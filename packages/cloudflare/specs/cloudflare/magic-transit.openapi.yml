  /accounts/{account_id}/magic/connectors/{connectorId}/telemetry/snapshots:
    get:
      operationId: listConnectorSnapshots
      description: "List Snapshots  @example ```ts const snapshots = await
        client.magicTransit.connectors.snapshots.list( 'connector_id', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', from: 0, to: 0, }, );
        ```"
      parameters:
        - name: connectorId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier"
          schema:
            type: string
        - name: from
          in: query
          required: true
          description: Query param
          schema:
            type: number
        - name: to
          in: query
          required: true
          description: Query param
          schema:
            type: number
        - name: cursor
          in: query
          required: false
          description: Query param
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Query param
          schema:
            type: number
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: number
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        a:
                          type: number
                          description: Time the Snapshot was collected (seconds since the Unix epoch)
                        t:
                          type: number
                          description: Time the Snapshot was recorded (seconds since the Unix epoch)
                      required:
                        - a
                        - t
                  cursor:
                    type: string
                required:
                  - count
                  - items
      x-distilled-response-path: result
