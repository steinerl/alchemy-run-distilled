  /accounts/{account_id}/magic/cf_interconnects/{cfInterconnectId}:
    get:
      operationId: getCfInterconnect
      description: "Lists details for a specific interconnect.  @example ```ts const
        cfInterconnect = await client.magicTransit.cfInterconnects.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: cfInterconnectId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: x-magic-new-hc-target
          in: header
          required: false
          description: "Header param: If true, the health check target in the response
            body will be presented using the new object format. Defaults to
            false."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  interconnect:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Identifier
                      automatic_return_routing:
                        type: boolean
                        description: True if automatic stateful return routing should be enabled for a
                          tunnel, false otherwise. Requires the
                          `coupler_integration` account flag to be enabled;
                          requests setting this to `true` without that flag will
                          be rejected.
                      colo_name:
                        type: string
                        description: The name of the interconnect. The name cannot share a name with
                          other tunnels.
                      created_on:
                        type: string
                        description: The date and time the tunnel was created.
                      description:
                        type: string
                        description: An optional description of the interconnect.
                      gre:
                        type: object
                        properties:
                          cloudflare_endpoint:
                            type: string
                            description: The IP address assigned to the Cloudflare side of the GRE tunnel
                              created as part of the Interconnect.
                        description: The configuration specific to GRE interconnects.
                      health_check:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            description: Determines whether to run healthchecks for a tunnel.
                          rate:
                            type: string
                            enum:
                              - low
                              - mid
                              - high
                            description: How frequent the health check is run. The default value is `mid`.
                          target:
                            oneOf:
                              - type: object
                                properties:
                                  effective:
                                    type: string
                                    description: The effective health check target. If 'saved' is empty, then this
                                      field will be populated with the
                                      calculated default value on GET requests.
                                      Ignored in POST, PUT, and PATCH requests.
                                  saved:
                                    type: string
                                    description: The saved health check target. Setting the value to the empty
                                      string indicates that the calculated
                                      default value will be used.
                              - type: string
                            description: The destination address in a request type health check. After the
                              healthcheck is decapsulated at the customer end of
                              the tunnel, the ICMP echo will be forwarded to
                              this address. This field defaults to
                              `customer_gre_endpoint address`. This field is
                              ignored for bidirectional healthchecks as the
                              interface_address (not assigned to the Cloudflare
                              side of the tunnel) is used as the target. Must be
                              in object form if the x-magic-new-hc-target header
                              is set to true and string form if
                              x-magic-new-hc-target is absent or set to false.
                          type:
                            type: string
                            enum:
                              - reply
                              - request
                            description: The type of healthcheck to run, reply or request. The default value
                              is `reply`.
                      interface_address:
                        type: string
                        description: "A 31-bit prefix (/31 in CIDR notation) supporting two hosts, one
                          for each side of the tunnel. Select the subnet from
                          the following private IP space:
                          10.0.0.0–10.255.255.255, 172.16.0.0–172.31.255.255,
                          192.168.0.0–192.168.255.255."
                      interface_address6:
                        type: string
                        description: A 127 bit IPV6 prefix from within the virtual_subnet6 prefix space
                          with the address being the first IP of the subnet and
                          not same as the address of virtual_subnet6. Eg if
                          virtual_subnet6 is 2606:54c1:7:0:a9fe:12d2::/127 ,
                          interface_address6 could be
                          2606:54c1:7:0:a9fe:12d2:1:200/127
                      modified_on:
                        type: string
                        description: The date and time the tunnel was last modified.
                      mtu:
                        type: number
                        description: The Maximum Transmission Unit (MTU) in bytes for the interconnect.
                          The minimum value is 576.
                      name:
                        type: string
                        description: The name of the interconnect. The name cannot share a name with
                          other tunnels.
                      virtual_port_reservation_id:
                        type: string
                        description: An identifier that correlates this interconnect with the
                          corresponding V2 CNI interconnect resource.
      x-distilled-response-path: result
    put:
      operationId: putCfInterconnect
      description: "Updates a specific interconnect associated with an account. Use
        `?validate_only=true` as an optional query parameter to only run
        validation without persisting changes.  @example ```ts const
        cfInterconnect = await client.magicTransit.cfInterconnects.update(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: cfInterconnectId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: x-magic-new-hc-target
          in: header
          required: false
          description: "Header param: If true, the health check target in the request and
            response bodies will be presented using the new object format.
            Defaults to false."
          schema:
            type: boolean
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                automatic_return_routing:
                  type: boolean
                  description: "Body param: True if automatic stateful return routing should be
                    enabled for a tunnel, false otherwise. Requires the
                    `coupler_integration` account flag to be enabled; requests
                    setting this to `true` without that flag will be rejected."
                description:
                  type: string
                  description: "Body param: An optional description of the interconnect."
                gre:
                  type: object
                  properties:
                    cloudflare_endpoint:
                      type: string
                      description: The IP address assigned to the Cloudflare side of the GRE tunnel
                        created as part of the Interconnect.
                  description: "Body param: The configuration specific to GRE interconnects."
                health_check:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Determines whether to run healthchecks for a tunnel.
                    rate:
                      type: string
                      enum:
                        - low
                        - mid
                        - high
                      description: How frequent the health check is run. The default value is `mid`.
                    target:
                      oneOf:
                        - type: object
                          properties:
                            saved:
                              type: string
                              description: The saved health check target. Setting the value to the empty
                                string indicates that the calculated default
                                value will be used.
                        - type: string
                      description: The destination address in a request type health check. After the
                        healthcheck is decapsulated at the customer end of the
                        tunnel, the ICMP echo will be forwarded to this address.
                        This field defaults to `customer_gre_endpoint address`.
                        This field is ignored for bidirectional healthchecks as
                        the interface_address (not assigned to the Cloudflare
                        side of the tunnel) is used as the target. Must be in
                        object form if the x-magic-new-hc-target header is set
                        to true and string form if x-magic-new-hc-target is
                        absent or set to false.
                    type:
                      type: string
                      enum:
                        - reply
                        - request
                      description: The type of healthcheck to run, reply or request. The default value
                        is `reply`.
                  description: Body param
                interface_address:
                  type: string
                  description: "Body param: A 31-bit prefix (/31 in CIDR notation) supporting two
                    hosts, one for each side of the tunnel. Select the subnet
                    from the following private IP space:
                    10.0.0.0–10.255.255.255, 172.16.0.0–172.31.255.255,
                    192.168.0.0–192.168.255.255."
                interface_address6:
                  type: string
                  description: "Body param: A 127 bit IPV6 prefix from within the virtual_subnet6
                    prefix space with the address being the first IP of the
                    subnet and not same as the address of virtual_subnet6. Eg if
                    virtual_subnet6 is 2606:54c1:7:0:a9fe:12d2::/127 ,
                    interface_address6 could be
                    2606:54c1:7:0:a9fe:12d2:1:200/127"
                mtu:
                  type: number
                  description: "Body param: The Maximum Transmission Unit (MTU) in bytes for the
                    interconnect. The minimum value is 576."
                name:
                  type: string
                  description: "Body param: The name of the interconnect. The name cannot share a
                    name with other tunnels."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  modified:
                    type: boolean
                  modified_interconnect:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Identifier
                      automatic_return_routing:
                        type: boolean
                        description: True if automatic stateful return routing should be enabled for a
                          tunnel, false otherwise. Requires the
                          `coupler_integration` account flag to be enabled;
                          requests setting this to `true` without that flag will
                          be rejected.
                      colo_name:
                        type: string
                        description: The name of the interconnect. The name cannot share a name with
                          other tunnels.
                      created_on:
                        type: string
                        description: The date and time the tunnel was created.
                      description:
                        type: string
                        description: An optional description of the interconnect.
                      gre:
                        type: object
                        properties:
                          cloudflare_endpoint:
                            type: string
                            description: The IP address assigned to the Cloudflare side of the GRE tunnel
                              created as part of the Interconnect.
                        description: The configuration specific to GRE interconnects.
                      health_check:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            description: Determines whether to run healthchecks for a tunnel.
                          rate:
                            type: string
                            enum:
                              - low
                              - mid
                              - high
                            description: How frequent the health check is run. The default value is `mid`.
                          target:
                            oneOf:
                              - type: object
                                properties:
                                  effective:
                                    type: string
                                    description: The effective health check target. If 'saved' is empty, then this
                                      field will be populated with the
                                      calculated default value on GET requests.
                                      Ignored in POST, PUT, and PATCH requests.
                                  saved:
                                    type: string
                                    description: The saved health check target. Setting the value to the empty
                                      string indicates that the calculated
                                      default value will be used.
                              - type: string
                            description: The destination address in a request type health check. After the
                              healthcheck is decapsulated at the customer end of
                              the tunnel, the ICMP echo will be forwarded to
                              this address. This field defaults to
                              `customer_gre_endpoint address`. This field is
                              ignored for bidirectional healthchecks as the
                              interface_address (not assigned to the Cloudflare
                              side of the tunnel) is used as the target. Must be
                              in object form if the x-magic-new-hc-target header
                              is set to true and string form if
                              x-magic-new-hc-target is absent or set to false.
                          type:
                            type: string
                            enum:
                              - reply
                              - request
                            description: The type of healthcheck to run, reply or request. The default value
                              is `reply`.
                      interface_address:
                        type: string
                        description: "A 31-bit prefix (/31 in CIDR notation) supporting two hosts, one
                          for each side of the tunnel. Select the subnet from
                          the following private IP space:
                          10.0.0.0–10.255.255.255, 172.16.0.0–172.31.255.255,
                          192.168.0.0–192.168.255.255."
                      interface_address6:
                        type: string
