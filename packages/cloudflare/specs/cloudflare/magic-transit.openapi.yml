        IKE session. Use `?validate_only=true` as an optional query parameter to
        only run validation without persisting changes. After a PSK is
        generated, the PSK is immediately persisted to Cloudflare's edge and
        cannot be retrieved later. Note the PSK in a safe place.  @example ```ts
        const response = await client.magicTransit.ipsecTunnels.pskGenerate(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', body: {}, }, ); ```"
      parameters:
        - name: ipsecTunnelId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema: {}
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ipsec_tunnel_id:
                    type: string
                    description: Identifier
                  psk:
                    type: string
                    description: A randomly generated or provided string for use in the IPsec
                      tunnel.
                  psk_metadata:
                    type: object
                    properties:
