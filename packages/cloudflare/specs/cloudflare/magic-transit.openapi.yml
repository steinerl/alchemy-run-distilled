openapi: 3.1.0
info:
  title: Cloudflare MAGIC-TRANSIT API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: magic-transit
paths:
  /accounts/{account_id}/magic/apps:
    get:
      operationId: listApps
      description: "Lists Apps associated with an account.  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        appListResponse of client.magicTransit.apps.list( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      account_app_id:
                        type: string
                        description: Magic account app ID.
                      hostnames:
                        type: array
                        items:
                          type: string
                        description: FQDNs to associate with traffic decisions.
                      ip_subnets:
                        type: array
                        items:
                          type: string
                        description: IPv4 CIDRs to associate with traffic decisions. (IPv6 CIDRs are
                          currently unsupported)
                      name:
                        type: string
                        description: Display name for the app.
                      source_subnets:
                        type: array
                        items:
                          type: string
                        description: IPv4 CIDRs to associate with traffic decisions. (IPv6 CIDRs are
                          currently unsupported)
                      type:
                        type: string
                        description: Category of the app.
                    required:
                      - account_app_id
                  - type: object
                    properties:
                      managed_app_id:
                        type: string
                        description: Managed app ID.
                      hostnames:
                        type: array
                        items:
                          type: string
                        description: FQDNs to associate with traffic decisions.
                      ip_subnets:
                        type: array
                        items:
                          type: string
                        description: IPv4 CIDRs to associate with traffic decisions. (IPv6 CIDRs are
                          currently unsupported)
                      name:
                        type: string
                        description: Display name for the app.
                      source_subnets:
                        type: array
                        items:
                          type: string
                        description: IPv4 CIDRs to associate with traffic decisions. (IPv6 CIDRs are
                          currently unsupported)
                      type:
                        type: string
                        description: Category of the app.
                    required:
                      - managed_app_id
      x-distilled-pagination-class: AppListResponsesSinglePage
      x-distilled-errors:
        MagicWanUnauthorized:
          - code: 1025
        Forbidden:
          - status: 403
    post:
      operationId: createApp
      description: "Creates a new App for an account  @example ```ts const app = await
        client.magicTransit.apps.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', name: 'Cloudflare Dashboard', type:
        'Development', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: Display name for the app."
                type:
                  type: string
                  description: "Body param: Category of the app."
                hostnames:
                  type: array
                  items:
                    type: string
                  description: "Body param: FQDNs to associate with traffic decisions."
                ip_subnets:
                  type: array
                  items:
                    type: string
                  description: "Body param: IPv4 CIDRs to associate with traffic decisions. (IPv6
                    CIDRs are currently unsupported)"
                source_subnets:
                  type: array
                  items:
                    type: string
                  description: "Body param: IPv4 CIDRs to associate with traffic decisions. (IPv6
                    CIDRs are currently unsupported)"
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_app_id:
                    type: string
                    description: Magic account app ID.
                  hostnames:
                    type: array
                    items:
                      type: string
                    description: FQDNs to associate with traffic decisions.
                  ip_subnets:
                    type: array
                    items:
                      type: string
                    description: IPv4 CIDRs to associate with traffic decisions. (IPv6 CIDRs are
                      currently unsupported)
                  name:
                    type: string
                    description: Display name for the app.
                  source_subnets:
                    type: array
                    items:
                      type: string
                    description: IPv4 CIDRs to associate with traffic decisions. (IPv6 CIDRs are
                      currently unsupported)
                  type:
                    type: string
                    description: Category of the app.
                required:
                  - account_app_id
      x-distilled-response-path: result
      x-distilled-errors:
        MagicWanUnauthorized:
          - code: 1025
        Forbidden:
          - status: 403
