  /accounts/{account_id}/magic/cf_interconnects:
    get:
      operationId: listCfInterconnects
      description: "Lists interconnects associated with an account.  @example ```ts
        const cfInterconnects = await client.magicTransit.cfInterconnects.list({
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: x-magic-new-hc-target
          in: header
          required: false
          description: "Header param: If true, the health check target in the response
            body will be presented using the new object format. Defaults to
            false."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  interconnects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Identifier
                        automatic_return_routing:
                          type: boolean
                          description: True if automatic stateful return routing should be enabled for a
                            tunnel, false otherwise. Requires the
                            `coupler_integration` account flag to be enabled;
                            requests setting this to `true` without that flag
                            will be rejected.
