openapi: 3.1.0
info:
  title: Cloudflare RULESETS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: rulesets
paths:
  /{accountOrZone}/{accountOrZoneId}/rulesets/phases/{rulesetPhase}/entrypoint:
    get:
      operationId: getPhas
      parameters:
        - name: rulesetPhase
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique ID of the ruleset.
                  kind:
                    type: string
                    enum:
                      - managed
                      - custom
                      - root
                      - zone
                    description: The kind of the ruleset.
                  last_updated:
                    type: string
                    description: The timestamp of when the ruleset was last modified.
                  name:
                    type: string
                    description: The human-readable name of the ruleset.
                  phase:
                    type: string
                    enum:
                      - ddos_l4
                      - ddos_l7
                      - http_config_settings
                      - http_custom_errors
                      - http_log_custom_fields
                      - http_ratelimit
                      - http_request_cache_settings
                      - http_request_dynamic_redirect
                      - http_request_firewall_custom
                      - http_request_firewall_managed
                      - http_request_late_transform
                      - http_request_origin
                      - http_request_redirect
                      - http_request_sanitize
                      - http_request_sbfm
                      - http_request_transform
                      - http_response_compression
                      - http_response_firewall_managed
                      - http_response_headers_transform
                      - magic_transit
                      - magic_transit_ids_managed
                      - magic_transit_managed
                      - magic_transit_ratelimit
                    description: The phase of the ruleset.
                  rules:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            last_updated:
                              type: string
                              description: The timestamp of when the rule was last modified.
                            version:
                              type: string
                              description: The version of the rule.
                            id:
                              type: string
                              description: The unique ID of the rule.
                            action:
                              type: string
                              enum:
                                - block
                              description: The action to perform when the rule matches.
                            action_parameters:
                              type: object
                              properties:
                                response:
                                  type: object
                                  properties:
                                    content:
                                      type: string
                                      description: The content to return.
                                    content_type:
                                      type: string
                                      description: The type of the content to return.
                                    status_code:
                                      type: number
                                      description: The status code to return.
                                  required:
                                    - content
                                    - content_type
                                    - status_code
                                  description: The response to show when the block is applied.
                              description: The parameters configuring the rule's action.
                            categories:
                              type: array
                              items:
                                type: string
                              description: The categories of the rule.
                            description:
                              type: string
                              description: An informative description of the rule.
                            enabled:
                              type: boolean
                              description: Whether the rule should be executed.
                            exposed_credential_check:
                              type: object
                              properties:
                                password_expression:
                                  type: string
                                  description: An expression that selects the password used in the credentials
                                    check.
                                username_expression:
                                  type: string
                                  description: An expression that selects the user ID used in the credentials
                                    check.
                              required:
                                - password_expression
                                - username_expression
                              description: Configuration for exposed credential checking.
                            expression:
                              type: string
                              description: The expression defining which traffic will match the rule.
                            logging:
                              type: object
                              properties:
                                enabled:
                                  type: boolean
                                  description: Whether to generate a log when the rule matches.
                              required:
                                - enabled
                              description: An object configuring the rule's logging behavior.
                            ratelimit:
                              type: object
                              properties:
                                characteristics:
                                  type: array
                                  items:
                                    type: string
                                  description: Characteristics of the request on which the rate limit counter will
                                    be incremented.
                                period:
                                  type: number
                                  description: Period in seconds over which the counter is being incremented.
                                counting_expression:
                                  type: string
                                  description: An expression that defines when the rate limit counter should be
                                    incremented. It defaults to the same as the
                                    rule's expression.
                                mitigation_timeout:
                                  type: number
                                  description: Period of time in seconds after which the action will be disabled
                                    following its first execution.
                                requests_per_period:
                                  type: number
                                  description: The threshold of requests per period after which the action will be
                                    executed for the first time.
                                requests_to_origin:
                                  type: boolean
                                  description: Whether counting is only performed when an origin is reached.
                                score_per_period:
                                  type: number
                                  description: The score threshold per period for which the action will be
                                    executed the first time.
                                score_response_header_name:
                                  type: string
                                  description: A response header name provided by the origin, which contains the
                                    score to increment rate limit counter with.
                              required:
                                - characteristics
                                - period
                              description: An object configuring the rule's rate limit behavior.
                            ref:
                              type: string
                              description: The reference of the rule (the rule's ID by default).
                          required:
                            - last_updated
