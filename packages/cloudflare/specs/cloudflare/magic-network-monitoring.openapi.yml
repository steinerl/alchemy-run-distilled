                name:
                  type: string
                  description: "Body param: The account name."
                router_ips:
                  type: array
                  items:
                    type: string
                  description: Body param
                warp_devices:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Unique identifier for the warp device.
                      name:
                        type: string
                        description: Name of the warp device.
                      router_ip:
                        type: string
                        description: IPv4 CIDR of the router sourcing flow data associated with this
                          warp device. Only /32 addresses are currently
                          supported.
                    required:
                      - id
                      - name
                      - router_ip
                  description: Body param
              required:
                - default_sampling
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      default_sampling:
                        type: number
                        description: Fallback sampling rate of flow messages being sent in packets per
                          second. This should match the packet sampling rate
                          configured on the router.
                      name:
                        type: string
                        description: The account name.
                      router_ips:
                        type: array
                        items:
                          type: string
                      warp_devices:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Unique identifier for the warp device.
                            name:
                              type: string
                              description: Name of the warp device.
                            router_ip:
                              type: string
                              description: IPv4 CIDR of the router sourcing flow data associated with this
                                warp device. Only /32 addresses are currently
                                supported.
                          required:
                            - id
                            - name
                            - router_ip
                nullable: true
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
        InvalidMnmConfig:
          - code: 1003
    patch:
      operationId: patchConfig
      description: "Update fields in an existing network monitoring
