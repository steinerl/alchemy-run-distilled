                    users of Magic Transit."
                name:
                  type: string
                  description: "Body param: The name of the rule. Must be unique. Supports
                    characters A-Z, a-z, 0-9, underscore (\\_), dash (-), period
                    (.), and tilde (~). You can’t have a space in the rule name.
                    Max 256 characters."
                prefixes:
                  type: array
                  items:
                    type: string
                  description: Body param
                type:
                  type: string
                  enum:
                    - threshold
                    - zscore
                    - advanced_ddos
                  description: "Body param: MNM rule type."
                bandwidth_threshold:
                  type: number
                  description: "Body param: The number of bits per second for the rule. When this
                    value is exceeded for the set duration, an alert
                    notification is sent. Minimum of 1 and no maximum."
                duration:
                  type: string
                  enum:
                    - 1m
                    - 5m
                    - 10m
                    - 15m
                    - 20m
                    - 30m
                    - 45m
                    - 60m
                  description: 'Body param: The amount of time that the rule threshold must be
                    exceeded to send an alert notification. The final value must
                    be equivalent to one of the following 8 values
                    ["1m","5m","10m","15m","20m","30m","45m","60m"].'
                packet_threshold:
                  type: number
                  description: "Body param: The number of packets per second for the rule. When
                    this value is exceeded for the set duration, an alert
