openapi: 3.1.0
info:
  title: Cloudflare MAGIC-NETWORK-MONITORING API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: magic-network-monitoring
paths:
  /accounts/{account_id}/mnm/config:
    get:
      operationId: getConfig
      description: "Lists default sampling, router IPs and warp devices for
        account.  @example ```ts const configuration = await
        client.magicNetworkMonitoring.configs.get({ account_id:
        '6f91088a406011ed95aed352566e8d4c', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      default_sampling:
                        type: number
                        description: Fallback sampling rate of flow messages being sent in packets per
                          second. This should match the packet sampling rate
                          configured on the router.
                      name:
                        type: string
                        description: The account name.
                      router_ips:
                        type: array
                        items:
                          type: string
                      warp_devices:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Unique identifier for the warp device.
                            name:
                              type: string
                              description: Name of the warp device.
                            router_ip:
                              type: string
                              description: IPv4 CIDR of the router sourcing flow data associated with this
                                warp device. Only /32 addresses are currently
                                supported.
                          required:
                            - id
                            - name
                            - router_ip
                nullable: true
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
    post:
      operationId: createConfig
      description: "Create a new network monitoring configuration.  @example ```ts
        const configuration = await
        client.magicNetworkMonitoring.configs.create({ account_id:
        '6f91088a406011ed95aed352566e8d4c', default_sampling: 1, name:
        \"cloudflare user's account\", }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Path param
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_sampling:
                  type: number
                  description: "Body param: Fallback sampling rate of flow messages being sent in
                    packets per second. This should match the packet sampling
                    rate configured on the router."
                name:
                  type: string
                  description: "Body param: The account name."
                router_ips:
                  type: array
                  items:
                    type: string
                  description: Body param
                warp_devices:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Unique identifier for the warp device.
                      name:
                        type: string
                        description: Name of the warp device.
                      router_ip:
                        type: string
                        description: IPv4 CIDR of the router sourcing flow data associated with this
                          warp device. Only /32 addresses are currently
                          supported.
                    required:
                      - id
                      - name
                      - router_ip
                  description: Body param
              required:
                - default_sampling
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  default_sampling:
                    type: number
                    description: Fallback sampling rate of flow messages being sent in packets per
                      second. This should match the packet sampling rate
                      configured on the router.
                  name:
                    type: string
                    description: The account name.
                  router_ips:
                    type: array
                    items:
                      type: string
                  warp_devices:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Unique identifier for the warp device.
                        name:
                          type: string
                          description: Name of the warp device.
                        router_ip:
                          type: string
                          description: IPv4 CIDR of the router sourcing flow data associated with this
                            warp device. Only /32 addresses are currently
                            supported.
                      required:
                        - id
                        - name
                        - router_ip
                required:
                  - default_sampling
                  - name
                  - router_ips
                  - warp_devices
      x-distilled-response-path: result
      x-distilled-errors:
        MnmConfigAlreadyExists:
          - code: 1005
            message:
              includes: already exists
        InvalidMnmConfig:
          - code: 1003
        Forbidden:
          - status: 403
    put:
      operationId: updateConfig
      description: "Update an existing network monitoring configuration, requires the
        entire configuration to be updated at once.  @example ```ts const
        configuration = await client.magicNetworkMonitoring.configs.update({
        account_id: '6f91088a406011ed95aed352566e8d4c', default_sampling: 1,
        name: \"cloudflare user's account\", }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Path param
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_sampling:
                  type: number
                  description: "Body param: Fallback sampling rate of flow messages being sent in
