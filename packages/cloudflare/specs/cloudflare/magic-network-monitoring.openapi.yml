                  name:
                    type: string
                    description: The name of the rule. Must be unique. Supports characters A-Z, a-z,
                      0-9, underscore (\_), dash (-), period (.), and tilde (~).
                      You can’t have a space in the rule name. Max 256
                      characters.
                  prefixes:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                    enum:
                      - threshold
                      - zscore
                      - advanced_ddos
                    description: MNM rule type.
                  bandwidth_threshold:
                    type: number
                    description: The number of bits per second for the rule. When this value is
                      exceeded for the set duration, an alert notification is
                      sent. Minimum of 1 and no maximum.
                  duration:
                    type: string
                    enum:
                      - 1m
                      - 5m
                      - 10m
                      - 15m
                      - 20m
                      - 30m
                      - 45m
                      - 60m
                    description: The amount of time that the rule threshold must be exceeded to send
                      an alert notification. The final value must be equivalent
