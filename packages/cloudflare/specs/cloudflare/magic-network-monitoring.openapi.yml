                prefix_match:
                  type: string
                  enum:
                    - exact
                    - subnet
                    - supernet
                  nullable: true
                  description: "Body param: Prefix match type to be applied for a prefix auto
                    advertisement when using an advanced_ddos rule."
                zscore_sensitivity:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                  nullable: true
                  description: "Body param: Level of sensitivity set for zscore rules."
                zscore_target:
                  type: string
                  enum:
                    - bits
                    - packets
                  nullable: true
                  description: "Body param: Target of the zscore rule analysis."
              required:
                - automatic_advertisement
                - name
                - prefixes
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The id of the rule. Must be unique.
                  automatic_advertisement:
                    oneOf:
                      - type: boolean
                    nullable: true
                    description: Toggle on if you would like Cloudflare to automatically advertise
                      the IP Prefixes within the rule via Magic Transit when the
                      rule is triggered. Only available for users of Magic
