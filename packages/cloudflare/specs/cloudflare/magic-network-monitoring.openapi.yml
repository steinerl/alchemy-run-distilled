  /accounts/{account_id}/mnm/rules/{ruleId}:
    get:
      operationId: getRule
      description: "List a single network monitoring rule for account.  @example ```ts
        const magicNetworkMonitoringRule = await
        client.magicNetworkMonitoring.rules.get(
        '2890e6fa406311ed9b5a23f70f6fb8cf', { account_id:
        '6f91088a406011ed95aed352566e8d4c' }, ); ```"
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The id of the rule. Must be unique.
                  automatic_advertisement:
                    oneOf:
                      - type: boolean
                    nullable: true
                    description: Toggle on if you would like Cloudflare to automatically advertise
                      the IP Prefixes within the rule via Magic Transit when the
                      rule is triggered. Only available for users of Magic
                      Transit.
                  name:
                    type: string
                    description: The name of the rule. Must be unique. Supports characters A-Z, a-z,
                      0-9, underscore (\_), dash (-), period (.), and tilde (~).
                      You can’t have a space in the rule name. Max 256
                      characters.
                  prefixes:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                    enum:
                      - threshold
                      - zscore
                      - advanced_ddos
                    description: MNM rule type.
                  bandwidth_threshold:
                    type: number
                    description: The number of bits per second for the rule. When this value is
                      exceeded for the set duration, an alert notification is
                      sent. Minimum of 1 and no maximum.
                  duration:
                    type: string
                    enum:
                      - 1m
                      - 5m
                      - 10m
                      - 15m
                      - 20m
                      - 30m
                      - 45m
                      - 60m
                    description: The amount of time that the rule threshold must be exceeded to send
                      an alert notification. The final value must be equivalent
                      to one of the following 8 values
                      ["1m","5m","10m","15m","20m","30m","45m","60m"].
                  packet_threshold:
                    type: number
                    description: The number of packets per second for the rule. When this value is
                      exceeded for the set duration, an alert notification is
                      sent. Minimum of 1 and no maximum.
                  prefix_match:
                    type: string
                    enum:
                      - exact
                      - subnet
                      - supernet
                    nullable: true
                    description: Prefix match type to be applied for a prefix auto advertisement
                      when using an advanced_ddos rule.
                  zscore_sensitivity:
                    type: string
                    enum:
                      - low
                      - medium
                      - high
                    nullable: true
                    description: Level of sensitivity set for zscore rules.
                  zscore_target:
                    type: string
                    enum:
                      - bits
                      - packets
                    nullable: true
                    description: Target of the zscore rule analysis.
                required:
                  - id
                  - automatic_advertisement
                  - name
                  - prefixes
                  - type
      x-distilled-response-path: result
      x-distilled-errors:
        MnmRuleNotFound:
          - code: 1009
        Forbidden:
          - status: 403
    patch:
      operationId: patchRule
      description: "Update a network monitoring rule for account.  @example ```ts
        const magicNetworkMonitoringRule = await
