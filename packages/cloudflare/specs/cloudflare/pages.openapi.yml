openapi: 3.1.0
info:
  title: Cloudflare PAGES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: pages
paths:
  /accounts/{account_id}/pages/projects/{projectName}/purge_build_cache:
    post:
      operationId: purgeBuildCacheProject
      description: "Purge all cached build artifacts for a Pages project  @example
        ```ts const response = await client.pages.projects.purgeBuildCache(
        'this-is-my-project-01', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: projectName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
  /accounts/{account_id}/pages/projects/{projectName}:
    get:
      operationId: getProject
      description: "Fetch a project by name.  @example ```ts const project = await
        client.pages.projects.get( 'this-is-my-project-01', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: projectName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the project.
                  canonical_deployment:
                    oneOf:
                      - type: object
