openapi: 3.1.0
info:
  title: Cloudflare ORIGIN-TLS-CLIENT-AUTH API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: origin-tls-client-auth
paths:
  /zones/{zone_id}/origin_tls_client_auth/hostnames/{hostname}:
    get:
      operationId: getHostname
      description: "Retrieves the client certificate authentication status for a
        specific hostname, showing whether authenticated origin pulls are
        enabled.  @example ```ts const authenticatedOriginPull = await
        client.originTLSClientAuth.hostnames.get( 'app.example.com', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: hostname
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  cert_id:
                    type: string
                    description: Identifier.
                  cert_status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate or the association.
                  cert_updated_at:
                    type: string
                    description: The time when the certificate was updated.
                  cert_uploaded_on:
                    type: string
                    description: The time when the certificate was uploaded.
                  certificate:
                    type: string
                    description: The hostname certificate.
                  created_at:
                    type: string
                    description: The time when the certificate was created.
                  enabled:
                    oneOf:
                      - type: boolean
                    nullable: true
                    description: Indicates whether hostname-level authenticated origin pulls is
                      enabled. A null value voids the association.
                  expires_on:
                    type: string
                    description: The date when the certificate expires.
                  hostname:
                    type: string
                    description: The hostname on the origin for which the client certificate
                      uploaded will be used.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  serial_number:
                    type: string
                    description: The serial number on the uploaded certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate or the association.
                  updated_at:
                    type: string
                    description: The time when the certificate was updated.
      x-distilled-response-path: result
      x-distilled-errors:
        HostnameAssociationNotFound:
          - code: 1553
            message:
              includes: setting for this hostname not found
          - status: 404
        Forbidden:
          - status: 403
  /zones/{zone_id}/origin_tls_client_auth/hostnames:
    put:
      operationId: putHostname
      description: "Associate a hostname to a certificate and enable, disable or
        invalidate the association. If disabled, client certificate will not be
        sent to the hostname even if activated at the zone level. 100 maximum
        associations on a single certificate are allowed. Note: Use a null value
        for parameter _enabled_ to invalidate the association.  @example ```ts
        // Automatically fetches more pages as needed. for await (const
        hostnameUpdateResponse of client.originTLSClientAuth.hostnames.update( {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353', config: [{}], }, )) { //
        ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: array
                  items:
                    type: object
                    properties:
                      cert_id:
                        type: string
                        description: Certificate identifier tag.
                      enabled:
                        oneOf:
                          - type: boolean
                        nullable: true
                        description: Indicates whether hostname-level authenticated origin pulls is
                          enabled. A null value voids the association.
                      hostname:
                        type: string
                        description: The hostname on the origin for which the client certificate
                          uploaded will be used.
                  description: Body param
              required:
                - config
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  cert_id:
                    type: string
                    description: Identifier.
                  cert_status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate or the association.
                  cert_updated_at:
                    type: string
                    description: The time when the certificate was updated.
                  cert_uploaded_on:
                    type: string
                    description: The time when the certificate was uploaded.
                  certificate:
                    type: string
                    description: The hostname certificate.
                  created_at:
                    type: string
                    description: The time when the certificate was created.
                  enabled:
                    oneOf:
                      - type: boolean
                    nullable: true
                    description: Indicates whether hostname-level authenticated origin pulls is
                      enabled. A null value voids the association.
                  expires_on:
                    type: string
                    description: The date when the certificate expires.
                  hostname:
                    type: string
                    description: The hostname on the origin for which the client certificate
                      uploaded will be used.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  serial_number:
                    type: string
                    description: The serial number on the uploaded certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate or the association.
                  updated_at:
                    type: string
                    description: The time when the certificate was updated.
                  id:
                    type: string
                    description: Identifier.
                  private_key:
                    type: string
                    description: The hostname certificate's private key.
      x-distilled-pagination-class: HostnameUpdateResponsesSinglePage
      x-distilled-errors:
        HostnameCertificateIdRequired:
          - code: 1404
            message:
              includes: Certificate ID required
        InvalidHostnameConfig:
          - code: 1415
        Forbidden:
          - status: 403
  /zones/{zone_id}/origin_tls_client_auth/hostnames/certificates/{certificateId}:
    get:
      operationId: getHostnameCertificate
      description: "Get the certificate by ID to be used for client authentication on
        a hostname.  @example ```ts const hostnameCertificate = await
        client.originTLSClientAuth.hostnameCertificates.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  certificate:
                    type: string
                    description: The hostname certificate.
                  expires_on:
                    type: string
                    description: The date when the certificate expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  serial_number:
                    type: string
                    description: The serial number on the uploaded certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate or the association.
                  uploaded_on:
                    type: string
                    description: The time when the certificate was uploaded.
      x-distilled-response-path: result
      x-distilled-errors:
        HostnameCertificateNotFound:
          - code: 1552
          - code: 1551
          - status: 404
        Forbidden:
          - status: 403
    delete:
      operationId: deleteHostnameCertificate
      description: "Removes a client certificate used for authenticated origin pulls
        on a specific hostname. Note: Before deleting the certificate, you must
        first invalidate the hostname for client authentication by sending a PUT
        request with `enabled` set to null. After invalidating the association,
        the certificate can be safely deleted.  @example ```ts const
        hostnameCertificate = await
        client.originTLSClientAuth.hostnameCertificates.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  certificate:
                    type: string
                    description: The hostname certificate.
                  expires_on:
                    type: string
                    description: The date when the certificate expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  serial_number:
                    type: string
                    description: The serial number on the uploaded certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate or the association.
                  uploaded_on:
                    type: string
                    description: The time when the certificate was uploaded.
      x-distilled-response-path: result
      x-distilled-errors:
        HostnameCertificateNotFound:
          - code: 1552
          - code: 1551
          - status: 404
        HostnameCertificateInUse:
          - code: 1433
            message:
              includes: in use
        CertificatePendingDeletion:
          - code: 1414
            message:
              includes: pending deletion
        CertificatePendingDeployment:
          - code: 1434
            message:
              includes: pending deployment
        InvalidCertificateId:
          - code: 1415
            message:
              includes: Invalid Certificate ID
        Forbidden:
          - status: 403
  /zones/{zone_id}/origin_tls_client_auth/hostnames/certificates:
    get:
      operationId: listHostnameCertificates
      description: "Lists all client certificates configured for per-hostname
        authenticated origin pulls on the zone.  @example ```ts // Automatically
