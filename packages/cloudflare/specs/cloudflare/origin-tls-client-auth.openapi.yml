  /zones/{zone_id}/origin_tls_client_auth/{certificateId}:
    get:
      operationId: getZoneCertificate
      description: "Retrieves details for a specific client certificate used in
        zone-level authenticated origin pulls.  @example ```ts const
        zoneCertificate = await client.originTLSClientAuth.zoneCertificates.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  certificate:
                    type: string
                    description: The zone's leaf certificate.
                  expires_on:
                    type: string
                    description: When the certificate from the authority expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate activation.
                  uploaded_on:
                    type: string
                    description: This is the time the certificate was uploaded.
                  enabled:
                    type: boolean
                    description: Indicates whether zone-level authenticated origin pulls is enabled.
                  private_key:
                    type: string
                    description: The zone's private key.
      x-distilled-response-path: result
    delete:
      operationId: deleteZoneCertificate
      description: "Removes a client certificate used for zone-level authenticated
        origin pulls.  @example ```ts const zoneCertificate = await
        client.originTLSClientAuth.zoneCertificates.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  certificate:
                    type: string
                    description: The zone's leaf certificate.
                  expires_on:
                    type: string
                    description: When the certificate from the authority expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deleted
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the certificate activation.
                  uploaded_on:
                    type: string
                    description: This is the time the certificate was uploaded.
                  enabled:
                    type: boolean
                    description: Indicates whether zone-level authenticated origin pulls is enabled.
                  private_key:
                    type: string
                    description: The zone's private key.
      x-distilled-response-path: result
  /zones/{zone_id}/origin_tls_client_auth:
    get:
      operationId: listZoneCertificates
      description: "Lists all client certificates configured for zone-level
        authenticated origin pulls.  @example ```ts // Automatically fetches
        more pages as needed. for await (const zoneCertificateListResponse of
        client.originTLSClientAuth.zoneCertificates.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  certificate:
                    type: string
                    description: The zone's leaf certificate.
                  expires_on:
                    type: string
                    description: When the certificate from the authority expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
