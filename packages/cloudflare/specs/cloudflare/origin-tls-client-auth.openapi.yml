  /zones/{zone_id}/origin_tls_client_auth/settings:
    get:
      operationId: getSetting
      description: "Get whether zone-level authenticated origin pulls is enabled or
        not. It is false by default.  @example ```ts const setting = await
        client.originTLSClientAuth.settings.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: Indicates whether zone-level authenticated origin pulls is enabled.
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
    put:
      operationId: putSetting
      description: "Enable or disable zone-level authenticated origin pulls. 'enabled'
        should be set true either before/after the certificate is uploaded to
        see the certificate in use.  @example ```ts const setting = await
        client.originTLSClientAuth.settings.update({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', enabled: true, }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: "Body param: Indicates whether zone-level authenticated origin
                    pulls is enabled."
              required:
                - enabled
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: Indicates whether zone-level authenticated origin pulls is enabled.
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
