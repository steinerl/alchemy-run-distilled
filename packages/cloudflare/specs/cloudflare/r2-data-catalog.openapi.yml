  /accounts/{account_id}/r2-catalog/{bucketName}:
    get:
      operationId: getR2DataCatalog
      description: "Retrieve detailed information about a specific R2 catalog by
        bucket name. Returns catalog status, maintenance configuration, and
        credential status.  @example ```ts const r2DataCatalog = await
        client.r2DataCatalog.get( 'my-data-bucket', { account_id:
        '0123456789abcdef0123456789abcdef' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Use this to identify the account.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Use this to uniquely identify the catalog.
                  bucket:
                    type: string
                    description: Specifies the associated R2 bucket name.
                  name:
                    type: string
                    description: Specifies the catalog name (generated from account and bucket
                      name).
                  status:
                    type: string
                    enum:
                      - active
                      - inactive
                    description: Indicates the status of the catalog.
                  credential_status:
                    type: string
                    enum:
                      - present
                      - absent
                    nullable: true
                    description: Shows the credential configuration status.
                  maintenance_config:
                    oneOf:
                      - type: object
                        properties:
                          compaction:
                            type: object
                            properties:
                              state:
                                type: string
                                enum:
                                  - enabled
                                  - disabled
                                description: Specifies the state of maintenance operations.
                              target_size_mb:
                                type: number
                                enum:
                                  - 64
                                  - 128
                                  - 256
                                  - 512
                                description: Sets the target file size for compaction in megabytes.
                            required:
                              - state
                              - target_size_mb
                            description: Configures compaction for catalog maintenance.
                          snapshot_expiration:
                            type: object
                            properties:
                              max_snapshot_age:
                                type: string
                                description: 'Specifies the maximum age for snapshots. The system deletes
                                  snapshots older than this age. Format:
                                  <number><unit> where unit is d (days), h
                                  (hours), m (minutes), or s (seconds).
                                  Examples: "7d" (7 days), "48h" (48 hours),
                                  "2880m" (2,880 minutes).'
                              min_snapshots_to_keep:
                                type: number
                                description: Specifies the minimum number of snapshots to retain.
                              state:
                                type: string
                                enum:
                                  - enabled
                                  - disabled
                                description: Specifies the state of maintenance operations.
                            required:
                              - max_snapshot_age
                              - min_snapshots_to_keep
                              - state
                            description: Configures snapshot expiration settings.
                    nullable: true
                    description: Configures maintenance for the catalog.
                required:
                  - id
                  - bucket
                  - name
                  - status
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/r2-catalog:
    get:
      operationId: listR2DataCatalogs
      description: "Returns a list of R2 buckets that have been enabled as Apache
