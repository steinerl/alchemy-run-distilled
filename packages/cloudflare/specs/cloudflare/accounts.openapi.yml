openapi: 3.1.0
info:
  title: Cloudflare ACCOUNTS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: accounts
paths:
  /accounts/{account_id}:
    get:
      operationId: getAccount
      description: "Get information about a specific account that you are a member
        of.  @example ```ts const account = await client.accounts.get({
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  name:
                    type: string
                    description: Account name
                  type:
                    type: string
                    enum:
                      - standard
                      - enterprise
                  created_on:
                    type: string
                    description: Timestamp for the creation of the account
                  managed_by:
                    type: object
                    properties:
                      parent_org_id:
                        type: string
                        description: ID of the parent Organization, if one exists
                      parent_org_name:
                        type: string
                        description: Name of the parent Organization, if one exists
                    description: Parent container details
                  settings:
                    type: object
                    properties:
                      abuse_contact_email:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Sets an abuse contact email to notify for abuse reports.
                      enforce_twofactor:
                        oneOf:
                          - type: boolean
                        nullable: true
                        description: Indicates whether membership in this account requires that
                          Two-Factor Authentication is enabled
                    description: Account settings
                required:
                  - id
                  - name
                  - type
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
    put:
      operationId: updateAccount
      description: "Update an existing account.  @example ```ts const account = await
        client.accounts.update({ account_id: '023e105f4ecef8ad9ca31a8372d0c353',
        id: '023e105f4ecef8ad9ca31a8372d0c353', name: 'Demo Account', type:
        'standard', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: "Body param: Identifier"
                name:
                  type: string
                  description: "Body param: Account name"
                type:
                  type: string
                  enum:
                    - standard
                    - enterprise
                  description: Body param
                managed_by:
                  type: object
                  additionalProperties: true
                  description: "Body param: Parent container details"
                settings:
                  type: object
                  properties:
                    abuse_contact_email:
                      type: string
                      description: Sets an abuse contact email to notify for abuse reports.
                    enforce_twofactor:
                      type: boolean
                      description: Indicates whether membership in this account requires that
                        Two-Factor Authentication is enabled
                  description: "Body param: Account settings"
              required:
                - id
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  name:
                    type: string
                    description: Account name
                  type:
                    type: string
                    enum:
                      - standard
                      - enterprise
                  created_on:
                    type: string
                    description: Timestamp for the creation of the account
                  managed_by:
                    type: object
                    properties:
                      parent_org_id:
                        type: string
                        description: ID of the parent Organization, if one exists
                      parent_org_name:
                        type: string
                        description: Name of the parent Organization, if one exists
                    description: Parent container details
                  settings:
                    type: object
                    properties:
                      abuse_contact_email:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Sets an abuse contact email to notify for abuse reports.
                      enforce_twofactor:
                        oneOf:
                          - type: boolean
                        nullable: true
                        description: Indicates whether membership in this account requires that
                          Two-Factor Authentication is enabled
                    description: Account settings
                required:
                  - id
                  - name
                  - type
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidAccountName:
          - code: 1001
            message:
              includes: invalid character
        AccountNameTooLong:
          - code: 1001
            message:
              includes: too long
        UpdateAccountTypeNotSupported:
          - code: 1001
            message:
              includes: account type is not supported
        InvalidRoute:
          - code: 7003
        MethodNotAllowed:
          - code: 7001
    delete:
      operationId: deleteAccount
      description: "Delete a specific account (only available for tenant admins at
        this time). This is a permanent operation that will delete any zones or
        other resources under the account  @example ```ts const account = await
        client.accounts.delete({ account_id: 'account_id', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account ID of the account to be deleted
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                required:
                  - id
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        MethodNotAllowed:
          - code: 7001
  /accounts:
    get:
      operationId: listAccounts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  name:
                    type: string
                    description: Account name
                  type:
                    type: string
                    enum:
                      - standard
                      - enterprise
                  created_on:
                    type: string
                    description: Timestamp for the creation of the account
                  managed_by:
                    type: object
                    properties:
                      parent_org_id:
                        type: string
                        description: ID of the parent Organization, if one exists
                      parent_org_name:
                        type: string
                        description: Name of the parent Organization, if one exists
                    description: Parent container details
                  settings:
                    type: object
                    properties:
                      abuse_contact_email:
                        type: string
                        description: Sets an abuse contact email to notify for abuse reports.
                      enforce_twofactor:
                        type: boolean
                        description: Indicates whether membership in this account requires that
                          Two-Factor Authentication is enabled
                    description: Account settings
                required:
                  - id
                  - name
                  - type
      x-distilled-pagination-class: AccountsV4PagePaginationArray
    post:
      operationId: createAccount
      description: "Create an account (only available for tenant admins at this
        time)  @example ```ts const account = await client.accounts.create({
        name: 'name', }); ```"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Account name
                type:
                  type: string
                  enum:
                    - standard
                    - enterprise
                unit:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Tenant unit ID
                  description: information related to the tenant unit, and optionally, an id of
                    the unit to create the account on. see
                    https://developers.cloudflare.com/tenant/how-to/manage-accounts/
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  name:
                    type: string
                    description: Account name
                  type:
                    type: string
                    enum:
                      - standard
                      - enterprise
                  created_on:
                    type: string
                    description: Timestamp for the creation of the account
                  managed_by:
                    type: object
                    properties:
                      parent_org_id:
                        type: string
                        description: ID of the parent Organization, if one exists
                      parent_org_name:
                        type: string
                        description: Name of the parent Organization, if one exists
                    description: Parent container details
                  settings:
                    type: object
                    properties:
                      abuse_contact_email:
                        type: string
                        description: Sets an abuse contact email to notify for abuse reports.
                      enforce_twofactor:
                        type: boolean
                        description: Indicates whether membership in this account requires that
                          Two-Factor Authentication is enabled
                    description: Account settings
                required:
                  - id
                  - name
                  - type
      x-distilled-response-path: result
      x-distilled-errors:
        AccountCreationForbidden:
          - code: 1002
        MissingName:
          - code: 1001
  /accounts/{account_id}/logs/audit:
    get:
      operationId: listLogAudits
      description: "Gets a list of audit logs for an account.  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        auditListResponse of client.accounts.logs.audit.list( { account_id:
        'a67e14daa5f8dceeb91fe5449ba496ef', before: '2024-10-31', since:
        '2024-10-30', }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The unique id that identifies the account."
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: true
          description: "Query param: Limits the returned results to logs older than the
            specified date. This can be a date string 2019-04-30 (interpreted in
            UTC) or an absolute timestamp that conforms to RFC3339."
          schema:
            type: string
        - name: since
          in: query
          required: true
          description: "Query param: Limits the returned results to logs newer than the
            specified date. This can be a date string 2019-04-30 (interpreted in
            UTC) or an absolute timestamp that conforms to RFC3339."
          schema:
            type: string
        - name: id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by their IDs.
        - name: account_name
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the account name.
        - name: action_result
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                  enum:
                    - success
                    - failure
                description: Filters out audit logs by whether the action was successful or not.
        - name: action_type
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                  enum:
                    - create
                    - delete
                    - view
                    - update
                description: Filters out audit logs by the action type.
        - name: actor_context
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                  enum:
                    - api_key
                    - api_token
                    - dash
                    - oauth
                    - origin_ca_key
                description: Filters out audit logs by the actor context.
        - name: actor_email
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the actor's email address.
        - name: actor_id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the actor ID. This can be either the
                  Account ID or User ID.
        - name: actor_ip_address
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs IP address where the action was initiated.
        - name: actor_token_id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the API token ID when the actor context
                  is an api_token or oauth.
        - name: actor_token_name
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the API token name when the actor context
                  is an api_token or oauth.
        - name: actor_type
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                  enum:
                    - account
                    - cloudflare_admin
                    - system
                    - user
                description: Filters out audit logs by the actor type.
        - name: audit_log_id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: "@deprecated Filters out audit logs by their IDs."
        - name: direction
          in: query
          required: false
          description: "Query param: Sets sorting order."
          schema:
            type: string
            enum:
              - desc
              - asc
        - name: limit
          in: query
          required: false
          description: "Query param: The number limits the objects to return. The cursor
            attribute may be used to iterate over the next batch of objects if
            there are more than the limit."
          schema:
            type: number
        - name: raw_cf_ray_id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the response CF Ray ID.
        - name: raw_method
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the HTTP method for the API call.
        - name: raw_status_code
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: number
                description: Filters out audit logs by the response status code that was
                  returned.
        - name: raw_uri
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the request URI.
        - name: resource_id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the resource ID.
        - name: resource_product
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the Cloudflare product associated with
                  the changed resource.
        - name: resource_scope
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                  enum:
                    - accounts
                    - user
                    - zones
                    - memberships
                description: Filters out audit logs by the resource scope, specifying whether
                  the resource is associated with an user, an account, a zone,
                  or a membership.
        - name: resource_type
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs based on the unique type of resource changed
                  by the action.
        - name: zone_id
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the zone ID.
        - name: zone_name
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              not:
                type: array
                items:
                  type: string
                description: Filters out audit logs by the zone name associated with the change.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: A unique identifier for the audit log entry.
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                        description: A unique identifier for the account.
                      name:
                        type: string
                        description: A string that identifies the account name.
                    description: Contains account related information.
                  action:
                    type: object
                    properties:
                      description:
                        type: string
                        description: A short description of the action performed.
                      result:
                        type: string
                        description: The result of the action, indicating success or failure.
                      time:
                        type: string
                        description: A timestamp indicating when the action was logged.
                      type:
                        type: string
                        description: A short string that describes the action that was performed.
                    description: Provides information about the action performed.
                  actor:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The ID of the actor who performed the action. If a user performed
                          the action, this will be their User ID.
                      context:
                        type: string
                        enum:
                          - api_key
                          - api_token
                          - dash
                          - oauth
                          - origin_ca_key
                      email:
                        type: string
                        description: The email of the actor who performed the action.
                      ip_address:
                        type: string
                        description: The IP address of the request that performed the action.
                      token_id:
                        type: string
                        description: The API token ID when the actor context is an api_token or oauth.
                      token_name:
                        type: string
                        description: The API token name when the actor context is an api_token or oauth.
                      type:
                        type: string
                        enum:
                          - account
                          - cloudflare_admin
                          - system
                          - user
                        description: The type of actor.
                    description: Provides details about the actor who performed the action.
                  raw:
                    type: object
                    properties:
                      cf_ray_id:
                        type: string
                        description: The Cloudflare Ray ID for the request.
                      method:
                        type: string
                        description: The HTTP method of the request.
                      status_code:
                        type: number
                        description: The HTTP response status code returned by the API.
                      uri:
                        type: string
                        description: The URI of the request.
                      user_agent:
                        type: string
                        description: The client's user agent string sent with the request.
                    description: Provides raw information about the request and response.
                  resource:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The unique identifier for the affected resource.
                      product:
                        type: string
                        description: The Cloudflare product associated with the resource.
                      request: {}
                      response: {}
                      scope:
                        description: The scope of the resource.
                      type:
                        type: string
                        description: The type of the resource.
                    description: Provides details about the affected resource.
                  zone:
                    type: object
                    properties:
                      id:
                        type: string
                        description: A string that identifies the zone id.
                      name:
                        type: string
                        description: A string that identifies the zone name.
                    description: Provides details about the zone affected by the action.
      x-distilled-pagination-class: AuditListResponsesCursorPaginationAfter
  /accounts/{account_id}/members/{memberId}:
    get:
      operationId: getMember
      description: "Get information about a specific member of an account.  @example
        ```ts const member = await client.accounts.members.get(
        '4536bcfad5faccb111b47003c79917fa', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Membership identifier tag.
                  email:
                    type: string
                    description: The contact email address of the user.
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Policy identifier.
                        access:
                          type: string
                          enum:
                            - allow
                            - deny
                          description: Allow or deny operations against the resources.
                        permission_groups:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Identifier of the group.
                            required:
                              - id
                          description: A set of permission groups that are specified to the policy.
                        resource_groups:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Identifier of the group.
                            required:
                              - id
                          description: A list of resource groups that the policy applies to.
                    description: Access policy for the membership
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Role identifier tag.
                        description:
                          type: string
                          description: Description of role's permissions.
                        name:
                          type: string
                          description: Role name.
                        permissions:
                          type: object
                          properties:
                            analytics:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            billing:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            cache_purge:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            dns:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            dns_records:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            lb:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            logs:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            organization:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            ssl:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            waf:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            zone_settings:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                            zones:
                              type: object
                              properties:
                                read:
                                  type: boolean
                                write:
                                  type: boolean
                      required:
                        - id
                        - description
                        - name
                        - permissions
                    description: Roles assigned to this Member.
                  status:
                    type: string
                    enum:
                      - accepted
                      - pending
                    description: A member's status in the account.
                  user:
                    type: object
                    properties:
                      email:
                        type: string
                        description: The contact email address of the user.
                      id:
                        type: string
                        description: Identifier
                      first_name:
                        oneOf:
                          - type: string
                        nullable: true
                        description: User's first name
                      last_name:
                        oneOf:
                          - type: string
                        nullable: true
                        description: User's last name
                      two_factor_authentication_enabled:
                        type: boolean
                        description: Indicates whether two-factor authentication is enabled for the user
                          account. Does not apply to API authentication.
                    required:
                      - email
                    description: Details of the user associated to the membership.
      x-distilled-response-path: result
      x-distilled-errors:
        MemberNotFound:
          - code: 1003
        InvalidRoute:
          - code: 7003
    put:
      operationId: updateMember
      description: "Modify an account member.  @example ```ts const member = await
        client.accounts.members.update( '4536bcfad5faccb111b47003c79917fa', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
