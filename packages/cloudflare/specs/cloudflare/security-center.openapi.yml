  /{accountOrZone}/{accountOrZoneId}/security-center/insights/{issueId}/classification:
    patch:
      operationId: patchInsightClassification
      description: "Updates the user classification for a Security Center insight.
        Valid values are 'false_positive' or 'accept_risk'. To reset, set
        classification to null. Cannot change directly between classification
        values - must reset to null first.  @example ```ts const classification
        = await client.securityCenter.insights.classification.update(
        'issue_id', { account_id: 'account_id' }, ); ```"
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID to use for this endpoint. Mutually
            exclusive with the Zone ID."
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: The Zone ID to use for this endpoint. Mutually
            exclusive with the Account ID."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                classification:
                  type: string
                  enum:
                    - false_positive
                    - accept_risk
                    - other
                  nullable: true
                  description: "Body param: User-defined classification for the insight. Can be
                    'false_positive', 'accept_risk', 'other', or null."
                rationale:
                  type: string
                  description: "Body param: Rationale for the classification change. Required when
                    classification is 'accept_risk' or 'other'."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
