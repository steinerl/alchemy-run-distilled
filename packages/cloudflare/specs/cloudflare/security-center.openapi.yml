          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID to use for this endpoint. Mutually
            exclusive with the Zone ID."
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: The Zone ID to use for this endpoint. Mutually
            exclusive with the Account ID."
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: before
          in: query
          required: false
          description: "Query param: Filter entries changed before this timestamp (RFC
            3339)."
          schema:
            type: string
        - name: changed_by
          in: query
          required: false
          description: "Query param: Filter by the actor that made the change."
          schema:
            type: string
        - name: field_changed
          in: query
          required: false
          description: "Query param: Filter by the field that was changed."
          schema:
            type: string
            enum:
              - status
              - user_classification
        - name: order
          in: query
          required: false
          description: "Query param: Sort order for results. Use 'asc' for oldest first or
            'desc' for newest first."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: since
          in: query
          required: false
          description: "Query param: Filter entries changed at or after this timestamp
            (RFC 3339)."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUIDv7 identifier for the audit log entry, time-ordered.
                  changed_at:
                    type: string
                    description: The timestamp when the change occurred.
                  changed_by:
                    type: string
                    description: The actor that made the change. 'system' for automated changes, or
                      a user identifier.
                  current_value:
                    oneOf:
                      - type: string
                    nullable: true
                    description: The value of the field after the change. Null if the field was
                      cleared.
                  field_changed:
                    type: string
                    enum:
                      - status
                      - user_classification
                    description: The field that was changed.
                  issue_id:
                    type: string
                    description: The ID of the insight this audit log entry relates to.
                  previous_value:
                    oneOf:
                      - type: string
                    nullable: true
                    description: The value of the field before the change. Null if the field was not
                      previously set.
                  rationale:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Optional rationale provided for the change.
                  zone_id:
                    type: number
                    description: The zone ID associated with the insight. Only present for
                      zone-level insights.
