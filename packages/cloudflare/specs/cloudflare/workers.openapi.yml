  /accounts/{account_id}/workers/scripts/{scriptName}/deployments/{deploymentId}:
    get:
      operationId: getScriptDeployment
      description: "Get information about a Worker Deployment.  @example ```ts const
        deployment = await client.workers.scripts.deployments.get(
        'this-is_my_script-01', '182bd5e5-6e1a-4fe4-a799-aa6d9a6ab26e', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_on:
                    type: string
                  source:
                    type: string
                  strategy:
                    type: string
                    enum:
                      - percentage
                  versions:
                    type: array
                    items:
                      type: object
                      properties:
                        percentage:
                          type: number
                        version_id:
                          type: string
                      required:
                        - percentage
                        - version_id
                  annotations:
                    type: object
                    properties:
                      workers/message:
                        type: string
                        description: Human-readable message about the deployment. Truncated to 1000
                          bytes if longer.
                      workers/triggered_by:
                        type: string
                        description: Operation that triggered the creation of the deployment.
                  author_email:
                    type: string
                required:
                  - id
                  - created_on
                  - source
                  - strategy
                  - versions
      x-distilled-response-path: result
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
        DeploymentNotFound:
          - code: 10336
    delete:
      operationId: deleteScriptDeployment
      description: "Delete a Worker Deployment. The latest deployment, which is
        actively serving traffic, cannot be deleted. All other deployments can
        be deleted.  @example ```ts const deployment = await
        client.workers.scripts.deployments.delete( 'this-is_my_script-01',
        '182bd5e5-6e1a-4fe4-a799-aa6d9a6ab26e', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful.
                required:
                  - errors
                  - messages
                  - success
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
        DeploymentNotFound:
          - code: 10336
