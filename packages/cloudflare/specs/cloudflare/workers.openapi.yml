    get:
      operationId: getScriptSecret
      description: "Get a given secret binding (value omitted) on a script.  @example
        ```ts const secret = await client.workers.scripts.secrets.get(
        'this-is_my_script-01', 'mySecret', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: secretName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: url_encoded
          in: query
          required: false
          description: "Query param: Flag that indicates whether the secret name is URL
            encoded."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      name:
                        type: string
                        description: A JavaScript variable name for the binding.
                      type:
                        type: string
                        enum:
                          - secret_text
                        description: The kind of resource that the binding provides.
                    required:
                      - name
                      - type
