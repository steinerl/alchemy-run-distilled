          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_on:
                    type: string
                  source:
                    type: string
                  strategy:
                    type: string
                    enum:
                      - percentage
                  versions:
                    type: array
                    items:
                      type: object
                      properties:
                        percentage:
                          type: number
                        version_id:
                          type: string
                      required:
                        - percentage
                        - version_id
                  annotations:
                    type: object
                    properties:
                      workers/message:
                        type: string
