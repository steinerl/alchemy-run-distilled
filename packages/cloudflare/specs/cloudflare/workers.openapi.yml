  /accounts/{account_id}/workers/scripts/{scriptName}/deployments/{deploymentId}:
    get:
      operationId: getScriptDeployment
      description: "Get information about a Worker Deployment.  @example ```ts const
        deployment = await client.workers.scripts.deployments.get(
        'this-is_my_script-01', '182bd5e5-6e1a-4fe4-a799-aa6d9a6ab26e', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
