openapi: 3.1.0
info:
  title: Cloudflare WORKERS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: workers
paths:
  /accounts/{account_id}/workers/account-settings:
    get:
      operationId: getAccountSetting
      description: "Fetches Worker account settings for an account.  @example ```ts
        const accountSetting = await client.workers.accountSettings.get({
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  default_usage_model:
                    type: string
                  green_compute:
                    type: boolean
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        Forbidden:
          - status: 403
    put:
      operationId: putAccountSetting
      description: "Creates Worker account settings for an account.  @example ```ts
        const accountSetting = await client.workers.accountSettings.update({
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                default_usage_model:
                  type: string
                  description: Body param
                green_compute:
                  type: boolean
                  description: Body param
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  default_usage_model:
                    type: string
                  green_compute:
                    type: boolean
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        Forbidden:
          - status: 403
  /accounts/{account_id}/workers/assets/upload:
    post:
      operationId: createAssetUpload
      description: "Upload assets ahead of creating a Worker version. To learn more
        about the direct uploads of assets, see
        https://developers.cloudflare.com/workers/static-assets/direct-upload/.  \
        @example ```ts const upload = await
        client.workers.assets.upload.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', base64: true, body: { foo: 'string'
        }, }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: base64
          in: query
          required: true
          description: "Query param: Whether the file contents are base64-encoded. Must be
            `true`."
          schema:
            type: boolean
            enum:
              - true
        - name: Authorization
          in: header
          required: false
          description: Upload session JWT returned by createScriptAssetUpload. This SDK
            sends it as an Authorization bearer token for this request.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                    description: A "completion" JWT which can be redeemed when creating a Worker
                      version.
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/workers/workers/{workerId}:
    get:
      operationId: getBetaWorker
      description: "Get details about a specific Worker.  @example ```ts const worker
        = await client.workers.beta.workers.get( 'worker_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: workerId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the referencing Worker.
                  name:
                    type: string
                    description: Name of the referencing Worker.
                required:
                  - id
                  - name
      x-distilled-response-path: result
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
        InvalidRoute:
          - code: 7003
    put:
      operationId: updateBetaWorker
      description: "Perform a complete replacement of a Worker, where omitted
        properties are set to their default values. This is the exact same as
        the Create Worker endpoint, but operates on an existing Worker. To
        perform a partial update instead, use the Edit Worker
        endpoint.  @example ```ts const worker = await
        client.workers.beta.workers.update( 'worker_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', name: 'my-worker', }, ); ```"
      parameters:
        - name: workerId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: Name of the Worker."
                logpush:
                  type: boolean
                  description: "Body param: Whether logpush is enabled for the Worker."
                observability:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Whether observability is enabled for the Worker.
                    head_sampling_rate:
                      type: number
                      description: The sampling rate for observability. From 0 to 1 (1 = 100%, 0.1 =
                        10%).
                    logs:
                      type: object
                      properties:
                        destinations:
                          type: array
                          items:
                            type: string
                          description: A list of destinations where logs will be exported to.
                        enabled:
                          type: boolean
                          description: Whether logs are enabled for the Worker.
                        head_sampling_rate:
                          type: number
                          description: The sampling rate for logs. From 0 to 1 (1 = 100%, 0.1 = 10%).
                        invocation_logs:
                          type: boolean
                          description: Whether [invocation
                            logs](https://developers.cloudflare.com/workers/observability/logs/workers-logs/#invocation-logs)
                            are enabled for the Worker.
                        persist:
                          type: boolean
                          description: Whether log persistence is enabled for the Worker.
                      description: Log settings for the Worker.
                    traces:
                      type: object
                      properties:
                        destinations:
                          type: array
                          items:
                            type: string
                          description: A list of destinations where traces will be exported to.
                        enabled:
                          type: boolean
                          description: Whether traces are enabled for the Worker.
                        head_sampling_rate:
                          type: number
                          description: The sampling rate for traces. From 0 to 1 (1 = 100%, 0.1 = 10%).
                        persist:
                          type: boolean
                          description: Whether trace persistence is enabled for the Worker.
                        propagation_policy:
                          type: string
                          enum:
                            - authenticated
                            - accept
                          description: Controls how inbound trace context (traceparent/tracestate) headers
                            on incoming requests are handled. "authenticated"
                            (default) honors inbound trace context only when
                            accompanied by a valid trace auth token. "accept"
                            unconditionally accepts inbound trace context.
                            Requires the trace propagation feature to be
                            enabled.
                      description: Trace settings for the Worker.
                  description: "Body param: Observability settings for the Worker."
                subdomain:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Whether the \ .workers.dev subdomain is enabled for the Worker.
                    previews_enabled:
                      type: boolean
                      description: Whether [preview
                        URLs](https://developers.cloudflare.com/workers/configuration/previews/)
                        are enabled for the Worker.
                  description: "Body param: Subdomain settings for the Worker."
                tags:
                  type: array
                  items:
                    type: string
                  description: "Body param: Tags associated with the Worker."
                tail_consumers:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the consumer Worker.
                    required:
                      - name
                  description: "Body param: Other Workers that should consume logs from the
                    Worker."
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the referencing Worker.
                  name:
                    type: string
                    description: Name of the referencing Worker.
                required:
                  - id
                  - name
      x-distilled-response-path: result
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
    patch:
      operationId: patchBetaWorker
      description: "Perform a partial update on a Worker, where omitted properties are
        left unchanged from their current values.  @example ```ts const worker =
        await client.workers.beta.workers.edit( 'worker_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', logpush: true, name: 'my-worker',
        observability: {}, subdomain: {}, tags: ['my-team', 'my-public-api'],
        tail_consumers: [{ name: 'my-tail-consumer' }], }, ); ```"
      parameters:
        - name: workerId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logpush:
                  type: boolean
                  description: "Body param: Whether logpush is enabled for the Worker."
                name:
                  type: string
                  description: "Body param: Name of the Worker."
                observability:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Whether observability is enabled for the Worker.
                    head_sampling_rate:
                      type: number
                      description: The sampling rate for observability. From 0 to 1 (1 = 100%, 0.1 =
                        10%).
                    logs:
                      type: object
                      properties:
                        destinations:
                          type: array
                          items:
                            type: string
                          description: A list of destinations where logs will be exported to.
                        enabled:
                          type: boolean
                          description: Whether logs are enabled for the Worker.
                        head_sampling_rate:
                          type: number
                          description: The sampling rate for logs. From 0 to 1 (1 = 100%, 0.1 = 10%).
                        invocation_logs:
                          type: boolean
                          description: Whether [invocation
                            logs](https://developers.cloudflare.com/workers/observability/logs/workers-logs/#invocation-logs)
                            are enabled for the Worker.
                        persist:
                          type: boolean
                          description: Whether log persistence is enabled for the Worker.
                      description: Log settings for the Worker.
                    traces:
                      type: object
                      properties:
                        destinations:
                          type: array
                          items:
                            type: string
                          description: A list of destinations where traces will be exported to.
                        enabled:
                          type: boolean
                          description: Whether traces are enabled for the Worker.
                        head_sampling_rate:
                          type: number
                          description: The sampling rate for traces. From 0 to 1 (1 = 100%, 0.1 = 10%).
                        persist:
                          type: boolean
                          description: Whether trace persistence is enabled for the Worker.
                        propagation_policy:
                          type: string
                          enum:
                            - authenticated
                            - accept
                          description: Controls how inbound trace context (traceparent/tracestate) headers
                            on incoming requests are handled. "authenticated"
                            (default) honors inbound trace context only when
                            accompanied by a valid trace auth token. "accept"
                            unconditionally accepts inbound trace context.
                            Requires the trace propagation feature to be
                            enabled.
                      description: Trace settings for the Worker.
                  description: "Body param: Observability settings for the Worker."
                subdomain:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Whether the \ .workers.dev subdomain is enabled for the Worker.
                    previews_enabled:
                      type: boolean
                      description: Whether [preview
                        URLs](https://developers.cloudflare.com/workers/configuration/previews/)
                        are enabled for the Worker.
                  description: "Body param: Subdomain settings for the Worker."
                tags:
                  type: array
                  items:
                    type: string
                  description: "Body param: Tags associated with the Worker."
                tail_consumers:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the consumer Worker.
                    required:
                      - name
                  description: "Body param: Other Workers that should consume logs from the
                    Worker."
              required:
                - logpush
                - name
                - observability
                - subdomain
                - tags
                - tail_consumers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the referencing Worker.
                  name:
                    type: string
                    description: Name of the referencing Worker.
                required:
                  - id
                  - name
      x-distilled-response-path: result
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
    delete:
      operationId: deleteBetaWorker
      description: "Delete a Worker and all its associated resources (versions,
        deployments, etc.).  @example ```ts const worker = await
        client.workers.beta.workers.delete( 'worker_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: workerId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful.
                required:
                  - errors
                  - messages
                  - success
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
  /accounts/{account_id}/workers/workers:
    get:
      operationId: listBetaWorkers
      description: "List all Workers for an account.  @example ```ts // Automatically
        fetches more pages as needed. for await (const worker of
        client.workers.beta.workers.list( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: order
          in: query
          required: false
          description: "Query param: Sort direction."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: order_by
          in: query
          required: false
          description: "Query param: Property to sort results by."
          schema:
            type: string
            enum:
              - deployed_on
              - updated_on
              - created_on
              - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the referencing Worker.
                  name:
                    type: string
                    description: Name of the referencing Worker.
                required:
                  - id
                  - name
      x-distilled-pagination-class: WorkersV4PagePaginationArray
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
    post:
      operationId: createBetaWorker
      description: "Create a new Worker.  @example ```ts const worker = await
        client.workers.beta.workers.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', name: 'my-worker', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: Name of the Worker."
                logpush:
                  type: boolean
                  description: "Body param: Whether logpush is enabled for the Worker."
                observability:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Whether observability is enabled for the Worker.
                    head_sampling_rate:
                      type: number
                      description: The sampling rate for observability. From 0 to 1 (1 = 100%, 0.1 =
                        10%).
                    logs:
                      type: object
                      properties:
                        destinations:
                          type: array
                          items:
                            type: string
                          description: A list of destinations where logs will be exported to.
                        enabled:
                          type: boolean
                          description: Whether logs are enabled for the Worker.
                        head_sampling_rate:
                          type: number
                          description: The sampling rate for logs. From 0 to 1 (1 = 100%, 0.1 = 10%).
                        invocation_logs:
                          type: boolean
                          description: Whether [invocation
                            logs](https://developers.cloudflare.com/workers/observability/logs/workers-logs/#invocation-logs)
                            are enabled for the Worker.
                        persist:
                          type: boolean
                          description: Whether log persistence is enabled for the Worker.
                      description: Log settings for the Worker.
                    traces:
                      type: object
                      properties:
                        destinations:
                          type: array
                          items:
                            type: string
                          description: A list of destinations where traces will be exported to.
                        enabled:
                          type: boolean
                          description: Whether traces are enabled for the Worker.
                        head_sampling_rate:
                          type: number
                          description: The sampling rate for traces. From 0 to 1 (1 = 100%, 0.1 = 10%).
                        persist:
                          type: boolean
                          description: Whether trace persistence is enabled for the Worker.
                        propagation_policy:
                          type: string
                          enum:
                            - authenticated
                            - accept
                          description: Controls how inbound trace context (traceparent/tracestate) headers
                            on incoming requests are handled. "authenticated"
                            (default) honors inbound trace context only when
                            accompanied by a valid trace auth token. "accept"
                            unconditionally accepts inbound trace context.
                            Requires the trace propagation feature to be
                            enabled.
                      description: Trace settings for the Worker.
                  description: "Body param: Observability settings for the Worker."
                subdomain:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Whether the \ .workers.dev subdomain is enabled for the Worker.
                    previews_enabled:
                      type: boolean
                      description: Whether [preview
                        URLs](https://developers.cloudflare.com/workers/configuration/previews/)
