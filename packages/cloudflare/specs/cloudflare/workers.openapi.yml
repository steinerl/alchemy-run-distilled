                          more](https://developer.mozilla.org/en-US/docs/Web/API/SubtleCrypto/importKey#algorithm).
                      format:
                        type: string
                        enum:
                          - raw
                          - pkcs8
                          - spki
                          - jwk
                        description: Data format of the key. [Learn
                          more](https://developer.mozilla.org/en-US/docs/Web/API/SubtleCrypto/importKey#format).
                      name:
                        type: string
                        description: A JavaScript variable name for the binding.
                      type:
                        type: string
                        enum:
                          - secret_key
                        description: The kind of resource that the binding provides.
                      usages:
                        type: array
                        items:
                          type: string
                          enum:
                            - encrypt
                            - decrypt
                            - sign
                            - verify
                            - deriveKey
                            - deriveBits
                            - wrapKey
                            - unwrapKey
