                  name:
                    type: string
                    description: Name of the referencing Worker.
                required:
                  - id
                  - name
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/workers/workers/{workerId}/versions/{versionId}:
    get:
      operationId: getBetaWorkerVersion
      description: "Get details about a specific version.  @example ```ts const
        version = await client.workers.beta.workers.versions.get( 'worker_id',
        'version_id', { account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, );
        ```"
      parameters:
        - name: workerId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: include
          in: query
          required: false
          description: "Query param: Whether to include the `modules` property of the
            version in the response, which contains code and sourcemap content
            and may add several megabytes to the response size."
          schema:
            type: string
            enum:
              - modules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Version identifier.
                  created_on:
                    type: string
                    description: When the version was created.
                  number:
                    type: number
                    description: The integer version number, starting from one.
                  urls:
                    type: array
                    items:
                      type: string
                    description: All routable URLs that always point to this version. Does not
                      include alias URLs, since aliases can be updated to point
                      to a different version.
                  annotations:
                    type: object
                    properties:
                      workers/message:
                        type: string
                        description: Human-readable message about the version. Truncated to 1000 bytes
                          if longer.
                      workers/tag:
                        type: string
                        description: User-provided identifier for the version. Maximum 100 bytes.
                      workers/triggered_by:
                        type: string
                        description: Operation that triggered the creation of the version.
                    description: Metadata about the version.
                  assets:
                    type: object
                    properties:
                      config:
                        type: object
                        properties:
                          html_handling:
                            type: string
                            enum:
                              - auto-trailing-slash
                              - force-trailing-slash
                              - drop-trailing-slash
                              - none
                            description: Determines the redirects and rewrites of requests for HTML content.
                          not_found_handling:
                            type: string
                            enum:
                              - none
                              - 404-page
                              - single-page-application
                            description: Determines the response when a request does not match a static
                              asset, and there is no Worker script.
                          run_worker_first:
                            oneOf:
                              - type: array
                                items:
                                  type: string
                              - type: boolean
                            description: Contains a list path rules to control routing to either the Worker
                              or assets. Glob (\ ) and negative (!) rules are
                              supported. Rules must start with either '/' or
                              '!/'. At least one non-negative rule must be
                              provided, and negative rules have higher
                              precedence than non-negative rules.
                        description: Configuration for assets within a Worker.
                      jwt:
                        type: string
                        description: Token provided upon successful upload of all files from a
                          registered manifest.
                    description: Configuration for assets within a
                      Worker.  [`_headers`](https://developers.cloudflare.com/workers/static-assets/headers/#custom-headers)
                      and
                      [`_redirects`](https://developers.cloudflare.com/workers/static-assets/redirects/)
                      files should be included as modules named `_headers` and
                      `_redirects` with content type `text/plain`.
                  bindings:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            name:
                              type: string
                              description: A JavaScript variable name for the binding.
                            type:
                              type: string
                              enum:
                                - ai
                              description: The kind of resource that the binding provides.
                          required:
                            - name
                            - type
                        - type: object
                          properties:
                            instance_name:
                              type: string
                              description: The user-chosen instance name. Must exist at deploy time. The
                                worker can search, chat, update, and manage
                                items/jobs on this instance.
                            name:
                              type: string
                              description: A JavaScript variable name for the binding.
                            type:
                              type: string
                              enum:
                                - ai_search
                              description: The kind of resource that the binding provides.
                            namespace:
                              type: string
                              description: The namespace the instance belongs to. Defaults to "default" if
                                omitted. Customers who don't use namespaces can
                                simply omit this field.
                          required:
                            - instance_name
                            - name
                            - type
                        - type: object
                          properties:
                            name:
                              type: string
                              description: A JavaScript variable name for the binding.
                            namespace:
                              type: string
