      operationId: deleteScriptDeployment
      description: "Delete a Worker Deployment. The latest deployment, which is
        actively serving traffic, cannot be deleted. All other deployments can
        be deleted.  @example ```ts const deployment = await
        client.workers.scripts.deployments.delete( 'this-is_my_script-01',
