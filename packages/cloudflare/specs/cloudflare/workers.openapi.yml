  /accounts/{account_id}/workers/scripts/{scriptName}/schedules:
    get:
      operationId: getScriptSchedule
      description: "Fetches Cron Triggers for a Worker.  @example ```ts const schedule
        = await client.workers.scripts.schedules.get( 'this-is_my_script-01', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedules:
                    type: array
                    items:
                      type: object
                      properties:
                        cron:
                          type: string
                        created_on:
                          type: string
                        modified_on:
                          type: string
                      required:
                        - cron
                required:
                  - schedules
      x-distilled-response-path: result
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
    put:
      operationId: putScriptSchedule
      description: "Updates Cron Triggers for a Worker.  @example ```ts const schedule
        = await client.workers.scripts.schedules.update( 'this-is_my_script-01',
        { account_id: '023e105f4ecef8ad9ca31a8372d0c353', body: [{ cron: '
        /30    ' }], }, ); ```"
      parameters:
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  cron:
                    type: string
                required:
                  - cron
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedules:
                    type: array
                    items:
                      type: object
                      properties:
                        cron:
                          type: string
                        created_on:
                          type: string
                        modified_on:
                          type: string
                      required:
                        - cron
                required:
                  - schedules
      x-distilled-response-path: result
      x-distilled-errors:
        WorkerNotFound:
          - code: 10007
