            application/json:
              schema:
                type: string
      x-distilled-response-path: result
      x-distilled-errors:
        FeatureNotEnabled:
          - code: 1012
            status: 403
        Forbidden:
          - status: 403
        CatalogSyncNotFound:
          - status: 404
  /accounts/{account_id}/magic/cloud/catalog-syncs/prebuilt-policies:
    get:
      operationId: listCatalogSyncPrebuiltPolicies
      description: List prebuilt catalog sync policies (Closed Beta).
      parameters:
        - name: account_id
          in: path
          required: true
          description: Path param
          schema:
            type: string
        - name: destination_type
          in: query
          required: false
          description: "Query param: Specify type of destination, omit to return all."
          schema:
            type: string
            enum:
              - NONE
              - ZERO_TRUST_LIST
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  applicable_destinations:
                    type: array
                    items:
                      type: string
                      enum:
                        - NONE
                        - ZERO_TRUST_LIST
                  policy_description:
                    type: string
                  policy_name:
                    type: string
                  policy_string:
                    type: string
                required:
                  - applicable_destinations
                  - policy_description
                  - policy_name
                  - policy_string
      x-distilled-pagination-class: PrebuiltPolicyListResponsesSinglePage
      x-distilled-errors:
        FeatureNotEnabled:
          - code: 1012
            status: 403
        Forbidden:
          - status: 403
  /accounts/{account_id}/magic/cloud/providers/{providerId}:
    get:
      operationId: getCloudIntegration
      description: Read a Cloud Integration (Closed Beta).
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Path param
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Query param
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  cloud_type:
                    type: string
                    enum:
                      - AWS
                      - AZURE
                      - GOOGLE
                      - CLOUDFLARE
                  friendly_name:
                    type: string
                  last_updated:
                    type: string
                  lifecycle_state:
                    type: string
                    enum:
                      - ACTIVE
                      - PENDING_SETUP
                      - RETIRED
                  state:
                    type: string
                    enum:
                      - UNSPECIFIED
                      - PENDING
                      - DISCOVERING
                      - FAILED
                      - SUCCEEDED
                  state_v2:
                    type: string
                    enum:
                      - UNSPECIFIED
                      - PENDING
                      - DISCOVERING
                      - FAILED
                      - SUCCEEDED
                  aws_arn:
                    type: string
                  azure_subscription_id:
                    type: string
                  azure_tenant_id:
                    type: string
                  description:
                    type: string
                  gcp_project_id:
                    type: string
                  gcp_service_account_email:
                    type: string
                  status:
                    type: object
                    properties:
                      discovery_progress:
                        type: object
                        properties:
                          done:
                            type: number
                          total:
                            type: number
                          unit:
                            type: string
                        required:
                          - done
                          - total
                          - unit
                      discovery_progress_v2:
                        type: object
                        properties:
                          done:
                            type: number
                          total:
                            type: number
                          unit:
                            type: string
                        required:
                          - done
                          - total
                          - unit
                      last_discovery_status:
                        type: string
                        enum:
                          - UNSPECIFIED
                          - PENDING
                          - DISCOVERING
                          - FAILED
                          - SUCCEEDED
                      last_discovery_status_v2:
                        type: string
                        enum:
                          - UNSPECIFIED
                          - PENDING
                          - DISCOVERING
                          - FAILED
                          - SUCCEEDED
                      regions:
                        type: array
                        items:
                          type: string
                      credentials_good_since:
                        type: string
                      credentials_missing_since:
                        type: string
                      credentials_rejected_since:
                        type: string
                      discovery_message:
                        type: string
                      discovery_message_v2:
                        type: string
                      in_use_by:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            client_type:
                              type: string
                              enum:
                                - MAGIC_WAN_CLOUD_ONRAMP
                            name:
                              type: string
                          required:
                            - id
                            - client_type
                            - name
                      last_discovery_completed_at:
                        type: string
                      last_discovery_completed_at_v2:
                        type: string
                      last_discovery_started_at:
                        type: string
                      last_discovery_started_at_v2:
                        type: string
                      last_updated:
                        type: string
                    required:
                      - discovery_progress
                      - discovery_progress_v2
                      - last_discovery_status
                      - last_discovery_status_v2
                      - regions
                required:
                  - id
                  - cloud_type
                  - friendly_name
                  - last_updated
                  - lifecycle_state
                  - state
                  - state_v2
      x-distilled-response-path: result
      x-distilled-errors:
        FeatureNotEnabled:
          - code: 1012
            status: 403
        Forbidden:
          - status: 403
        CloudIntegrationNotFound:
          - status: 404
    put:
      operationId: updateCloudIntegration
      description: Update a Cloud Integration (Closed Beta).
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
