  /accounts/{account_id}/magic/cloud/catalog-syncs/{syncId}:
    get:
      operationId: getCatalogSync
      description: Read a Catalog Sync (Closed Beta).
      parameters:
        - name: syncId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  description:
                    type: string
                  destination_id:
                    type: string
                  destination_type:
                    type: string
                    enum:
                      - NONE
                      - ZERO_TRUST_LIST
                  last_user_update_at:
                    type: string
                  name:
                    type: string
                  policy:
                    type: string
                  update_mode:
                    type: string
                    enum:
                      - AUTO
                      - MANUAL
                  errors:
                    type: object
                    additionalProperties: true
                  includes_discoveries_until:
                    type: string
                  last_attempted_update_at:
                    type: string
                  last_successful_update_at:
                    type: string
                required:
                  - id
                  - description
                  - destination_id
                  - destination_type
                  - last_user_update_at
                  - name
                  - policy
                  - update_mode
      x-distilled-response-path: result
      x-distilled-errors:
        FeatureNotEnabled:
          - code: 1012
            status: 403
        Forbidden:
          - status: 403
        CatalogSyncNotFound:
