openapi: 3.1.0
info:
  title: Cloudflare KEYLESS-CERTIFICATES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: keyless-certificates
paths:
  /zones/{zone_id}/keyless_certificates/{keylessCertificateId}:
    get:
      operationId: getKeylessCertificate
      description: "Get details for one Keyless SSL configuration.  @example ```ts
        const keylessCertificate = await client.keylessCertificates.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: keylessCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-response-path: result
      x-distilled-errors:
        KeylessCertificateNotFound:
          - code: 1005
            message:
              includes: Invalid or missing Keyless SSL
        Forbidden:
          - status: 403
    patch:
      operationId: patchKeylessCertificate
      description: "This will update attributes of a Keyless SSL. Consists of one or
        more of the following: host,name,port.  @example ```ts const
        keylessCertificate = await client.keylessCertificates.edit(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: keylessCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: "@deprecated Body param: Whether or not the Keyless SSL is on or
                    off."
                host:
                  type: string
                  description: "Body param: The keyless SSL name."
                name:
                  type: string
                  description: "Body param: The keyless SSL name."
                port:
                  type: number
                  description: "Body param: The keyless SSL port used to communicate between
                    Cloudflare and the client's Keyless SSL server."
                tunnel:
                  type: object
                  properties:
                    private_ip:
                      type: string
                      description: Private IP of the Key Server Host
                    vnet_id:
                      type: string
                      description: Cloudflare Tunnel Virtual Network ID
                  required:
                    - private_ip
                    - vnet_id
                  description: "Body param: Configuration for using Keyless SSL through a
                    Cloudflare Tunnel"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-response-path: result
      x-distilled-errors:
        KeylessCertificateNotFound:
          - code: 1005
            message:
              includes: Invalid or missing Keyless SSL
        Forbidden:
          - status: 403
    delete:
      operationId: deleteKeylessCertificate
      description: "Removes a Keyless SSL configuration. SSL connections will no
        longer use the keyless server for cryptographic operations.  @example
        ```ts const keylessCertificate = await
        client.keylessCertificates.delete( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: keylessCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
      x-distilled-response-path: result
      x-distilled-errors:
        KeylessCertificateNotFound:
          - code: 1005
            message:
              includes: Invalid or missing Keyless SSL
        Forbidden:
          - status: 403
  /zones/{zone_id}/keyless_certificates:
    get:
      operationId: listKeylessCertificates
      description: "List all Keyless SSL configurations for a given zone.  @example
        ```ts // Automatically fetches more pages as needed. for await (const
        keylessCertificate of client.keylessCertificates.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-pagination-class: KeylessCertificatesSinglePage
      x-distilled-errors:
        Forbidden:
          - status: 403
    post:
      operationId: createKeylessCertificate
      description: "Creates a Keyless SSL configuration that allows SSL/TLS
        termination without exposing private keys to Cloudflare. Keys remain on
        your infrastructure.  @example ```ts const keylessCertificate = await
        client.keylessCertificates.create({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', certificate: '-----BEGIN
        CERTIFICATE-----\\nMIIDtTCCAp2gAwIBAgIJAM15n7fdxhRtMA0GCSqGSIb3DQEBBQUA\
        MEUxCzAJBgNV\\nBAYTAlVTMRMwEQYDVQQIEwpTb21lLVN0YXRlMSEwHwYDVQQKExhJbnRl\
        cm5ldCBX\\naWRnaXRzIFB0eSBMdGQwHhcNMTQwMzExMTkyMTU5WhcNMTQwNDEwMTkyMTU5\
        WjBF\\nMQswCQYDVQQGEwJVUzETMBEGA1UECBMKU29tZS1TdGF0ZTEhMB8GA1UEChMYSW50\
        \\nZXJuZXQgV2lkZ2l0cyBQdHkgTHRkMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIB\\nC\
        gKCAQEAvq3sKsHpeduJHimOK+fvQdKsI8z8A05MZyyLp2/R/GE8FjNv+hkVY1WQ\\nLIyTN\
        NQH7CJecE1nbTfo8Y56S7x/rhxC6/DJ8MIulapFPnorq46KU6yRxiM0MQ3N\\nnTJHlHA2o\
        zZta6YBBfVfhHWl1F0IfNbXCLKvGwWWMbCx43OfW6KTkbRnE6gFWKuO\\nfSO5h2u5TaWVu\
        SIzBvYs7Vza6m+gtYAvKAJV2nSZ+eSEFPDo29corOy8+huEOUL8\\n5FAw4BFPsr1TlrlGP\
        FitduQUHGrSL7skk1ESGza0to3bOtrodKei2s9bk5MXm7lZ\\nqI+WZJX4Zu9+mzZhc9pCV\
        i8r/qlXuQIDAQABo4GnMIGkMB0GA1UdDgQWBBRvavf+\\nsWM4IwKiH9X9w1vl6nUVRDB1B\
        gNVHSMEbjBsgBRvavf+sWM4IwKiH9X9w1vl6nUV\\nRKFJpEcwRTELMAkGA1UEBhMCVVMxE\
        zARBgNVBAgTClNvbWUtU3RhdGUxITAfBgNV\\nBAoTGEludGVybmV0IFdpZGdpdHMgUHR5I\
        Ex0ZIIJAM15n7fdxhRtMAwGA1UdEwQF\\nMAMBAf8wDQYJKoZIhvcNAQEFBQADggEBABY2Z\
        zBaW0dMsAAT7tPJzrVWVzQx6KU4\\nUEBLudIlWPlkAwTnINCWR/8eNjCCmGA4heUdHmazd\
        pPa8RzwOmc0NT1NQqzSyktt\\nvTqb4iHD7+8f9MqJ9/FssCfTtqr/Qst/hGH4Wmdf1EJ/6\
        FqYAAb5iRlPgshFZxU8\\nuXtA8hWn6fK6eISD9HBdcAFToUvKNZ1BIDPvh9f95Ine8ar6y\
        Gd56TUNrHR8eHBs\\nESxz5ddVR/oWRysNJ+aGAyYqHS8S/ttmC7r4XCAHqXptkHPCGRqkA\
        hsterYhd4I8\\n/cBzejUobNCjjHFbtkAL/SjxZOLW+pNkZwfeYdM8iPkD54Uua1v2tdw=\
        \\n-----END CERTIFICATE-----', host: 'example.com', port: 24008, });
        ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                certificate:
                  type: string
                  description: "Body param: The zone's SSL certificate or SSL certificate and
                    intermediate(s)."
                host:
                  type: string
                  description: "Body param: The keyless SSL name."
                port:
                  type: number
                  description: "Body param: The keyless SSL port used to communicate between
                    Cloudflare and the client's Keyless SSL server."
                bundle_method:
                  type: string
                  enum:
                    - ubiquitous
                    - optimal
                    - force
                  description: "Body param: A ubiquitous bundle has the highest probability of
                    being verified everywhere, even by clients using outdated or
                    unusual trust stores. An optimal bundle uses the shortest
                    chain and newest intermediates. And the force bundle
                    verifies the chain, but does not otherwise modify it."
                name:
                  type: string
                  description: "Body param: The keyless SSL name."
                tunnel:
                  type: object
                  properties:
                    private_ip:
                      type: string
                      description: Private IP of the Key Server Host
                    vnet_id:
                      type: string
                      description: Cloudflare Tunnel Virtual Network ID
                  required:
                    - private_ip
                    - vnet_id
                  description: "Body param: Configuration for using Keyless SSL through a
                    Cloudflare Tunnel"
              required:
                - certificate
                - host
                - port
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-response-path: result
      x-distilled-errors:
        KeylessSslNotAvailable:
          - code: 1067
            message:
              includes: Keyless SSL is not available
        Forbidden:
          - status: 403
