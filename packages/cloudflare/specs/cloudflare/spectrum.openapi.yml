  /zones/{zone_id}/spectrum/apps/{appId}:
    get:
      operationId: getApp
      description: Gets the application configuration of a specific application inside
        a zone.
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Zone identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      id:
                        type: string
                        description: App identifier.
                      created_on:
                        type: string
                        description: When the Application was created.
                      dns:
                        type: object
                        properties:
                          name:
                            type: string
                            description: The name of the DNS record associated with the application.
                          type:
                            type: string
                            enum:
                              - CNAME
                              - ADDRESS
                            description: The type of DNS record associated with the application.
                        description: The name and type of DNS record for the Spectrum application.
                      modified_on:
                        type: string
                        description: When the Application was last modified.
                      protocol:
                        type: string
                        description: The port configuration at Cloudflare's edge. May specify a single
                          port, for example `"tcp/1000"`, or a range of ports,
                          for example `"tcp/1000-2000"`.
                      traffic_type:
                        type: string
                        enum:
                          - direct
                          - http
                          - https
                        description: Determines how data travels from the edge to your origin. When set
                          to "direct", Spectrum will send traffic directly to
                          your origin, and the application's type is derived
                          from the `protocol`. When set to "http" or "https",
                          Spectrum will apply Cloudflare's HTTP/HTTPS features
                          as it sends traffic to your origin, and the
                          application type matches this property exactly.
                      argo_smart_routing:
                        type: boolean
                        description: 'Enables Argo Smart Routing for this application. Notes: Only
                          available for TCP applications with traffic_type set
                          to "direct".'
                      edge_ips:
                        oneOf:
                          - type: object
                            properties:
                              connectivity:
                                type: string
                                enum:
                                  - all
                                  - ipv4
                                  - ipv6
                                description: The IP versions supported for inbound connections on Spectrum
                                  anycast IPs.
                              type:
                                type: string
                                enum:
                                  - dynamic
                                description: The type of edge IP configuration specified. Dynamically allocated
                                  edge IPs use Spectrum anycast IPs in
                                  accordance with the connectivity you specify.
                                  Only valid with CNAME DNS names.
                          - type: object
                            properties:
                              ips:
                                type: array
                                items:
                                  type: string
                                description: The array of customer owned IPs we broadcast via anycast for this
                                  hostname and application.
                              type:
                                type: string
                                enum:
                                  - static
                                description: The type of edge IP configuration specified. Statically allocated
                                  edge IPs use customer IPs in accordance with
                                  the ips array you specify. Only valid with
                                  ADDRESS DNS names.
                        description: The anycast edge IP configuration for the hostname of this
                          application.
                      ip_firewall:
                        type: boolean
                        description: "Enables IP Access Rules for this application. Notes: Only
                          available for TCP applications."
                      origin_direct:
                        type: array
                        items:
                          type: string
                        description: List of origin IP addresses. Array may contain multiple IP
                          addresses for load balancing.
                      origin_dns:
                        type: object
                        properties:
                          name:
                            type: string
                            description: The name of the DNS record associated with the origin.
                          ttl:
                            type: number
                            description: The TTL of our resolution of your DNS record in seconds.
                          type:
                            type: string
                            enum:
                              - ""
                              - A
                              - AAAA
                              - SRV
                            description: The type of DNS record associated with the origin. "" is used to
                              specify a combination of A/AAAA records.
                        description: The name and type of DNS record for the Spectrum application.
                      origin_port:
                        oneOf:
                          - type: number
                          - type: string
                        description: 'The destination port at the origin. Only specified in conjunction
                          with origin_dns. May use an integer to specify a
                          single origin port, for example `1000`, or a string to
                          specify a range of origin ports, for example
                          `"1000-2000"`. Notes: If specifying a port range, the
                          number of ports in the range must match the number of
                          ports specified in the "protocol" field.'
                      proxy_protocol:
                        type: string
                        enum:
                          - off
                          - v1
                          - v2
                          - simple
                        description: Enables Proxy Protocol to the origin. Refer to [Enable Proxy
                          protocol](https://developers.cloudflare.com/spectrum/getting-started/proxy-protocol/)
                          for implementation details on PROXY Protocol V1, PROXY
                          Protocol V2, and Simple Proxy Protocol.
                      tls:
                        type: string
                        enum:
                          - off
                          - flexible
                          - full
                          - strict
                        description: The type of TLS termination associated with the application.
                      virtual_network_id:
                        type: string
                        description: Optional UUID of a virtual network for routing origin traffic
                          through tunnel virtual networks.
                    required:
                      - id
                      - created_on
                      - dns
                      - modified_on
                      - protocol
                      - traffic_type
                  - type: object
                    properties:
                      id:
                        type: string
                        description: App identifier.
                      created_on:
                        type: string
                        description: When the Application was created.
                      dns:
                        type: object
                        properties:
                          name:
                            type: string
                            description: The name of the DNS record associated with the application.
                          type:
                            type: string
                            enum:
                              - CNAME
                              - ADDRESS
                            description: The type of DNS record associated with the application.
                        description: The name and type of DNS record for the Spectrum application.
                      modified_on:
                        type: string
                        description: When the Application was last modified.
                      protocol:
                        type: string
                        description: The port configuration at Cloudflare's edge. May specify a single
                          port, for example `"tcp/1000"`, or a range of ports,
                          for example `"tcp/1000-2000"`.
                      origin_direct:
                        type: array
                        items:
                          type: string
                        description: List of origin IP addresses. Array may contain multiple IP
                          addresses for load balancing.
                    required:
                      - id
                      - created_on
                      - dns
                      - modified_on
                      - protocol
      x-distilled-response-path: result
      x-distilled-errors:
        SpectrumAppNotFound:
          - code: 10006
        Forbidden:
          - status: 403
    put:
      operationId: updateApp
      description: "Updates a previously existing application's configuration that
