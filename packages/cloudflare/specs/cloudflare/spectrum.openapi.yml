openapi: 3.1.0
info:
  title: Cloudflare SPECTRUM API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: spectrum
paths:
  /zones/{zone_id}/spectrum/analytics/aggregate/current:
    get:
      operationId: getAnalyticAggregateCurrent
      description: Retrieves analytics aggregated from the last minute of usage on
        Spectrum applications underneath a given zone.
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: appID
          in: query
          required: false
          description: "Query param: Comma-delimited list of Spectrum Application Id(s).
            If provided, the response will be limited to Spectrum Application
            Id(s) that match."
          schema:
            type: string
        - name: colo_name
          in: query
          required: false
          description: "Query param: Co-location identifier."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    appID:
                      type: string
                      description: Application identifier.
                    bytesEgress:
                      type: number
                      description: Number of bytes sent
                    bytesIngress:
                      type: number
                      description: Number of bytes received
                    connections:
                      type: number
                      description: Number of connections
                    durationAvg:
                      type: number
                      description: Average duration of connections
                  required:
                    - appID
                    - bytesEgress
                    - bytesIngress
                    - connections
                    - durationAvg
      x-distilled-response-path: result
  /zones/{zone_id}/spectrum/analytics/events/bytime:
    get:
      operationId: getAnalyticEventBytime
      description: Retrieves a list of aggregate metrics grouped by time interval.
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: time_delta
          in: query
          required: true
          description: "Query param: Used to select time series resolution."
          schema:
            type: string
            enum:
              - year
              - quarter
              - month
              - week
              - day
              - hour
              - dekaminute
              - minute
        - name: dimensions
          in: query
          required: false
          description: "Query param: Can be used to break down the data by given
            attributes. Options are:  | Dimension |
            Name                          |
            Example                                                    | |
            --------- | ----------------------------- |
            ---------------------------------------------------------- | |
            event     | Connection Event              | connect, progress,
            disconnect, originError, clientFiltered | | appID     | Application
            ID                |
            40d67c87c6cd4b889a4fd57805225e85                           | |
            coloName  | Colo Name                     |
            SFO                                                        | |
            ipVersion | IP version used by the client | 4,
            6.                                                      |"
          schema:
            type: array
            items:
              type: string
              enum:
                - event
                - appID
                - coloName
                - ipVersion
        - name: filters
          in: query
          required: false
          description: "Query param: Used to filter rows by one or more dimensions.
            Filters can be combined using OR and AND boolean logic. AND takes
            precedence over OR in all the expressions. The OR operator is
            defined using a comma (,) or OR keyword surrounded by whitespace.
            The AND operator is defined using a semicolon (;) or AND keyword
            surrounded by whitespace. Note that the semicolon is a reserved
            character in URLs (rfc1738) and needs to be percent-encoded as %3B.
            Comparison options are:  | Operator | Name                     | URL
            Encoded | | -------- | ------------------------ | ----------- | |
            ==       | Equals                   | %3D%3D      | | !=       |
            Does not equals          | !%3D        | | \\>       | Greater
            Than             | %3E         | | \\<       | Less
            Than                | %3C         | | \\>=      | Greater than or
            equal to | %3E%3D      | | \\<=      | Less than or equal to    |
            %3C%3D      |"
          schema:
            type: string
        - name: metrics
          in: query
          required: false
          description: "Query param: One or more metrics to compute. Options are:  |
            Metric         | Name                                | Example |
            Unit                  | | -------------- |
            ----------------------------------- | ------- |
            --------------------- | | count          | Count of total
            events               | 1000    | Count                 | |
            bytesIngress   | Sum of ingress bytes                | 1000    |
            Sum                   | | bytesEgress    | Sum of egress
            bytes                 | 1000    | Sum                   | |
            durationAvg    | Average connection duration         | 1.0     |
            Time in milliseconds  | | durationMedian | Median connection
            duration          | 1.0     | Time in milliseconds  | |
            duration90th   | 90th percentile connection duration | 1.0     |
            Time in milliseconds  | | duration99th   | 99th percentile
            connection duration | 1.0     | Time in milliseconds. |"
          schema:
            type: array
            items:
              type: string
              enum:
                - count
                - bytesIngress
                - bytesEgress
                - durationAvg
                - durationMedian
                - duration90th
                - duration99th
        - name: since
          in: query
          required: false
          description: "Query param: Start of time interval to query, defaults to `until`
            - 6 hours. Timestamp must be in RFC3339 format and uses UTC unless
            otherwise specified."
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: "Query param: The sort order for the result set; sort fields must
            be included in `metrics` or `dimensions`."
          schema:
            type: array
            items:
              type: string
        - name: until
          in: query
          required: false
          description: "Query param: End of time interval to query, defaults to current
            time. Timestamp must be in RFC3339 format and uses UTC unless
            otherwise specified."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        dimensions:
                          type: array
                          items:
                            type: string
                        metrics:
                          oneOf:
                            - type: array
                              items:
                                type: number
                            - type: array
                              items:
                                type: array
                                items:
                                  type: number
                    description: List of columns returned by the analytics query.
                  data_lag:
                    type: number
                    description: Number of seconds between current time and last processed event,
                      i.e. how many seconds of data could be missing.
                  max:
                    type: object
                    additionalProperties: true
                    description: Maximum result for each selected metrics across all data.
                  min:
                    type: object
                    additionalProperties: true
                    description: Minimum result for each selected metrics across all data.
                  query:
                    type: object
                    properties:
                      dimensions:
                        type: array
                        items:
                          type: string
                          enum:
                            - event
                            - appID
                            - coloName
                            - ipVersion
                        description: "Can be used to break down the data by given attributes. Options
                          are:  | Dimension | Name                          |
                          Example                                                    \
                          | | --------- | ----------------------------- |
                          -----------------------------------------------------\
                          ----- | | event     | Connection Event              |
                          connect, progress, disconnect, originError,
                          clientFiltered | | appID     | Application
                          ID                |
                          40d67c87c6cd4b889a4fd57805225e85                           \
                          | | coloName  | Colo Name                     |
                          SFO                                                        \
                          | | ipVersion | IP version used by the client | 4,
                          6.                                                      \
                          |"
                      filters:
                        type: string
                        description: "Used to filter rows by one or more dimensions. Filters can be
                          combined using OR and AND boolean logic. AND takes
                          precedence over OR in all the expressions. The OR
                          operator is defined using a comma (,) or OR keyword
                          surrounded by whitespace. The AND operator is defined
                          using a semicolon (;) or AND keyword surrounded by
                          whitespace. Note that the semicolon is a reserved
                          character in URLs (rfc1738) and needs to be
                          percent-encoded as %3B. Comparison options are:  |
                          Operator | Name                     | URL Encoded | |
                          -------- | ------------------------ | ----------- | |
                          ==       | Equals                   | %3D%3D      | |
                          !=       | Does not equals          | !%3D        | |
                          \\>       | Greater Than             | %3E         | |
                          \\<       | Less Than                | %3C         | |
                          \\>=      | Greater than or equal to | %3E%3D      | |
                          \\<=      | Less than or equal to    | %3C%3D      |"
                      limit:
                        type: number
                        description: Limit number of returned metrics.
                      metrics:
                        type: array
                        items:
                          type: string
                          enum:
                            - count
                            - bytesIngress
                            - bytesEgress
                            - durationAvg
                            - durationMedian
                            - duration90th
                            - duration99th
                        description: "One or more metrics to compute. Options are:  | Metric         |
                          Name                                | Example |
                          Unit                  | | -------------- |
                          ----------------------------------- | ------- |
                          --------------------- | | count          | Count of
                          total events               | 1000    |
                          Count                 | | bytesIngress   | Sum of
                          ingress bytes                | 1000    |
                          Sum                   | | bytesEgress    | Sum of
                          egress bytes                 | 1000    |
                          Sum                   | | durationAvg    | Average
                          connection duration         | 1.0     | Time in
                          milliseconds  | | durationMedian | Median connection
                          duration          | 1.0     | Time in milliseconds  |
                          | duration90th   | 90th percentile connection duration
                          | 1.0     | Time in milliseconds  | | duration99th   |
                          99th percentile connection duration | 1.0     | Time
                          in milliseconds. |"
                      since:
                        type: string
                        description: Start of time interval to query, defaults to `until` - 6 hours.
                          Timestamp must be in RFC3339 format and uses UTC
                          unless otherwise specified.
                      sort:
                        type: array
                        items:
                          type: string
                        description: The sort order for the result set; sort fields must be included in
                          `metrics` or `dimensions`.
                      until:
                        type: string
                        description: End of time interval to query, defaults to current time. Timestamp
                          must be in RFC3339 format and uses UTC unless
                          otherwise specified.
                  rows:
                    type: number
                    description: Total number of rows in the result.
                  totals:
                    type: object
                    additionalProperties: true
                    description: Total result for each selected metrics across all data.
                  time_intervals:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                    description: "List of time interval buckets: [start, end]"
                required:
                  - data
                  - data_lag
                  - max
                  - min
                  - query
                  - rows
                  - totals
      x-distilled-response-path: result
