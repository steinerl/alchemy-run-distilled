          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      category:
                        type: string
                      date:
                        type: string
                      event:
                        type: string
                      raw:
                        type: object
                        properties:
                          data:
                            oneOf:
                              - type: object
                                additionalProperties: true
                            nullable: true
                          source:
                            type: string
                          tlp:
                            type: string
                        required:
                          - data
                      tlp:
                        type: string
                      accountId:
                        type: number
                      attacker:
                        oneOf:
                          - type: string
                        nullable: true
                      attackerCountry:
                        type: string
                      datasetId:
                        type: string
                      indicator:
                        type: string
                      indicators:
                        type: array
                        items:
                          type: object
                          properties:
                            indicatorType:
                              type: string
                              description: The type of indicator (e.g., DOMAIN, IP, JA3, HASH)
                            value:
                              type: string
                              description: The indicator value (e.g., domain name, IP address, hash)
                          required:
                            - indicatorType
                            - value
                        description: Array of indicators for this event. Supports multiple indicators
                          per event for complex scenarios.
                      indicatorType:
                        type: string
                      insight:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                      targetCountry:
                        type: string
                      targetIndustry:
                        type: string
                    required:
                      - category
                      - date
                      - event
                      - raw
                      - tlp
                  description: Body param
                datasetId:
                  type: string
                  description: Body param
                includeCreatedEvents:
                  type: boolean
                  description: "Body param: When true, response includes array of created event
                    UUIDs and shard IDs. Useful for tracking which events were
                    created and where."
              required:
                - data
                - datasetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  createdEventsCount:
                    type: number
                    description: Number of events created
                  createdTagsCount:
                    type: number
                    description: Number of new tags created in SoT
                  errorCount:
                    type: number
                    description: Number of errors encountered
                  queuedIndicatorsCount:
                    type: number
                    description: Number of indicators queued for async processing
                  createBulkEventsRequestId:
                    type: string
                    description: Correlation ID for async indicator processing
                  createdEvents:
                    type: array
                    items:
                      type: object
                      properties:
                        eventIndex:
                          type: number
                          description: Original index in the input data array
                        shardId:
                          type: string
                          description: Dataset ID of the shard where the event was created
                        uuid:
                          type: string
                          description: UUID of the created event
                      required:
                        - eventIndex
                        - shardId
                        - uuid
                    description: Array of created events with UUIDs and shard locations. Only
                      present when includeCreatedEvents=true
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        error:
                          type: string
                          description: Error message
                        eventIndex:
                          type: number
                          description: Index of the event that caused the error
                      required:
                        - error
                        - eventIndex
                    description: Array of error details
                required:
                  - createdEventsCount
                  - createdTagsCount
                  - errorCount
                  - queuedIndicatorsCount
