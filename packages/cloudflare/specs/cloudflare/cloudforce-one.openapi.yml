openapi: 3.1.0
info:
  title: Cloudflare CLOUDFORCE-ONE API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: cloudforce-one
paths:
  /accounts/{account_id}/cloudforce-one/binary/{hash}:
    get:
      operationId: getBinaryStorage
      description: "Retrieves a file from Binary Storage  @example ```ts await
        client.cloudforceOne.binaryStorage.get('hash', { account_id:
        'account_id', }); ```"
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID.
          schema:
            type: string
      responses:
        "200":
          description: Success
  /accounts/{account_id}/cloudforce-one/binary:
    post:
      operationId: createBinaryStorage
      description: "Posts a file to Binary Storage  @example ```ts const binaryStorage
        = await client.cloudforceOne.binaryStorage.create({ account_id:
        'account_id', file: fs.createReadStream('path/to/file'), }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: "Body param: The binary file content to upload."
              required:
                - file
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  content_type:
                    type: string
                  md5:
                    type: string
                  sha1:
                    type: string
                  sha256:
                    type: string
                required:
                  - content_type
                  - md5
                  - sha1
                  - sha256
  /accounts/{account_id}/cloudforce-one/requests/{requestId}:
    get:
      operationId: getRequest
      description: "Retrieves details for a specific Cloudforce One intelligence
        request.  @example ```ts const item = await
        client.cloudforceOne.requests.get(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID.
                  content:
                    type: string
                    description: Request content.
                  created:
                    type: string
                  priority:
                    type: string
                  request:
                    type: string
                    description: Requested information from request.
                  summary:
                    type: string
                    description: Brief description of the request.
                  tlp:
                    type: string
                    enum:
                      - clear
                      - amber
                      - amber-strict
                      - green
                      - red
                    description: The CISA defined Traffic Light Protocol (TLP).
                  updated:
                    type: string
                  completed:
                    type: string
                  message_tokens:
                    type: number
                    description: Tokens for the request messages.
                  readable_id:
                    type: string
                    description: Readable Request ID.
                  status:
                    type: string
                    enum:
                      - open
                      - accepted
                      - reported
                      - approved
                      - completed
                      - declined
                    description: Request Status.
                  tokens:
                    type: number
                    description: Tokens for the request.
                required:
                  - id
                  - content
                  - created
                  - priority
                  - request
                  - summary
                  - tlp
                  - updated
      x-distilled-response-path: result
    put:
      operationId: updateRequest
      description: "Updating a request alters the request in the Cloudforce One queue.
        This API may be used to update any attributes of the request after the
        initial submission. Only fields that you choose to update need to be add
        to the request body.  @example ```ts const item = await
        client.cloudforceOne.requests.update(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: "Body param: Request content."
                priority:
                  type: string
                  description: "Body param: Priority for analyzing the request."
                request_type:
                  type: string
                  description: "Body param: Requested information from request."
                summary:
                  type: string
                  description: "Body param: Brief description of the request."
                tlp:
                  type: string
                  enum:
                    - clear
                    - amber
                    - amber-strict
                    - green
                    - red
                  description: "Body param: The CISA defined Traffic Light Protocol (TLP)."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID.
                  content:
                    type: string
                    description: Request content.
                  created:
                    type: string
                  priority:
                    type: string
                  request:
                    type: string
                    description: Requested information from request.
                  summary:
                    type: string
                    description: Brief description of the request.
                  tlp:
                    type: string
                    enum:
                      - clear
                      - amber
                      - amber-strict
                      - green
                      - red
                    description: The CISA defined Traffic Light Protocol (TLP).
                  updated:
                    type: string
                  completed:
                    type: string
                  message_tokens:
                    type: number
                    description: Tokens for the request messages.
                  readable_id:
                    type: string
                    description: Readable Request ID.
                  status:
                    type: string
                    enum:
                      - open
                      - accepted
                      - reported
                      - approved
                      - completed
                      - declined
                    description: Request Status.
                  tokens:
                    type: number
                    description: Tokens for the request.
                required:
                  - id
                  - content
                  - created
                  - priority
                  - request
                  - summary
                  - tlp
                  - updated
      x-distilled-response-path: result
    delete:
      operationId: deleteRequest
      description: "Deletes a Cloudforce One intelligence request and all associated
        data.  @example ```ts const request = await
        client.cloudforceOne.requests.delete(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful.
                required:
                  - errors
                  - messages
                  - success
  /accounts/{account_id}/cloudforce-one/requests:
    post:
      operationId: listRequests
      description: "Lists Cloudforce One intelligence requests with filtering and
        pagination.  @example ```ts // Automatically fetches more pages as
        needed. for await (const listItem of client.cloudforceOne.requests.list(
        { account_id: '023e105f4ecef8ad9ca31a8372d0c353', page: 0, per_page: 10,
        }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: number
                  description: "Body param: Page number of results."
                per_page:
                  type: number
                  description: "Body param: Number of results per page."
                completed_after:
                  type: string
                  description: "Body param: Retrieve requests completed after this time."
                completed_before:
                  type: string
                  description: "Body param: Retrieve requests completed before this time."
                created_after:
                  type: string
                  description: "Body param: Retrieve requests created after this time."
                created_before:
                  type: string
                  description: "Body param: Retrieve requests created before this time."
                request_type:
                  type: string
                  description: "Body param: Requested information from request."
                sort_by:
                  type: string
                  description: "Body param: Field to sort results by."
                sort_order:
                  type: string
                  enum:
                    - asc
                    - desc
                  description: "Body param: Sort order (asc or desc)."
                status:
                  type: string
                  enum:
                    - open
                    - accepted
                    - reported
                    - approved
                    - completed
                    - declined
                  description: "Body param: Request Status."
              required:
                - page
                - per_page
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID.
                  created:
                    type: string
                    description: Request creation time.
                  priority:
                    type: string
                    enum:
                      - routine
                      - high
                      - urgent
                  request:
                    type: string
                    description: Requested information from request.
                  summary:
                    type: string
                    description: Brief description of the request.
                  tlp:
                    type: string
                    enum:
                      - clear
                      - amber
                      - amber-strict
                      - green
                      - red
                    description: The CISA defined Traffic Light Protocol (TLP).
                  updated:
                    type: string
                    description: Request last updated time.
                  completed:
                    type: string
                    description: Request completion time.
                  message_tokens:
                    type: number
                    description: Tokens for the request messages.
                  readable_id:
                    type: string
                    description: Readable Request ID.
                  status:
                    type: string
                    enum:
                      - open
                      - accepted
                      - reported
                      - approved
                      - completed
                      - declined
                    description: Request Status.
                  tokens:
                    type: number
                    description: Tokens for the request.
                required:
                  - id
                  - created
                  - priority
                  - request
                  - summary
                  - tlp
                  - updated
      x-distilled-pagination-class: ListItemsSinglePage
