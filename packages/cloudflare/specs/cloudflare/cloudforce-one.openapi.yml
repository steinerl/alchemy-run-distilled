  /accounts/{account_id}/cloudforce-one/events:
    get:
      operationId: listThreatEvents
      description: "Use `datasetId=all` or `datasetId= ` to query all event datasets
        for the account (limited to 10). When `datasetId` is unspecified, events
        are listed from the default Cloudforce One Threat Events dataset. To
        list existing datasets, use the [`List
        Datasets`](https://developers.cloudflare.com/api/resources/cloudforce_o\
        ne/subresources/threat_events/subresources/datasets/methods/list/)
        endpoint.  @example ```ts const threatEvents = await
        client.cloudforceOne.threatEvents.list({ account_id: 'account_id', });
        ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: "Query param: Cursor for pagination. When provided, filters are
            embedded in the cursor so you only need to pass cursor and pageSize.
            Returned in the previous response's result_info.cursor field. Use
            cursor-based pagination for deep pagination (beyond 100,000 records)
            or for optimal performance."
          schema:
            type: string
        - name: datasetId
          in: query
          required: false
          description: "Query param: Dataset IDs to query events from (array of UUIDs), or
            special value 'all' or '\\ ' to query all event datasets for the
            account. If not provided, uses the default dataset."
          schema:
            type: array
            items:
              type: string
        - name: forceRefresh
          in: query
          required: false
          description: Query param
          schema:
            type: boolean
        - name: format
          in: query
          required: false
          description: Query param
          schema:
            type: string
            enum:
              - json
              - stix2
              - taxii
        - name: order
          in: query
          required: false
          description: Query param
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: orderBy
          in: query
          required: false
          description: Query param
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: "Query param: Page number (1-indexed) for offset-based pagination.
            Limited to offset of 100,000 records. For deep pagination, use
            cursor-based pagination instead."
          schema:
            type: number
        - name: pageSize
          in: query
          required: false
          description: "Query param: Number of results per page. Maximum 25,000."
          schema:
            type: number
        - name: search
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: object
              properties:
                field:
                  type: string
                  description: "Event field to search on. Allowed: attacker, attackerCountry,
                    category, createdAt, date, event, indicator, indicatorType,
                    killChain, mitreAttack, tags, targetCountry, targetIndustry,
                    tlp, uuid."
                op:
                  type: string
                  enum:
                    - equals
                    - not
                    - gt
                    - gte
                    - lt
                    - lte
                    - like
                    - contains
                    - startsWith
                    - endsWith
                    - in
                    - find
                  description: Search operator. Use 'in' for bulk lookup of up to 100 values at
                    once, e.g. {field:'tags', op:'in', value:['malware','apt']}.
                value:
                  oneOf:
                    - type: string
                    - type: number
                    - type: array
                      items:
                        oneOf:
                          - type: string
                          - type: number
                  description: Search value. String or number for most operators. Array for 'in'
                    operator (max 100 items).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
