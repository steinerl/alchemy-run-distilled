openapi: 3.1.0
info:
  title: Cloudflare EMAIL-SECURITY API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: email-security
paths:
  /accounts/{account_id}/email-security/investigate/{investigateId}:
    get:
      operationId: getInvestigate
      description: "Retrieves comprehensive details for a specific email message
        including headers, recipients, sender information, and current
        quarantine status. Use the investigate_id from search results to fetch
        detailed information.  @example ```ts const investigate = await
        client.emailSecurity.investigate.get(
        '4Njp3P0STMz2c02Q-2024-01-05T10:00:00-12345678', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: investigateId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: submission
          in: query
          required: false
          description: "Query param: When true, search the submissions datastore only.
            When false or omitted, search the regular datastore only."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique identifier for a message retrieved from investigation
                  action_log:
                    type: array
                    items:
                      type: object
                      properties:
                        completed_at:
                          type: string
                          description: Timestamp when action completed
                        operation:
                          type: string
                          enum:
                            - MOVE
                            - RELEASE
                            - RECLASSIFY
                            - SUBMISSION
                            - QUARANTINE_RELEASE
                            - PREVIEW
                          description: Type of action performed
                        completed_timestamp:
                          type: string
                          description: "@deprecated Deprecated, use `completed_at` instead. End of life:
                            November 1, 2026."
                        properties:
                          type: object
                          properties:
                            folder:
                              type: string
                              description: Target folder for move operations
                            requested_by:
                              type: string
                              description: User who requested the action
                          description: Additional properties for the action
                        status:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Status of the action
                      required:
                        - completed_at
                        - operation
                    description: "@deprecated Deprecated, use `GET
                      /investigate/{investigate_id}/action_log` instead. End of
                      life: November 1, 2026."
                  client_recipients:
                    type: array
                    items:
                      type: string
                  detection_reasons:
                    type: array
                    items:
                      type: string
                  is_phish_submission:
                    type: boolean
                  is_quarantined:
                    type: boolean
                  postfix_id:
                    type: string
                    description: The identifier of the message
                  properties:
                    type: object
                    properties:
                      allowlisted_pattern:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Pattern that allowlisted this message
                      allowlisted_pattern_type:
                        type: string
                        enum:
                          - quarantine_release
                          - acceptable_sender
                          - allowed_sender
                          - allowed_recipient
                          - domain_similarity
                          - domain_recency
                          - managed_acceptable_sender
                          - outbound_ndr
                        nullable: true
                        description: Type of allowlist pattern
                      blocklisted_message:
                        oneOf:
                          - type: boolean
                        nullable: true
                        description: Whether message was blocklisted
                      blocklisted_pattern:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Pattern that blocklisted this message
                      whitelisted_pattern_type:
                        type: string
                        enum:
                          - quarantine_release
                          - acceptable_sender
                          - allowed_sender
                          - allowed_recipient
                          - domain_similarity
                          - domain_recency
                          - managed_acceptable_sender
                          - outbound_ndr
                        nullable: true
                        description: Legacy field for allowlist pattern type
                    description: Message processing properties
                  ts:
                    type: string
                    description: "@deprecated Deprecated, use `scanned_at` instead. End of life:
                      November 1, 2026."
                  alert_id:
                    oneOf:
                      - type: string
                    nullable: true
                  delivery_mode:
                    type: string
                    enum:
                      - DIRECT
                      - BCC
                      - JOURNAL
                      - REVIEW_SUBMISSION
                      - DMARC_UNVERIFIED
                      - DMARC_FAILURE_REPORT
                      - DMARC_AGGREGATE_REPORT
                      - THREAT_INTEL_SUBMISSION
                      - SIMULATION_SUBMISSION
                      - API
                      - RETRO_SCAN
                  delivery_status:
                    oneOf:
                      - type: array
                        items:
                          type: string
                          enum:
                            - delivered
                            - moved
                            - quarantined
                            - rejected
                            - deferred
                            - bounced
                            - queued
                    nullable: true
                  edf_hash:
                    oneOf:
                      - type: string
                    nullable: true
                  envelope_from:
                    oneOf:
                      - type: string
                    nullable: true
                  envelope_to:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  final_disposition:
                    type: string
                    enum:
                      - MALICIOUS
                      - MALICIOUS-BEC
                      - SUSPICIOUS
                      - SPOOF
                      - SPAM
                      - BULK
                      - ENCRYPTED
                      - EXTERNAL
                      - UNKNOWN
                      - NONE
                  findings:
                    oneOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            attachment:
                              oneOf:
                                - type: string
                              nullable: true
                            detail:
                              oneOf:
                                - type: string
                              nullable: true
                            detection:
                              type: string
                              enum:
                                - MALICIOUS
                                - MALICIOUS-BEC
                                - SUSPICIOUS
                                - SPOOF
                                - SPAM
                                - BULK
                                - ENCRYPTED
                                - EXTERNAL
                                - UNKNOWN
                                - NONE
                            field:
                              oneOf:
                                - type: string
                              nullable: true
                            name:
                              oneOf:
                                - type: string
                              nullable: true
                            portion:
                              oneOf:
                                - type: string
                              nullable: true
                            reason:
                              oneOf:
                                - type: string
                              nullable: true
                            score:
                              oneOf:
                                - type: number
                              nullable: true
                            value:
                              oneOf:
                                - type: string
                              nullable: true
                    nullable: true
                    description: "@deprecated Deprecated, use the `findings` field from `GET
                      /investigate/{investigate_id}/detections` instead. End of
                      life: November 1, 2026. Detection findings for this
                      message."
                  from:
                    oneOf:
                      - type: string
                    nullable: true
                  from_name:
                    oneOf:
                      - type: string
                    nullable: true
                  htmltext_structure_hash:
                    oneOf:
                      - type: string
                    nullable: true
                  message_id:
                    oneOf:
                      - type: string
                    nullable: true
                  post_delivery_operations:
                    oneOf:
                      - type: array
                        items:
                          type: string
                          enum:
                            - PREVIEW
                            - QUARANTINE_RELEASE
                            - SUBMISSION
                            - MOVE
                    nullable: true
                    description: Post-delivery operations performed on this message
                  postfix_id_outbound:
                    oneOf:
                      - type: string
                    nullable: true
                  replyto:
                    oneOf:
                      - type: string
                    nullable: true
                  scanned_at:
                    oneOf:
                      - type: string
                    nullable: true
                    description: When the message was scanned (UTC)
                  sent_at:
                    oneOf:
                      - type: string
                    nullable: true
                    description: When the message was sent (UTC)
                  sent_date:
                    oneOf:
                      - type: string
                    nullable: true
                  smtp_helo_server_ip:
                    oneOf:
                      - type: string
                    nullable: true
                  smtp_previous_hop_ip:
                    oneOf:
                      - type: string
                    nullable: true
                  subject:
                    oneOf:
                      - type: string
                    nullable: true
                  threat_categories:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  to:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  to_name:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  validation:
                    type: object
                    properties:
                      comment:
                        oneOf:
                          - type: string
                        nullable: true
                      dkim:
                        type: string
                        enum:
                          - pass
                          - neutral
                          - fail
                          - error
                          - none
                      dmarc:
                        type: string
                        enum:
                          - pass
                          - neutral
                          - fail
                          - error
                          - none
                      spf:
                        type: string
                        enum:
                          - pass
                          - neutral
                          - fail
                          - error
                          - none
                  x_originating_ip:
                    oneOf:
                      - type: string
                    nullable: true
                required:
                  - id
                  - action_log
                  - client_recipients
                  - detection_reasons
                  - is_phish_submission
                  - is_quarantined
                  - postfix_id
                  - properties
                  - ts
      x-distilled-response-path: result
