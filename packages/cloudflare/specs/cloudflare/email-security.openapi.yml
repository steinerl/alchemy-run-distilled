  /accounts/{account_id}/email-security/investigate/{investigateId}/detections:
    get:
      operationId: getInvestigateDetection
      description: "Returns detection details such as threat categories and sender
        information for non-benign messages.  @example ```ts const detection =
        await client.emailSecurity.investigate.detections.get(
        '4Njp3P0STMz2c02Q-2024-01-05T10:00:00-12345678', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: investigateId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                  attachments:
                    type: array
                    items:
                      type: object
                      properties:
                        size:
                          type: number
                          description: Size of the attachment in bytes
                        content_type:
                          oneOf:
                            - type: string
                          nullable: true
                          description: MIME type of the attachment
                        detection:
                          type: string
                          enum:
                            - MALICIOUS
                            - MALICIOUS-BEC
                            - SUSPICIOUS
                            - SPOOF
                            - SPAM
                            - BULK
                            - ENCRYPTED
                            - EXTERNAL
                            - UNKNOWN
                            - NONE
                          nullable: true
                          description: Detection result for this attachment
                        encrypted:
                          oneOf:
                            - type: boolean
                          nullable: true
                          description: Whether the attachment is encrypted
                        filename:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Name of the attached file
                        md5:
                          oneOf:
                            - type: string
                          nullable: true
                          description: MD5 hash of the attachment
                        name:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Attachment name (alternative to filename)
                        sha1:
                          oneOf:
                            - type: string
                          nullable: true
                          description: SHA1 hash of the attachment
                        sha256:
                          oneOf:
                            - type: string
                          nullable: true
                          description: SHA256 hash of the attachment
                      required:
                        - size
                  findings:
                    oneOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            attachment:
                              oneOf:
                                - type: string
                              nullable: true
                            detail:
                              oneOf:
                                - type: string
                              nullable: true
                            detection:
                              type: string
                              enum:
                                - MALICIOUS
                                - MALICIOUS-BEC
                                - SUSPICIOUS
                                - SPOOF
                                - SPAM
                                - BULK
                                - ENCRYPTED
                                - EXTERNAL
                                - UNKNOWN
                                - NONE
                            field:
                              oneOf:
                                - type: string
                              nullable: true
                            name:
                              oneOf:
                                - type: string
                              nullable: true
                            portion:
                              oneOf:
                                - type: string
                              nullable: true
                            reason:
                              oneOf:
                                - type: string
                              nullable: true
                            score:
                              oneOf:
                                - type: number
                              nullable: true
                            value:
                              oneOf:
                                - type: string
                              nullable: true
                    nullable: true
                  headers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                      required:
                        - name
                        - value
                  links:
                    type: array
                    items:
                      type: object
                      properties:
                        href:
                          type: string
                        text:
                          oneOf:
                            - type: string
                          nullable: true
                      required:
                        - href
                  sender_info:
