      description: "Deletes an app from Cloudflare Calls  @example ```ts const sfu =
        await client.calls.sfu.delete( '2a95132c15732412d22c1476fa83f27a', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
