  /accounts/{account_id}/calls/apps:
    post:
      operationId: createSfu
      description: "Creates a new Cloudflare calls app. An app is an unique enviroment
        where each Session can access all Tracks within the app.  @example ```ts
        const sfu = await client.calls.sfu.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: A short description of Calls app, not shown to end
                    users."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: string
                    description: The date and time the item was created.
                  modified:
                    type: string
                    description: The date and time the item was last modified.
                  name:
                    type: string
                    description: A short description of Calls app, not shown to end users.
                  secret:
                    type: string
                    description: Bearer token
                  uid:
                    type: string
                    description: A Cloudflare-generated unique identifier for a item.
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
    get:
      operationId: listSfus
      description: "Lists all apps in the Cloudflare account  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        sfuListResponse of client.calls.sfu.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', })) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: string
                    description: The date and time the item was created.
                  modified:
                    type: string
