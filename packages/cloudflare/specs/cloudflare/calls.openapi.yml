openapi: 3.1.0
info:
  title: Cloudflare CALLS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: calls
paths:
  /accounts/{account_id}/calls/apps/{appId}:
    get:
      operationId: getSfu
      description: "Fetches details for a single Calls app.  @example ```ts const sfu
        = await client.calls.sfu.get( '2a95132c15732412d22c1476fa83f27a', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: string
                    description: The date and time the item was created.
                  modified:
                    type: string
                    description: The date and time the item was last modified.
                  name:
                    type: string
                    description: A short description of Calls app, not shown to end users.
                  uid:
                    type: string
                    description: A Cloudflare-generated unique identifier for a item.
      x-distilled-response-path: result
      x-distilled-errors:
        CallsAppNotFound:
          - code: 20007
        Forbidden:
          - status: 403
    put:
      operationId: updateSfu
      description: "Edit details for a single app.  @example ```ts const sfu = await
        client.calls.sfu.update( '2a95132c15732412d22c1476fa83f27a', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: A short description of Calls app, not shown to end
                    users."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: string
                    description: The date and time the item was created.
                  modified:
                    type: string
                    description: The date and time the item was last modified.
                  name:
                    type: string
                    description: A short description of Calls app, not shown to end users.
                  uid:
                    type: string
                    description: A Cloudflare-generated unique identifier for a item.
