openapi: 3.1.0
info:
  title: Cloudflare R2 API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: r2
paths:
  /accounts/{account_id}/slurper/jobs/abortAll:
    put:
      operationId: abortAllSuperSlurperJob
      description: "Cancels all running R2 Super Slurper migration jobs for the
        account. Any objects in the middle of a transfer will finish, but no new
        objects will start transferring.  @example ```ts const response = await
        client.r2.superSlurper.jobs.abortAll( { account_id: 'account_id' }, );
        ```"
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
      x-distilled-response-path: result
  /accounts/{account_id}/r2/buckets/{bucketName}:
    get:
      operationId: getBucket
      description: "Gets properties of an existing R2 bucket.  @example ```ts const
        bucket = await client.r2.buckets.get( 'example-bucket', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  creation_date:
                    type: string
                    description: Creation timestamp.
                  jurisdiction:
                    type: string
                    enum:
                      - default
                      - eu
                      - fedramp
                    description: Jurisdiction where objects in this bucket are guaranteed to be
                      stored.
                  location:
                    type: string
                    enum:
                      - apac
                      - eeur
                      - enam
                      - weur
                      - wnam
                      - oc
                      - APAC
                      - EEUR
                      - ENAM
                      - WEUR
                      - WNAM
                      - OC
                    description: Location of the bucket.
                  name:
                    type: string
                    description: Name of the bucket.
                  storage_class:
                    type: string
                    enum:
                      - Standard
                      - InfrequentAccess
                    description: Storage class for newly uploaded objects, unless specified
                      otherwise.
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
    patch:
      operationId: patchBucket
      description: "Updates properties of an existing R2 bucket.  @example ```ts const
        bucket = await client.r2.buckets.edit( 'example-bucket', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', storage_class: 'Standard', }, );
        ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-storage-class
          in: header
          required: true
          description: "Header param: Storage class for newly uploaded objects, unless
            specified otherwise."
          schema:
            type: string
            enum:
              - Standard
              - InfrequentAccess
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  creation_date:
                    type: string
                    description: Creation timestamp.
                  jurisdiction:
                    type: string
                    enum:
                      - default
                      - eu
                      - fedramp
                    description: Jurisdiction where objects in this bucket are guaranteed to be
                      stored.
                  location:
                    type: string
                    enum:
                      - apac
                      - eeur
                      - enam
                      - weur
                      - wnam
                      - oc
                      - APAC
                      - EEUR
                      - ENAM
                      - WEUR
                      - WNAM
                      - OC
                    description: Location of the bucket.
                  name:
                    type: string
                    description: Name of the bucket.
                  storage_class:
                    type: string
                    enum:
                      - Standard
                      - InfrequentAccess
                    description: Storage class for newly uploaded objects, unless specified
                      otherwise.
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
    delete:
      operationId: deleteBucket
      description: "Deletes an existing R2 bucket.  @example ```ts const bucket =
        await client.r2.buckets.delete( 'example-bucket', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
        NoRoute:
          - code: 10015
  /accounts/{account_id}/r2/buckets:
    get:
      operationId: listBuckets
      description: "Lists all R2 buckets on your account.  @example ```ts const
        buckets = await client.r2.buckets.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: "Query param: Pagination cursor received during the last List
            Buckets call. R2 buckets are paginated using cursors instead of page
            numbers."
          schema:
            type: string
        - name: direction
          in: query
          required: false
          description: "Query param: Direction to order buckets."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: name_contains
          in: query
          required: false
          description: "Query param: Bucket names to filter by. Only buckets with this
            phrase in their name will be returned."
          schema:
            type: string
        - name: order
          in: query
          required: false
          description: "Query param: Field to order buckets by."
          schema:
            type: string
            enum:
              - name
        - name: per_page
          in: query
          required: false
          description: "Query param: Maximum number of buckets to return in a single call."
          schema:
            type: number
        - name: start_after
          in: query
          required: false
          description: "Query param: Bucket name to start searching after. Buckets are
            ordered lexicographically."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        creation_date:
                          type: string
                          description: Creation timestamp.
                        jurisdiction:
                          type: string
                          enum:
                            - default
                            - eu
                            - fedramp
                          description: Jurisdiction where objects in this bucket are guaranteed to be
                            stored.
                        location:
                          type: string
                          enum:
                            - apac
                            - eeur
                            - enam
                            - weur
                            - wnam
                            - oc
                            - APAC
                            - EEUR
                            - ENAM
                            - WEUR
                            - WNAM
                            - OC
                          description: Location of the bucket.
                        name:
                          type: string
                          description: Name of the bucket.
                        storage_class:
                          type: string
                          enum:
                            - Standard
                            - InfrequentAccess
                          description: Storage class for newly uploaded objects, unless specified
                            otherwise.
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
    post:
      operationId: createBucket
      description: "Creates a new R2 bucket.  @example ```ts const bucket = await
        client.r2.buckets.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', name: 'example-bucket', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: Name of the bucket."
                locationHint:
                  type: string
                  enum:
                    - apac
                    - eeur
                    - enam
                    - weur
                    - wnam
                    - oc
                  description: "Body param: Location of the bucket."
                storageClass:
                  type: string
                  enum:
                    - Standard
                    - InfrequentAccess
                  description: "Body param: Storage class for newly uploaded objects, unless
                    specified otherwise."
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  creation_date:
                    type: string
                    description: Creation timestamp.
                  jurisdiction:
                    type: string
                    enum:
                      - default
                      - eu
                      - fedramp
                    description: Jurisdiction where objects in this bucket are guaranteed to be
                      stored.
                  location:
                    type: string
                    enum:
                      - apac
                      - eeur
                      - enam
                      - weur
                      - wnam
                      - oc
                      - APAC
                      - EEUR
                      - ENAM
                      - WEUR
                      - WNAM
                      - OC
                    description: Location of the bucket.
                  name:
                    type: string
                    description: Name of the bucket.
                  storage_class:
                    type: string
                    enum:
                      - Standard
                      - InfrequentAccess
                    description: Storage class for newly uploaded objects, unless specified
                      otherwise.
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidBucketName:
          - code: 10005
        BucketAlreadyExists:
          - code: 10004
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/r2/buckets/{bucketName}/cors:
    get:
      operationId: getBucketCors
      description: "Get the CORS policy for a bucket.  @example ```ts const cors =
        await client.r2.buckets.cors.get( 'example-bucket', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        allowed:
                          type: object
                          properties:
                            methods:
                              type: array
                              items:
                                type: string
                                enum:
                                  - GET
                                  - PUT
                                  - POST
                                  - DELETE
                                  - HEAD
                              description: Specifies the value for the Access-Control-Allow-Methods header R2
                                sets when requesting objects in a bucket from a
                                browser.
                            origins:
                              type: array
                              items:
                                type: string
                              description: Specifies the value for the Access-Control-Allow-Origin header R2
                                sets when requesting objects in a bucket from a
                                browser.
                            headers:
                              type: array
                              items:
                                type: string
                              description: Specifies the value for the Access-Control-Allow-Headers header R2
                                sets when requesting objects in this bucket from
                                a browser. Cross-origin requests that include
                                custom headers (e.g. x-user-id) should specify
                                these headers as AllowedHeaders.
                          required:
                            - methods
                            - origins
                          description: Object specifying allowed origins, methods and headers for this
                            CORS rule.
                        id:
                          type: string
                          description: Identifier for this rule.
                        exposeHeaders:
                          type: array
                          items:
                            type: string
                          description: Specifies the headers that can be exposed back, and accessed by,
                            the JavaScript making the cross-origin request. If
                            you need to access headers beyond the safelisted
                            response headers, such as Content-Encoding or
                            cf-cache-status, you must specify it here.
                        maxAgeSeconds:
                          type: number
                          description: Specifies the amount of time (in seconds) browsers are allowed to
                            cache CORS preflight responses. Browsers may limit
                            this to 2 hours or less, even if the maximum value
                            (86400) is specified.
                      required:
                        - allowed
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
        NoCorsConfiguration:
          - code: 10059
    put:
      operationId: putBucketCors
      description: "Set the CORS policy for a bucket.  @example ```ts const cors =
        await client.r2.buckets.cors.update( 'example-bucket', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      allowed:
                        type: object
                        properties:
                          methods:
                            type: array
                            items:
                              type: string
                              enum:
                                - GET
                                - PUT
                                - POST
                                - DELETE
                                - HEAD
                            description: Specifies the value for the Access-Control-Allow-Methods header R2
                              sets when requesting objects in a bucket from a
                              browser.
                          origins:
                            type: array
                            items:
                              type: string
                            description: Specifies the value for the Access-Control-Allow-Origin header R2
                              sets when requesting objects in a bucket from a
                              browser.
                          headers:
                            type: array
                            items:
                              type: string
                            description: Specifies the value for the Access-Control-Allow-Headers header R2
                              sets when requesting objects in this bucket from a
                              browser. Cross-origin requests that include custom
                              headers (e.g. x-user-id) should specify these
                              headers as AllowedHeaders.
                        required:
                          - methods
                          - origins
                        description: Object specifying allowed origins, methods and headers for this
                          CORS rule.
                      id:
                        type: string
                        description: Identifier for this rule.
                      exposeHeaders:
                        type: array
                        items:
                          type: string
                        description: Specifies the headers that can be exposed back, and accessed by,
                          the JavaScript making the cross-origin request. If you
                          need to access headers beyond the safelisted response
                          headers, such as Content-Encoding or cf-cache-status,
                          you must specify it here.
                      maxAgeSeconds:
                        type: number
                        description: Specifies the amount of time (in seconds) browsers are allowed to
                          cache CORS preflight responses. Browsers may limit
                          this to 2 hours or less, even if the maximum value
                          (86400) is specified.
                    required:
                      - allowed
                  description: Body param
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
    delete:
      operationId: deleteBucketCors
      description: "Delete the CORS policy for a bucket.  @example ```ts const cors =
        await client.r2.buckets.cors.delete( 'example-bucket', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/r2/buckets/{bucketName}/domains/custom/{domain}:
    get:
      operationId: getBucketDomainCustom
      description: "Get the configuration for a custom domain on an existing R2
        bucket.  @example ```ts const custom = await
        client.r2.buckets.domains.custom.get( 'example-bucket',
        'example-domain/custom-domain.com', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: domain
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                    description: Domain name of the custom domain to be added.
                  enabled:
                    type: boolean
                    description: Whether this bucket is publicly accessible at the specified custom
                      domain.
                  status:
                    type: object
                    properties:
                      ownership:
                        type: string
                        enum:
                          - pending
                          - active
                          - deactivated
                          - blocked
                          - error
                          - unknown
                        description: Ownership status of the domain.
                      ssl:
                        type: string
                        enum:
                          - initializing
                          - pending
                          - active
                          - deactivated
                          - error
                          - unknown
                        description: SSL certificate status.
                    required:
                      - ownership
                      - ssl
                  ciphers:
                    type: array
                    items:
                      type: string
                    description: An allowlist of ciphers for TLS termination. These ciphers must be
                      in the BoringSSL format.
                  minTLS:
                    type: number
                    enum:
                      - 1
                      - 1.1
                      - 1.2
                      - 1.3
                    description: Minimum TLS Version the custom domain will accept for incoming
                      connections. If not set, defaults to 1.0.
                  zoneId:
                    type: string
                    description: Zone ID of the custom domain resides in.
                  zoneName:
                    type: string
                    description: Zone that the custom domain resides in.
                required:
                  - domain
                  - enabled
                  - status
      x-distilled-response-path: result
      x-distilled-errors:
        DomainNotFound:
          - code: 10053
        NoSuchBucket:
          - code: 10006
        InvalidRoute:
          - code: 7003
    put:
      operationId: updateBucketDomainCustom
      description: "Edit the configuration for a custom domain on an existing R2
        bucket.  @example ```ts const custom = await
        client.r2.buckets.domains.custom.update( 'example-bucket',
        'example-domain/custom-domain.com', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: domain
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ciphers:
                  type: array
                  items:
                    type: string
                  description: "Body param: An allowlist of ciphers for TLS termination. These
                    ciphers must be in the BoringSSL format."
                enabled:
                  type: boolean
                  description: "Body param: Whether to enable public bucket access at the
                    specified custom domain."
                minTLS:
                  type: number
                  enum:
                    - 1
                    - 1.1
                    - 1.2
                    - 1.3
                  description: "Body param: Minimum TLS Version the custom domain will accept for
                    incoming connections. If not set, defaults to previous
                    value."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                    description: Domain name of the affected custom domain.
                  ciphers:
                    type: array
                    items:
                      type: string
                    description: An allowlist of ciphers for TLS termination. These ciphers must be
                      in the BoringSSL format.
                  enabled:
                    type: boolean
                    description: Whether this bucket is publicly accessible at the specified custom
                      domain.
                  minTLS:
                    type: number
                    enum:
                      - 1
                      - 1.1
                      - 1.2
                      - 1.3
                    description: Minimum TLS Version the custom domain will accept for incoming
                      connections. If not set, defaults to 1.0.
                required:
                  - domain
      x-distilled-response-path: result
      x-distilled-errors:
        NoSuchBucket:
          - code: 10006
    delete:
      operationId: deleteBucketDomainCustom
      description: "Remove custom domain registration from an existing R2
        bucket.  @example ```ts const custom = await
        client.r2.buckets.domains.custom.delete( 'example-bucket',
        'example-domain/custom-domain.com', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: domain
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cf-r2-jurisdiction
          in: header
          required: false
          description: "Header param: Jurisdiction where objects in this bucket are
            guaranteed to be stored."
          schema:
            type: string
            enum:
              - default
              - eu
              - fedramp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                    description: Name of the removed custom domain.
                required:
                  - domain
      x-distilled-response-path: result
      x-distilled-errors:
        DomainNotFound:
          - code: 10053
        NoSuchBucket:
          - code: 10006
  /accounts/{account_id}/r2/buckets/{bucketName}/domains/custom:
    get:
      operationId: listBucketDomainCustoms
