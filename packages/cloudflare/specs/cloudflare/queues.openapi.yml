                      script:
                        type: string
                        description: Name of a Worker
                      settings:
                        type: object
                        properties:
                          batch_size:
                            type: number
                            description: The maximum number of messages to include in a batch.
                          max_concurrency:
                            type: number
                            description: Maximum number of concurrent consumers that may consume from this
                              Queue. Set to `null` to automatically opt in to
                              the platform's maximum (recommended).
                          max_retries:
                            type: number
                            description: The maximum number of retries
                          max_wait_time_ms:
                            type: number
                            description: The number of milliseconds to wait for a batch to fill up before
                              attempting to deliver it
                          retry_delay:
                            type: number
                            description: The number of seconds to delay before making the message available
                              for another attempt.
                      type:
                        type: string
                        enum:
                          - worker
                  - type: object
                    properties:
                      consumer_id:
                        type: string
                        description: A Resource identifier.
                      created_on:
                        type: string
                      queue_id:
                        type: string
                        description: A Resource identifier.
