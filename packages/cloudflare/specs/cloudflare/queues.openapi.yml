          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: A Resource identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                delay_seconds:
                  type: number
                  description: "Body param: The number of seconds to wait for attempting to
                    deliver this batch to consumers"
                messages:
                  type: array
                  items:
                    oneOf:
                      - type: object
                        properties:
                          body:
                            type: string
                          content_type:
                            type: string
                            enum:
                              - text
                          delay_seconds:
                            type: number
