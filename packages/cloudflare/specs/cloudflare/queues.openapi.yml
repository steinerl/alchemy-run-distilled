  /accounts/{account_id}/queues/{queueId}/messages/batch:
    post:
      operationId: bulkPushMessages
      description: "Push a batch of message to a Queue  @example ```ts const response
        = await client.queues.messages.bulkPush(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
