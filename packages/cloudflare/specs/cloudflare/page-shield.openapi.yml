        'ends_with(http.request.uri.path, \"/checkout\")', value: \"script-src
        'none';\", }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - allow
                    - log
                    - add_reporting_directives
                  description: "Body param: The action to take if the expression matches"
                description:
                  type: string
                  description: "Body param: A description for the policy"
                enabled:
                  type: boolean
                  description: "Body param: Whether the policy is enabled"
                expression:
                  type: string
                  description: "Body param: The expression which must match for the policy to be
                    applied, using the Cloudflare Firewall rule expression
                    syntax"
                value:
                  type: string
                  description: "Body param: The policy which will be applied"
              required:
                - action
                - description
                - enabled
                - expression
                - value
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  action:
                    type: string
                    enum:
                      - allow
                      - log
                      - add_reporting_directives
                    description: The action to take if the expression matches
                  description:
                    type: string
                    description: A description for the policy
                  enabled:
                    type: boolean
                    description: Whether the policy is enabled
                  expression:
                    type: string
                    description: The expression which must match for the policy to be applied, using
                      the Cloudflare Firewall rule expression syntax
                  value:
                    type: string
                    description: The policy which will be applied
                required:
                  - id
                  - action
                  - description
                  - enabled
                  - expression
                  - value
      x-distilled-response-path: result
      x-distilled-errors:
        PolicyQuotaExceeded:
          - status: 400
            message:
              includes: exceeded the maximum number of rules in the phase
                http_response_page_shield
        Forbidden:
          - status: 403
  /zones/{zone_id}/page_shield/scripts/{scriptId}:
    get:
      operationId: getScript
      description: "Fetches a script detected by Page Shield by script ID.  @example
        ```ts const script = await client.pageShield.scripts.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: scriptId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
