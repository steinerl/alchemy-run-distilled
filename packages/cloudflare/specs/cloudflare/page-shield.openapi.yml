openapi: 3.1.0
info:
  title: Cloudflare PAGE-SHIELD API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: page-shield
paths:
  /zones/{zone_id}/page_shield/connections/{connectionId}:
    get:
      operationId: getConnection
      description: "Fetches a connection detected by Page Shield by connection
        ID.  @example ```ts const connection = await
        client.pageShield.connections.get( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  added_at:
                    type: string
                  first_seen_at:
                    type: string
                  host:
                    type: string
                  last_seen_at:
                    type: string
                  url:
                    type: string
                  url_contains_cdn_cgi_path:
                    type: boolean
                  domain_reported_malicious:
                    type: boolean
                  first_page_url:
                    type: string
                  malicious_domain_categories:
                    type: array
                    items:
                      type: string
                  malicious_url_categories:
                    type: array
                    items:
                      type: string
                  page_urls:
                    type: array
                    items:
                      type: string
                  url_reported_malicious:
                    type: boolean
                required:
                  - id
                  - added_at
                  - first_seen_at
                  - host
                  - last_seen_at
                  - url
                  - url_contains_cdn_cgi_path
      x-distilled-response-path: result
  /zones/{zone_id}/page_shield/connections:
    get:
      operationId: listConnections
      description: "Lists all connections detected by Page Shield.  @example ```ts //
        Automatically fetches more pages as needed. for await (const connection
        of client.pageShield.connections.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: direction
          in: query
          required: false
          description: "Query param: The direction used to sort returned connections."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: exclude_cdn_cgi
          in: query
          required: false
          description: "Query param: When true, excludes connections seen in a `/cdn-cgi`
            path from the returned connections. The default value is true."
          schema:
            type: boolean
        - name: exclude_urls
          in: query
          required: false
          description: "Query param: Excludes connections whose URL contains one of the
            URL-encoded URLs separated by commas."
          schema:
            type: string
        - name: export
          in: query
          required: false
          description: "Query param: Export the list of connections as a file, limited to
            50000 entries."
          schema:
            type: string
            enum:
              - csv
        - name: hosts
          in: query
          required: false
          description: "Query param: Includes connections that match one or more
            URL-encoded hostnames separated by commas.  Wildcards are supported
            at the start and end of each hostname to support starts with, ends
            with and contains. If no wildcards are used, results will be
            filtered by exact match"
          schema:
            type: string
        - name: order_by
          in: query
          required: false
          description: "Query param: The field used to sort returned connections."
          schema:
            type: string
            enum:
              - first_seen_at
              - last_seen_at
        - name: page
          in: query
          required: false
          description: 'Query param: The current page number of the paginated results.  We
            additionally support a special value "all". When "all" is used, the
            API will return all the connections with the applied filters in a
            single page. This feature is best-effort and it may only work for
            zones with a low number of connections'
          schema:
            type: string
        - name: page_url
          in: query
          required: false
          description: "Query param: Includes connections that match one or more page URLs
            (separated by commas) where they were last seen  Wildcards are
            supported at the start and end of each page URL to support starts
            with, ends with and contains. If no wildcards are used, results will
            be filtered by exact match"
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: "Query param: The number of results per page."
          schema:
            type: number
        - name: prioritize_malicious
          in: query
          required: false
          description: "Query param: When true, malicious connections appear first in the
            returned connections."
          schema:
            type: boolean
        - name: status
          in: query
          required: false
          description: "Query param: Filters the returned connections using a
            comma-separated list of connection statuses. Accepted values:
            `active`, `infrequent`, and `inactive`. The default value is
            `active`."
          schema:
            type: string
        - name: urls
          in: query
          required: false
          description: "Query param: Includes connections whose URL contain one or more
            URL-encoded URLs separated by commas."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  added_at:
                    type: string
                  first_seen_at:
                    type: string
                  host:
                    type: string
                  last_seen_at:
                    type: string
                  url:
                    type: string
                  url_contains_cdn_cgi_path:
                    type: boolean
                  domain_reported_malicious:
                    type: boolean
                  first_page_url:
                    type: string
                  malicious_domain_categories:
                    type: array
                    items:
                      type: string
                  malicious_url_categories:
                    type: array
                    items:
                      type: string
                  page_urls:
                    type: array
                    items:
                      type: string
                  url_reported_malicious:
                    type: boolean
                required:
                  - id
                  - added_at
                  - first_seen_at
                  - host
                  - last_seen_at
                  - url
                  - url_contains_cdn_cgi_path
      x-distilled-pagination-class: ConnectionsSinglePage
  /zones/{zone_id}/page_shield/cookies/{cookieId}:
    get:
      operationId: getCooky
      description: "Fetches a cookie collected by Page Shield by cookie ID.  @example
        ```ts const cookie = await client.pageShield.cookies.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: cookieId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  first_seen_at:
                    type: string
                  host:
                    type: string
                  last_seen_at:
                    type: string
                  name:
                    type: string
                  type:
                    type: string
                    enum:
                      - first_party
                      - unknown
                  domain_attribute:
                    type: string
                  expires_attribute:
                    type: string
                  http_only_attribute:
                    type: boolean
                  max_age_attribute:
                    type: number
                  page_urls:
                    type: array
                    items:
                      type: string
                  path_attribute:
                    type: string
                  same_site_attribute:
                    type: string
                    enum:
                      - lax
                      - strict
                      - none
                  secure_attribute:
                    type: boolean
                required:
                  - id
                  - first_seen_at
                  - host
                  - last_seen_at
                  - name
                  - type
      x-distilled-response-path: result
  /zones/{zone_id}/page_shield/cookies:
    get:
      operationId: listCookies
      description: "Lists all cookies collected by Page Shield.  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        cookieListResponse of client.pageShield.cookies.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: direction
          in: query
          required: false
          description: "Query param: The direction used to sort returned cookies.'"
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: domain
          in: query
          required: false
          description: "Query param: Filters the returned cookies that match the specified
            domain attribute"
          schema:
            type: string
        - name: export
          in: query
          required: false
          description: "Query param: Export the list of cookies as a file, limited to
            50000 entries."
          schema:
            type: string
            enum:
              - csv
        - name: hosts
          in: query
          required: false
          description: "Query param: Includes cookies that match one or more URL-encoded
            hostnames separated by commas.  Wildcards are supported at the start
            and end of each hostname to support starts with, ends with and
            contains. If no wildcards are used, results will be filtered by
            exact match"
          schema:
            type: string
        - name: http_only
          in: query
          required: false
          description: "Query param: Filters the returned cookies that are set with
            HttpOnly"
          schema:
            type: boolean
        - name: name
          in: query
          required: false
          description: "Query param: Filters the returned cookies that match the specified
            name. Wildcards are supported at the start and end to support starts
            with, ends with and contains. e.g. session\\"
          schema:
            type: string
        - name: order_by
          in: query
          required: false
          description: "Query param: The field used to sort returned cookies."
          schema:
            type: string
            enum:
              - first_seen_at
              - last_seen_at
        - name: page
          in: query
          required: false
          description: 'Query param: The current page number of the paginated results.  We
            additionally support a special value "all". When "all" is used, the
            API will return all the cookies with the applied filters in a single
            page. This feature is best-effort and it may only work for zones
            with a low number of cookies'
          schema:
            type: string
        - name: page_url
          in: query
          required: false
          description: "Query param: Includes connections that match one or more page URLs
            (separated by commas) where they were last seen  Wildcards are
            supported at the start and end of each page URL to support starts
            with, ends with and contains. If no wildcards are used, results will
            be filtered by exact match"
          schema:
            type: string
        - name: path
          in: query
          required: false
          description: "Query param: Filters the returned cookies that match the specified
            path attribute"
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: "Query param: The number of results per page."
          schema:
            type: number
        - name: same_site
          in: query
          required: false
          description: "Query param: Filters the returned cookies that match the specified
            same_site attribute"
          schema:
            type: string
            enum:
              - lax
              - strict
              - none
        - name: secure
          in: query
          required: false
          description: "Query param: Filters the returned cookies that are set with Secure"
          schema:
            type: boolean
        - name: type
          in: query
          required: false
          description: "Query param: Filters the returned cookies that match the specified
            type attribute"
          schema:
            type: string
            enum:
              - first_party
              - unknown
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  first_seen_at:
                    type: string
                  host:
                    type: string
                  last_seen_at:
                    type: string
                  name:
                    type: string
                  type:
                    type: string
                    enum:
                      - first_party
                      - unknown
                  domain_attribute:
                    type: string
                  expires_attribute:
                    type: string
                  http_only_attribute:
                    type: boolean
                  max_age_attribute:
                    type: number
                  page_urls:
                    type: array
                    items:
                      type: string
                  path_attribute:
                    type: string
                  same_site_attribute:
                    type: string
                    enum:
                      - lax
                      - strict
                      - none
                  secure_attribute:
                    type: boolean
                required:
                  - id
                  - first_seen_at
                  - host
                  - last_seen_at
                  - name
                  - type
      x-distilled-pagination-class: CookieListResponsesSinglePage
  /zones/{zone_id}/page_shield:
    get:
      operationId: getPageShield
      description: "Fetches the Page Shield settings.  @example ```ts const setting =
        await client.pageShield.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: When true, indicates that Page Shield is enabled.
                  updated_at:
                    type: string
                    description: The timestamp of when Page Shield was last updated.
                  use_cloudflare_reporting_endpoint:
                    type: boolean
                    description: When true, CSP reports will be sent to
                      https://csp-reporting.cloudflare.com/cdn-cgi/script_monitor/report
                  use_connection_url_path:
                    type: boolean
                    description: When true, the paths associated with connections URLs will also be
                      analyzed.
                required:
                  - enabled
                  - updated_at
                  - use_cloudflare_reporting_endpoint
                  - use_connection_url_path
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
    put:
      operationId: putPageShield
      description: "Updates Page Shield settings.  @example ```ts const pageShield =
        await client.pageShield.update({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: "Body param: When true, indicates that Page Shield is enabled."
                use_cloudflare_reporting_endpoint:
                  type: boolean
                  description: "Body param: When true, CSP reports will be sent to
                    https://csp-reporting.cloudflare.com/cdn-cgi/script_monitor\
                    /report"
                use_connection_url_path:
                  type: boolean
                  description: "Body param: When true, the paths associated with connections URLs
                    will also be analyzed."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: When true, indicates that Page Shield is enabled.
                  updated_at:
                    type: string
                    description: The timestamp of when Page Shield was last updated.
                  use_cloudflare_reporting_endpoint:
                    type: boolean
                    description: When true, CSP reports will be sent to
                      https://csp-reporting.cloudflare.com/cdn-cgi/script_monitor/report
                  use_connection_url_path:
                    type: boolean
                    description: When true, the paths associated with connections URLs will also be
                      analyzed.
                required:
                  - enabled
                  - updated_at
                  - use_cloudflare_reporting_endpoint
                  - use_connection_url_path
      x-distilled-response-path: result
      x-distilled-errors:
        NotEntitled:
          - status: 403
            message:
              includes: not entitled
        Forbidden:
          - status: 403
  /zones/{zone_id}/page_shield/policies/{policyId}:
    get:
      operationId: getPolicy
      description: "Fetches a Page Shield policy by ID.  @example ```ts const policy =
        await client.pageShield.policies.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  action:
                    type: string
                    enum:
                      - allow
                      - log
                      - add_reporting_directives
                    description: The action to take if the expression matches
                  description:
                    type: string
                    description: A description for the policy
                  enabled:
                    type: boolean
                    description: Whether the policy is enabled
                  expression:
                    type: string
                    description: The expression which must match for the policy to be applied, using
                      the Cloudflare Firewall rule expression syntax
                  value:
                    type: string
                    description: The policy which will be applied
                required:
                  - id
                  - action
                  - description
                  - enabled
                  - expression
                  - value
      x-distilled-response-path: result
      x-distilled-errors:
        PolicyNotFound:
          - status: 404
            message:
              includes: Could not find Policy
        Forbidden:
          - status: 403
    put:
      operationId: updatePolicy
      description: "Update a Page Shield policy by ID.  @example ```ts const policy =
        await client.pageShield.policies.update(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - allow
                    - log
                    - add_reporting_directives
                  description: "Body param: The action to take if the expression matches"
                description:
                  type: string
                  description: "Body param: A description for the policy"
                enabled:
                  type: boolean
                  description: "Body param: Whether the policy is enabled"
                expression:
                  type: string
                  description: "Body param: The expression which must match for the policy to be
                    applied, using the Cloudflare Firewall rule expression
                    syntax"
                value:
                  type: string
                  description: "Body param: The policy which will be applied"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  action:
                    type: string
                    enum:
                      - allow
                      - log
                      - add_reporting_directives
                    description: The action to take if the expression matches
                  description:
                    type: string
                    description: A description for the policy
                  enabled:
                    type: boolean
                    description: Whether the policy is enabled
                  expression:
                    type: string
                    description: The expression which must match for the policy to be applied, using
                      the Cloudflare Firewall rule expression syntax
                  value:
                    type: string
                    description: The policy which will be applied
                required:
                  - id
                  - action
                  - description
                  - enabled
                  - expression
                  - value
      x-distilled-response-path: result
      x-distilled-errors:
        PolicyNotFound:
          - status: 404
            message:
              includes: Could not find Policy
        Forbidden:
          - status: 403
    delete:
      operationId: deletePolicy
      description: "Delete a Page Shield policy by ID.  @example ```ts await
        client.pageShield.policies.delete( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
      x-distilled-errors:
        PolicyNotFound:
          - status: 404
            message:
              includes: Could not find Policy
        Forbidden:
          - status: 403
  /zones/{zone_id}/page_shield/policies:
