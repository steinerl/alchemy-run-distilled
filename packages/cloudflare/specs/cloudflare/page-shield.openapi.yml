  /zones/{zone_id}/page_shield/scripts:
    get:
      operationId: listScripts
      description: "Lists all scripts detected by Page Shield.  @example ```ts //
        Automatically fetches more pages as needed. for await (const script of
        client.pageShield.scripts.list({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', })) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: direction
          in: query
          required: false
          description: "Query param: The direction used to sort returned scripts."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: exclude_cdn_cgi
          in: query
          required: false
          description: "Query param: When true, excludes scripts seen in a `/cdn-cgi` path
            from the returned scripts. The default value is true."
          schema:
            type: boolean
        - name: exclude_duplicates
          in: query
          required: false
          description: "Query param: When true, excludes duplicate scripts. We consider a
            script duplicate of another if their javascript content matches and
            they share the same url host and zone hostname. In such case, we
            return the most recent script for the URL host and zone hostname
            combination."
          schema:
            type: boolean
        - name: exclude_urls
          in: query
          required: false
          description: "Query param: Excludes scripts whose URL contains one of the
            URL-encoded URLs separated by commas."
          schema:
            type: string
        - name: export
          in: query
          required: false
          description: "Query param: Export the list of scripts as a file, limited to
            50000 entries."
          schema:
            type: string
            enum:
              - csv
        - name: hosts
          in: query
          required: false
          description: "Query param: Includes scripts that match one or more URL-encoded
            hostnames separated by commas.  Wildcards are supported at the start
            and end of each hostname to support starts with, ends with and
            contains. If no wildcards are used, results will be filtered by
            exact match"
          schema:
            type: string
        - name: order_by
          in: query
          required: false
          description: "Query param: The field used to sort returned scripts."
          schema:
            type: string
            enum:
              - first_seen_at
              - last_seen_at
        - name: page
          in: query
          required: false
          description: 'Query param: The current page number of the paginated results.  We
            additionally support a special value "all". When "all" is used, the
            API will return all the scripts with the applied filters in a single
            page. This feature is best-effort and it may only work for zones
            with a low number of scripts'
          schema:
            type: string
        - name: page_url
          in: query
          required: false
          description: "Query param: Includes scripts that match one or more page URLs
            (separated by commas) where they were last seen  Wildcards are
            supported at the start and end of each page URL to support starts
            with, ends with and contains. If no wildcards are used, results will
            be filtered by exact match"
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: "Query param: The number of results per page."
          schema:
            type: number
        - name: prioritize_malicious
          in: query
          required: false
          description: "Query param: When true, malicious scripts appear first in the
            returned scripts."
          schema:
            type: boolean
        - name: status
          in: query
          required: false
          description: "Query param: Filters the returned scripts using a comma-separated
            list of scripts statuses. Accepted values: `active`, `infrequent`,
            and `inactive`. The default value is `active`."
          schema:
            type: string
        - name: urls
          in: query
          required: false
          description: "Query param: Includes scripts whose URL contain one or more
            URL-encoded URLs separated by commas."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  added_at:
                    type: string
                  first_seen_at:
                    type: string
                  host:
                    type: string
                  last_seen_at:
                    type: string
                  url:
                    type: string
                  url_contains_cdn_cgi_path:
                    type: boolean
                  cryptomining_score:
                    oneOf:
                      - type: number
                    nullable: true
                    description: The cryptomining score of the JavaScript content.
                  dataflow_score:
                    oneOf:
                      - type: number
                    nullable: true
                    description: "@deprecated The dataflow score of the JavaScript content. This
                      field has been deprecated in favour of
                      js_integrity_score."
                  domain_reported_malicious:
                    type: boolean
                  fetched_at:
                    oneOf:
                      - type: string
                    nullable: true
                    description: The timestamp of when the script was last fetched.
                  first_page_url:
                    type: string
                  hash:
                    oneOf:
                      - type: string
                    nullable: true
                    description: The computed hash of the analyzed script.
                  js_integrity_score:
                    oneOf:
                      - type: number
                    nullable: true
                    description: The integrity score of the JavaScript content.
                  magecart_score:
                    oneOf:
                      - type: number
                    nullable: true
                    description: The magecart score of the JavaScript content.
                  malicious_domain_categories:
                    type: array
                    items:
                      type: string
                  malicious_url_categories:
                    type: array
                    items:
                      type: string
                  malware_score:
                    oneOf:
                      - type: number
                    nullable: true
                    description: The malware score of the JavaScript content.
                  obfuscation_score:
                    oneOf:
                      - type: number
                    nullable: true
                    description: "@deprecated The obfuscation score of the JavaScript content. This
                      field has been deprecated in favour of
                      js_integrity_score."
                  page_urls:
                    type: array
                    items:
                      type: string
                  url_reported_malicious:
                    type: boolean
                required:
                  - id
                  - added_at
                  - first_seen_at
                  - host
                  - last_seen_at
                  - url
                  - url_contains_cdn_cgi_path
      x-distilled-pagination-class: ScriptsSinglePage
