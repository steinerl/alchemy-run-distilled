                    companyName:
                      type: string
                    companyStreetAddress:
                      type: string
                    consentModalIntroHTML:
                      type: string
                    consentModalIntroHTMLWithTranslations:
                      type: object
                      additionalProperties: true
                      description: Object where keys are language codes
                    cookieName:
                      type: string
                    customCSS:
                      type: string
                    customIntroDisclaimerDismissed:
                      type: boolean
                    defaultLanguage:
                      type: string
                    hideModal:
                      type: boolean
                    purposes:
                      type: object
                      additionalProperties: true
                      description: Object where keys are purpose alpha-numeric IDs
                    purposesWithTranslations:
                      type: object
                      additionalProperties: true
                      description: Object where keys are purpose alpha-numeric IDs
                    tcfCompliant:
                      type: boolean
                  required:
                    - enabled
                  description: "Body param: Consent management configuration."
                historyChange:
                  type: boolean
                  description: "Body param: Single Page Application support enabled."
