                      description: Ecommerce API enabled.
                    eventsApiPath:
                      type: string
                      description: Custom endpoint for server-side track events.
                    hideExternalReferer:
                      type: boolean
                      description: Hiding external referrer URL enabled.
                    hideIPAddress:
                      type: boolean
                      description: Trimming IP address enabled.
                    hideQueryParams:
                      type: boolean
                      description: Removing URL query params enabled.
                    hideUserAgent:
                      type: boolean
                      description: Removing sensitive data from User Aagent string enabled.
                    initPath:
                      type: string
                      description: Custom endpoint for Zaraz init script.
                    injectIframes:
                      type: boolean
                      description: Injection of Zaraz scripts into iframes enabled.
                    mcRootPath:
                      type: string
                      description: Custom path for Managed Components server functionalities.
                    scriptPath:
                      type: string
                      description: Custom endpoint for Zaraz main script.
                    trackPath:
                      type: string
                      description: Custom endpoint for Zaraz tracking requests.
                  required:
                    - autoInjectScript
                  description: "Body param: General Zaraz settings."
                tools:
                  type: object
                  additionalProperties: true
                  description: "Body param: Tools set up under Zaraz configuration, where key is
                    the alpha-numeric tool ID and value is the tool
                    configuration object."
                triggers:
                  type: object
                  additionalProperties: true
                  description: "Body param: Triggers set up under Zaraz configuration, where key
                    is the trigger alpha-numeric ID and value is the trigger
                    configuration."
                variables:
                  type: object
                  additionalProperties: true
                  description: "Body param: Variables set up under Zaraz configuration, where key
                    is the variable alpha-numeric ID and value is the variable
                    configuration. Values of variables of type secret are not
                    included."
                zarazVersion:
                  type: number
                  description: "Body param: Zaraz internal version of the config."
                analytics:
                  type: object
                  properties:
                    defaultPurpose:
                      type: string
                      description: Consent purpose assigned to Monitoring.
                    enabled:
                      type: boolean
                      description: Whether Advanced Monitoring reports are enabled.
                    sessionExpTime:
                      type: number
                      description: Session expiration time (seconds).
                  description: "Body param: Cloudflare Monitoring settings."
                consent:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    buttonTextTranslations:
                      type: object
                      properties:
                        accept_all:
                          type: object
                          additionalProperties: true
                          description: Object where keys are language codes
                        confirm_my_choices:
                          type: object
                          additionalProperties: true
                          description: Object where keys are language codes
                        reject_all:
                          type: object
                          additionalProperties: true
                          description: Object where keys are language codes
                      required:
                        - accept_all
