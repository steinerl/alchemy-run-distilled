  /zones/{zone_id}/settings/zaraz/history:
    get:
      operationId: listHistories
      description: "Lists a history of published Zaraz configuration records for a
        zone.  @example ```ts // Automatically fetches more pages as needed. for
        await (const historyListResponse of client.zaraz.history.list( {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: "Query param: Maximum amount of results to list. Default value is
            10."
          schema:
            type: number
        - name: offset
          in: query
          required: false
          description: "Query param: Ordinal number to start listing the results with.
            Default value is 0."
          schema:
            type: number
        - name: sortField
          in: query
          required: false
          description: "Query param: The field to sort by. Default is updated_at."
          schema:
            type: string
            enum:
              - id
              - user_id
              - description
              - created_at
              - updated_at
        - name: sortOrder
          in: query
          required: false
          description: "Query param: Sorting order. Default is DESC."
          schema:
            type: string
            enum:
              - DESC
              - ASC
      responses:
        "200":
          description: Success
