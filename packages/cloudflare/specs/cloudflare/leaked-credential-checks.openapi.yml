x-distilled-service: leaked-credential-checks
paths:
  /zones/{zone_id}/leaked-credential-checks/detections/{detectionId}:
    get:
      operationId: getDetection
      description: "Get user-defined detection pattern for Leaked Credential
        Checks.  @example ```ts const detection = await
        client.leakedCredentialChecks.detections.get(
        '18a14bafaa8eb1df04ce683ec18c765e', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: detectionId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Defines an identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Defines the unique ID for this custom detection.
                  password:
                    type: string
                    description: Defines ehe ruleset expression to use in matching the password in a
                      request.
                  username:
                    type: string
                    description: Defines the ruleset expression to use in matching the username in a
                      request.
      x-distilled-response-path: result
      x-distilled-errors:
        DetectionNotFound:
          - code: 11002
        LeakedCredentialChecksDisabled:
          - code: 11001
        Forbidden:
          - status: 403
