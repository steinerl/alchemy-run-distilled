openapi: 3.1.0
info:
  title: Cloudflare SSL API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: ssl
paths:
  /zones/{zone_id}/ssl/analyze:
    post:
      operationId: createAnalyze
      description: "Returns the set of hostnames, the signature algorithm, and the
        expiration date of the certificate.  @example ```ts const analyze =
        await client.ssl.analyze.create({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bundle_method:
                  type: string
                  enum:
                    - ubiquitous
                    - optimal
                    - force
                  description: "Body param: A ubiquitous bundle has the highest probability of
                    being verified everywhere, even by clients using outdated or
                    unusual trust stores. An optimal bundle uses the shortest
                    chain and newest intermediates. And the force bundle
                    verifies the chain, but does not otherwise modify it."
                certificate:
                  type: string
                  description: "Body param: The zone's SSL certificate or certificate and the
                    intermediate(s)."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
  /zones/{zone_id}/ssl/certificate_packs/{certificatePackId}:
    get:
      operationId: getCertificatePack
      description: "For a given zone, get a certificate pack.  @example ```ts const
        certificatePack = await client.ssl.certificatePacks.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: certificatePackId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  certificates:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Certificate identifier.
                        hosts:
                          type: array
                          items:
                            type: string
                          description: Hostnames covered by this certificate.
                        status:
                          type: string
                          description: Certificate status.
                        bundle_method:
                          type: string
                          description: Certificate bundle method.
                        expires_on:
                          type: string
                          description: When the certificate from the authority expires.
                        geo_restrictions:
                          type: object
                          properties:
                            label:
                              type: string
                              enum:
                                - us
                                - eu
                                - highest_security
                          description: Specify the region where your private key can be held locally.
                        issuer:
                          type: string
                          description: The certificate authority that issued the certificate.
                        modified_on:
                          type: string
                          description: When the certificate was last modified.
                        priority:
                          type: number
                          description: The order/priority in which the certificate will be used.
                        signature:
                          type: string
                          description: The type of hash used for the certificate.
                        uploaded_on:
                          type: string
                          description: When the certificate was uploaded to Cloudflare.
                        zone_id:
                          type: string
                          description: Identifier.
                      required:
                        - id
                        - hosts
                        - status
                    description: Array of certificates in this pack.
                  hosts:
                    type: array
                    items:
                      type: string
                    description: Comma separated list of valid host names for the certificate packs.
                      Must contain the zone apex, may not contain more than 50
                      hosts, and may not be empty.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_validation
                      - deleted
                      - pending_issuance
                      - pending_deployment
                      - pending_deletion
                      - pending_expiration
                      - expired
                      - active
                      - initializing_timed_out
                      - validation_timed_out
                      - issuance_timed_out
                      - deployment_timed_out
                      - deletion_timed_out
                      - pending_cleanup
                      - staging_deployment
                      - staging_active
                      - deactivating
                      - inactive
                      - backup_issued
                      - holding_deployment
                    description: Status of certificate pack.
                  type:
                    type: string
                    enum:
                      - mh_custom
                      - managed_hostname
                      - sni_custom
                      - universal
                      - advanced
                      - total_tls
                      - keyless
                      - legacy_custom
                    description: Type of certificate pack.
                  certificate_authority:
                    type: string
                    enum:
                      - google
                      - lets_encrypt
                      - ssl_com
                    description: Certificate Authority selected for the order. For information on
                      any certificate authority specific details or restrictions
                      [see this page for more
                      details.](https://developers.cloudflare.com/ssl/reference/certificate-authorities)
                  cloudflare_branding:
                    type: boolean
                    description: Whether or not to add Cloudflare Branding for the order. This will
                      add a subdomain of sni.cloudflaressl.com as the Common
                      Name if set to true.
                  dcv_delegation_records:
                    type: array
                    items:
                      type: object
                      properties:
                        cname:
                          type: string
                          description: The CNAME record hostname for DCV delegation.
                        cname_target:
                          type: string
                          description: The CNAME record target value for DCV delegation.
                        emails:
                          type: array
                          items:
                            type: string
                          description: The set of email addresses that the certificate authority (CA) will
                            use to complete domain validation.
                        http_body:
                          type: string
                          description: The content that the certificate authority (CA) will expect to find
                            at the http_url during the domain validation.
                        http_url:
                          type: string
                          description: The url that will be checked during domain validation.
                        status:
                          type: string
                          description: Status of the validation record.
                        txt_name:
                          type: string
                          description: The hostname that the certificate authority (CA) will check for a
                            TXT record during domain validation .
                        txt_value:
                          type: string
                          description: The TXT record that the certificate authority (CA) will check
                            during domain validation.
                    description: DCV Delegation records for domain validation.
                  primary_certificate:
                    type: string
                    description: Identifier of the primary certificate in a pack.
                  validation_errors:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          description: A domain validation error.
                    description: Domain validation errors that have been received by the certificate
                      authority (CA).
                  validation_method:
                    type: string
                    enum:
                      - txt
                      - http
                      - email
                    description: Validation Method selected for the order.
                  validation_records:
                    type: array
                    items:
                      type: object
                      properties:
                        cname:
                          type: string
                          description: The CNAME record hostname for DCV delegation.
                        cname_target:
                          type: string
                          description: The CNAME record target value for DCV delegation.
                        emails:
                          type: array
                          items:
                            type: string
                          description: The set of email addresses that the certificate authority (CA) will
                            use to complete domain validation.
                        http_body:
                          type: string
                          description: The content that the certificate authority (CA) will expect to find
                            at the http_url during the domain validation.
                        http_url:
                          type: string
                          description: The url that will be checked during domain validation.
                        status:
                          type: string
                          description: Status of the validation record.
                        txt_name:
                          type: string
                          description: The hostname that the certificate authority (CA) will check for a
                            TXT record during domain validation .
                        txt_value:
                          type: string
                          description: The TXT record that the certificate authority (CA) will check
                            during domain validation.
                    description: Certificates' validation records.
                  validity_days:
                    type: number
                    description: Validity Days selected for the order.
                required:
                  - id
                  - certificates
                  - hosts
                  - status
                  - type
      x-distilled-response-path: result
      x-distilled-errors:
        CertificatePackNotFound:
          - code: 1408
          - status: 404
        Forbidden:
          - status: 403
    patch:
      operationId: patchCertificatePack
      description: "For a given zone, restart validation or add cloudflare branding
