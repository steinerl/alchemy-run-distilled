  /zones/{zone_id}/ssl/certificate_packs/order:
    post:
      operationId: createCertificatePack
      description: "For a given zone, order an advanced certificate pack.  @example
        ```ts const certificatePack = await client.ssl.certificatePacks.create({
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353', certificate_authority:
        'lets_encrypt', hosts: [ 'example.com', ' .example.com',
        'www.example.com', ], type: 'advanced', validation_method: 'txt',
        validity_days: 14, }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                certificate_authority:
                  type: string
                  enum:
                    - google
                    - lets_encrypt
                    - ssl_com
                  description: "Body param: Certificate Authority selected for the order. For
                    information on any certificate authority specific details or
                    restrictions [see this page for more
                    details.](https://developers.cloudflare.com/ssl/reference/c\
                    ertificate-authorities)"
                hosts:
                  type: array
                  items:
                    type: string
                  description: "Body param: Comma separated list of valid host names for the
                    certificate packs. Must contain the zone apex, may not
                    contain more than 50 hosts, and may not be empty."
                type:
                  type: string
                  enum:
                    - advanced
                  description: "Body param: Type of certificate pack."
                validation_method:
                  type: string
                  enum:
                    - txt
                    - http
                    - email
                  description: "Body param: Validation Method selected for the order."
                validity_days:
                  type: number
                  description: "Body param: Validity Days selected for the order."
