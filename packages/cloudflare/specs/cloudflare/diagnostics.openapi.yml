            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    check_type:
                      type: string
                      enum:
                        - icmp
                      description: type of check to perform
                    endpoint:
                      type: string
                      description: the IP address of the host to perform checks against
                    id:
                      type: string
