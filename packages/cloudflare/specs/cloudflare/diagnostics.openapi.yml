openapi: 3.1.0
info:
  title: Cloudflare DIAGNOSTICS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: diagnostics
paths:
  /accounts/{account_id}/diagnostics/endpoint-healthchecks/{id}:
    get:
      operationId: getEndpointHealthcheck
      description: "Get a single Endpoint Health Check.  @example ```ts const
        endpointHealthcheck = await client.diagnostics.endpointHealthchecks.get(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  check_type:
                    type: string
                    enum:
                      - icmp
                    description: type of check to perform
                  endpoint:
                    type: string
                    description: the IP address of the host to perform checks against
                  id:
                    type: string
                    description: UUID.
                  name:
                    type: string
                    description: Optional name associated with this check
                required:
                  - check_type
                  - endpoint
      x-distilled-response-path: result
      x-distilled-errors:
        EndpointHealthcheckNotFound:
          - code: 1022
        Forbidden:
          - status: 403
    put:
      operationId: updateEndpointHealthcheck
      description: "Update a Endpoint Health Check.  @example ```ts const
        endpointHealthcheck = await
        client.diagnostics.endpointHealthchecks.update(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', check_type: 'icmp', endpoint:
        '203.0.113.1', }, ); ```"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                check_type:
                  type: string
                  enum:
                    - icmp
                  description: "Body param: type of check to perform"
                endpoint:
                  type: string
                  description: "Body param: the IP address of the host to perform checks against"
                name:
                  type: string
                  description: "Body param: Optional name associated with this check"
              required:
                - check_type
                - endpoint
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  check_type:
                    type: string
                    enum:
                      - icmp
                    description: type of check to perform
                  endpoint:
                    type: string
                    description: the IP address of the host to perform checks against
                  id:
                    type: string
                    description: UUID.
                  name:
                    type: string
                    description: Optional name associated with this check
                required:
                  - check_type
                  - endpoint
      x-distilled-response-path: result
      x-distilled-errors:
        EndpointHealthcheckNotFound:
          - code: 1022
        InvalidHealthcheckEndpoint:
          - code: 1002
        Forbidden:
          - status: 403
    delete:
      operationId: deleteEndpointHealthcheck
      description: "Delete Endpoint Health Check.  @example ```ts const
        endpointHealthcheck = await
        client.diagnostics.endpointHealthchecks.delete(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful.
                required:
                  - errors
                  - messages
                  - success
      x-distilled-errors:
        EndpointHealthcheckNotFound:
          - code: 1022
        Forbidden:
          - status: 403
