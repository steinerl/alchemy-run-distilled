                      type: number
                      description: Minutes of longitude.
                    long_seconds:
                      type: number
                      description: Seconds of longitude.
                    precision_horz:
                      type: number
                      description: Horizontal precision of location.
                    precision_vert:
                      type: number
                      description: Vertical precision of location.
                    size:
                      type: number
                      description: Size of location in meters.
                    order:
                      type: number
                      description: Order.
                    preference:
                      type: number
                      description: Preference.
                    regex:
                      type: string
                      description: Regex.
                    replacement:
                      type: string
                      description: Replacement.
                    service:
                      type: string
                      description: Service.
                    matching_type:
                      type: number
                      description: Matching Type.
                    selector:
                      type: number
                      description: Selector.
                    usage:
                      type: number
                      description: Usage.
                    port:
                      type: number
                      description: The port of the service.
                    weight:
                      type: number
                      description: The record weight.
                    fingerprint:
                      type: string
                      description: Fingerprint.
                  description: "Body param: Components of a CAA record."
