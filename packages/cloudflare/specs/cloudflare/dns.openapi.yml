    post:
      operationId: createRecord
      description: "Create a new DNS record for a zone.  Notes:  - A/AAAA records
        cannot exist on the same name as CNAME records. - NS records cannot
        exist on the same name as any other record type. - Domain names are
        always represented in Punycode, even if Unicode characters were used
        when creating the record.  @example ```ts const recordResponse = await
        client.dns.records.create({ zone_id: '023e105f4ecef8ad9ca31a8372d0c353',
        name: 'example.com', ttl: 3600, type: 'A', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: Complete DNS record name, including the zone name, in
                    Punycode."
                ttl:
                  oneOf:
                    - type: number
                    - type: number
                      enum:
                        - 1
                  description: "Body param: Time To Live (TTL) of the DNS record in seconds.
                    Setting to 1 means 'automatic'. Value must be between 60 and
                    86400, with the minimum reduced to 30 for Enterprise zones."
                type:
                  type: string
                  enum:
                    - A
                    - AAAA
                    - CNAME
                    - MX
                    - NS
                    - OPENPGPKEY
                    - PTR
                    - TXT
                    - CAA
                    - CERT
                    - DNSKEY
                    - DS
                    - HTTPS
                    - LOC
                    - NAPTR
                    - SMIMEA
                    - SRV
                    - SSHFP
                    - SVCB
                    - TLSA
                    - URI
                  description: "Body param: Record type."
                comment:
                  type: string
                  description: "Body param: Comments or notes about the DNS record. This field has
                    no effect on DNS responses."
                content:
                  type: string
                  description: "Body param: A valid IPv4 address."
                private_routing:
                  type: boolean
                  description: "Body param: Enables private network routing to the origin."
                proxied:
                  type: boolean
                  description: "Body param: Whether the record is receiving the performance and
                    security benefits of Cloudflare."
                settings:
                  type: object
                  properties:
                    ipv4_only:
                      type: boolean
                      description: When enabled, only A records will be generated, and AAAA records
                        will not be created. This setting is intended for
                        exceptional cases. Note that this option only applies to
                        proxied records and it has no effect on whether
                        Cloudflare communicates with the origin using IPv4 or
                        IPv6.
                    ipv6_only:
                      type: boolean
                      description: When enabled, only AAAA records will be generated, and A records
                        will not be created. This setting is intended for
                        exceptional cases. Note that this option only applies to
                        proxied records and it has no effect on whether
                        Cloudflare communicates with the origin using IPv4 or
                        IPv6.
                    flatten_cname:
                      type: boolean
                      description: If enabled, causes the CNAME record to be resolved externally and
                        the resulting address records (e.g., A and AAAA) to be
                        returned instead of the CNAME record itself. This
                        setting is unavailable for proxied records, since they
                        are always flattened.
                  description: "Body param: Settings for the DNS record."
                tags:
                  type: array
                  items:
                    type: string
                  description: "Body param: Custom tags for the DNS record. This field has no
                    effect on DNS responses."
                priority:
                  type: number
                  description: "Body param: Required for MX and URI records; ignored for other
                    record types (but may still be returned by the API). Records
                    with lower priorities are preferred. This field is to be
                    deprecated in favor of the priority field within the data
                    map."
                data:
                  type: object
                  properties:
                    flags:
                      oneOf:
                        - type: number
                        - type: string
                      description: Flags for the CAA record.
                    tag:
                      type: string
                      description: "Name of the property controlled by this record (e.g.: issue,
                        issuewild, iodef)."
                    value:
                      type: string
                      description: Value of the record. This field's semantics depend on the chosen
                        tag.
                    algorithm:
                      type: number
                      description: Algorithm.
                    certificate:
                      type: string
                      description: Certificate.
                    key_tag:
                      type: number
                      description: Key Tag.
                    type:
                      type: number
                      description: Type.
                    protocol:
                      type: number
                      description: Protocol.
                    public_key:
                      type: string
                      description: Public Key.
                    digest:
                      type: string
                      description: Digest.
                    digest_type:
                      type: number
                      description: Digest Type.
                    priority:
                      type: number
                      description: Priority.
                    target:
                      type: string
                      description: Target.
                    altitude:
                      type: number
                      description: Altitude of location in meters.
                    lat_degrees:
                      type: number
                      description: Degrees of latitude.
                    lat_direction:
                      type: string
                      enum:
                        - N
                        - S
                      description: Latitude direction.
                    lat_minutes:
                      type: number
                      description: Minutes of latitude.
                    lat_seconds:
                      type: number
                      description: Seconds of latitude.
                    long_degrees:
                      type: number
                      description: Degrees of longitude.
                    long_direction:
                      type: string
                      enum:
                        - E
                        - W
                      description: Longitude direction.
                    long_minutes:
                      type: number
                      description: Minutes of longitude.
                    long_seconds:
                      type: number
                      description: Seconds of longitude.
                    precision_horz:
                      type: number
                      description: Horizontal precision of location.
                    precision_vert:
                      type: number
                      description: Vertical precision of location.
                    size:
                      type: number
                      description: Size of location in meters.
                    order:
                      type: number
                      description: Order.
                    preference:
                      type: number
                      description: Preference.
                    regex:
                      type: string
                      description: Regex.
                    replacement:
                      type: string
                      description: Replacement.
                    service:
                      type: string
                      description: Service.
                    matching_type:
                      type: number
                      description: Matching Type.
                    selector:
                      type: number
                      description: Selector.
                    usage:
                      type: number
                      description: Usage.
                    port:
                      type: number
                      description: The port of the service.
                    weight:
                      type: number
                      description: The record weight.
                    fingerprint:
                      type: string
                      description: Fingerprint.
                  description: "Body param: Components of a CAA record."
              required:
                - name
                - ttl
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      name:
                        type: string
                        description: Complete DNS record name, including the zone name, in Punycode.
                      ttl:
                        oneOf:
                          - type: number
                          - type: number
                            enum:
                              - 1
                        description: Time To Live (TTL) of the DNS record in seconds. Setting to 1 means
                          'automatic'. Value must be between 60 and 86400, with
                          the minimum reduced to 30 for Enterprise zones.
                      type:
                        type: string
                        enum:
                          - A
                        description: Record type.
                      comment:
                        type: string
                        description: Comments or notes about the DNS record. This field has no effect on
                          DNS responses.
