    patch:
      operationId: patchCustomHostname
      description: "Modify SSL configuration for a custom hostname. When sent with SSL
        config that matches existing config, used to indicate that hostname
        should pass domain control validation (DCV). Can also be used to change
        validation type, e.g., from 'http' to 'email'. Bundle an existing
        certificate with another certificate by using the \"custom_cert_bundle\"
        field. The bundling process supports combining certificates as long as
        the following condition is met. One certificate must use the RSA
        algorithm, and the other must use the ECDSA algorithm.  @example ```ts
        const response = await client.customHostnames.edit(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: customHostnameId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                custom_metadata:
                  type: object
                  additionalProperties: true
                  description: "Body param: Unique key/value metadata for this hostname. These are
                    per-hostname (customer) settings."
                custom_origin_server:
                  type: string
                  description: "Body param: a valid hostname that’s been added to your DNS zone as
                    an A, AAAA, or CNAME record."
                custom_origin_sni:
                  type: string
                  description: "Body param: A hostname that will be sent to your custom origin
                    server as SNI for TLS handshake. This can be a valid
                    subdomain of the zone or custom origin server name or the
                    string ':request_host_header:' which will cause the host
                    header in the request to be used as SNI. Not configurable
                    with default/fallback origin server."
                ssl:
                  type: object
                  properties:
                    bundle_method:
                      type: string
                      enum:
                        - ubiquitous
                        - optimal
                        - force
                      description: A ubiquitous bundle has the highest probability of being verified
                        everywhere, even by clients using outdated or unusual
                        trust stores. An optimal bundle uses the shortest chain
                        and newest intermediates. And the force bundle verifies
                        the chain, but does not otherwise modify it.
                    certificate_authority:
                      type: string
                      enum:
                        - digicert
                        - google
                        - lets_encrypt
                        - ssl_com
                      description: The Certificate Authority that will issue the certificate
                    cloudflare_branding:
                      type: boolean
                      description: Whether or not to add Cloudflare Branding for the order. This will
                        add a subdomain of sni.cloudflaressl.com as the Common
                        Name if set to true
                    custom_cert_bundle:
                      type: array
                      items:
                        type: object
                        properties:
                          custom_certificate:
                            type: string
                            description: If a custom uploaded certificate is used.
                          custom_key:
                            type: string
                            description: The key for a custom uploaded certificate.
                        required:
                          - custom_certificate
                          - custom_key
                      description: Array of custom certificate and key pairs (1 or 2 pairs allowed)
                    custom_certificate:
                      type: string
                      description: If a custom uploaded certificate is used.
                    custom_csr_id:
                      type: string
                      description: The identifier for the Custom CSR that was used.
                    custom_key:
                      type: string
                      description: The key for a custom uploaded certificate.
                    method:
                      type: string
                      enum:
                        - http
                        - txt
                        - email
                      description: Domain control validation (DCV) method used for this hostname.
                    settings:
                      type: object
                      properties:
                        ciphers:
                          type: array
                          items:
                            type: string
                          description: An allowlist of ciphers for TLS termination. These ciphers must be
                            in the BoringSSL format.
                        early_hints:
                          type: string
                          enum:
                            - on
                            - off
                          description: Whether or not Early Hints is enabled.
                        http2:
                          type: string
                          enum:
                            - on
                            - off
                          description: Whether or not HTTP2 is enabled.
                        min_tls_version:
                          type: number
                          enum:
                            - 1
                            - 1.1
                            - 1.2
                            - 1.3
                          description: The minimum TLS version supported.
                        tls_1_3:
                          type: string
                          enum:
                            - on
                            - off
                          description: Whether or not TLS 1.3 is enabled.
                      description: SSL specific settings.
                    type:
                      type: string
                      enum:
