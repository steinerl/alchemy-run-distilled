openapi: 3.1.0
info:
  title: Cloudflare CUSTOM-HOSTNAMES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: custom-hostnames
paths:
  /zones/{zone_id}/custom_hostnames/{customHostnameId}/certificate_pack/{certificatePackId}/certificates/{certificateId}:
    put:
      operationId: putCertificatePackCertificate
      description: "Replace a single custom certificate within a certificate pack that
        contains two bundled certificates. The replacement must adhere to the
        following constraints. You can only replace an RSA certificate with
        another RSA certificate or an ECDSA certificate with another ECDSA
        certificate.  @example ```ts const certificate = await
        client.customHostnames.certificatePack.certificates.update(
        '023e105f4ecef8ad9ca31a8372d0c353', '023e105f4ecef8ad9ca31a8372d0c353',
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', custom_certificate: '-----BEGIN
        CERTIFICATE-----\\nMIIDdjCCAl6gAwIBAgIJAPnMg0Fs+/B0MA0GCSqGSIb3DQEBCwUA\
        MFsx...\\n-----END CERTIFICATE-----\\n', custom_key: '-----BEGIN PRIVATE
        KEY-----\\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC/SCB5...\
        \\n-----END PRIVATE KEY-----\\n', }, ); ```"
      parameters:
        - name: customHostnameId
          in: path
          required: true
          schema:
            type: string
        - name: certificatePackId
          in: path
          required: true
          schema:
            type: string
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                custom_certificate:
                  type: string
                  description: "Body param: If a custom uploaded certificate is used."
                custom_key:
                  type: string
                  description: "Body param: The key for a custom uploaded certificate."
              required:
                - custom_certificate
                - custom_key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  hostname:
                    type: string
                    description: The custom hostname that will point to your hostname via CNAME.
                  created_at:
                    type: string
                    description: This is the time the hostname was created.
                  custom_metadata:
                    type: object
                    additionalProperties: true
                    description: Unique key/value metadata for this hostname. These are per-hostname
                      (customer) settings.
                  custom_origin_server:
                    type: string
                    description: a valid hostname that’s been added to your DNS zone as an A, AAAA,
                      or CNAME record.
                  custom_origin_sni:
                    type: string
                    description: A hostname that will be sent to your custom origin server as SNI
                      for TLS handshake. This can be a valid subdomain of the
                      zone or custom origin server name or the string
                      ':request_host_header:' which will cause the host header
                      in the request to be used as SNI. Not configurable with
                      default/fallback origin server.
                  ownership_verification:
                    type: object
                    properties:
                      name:
                        type: string
                        description: DNS Name for record.
                      type:
                        type: string
                        enum:
                          - txt
                        description: DNS Record type.
                      value:
                        type: string
                        description: Content for the record.
                    description: This is a record which can be placed to activate a hostname.
                  ownership_verification_http:
                    type: object
                    properties:
                      http_body:
                        type: string
                        description: Token to be served.
                      http_url:
                        type: string
                        description: The HTTP URL that will be checked during custom hostname
                          verification and where the customer should host the
                          token.
                    description: This presents the token to be served by the given http url to
                      activate a hostname.
                  ssl:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Custom hostname SSL identifier tag.
                      bundle_method:
                        type: string
                        enum:
                          - ubiquitous
                          - optimal
                          - force
                        description: A ubiquitous bundle has the highest probability of being verified
                          everywhere, even by clients using outdated or unusual
                          trust stores. An optimal bundle uses the shortest
                          chain and newest intermediates. And the force bundle
                          verifies the chain, but does not otherwise modify it.
                      certificate_authority:
                        type: string
                        enum:
                          - digicert
                          - google
                          - lets_encrypt
                          - ssl_com
                        description: The Certificate Authority that will issue the certificate
                      custom_certificate:
                        type: string
                        description: If a custom uploaded certificate is used.
                      custom_csr_id:
                        type: string
                        description: The identifier for the Custom CSR that was used.
                      custom_key:
                        type: string
                        description: The key for a custom uploaded certificate.
                      dcv_delegation_records:
                        type: array
                        items:
                          type: object
                          properties:
                            cname:
                              type: string
                              description: The CNAME record hostname for DCV delegation.
                            cname_target:
                              type: string
                              description: The CNAME record target value for DCV delegation.
                            emails:
                              type: array
                              items:
                                type: string
                              description: The set of email addresses that the certificate authority (CA) will
                                use to complete domain validation.
                            http_body:
                              type: string
                              description: The content that the certificate authority (CA) will expect to find
                                at the http_url during the domain validation.
                            http_url:
                              type: string
                              description: The url that will be checked during domain validation.
                            status:
                              type: string
                              description: Status of the validation record.
                            txt_name:
                              type: string
                              description: The hostname that the certificate authority (CA) will check for a
                                TXT record during domain validation .
                            txt_value:
                              type: string
                              description: The TXT record that the certificate authority (CA) will check
                                during domain validation.
                        description: DCV Delegation records for domain validation.
                      expires_on:
                        type: string
                        description: The time the custom certificate expires on.
                      hosts:
                        type: array
                        items:
                          type: string
                        description: A list of Hostnames on a custom uploaded certificate.
                      issuer:
                        type: string
                        description: The issuer on a custom uploaded certificate.
                      method:
                        type: string
                        enum:
                          - http
                          - txt
                          - email
                        description: Domain control validation (DCV) method used for this hostname.
                      serial_number:
                        type: string
                        description: The serial number on a custom uploaded certificate.
                      settings:
                        type: object
                        properties:
                          ciphers:
                            type: array
                            items:
                              type: string
                            description: An allowlist of ciphers for TLS termination. These ciphers must be
                              in the BoringSSL format.
                          early_hints:
                            type: string
                            enum:
                              - on
                              - off
                            description: Whether or not Early Hints is enabled.
                          http2:
                            type: string
                            enum:
                              - on
                              - off
                            description: Whether or not HTTP2 is enabled.
                          min_tls_version:
                            type: number
                            enum:
                              - 1
                              - 1.1
                              - 1.2
                              - 1.3
                            description: The minimum TLS version supported.
                          tls_1_3:
                            type: string
                            enum:
                              - on
                              - off
                            description: Whether or not TLS 1.3 is enabled.
                      signature:
                        type: string
                        description: The signature on a custom uploaded certificate.
                      status:
                        type: string
                        enum:
                          - initializing
                          - pending_validation
                          - deleted
                          - pending_issuance
                          - pending_deployment
                          - pending_deletion
                          - pending_expiration
                          - expired
                          - active
                          - initializing_timed_out
                          - validation_timed_out
                          - issuance_timed_out
                          - deployment_timed_out
                          - deletion_timed_out
                          - pending_cleanup
                          - staging_deployment
                          - staging_active
                          - deactivating
                          - inactive
                          - backup_issued
                          - holding_deployment
                        description: Status of the hostname's SSL certificates.
                      type:
                        type: string
                        enum:
                          - dv
                        description: Level of validation to be used for this hostname. Domain validation
                          (dv) must be used.
                      uploaded_on:
                        type: string
                        description: The time the custom certificate was uploaded.
                      validation_errors:
                        type: array
                        items:
                          type: object
                          properties:
                            message:
                              type: string
                              description: A domain validation error.
                        description: Domain validation errors that have been received by the certificate
                          authority (CA).
                      validation_records:
                        type: array
                        items:
                          type: object
                          properties:
                            cname:
                              type: string
                              description: The CNAME record hostname for DCV delegation.
                            cname_target:
                              type: string
                              description: The CNAME record target value for DCV delegation.
                            emails:
                              type: array
                              items:
                                type: string
                              description: The set of email addresses that the certificate authority (CA) will
                                use to complete domain validation.
                            http_body:
                              type: string
                              description: The content that the certificate authority (CA) will expect to find
                                at the http_url during the domain validation.
                            http_url:
                              type: string
                              description: The url that will be checked during domain validation.
                            status:
                              type: string
                              description: Status of the validation record.
                            txt_name:
                              type: string
                              description: The hostname that the certificate authority (CA) will check for a
                                TXT record during domain validation .
                            txt_value:
                              type: string
                              description: The TXT record that the certificate authority (CA) will check
                                during domain validation.
                      wildcard:
                        type: boolean
                        description: Indicates whether the certificate covers a wildcard.
                  status:
                    type: string
                    enum:
                      - active
                      - pending
                      - active_redeploying
                      - moved
                      - pending_deletion
                      - deleted
                      - pending_blocked
                      - pending_migration
                      - pending_provisioned
                      - test_pending
                      - test_active
                      - test_active_apex
                      - test_blocked
                      - test_failed
                      - provisioned
                      - blocked
                    description: Status of the hostname's activation.
                  verification_errors:
                    type: array
                    items:
                      type: string
                    description: These are errors that were encountered while trying to activate a
                      hostname.
                required:
                  - id
                  - hostname
      x-distilled-response-path: result
    delete:
      operationId: deleteCertificatePackCertificate
      description: "Delete a single custom certificate from a certificate pack that
        contains two bundled certificates. Deletion is subject to the following
        constraints. You cannot delete a certificate if it is the only remaining
        certificate in the pack. At least one certificate must remain in the
        pack.  @example ```ts const certificate = await
        client.customHostnames.certificatePack.certificates.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', '023e105f4ecef8ad9ca31a8372d0c353',
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: customHostnameId
          in: path
          required: true
          schema:
            type: string
        - name: certificatePackId
          in: path
          required: true
          schema:
            type: string
        - name: certificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
  /zones/{zone_id}/custom_hostnames/{customHostnameId}:
    get:
      operationId: getCustomHostname
      description: "Retrieves detailed information about a specific custom hostname,
        including SSL certificate status, ownership verification, and origin
        configuration.  @example ```ts const customHostname = await
        client.customHostnames.get( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: customHostnameId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
