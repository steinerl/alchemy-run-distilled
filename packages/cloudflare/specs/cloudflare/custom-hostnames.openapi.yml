  /zones/{zone_id}/custom_hostnames/fallback_origin:
    get:
      operationId: getFallbackOrigin
      description: "Retrieves the current fallback origin configuration for custom
        hostnames on a zone. The fallback origin handles traffic when specific
        custom hostname origins are unavailable.  @example ```ts const
        fallbackOrigin = await client.customHostnames.fallbackOrigin.get({
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created_at:
                    type: string
                    description: This is the time the fallback origin was created.
                  errors:
                    type: array
                    items:
                      type: string
                    description: These are errors that were encountered while trying to activate a
                      fallback origin.
                  origin:
                    type: string
                    description: Your origin hostname that requests to your custom hostnames will be
                      sent to.
                  status:
                    type: string
                    enum:
                      - initializing
                      - pending_deployment
                      - pending_deletion
                      - active
                      - deployment_timed_out
                      - deletion_timed_out
                    description: Status of the fallback origin's activation.
                  updated_at:
                    type: string
                    description: This is the time the fallback origin was updated.
      x-distilled-response-path: result
