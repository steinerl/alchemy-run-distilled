openapi: 3.1.0
info:
  title: Cloudflare AI Gateway API (patch additions)
  version: 0.0.0
  description: |
    Operations missing from the upstream OpenAPI spec / TypeScript SDK.
    Currently:
      - deleteProviderConfig: the dashboard deletes BYOK provider configs via
        DELETE .../provider_configs/{id}; verified live (returns the deleted
        config object; a second delete returns code 7002 Not Found), but the
        upstream spec only documents list + create.
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: ai-gateway
paths:
  /accounts/{account_id}/ai-gateway/gateways/{id}:
    get:
      operationId: getAiGateway
      description: "Retrieves details for a specific AI Gateway dataset.  @example
        ```ts const aiGateway = await client.aiGateway.get('my-gateway', {
        account_id: '3ebbcb006d4d46d7bb6a8c7f14676cb0', }); ```"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: gateway id
                  cache_invalidate_on_update:
                    type: boolean
                  cache_ttl:
                    oneOf:
                      - type: number
                    nullable: true
                  collect_logs:
                    type: boolean
                  created_at:
                    type: string
                  modified_at:
                    type: string
                  rate_limiting_interval:
                    oneOf:
                      - type: number
                    nullable: true
                  rate_limiting_limit:
                    oneOf:
                      - type: number
                    nullable: true
                  authentication:
                    type: boolean
                  dlp:
                    oneOf:
                      - type: object
                        properties:
                          action:
                            type: string
                            enum:
                              - BLOCK
                              - FLAG
                          enabled:
                            type: boolean
                          profiles:
                            type: array
                            items:
                              type: string
                        required:
                          - action
                          - enabled
                          - profiles
                      - type: object
                        properties:
                          enabled:
                            type: boolean
                          policies:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                action:
                                  type: string
                                  enum:
                                    - FLAG
                                    - BLOCK
                                check:
                                  type: array
                                  items:
                                    type: string
                                    enum:
                                      - REQUEST
                                      - RESPONSE
                                enabled:
                                  type: boolean
                                profiles:
                                  type: array
                                  items:
                                    type: string
                              required:
