        - name: configuration
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              target:
                type: string
                enum:
                  - ip
                  - ip_range
                  - asn
                  - country
                description: Defines the target to search in existing rules.
              value:
                type: string
                description: "Defines the target value to search for in existing rules: an IP
                  address, an IP address range, or a country code, depending on
                  the provided `configuration.target`. Notes: You can search for
                  a single IPv4 address, an IP address range with a subnet of
                  '/16' or '/24', or a two-letter ISO-3166-1 alpha-2 country
                  code."
        - name: direction
          in: query
          required: false
          description: "Query param: Defines the direction used to sort returned rules."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: match
          in: query
          required: false
          description: "Query param: Defines the search requirements. When set to `all`,
            all the search requirements must match. When set to `any`, only one
            of the search requirements has to match."
          schema:
            type: string
            enum:
              - any
              - all
        - name: mode
          in: query
          required: false
          description: "Query param: The action to apply to a matched request."
          schema:
            type: string
            enum:
              - block
              - challenge
              - whitelist
              - js_challenge
              - managed_challenge
        - name: notes
          in: query
          required: false
          description: "Query param: Defines the string to search for in the notes of
            existing IP Access rules. Notes: For example, the string 'attack'
            would match IP Access rules with notes 'Attack 26/02' and 'Attack
            27/02'. The search is case insensitive."
          schema:
            type: string
        - name: order
          in: query
          required: false
          description: "Query param: Defines the field used to sort returned rules."
          schema:
            type: string
            enum:
              - configuration.target
              - configuration.value
              - mode
