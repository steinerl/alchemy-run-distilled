openapi: 3.1.0
info:
  title: Cloudflare FIREWALL API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: firewall
paths:
  /{accountOrZone}/{accountOrZoneId}/firewall/access_rules/rules/{ruleId}:
    get:
      operationId: getAccessRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: The Account ID to use for this endpoint. Mutually exclusive with
                    the Zone ID.
                zone_id:
                  type: string
                  description: The Zone ID to use for this endpoint. Mutually exclusive with the
                    Account ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique identifier of the IP Access rule.
                  allowed_modes:
                    type: array
                    items:
                      type: string
                      enum:
                        - block
                        - challenge
                        - whitelist
                        - js_challenge
                        - managed_challenge
                    description: The available actions that a rule can apply to a matched request.
                  configuration:
                    oneOf:
                      - type: object
                        properties:
                          target:
                            type: string
                            enum:
                              - ip
                            description: The configuration target. You must set the target to `ip` when
                              specifying an IP address in the rule.
                          value:
                            type: string
                            description: The IP address to match. This address will be compared to the IP
                              address of incoming requests.
                      - type: object
                        properties:
                          target:
                            type: string
                            enum:
                              - ip6
                            description: The configuration target. You must set the target to `ip6` when
                              specifying an IPv6 address in the rule.
                          value:
                            type: string
                            description: The IPv6 address to match.
                      - type: object
                        properties:
                          target:
                            type: string
                            enum:
                              - ip_range
                            description: The configuration target. You must set the target to `ip_range`
                              when specifying an IP address range in the rule.
                          value:
                            type: string
                            description: The IP address range to match. You can only use prefix lengths
                              `/16` and `/24` for IPv4 ranges, and prefix
                              lengths `/32`, `/48`, and `/64` for IPv6 ranges.
                      - type: object
                        properties:
                          target:
                            type: string
                            enum:
                              - asn
                            description: The configuration target. You must set the target to `asn` when
                              specifying an Autonomous System Number (ASN) in
                              the rule.
                          value:
                            type: string
                            description: The AS number to match.
                      - type: object
                        properties:
                          target:
                            type: string
                            enum:
                              - country
                            description: The configuration target. You must set the target to `country` when
                              specifying a country code in the rule.
                          value:
                            type: string
                            description: "The two-letter ISO-3166-1 alpha-2 code to match. For more
                              information, refer to [IP Access rules:
                              Parameters](https://developers.cloudflare.com/waf\
                              /tools/ip-access-rules/parameters/#country)."
                    description: The rule configuration.
                  mode:
                    type: string
                    enum:
                      - block
                      - challenge
                      - whitelist
                      - js_challenge
                      - managed_challenge
                    description: The action to apply to a matched request.
                  created_on:
                    type: string
                    description: The timestamp of when the rule was created.
                  modified_on:
                    type: string
                    description: The timestamp of when the rule was last modified.
                  notes:
                    type: string
                    description: An informative summary of the rule, typically used as a reminder or
                      explanation.
                  scope:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Defines an identifier.
                      email:
                        type: string
                        description: The contact email address of the user.
                      type:
                        type: string
                        enum:
                          - user
                          - organization
                        description: Defines the scope of the rule.
                    description: All zones owned by the user will have the rule applied.
                required:
                  - id
                  - allowed_modes
                  - configuration
                  - mode
