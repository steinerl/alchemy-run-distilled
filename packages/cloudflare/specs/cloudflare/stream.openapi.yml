          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: "Body param: The optional ID of a Stream signing key. If present,
                    the `pem` field is also required."
                accessRules:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                        enum:
                          - allow
                          - block
                        description: The action to take when a request matches a rule. If the action is
                          `block`, the signed token blocks views for viewers
                          matching the rule.
                      country:
                        type: array
                        items:
                          type: string
                        description: An array of 2-letter country codes in ISO 3166-1 Alpha-2 format
                          used to match requests.
                      ip:
                        type: array
                        items:
                          type: string
                        description: An array of IPv4 or IPV6 addresses or CIDRs used to match requests.
                      type:
                        type: string
                        enum:
                          - any
                          - ip.src
                          - ip.geoip.country
                        description: Lists available rule types to match for requests. An `any` type
                          matches all requests and can be used as a wildcard to
                          apply default actions after other rules.
                  description: "Body param: The optional list of access rule constraints on the
                    token. Access can be blocked or allowed based on an IP, IP
                    range, or by country. Access rules are evaluated from first
                    to last. If a rule matches, the associated action is applied
                    and no further rules are evaluated."
                downloadable:
                  type: boolean
                  description: "Body param: The optional boolean value that enables using signed
                    tokens to access MP4 download links for a video."
                exp:
                  type: number
                  description: "Body param: The optional unix epoch timestamp that specficies the
                    time after a token is not accepted. The maximum time
                    specification is 24 hours from issuing time. If this field
                    is not set, the default is one hour after issuing."
                flags:
                  type: object
                  properties:
                    original:
