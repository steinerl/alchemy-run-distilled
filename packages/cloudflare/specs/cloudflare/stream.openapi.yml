                      description: Whether to return the original video without transformations.
                  description: "Body param: Optional flags for the signed token."
                nbf:
                  type: number
                  description: "Body param: The optional unix epoch timestamp that specifies the
                    time before a the token is not accepted. If this field is
                    not set, the default is one hour before issuing."
                pem:
                  type: string
                  description: "Body param: The optional base64 encoded private key in PEM format
                    associated with a Stream signing key. If present, the `id`
                    field is also required."
