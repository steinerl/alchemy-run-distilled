    post:
      operationId: createStream
      description: "Initiates a video upload using the TUS protocol. On success, the
        server responds with a status code 201 (created) and includes a
        `location` header to indicate where the content should be uploaded.
        Refer to https://tus.io for protocol details.  @example ```ts await
        client.stream.create({ account_id: '023e105f4ecef8ad9ca31a8372d0c353',
        'Tus-Resumable': '1.0.0', 'Upload-Length': 0, }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
        - name: direct_user
          in: query
          required: false
          description: "Query param: Provisions a URL to let your end users upload videos
            directly to Cloudflare Stream without exposing your API token to
            clients."
          schema:
            type: boolean
        - name: Tus-Resumable
          in: header
          required: true
          description: "Header param: Specifies the TUS protocol version. This value must
            be included in every upload request. Notes: The only supported
            version of TUS protocol is 1.0.0."
          schema:
            type: string
            enum:
              - 1.0.0
        - name: Upload-Length
          in: header
          required: true
          description: "Header param: Indicates the size of the entire upload in bytes.
            The value must be a non-negative integer."
          schema:
            type: number
        - name: Upload-Creator
          in: header
          required: false
          description: "Header param: A user-defined identifier for the media creator."
          schema:
            type: string
        - name: Upload-Metadata
          in: header
          required: false
          description: "Header param: Comma-separated key-value pairs following the TUS
            protocol specification. Values are Base-64 encoded. Supported keys:
            `name`, `requiresignedurls`, `allowedorigins`,
            `thumbnailtimestamppct`, `watermark`, `scheduleddeletion`,
            `maxdurationseconds`."
          schema:
            type: string
      responses:
        "200":
          description: Success
