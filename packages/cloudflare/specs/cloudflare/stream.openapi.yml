openapi: 3.1.0
info:
  title: Cloudflare STREAM API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: stream
paths:
  /accounts/{account_id}/stream/{identifier}/audio:
    get:
      operationId: getAudioTrack
      description: "Lists additional audio tracks on a video. Note this API will not
        return information for audio attached to the video upload.  @example
        ```ts const audioTrack = await client.stream.audioTracks.get(
        'ea95132c15732412d22c1476fa83f27a', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  audio:
                    type: array
                    items:
                      type: object
                      properties:
                        default:
                          type: boolean
                          description: Denotes whether the audio track will be played by default in a
                            player.
                        label:
                          type: string
                          description: A string to uniquely identify the track amongst other audio track
                            labels for the specified video.
                        status:
                          type: string
                          enum:
                            - queued
                            - ready
                            - error
                          description: Specifies the processing status of the video.
                        uid:
                          type: string
                          description: A Cloudflare-generated unique identifier for a media item.
                    description: Array of audio tracks for the video.
      x-distilled-response-path: result
  /accounts/{account_id}/stream/{identifier}/audio/{audioIdentifier}:
    patch:
      operationId: patchAudioTrack
      description: "Edits additional audio tracks on a video. Editing the default
        status of an audio track to `true` will mark all other audio tracks on
        the video default status to `false`.  @example ```ts const audio = await
        client.stream.audioTracks.edit( 'ea95132c15732412d22c1476fa83f27a',
        'ea95132c15732412d22c1476fa83f27a', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: audioIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                default:
                  type: boolean
                  description: "Body param: Denotes whether the audio track will be played by
                    default in a player."
                label:
                  type: string
                  description: "Body param: A string to uniquely identify the track amongst other
                    audio track labels for the specified video."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  default:
                    type: boolean
                    description: Denotes whether the audio track will be played by default in a
                      player.
                  label:
                    type: string
                    description: A string to uniquely identify the track amongst other audio track
                      labels for the specified video.
                  status:
                    type: string
                    enum:
                      - queued
                      - ready
                      - error
                    description: Specifies the processing status of the video.
                  uid:
                    type: string
                    description: A Cloudflare-generated unique identifier for a media item.
      x-distilled-response-path: result
    delete:
      operationId: deleteAudioTrack
      description: "Deletes additional audio tracks on a video. Deleting a default
        audio track is not allowed. You must assign another audio track as
        default prior to deletion.  @example ```ts const audioTrack = await
        client.stream.audioTracks.delete( 'ea95132c15732412d22c1476fa83f27a',
        'ea95132c15732412d22c1476fa83f27a', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: audioIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
      x-distilled-response-path: result
  /accounts/{account_id}/stream/{identifier}/audio/copy:
    post:
      operationId: copyAudioTrack
      description: "Adds an additional audio track to a video using the provided audio
        track URL.  @example ```ts const audio = await
        client.stream.audioTracks.copy( 'ea95132c15732412d22c1476fa83f27a', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', label: 'director
        commentary', }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: "Body param: A string to uniquely identify the track amongst other
                    audio track labels for the specified video."
                url:
                  type: string
                  description: "Body param: An audio track URL. The server must be publicly
                    routable and support `HTTP HEAD` requests and `HTTP GET`
                    range requests. The server should respond to `HTTP HEAD`
                    requests with a `content-range` header that includes the
                    size of the file."
              required:
                - label
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  default:
                    type: boolean
                    description: Denotes whether the audio track will be played by default in a
                      player.
                  label:
                    type: string
                    description: A string to uniquely identify the track amongst other audio track
                      labels for the specified video.
                  status:
                    type: string
                    enum:
                      - queued
                      - ready
                      - error
                    description: Specifies the processing status of the video.
                  uid:
                    type: string
                    description: A Cloudflare-generated unique identifier for a media item.
      x-distilled-response-path: result
  /accounts/{account_id}/stream/{identifier}/captions:
    get:
      operationId: getCaption
      description: "Lists the available captions or subtitles for a specific
        video.  @example ```ts // Automatically fetches more pages as needed.
        for await (const caption of client.stream.captions.get(
        'ea95132c15732412d22c1476fa83f27a', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: boolean
                    description: Whether the caption was generated via AI.
                  label:
                    type: string
                    description: The language label displayed in the native language to users.
                  language:
                    type: string
                    description: The language tag in BCP 47 format.
                  status:
                    type: string
                    enum:
                      - ready
                      - inprogress
                      - error
                    description: The status of a generated caption.
      x-distilled-pagination-class: CaptionsSinglePage
  /accounts/{account_id}/stream/{identifier}/captions/{language}:
    get:
      operationId: getCaptionLanguage
      description: "Lists the captions or subtitles for provided language.  @example
        ```ts const caption = await client.stream.captions.language.get(
        'ea95132c15732412d22c1476fa83f27a', 'tr', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: boolean
                    description: Whether the caption was generated via AI.
                  label:
                    type: string
                    description: The language label displayed in the native language to users.
                  language:
                    type: string
                    description: The language tag in BCP 47 format.
                  status:
                    type: string
                    enum:
                      - ready
                      - inprogress
                      - error
                    description: The status of a generated caption.
      x-distilled-response-path: result
    put:
      operationId: updateCaptionLanguage
      description: "Uploads the caption or subtitle file to the endpoint for a
        specific BCP47 language. One caption or subtitle file per language is
        allowed.  @example ```ts const caption = await
        client.stream.captions.language.update(
        'ea95132c15732412d22c1476fa83f27a', 'tr', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', file: '@/Users/kyle/Desktop/tr.vtt',
        }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: "Body param: The WebVTT file containing the caption or subtitle
                    content."
              required:
                - file
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: boolean
                    description: Whether the caption was generated via AI.
                  label:
                    type: string
                    description: The language label displayed in the native language to users.
                  language:
                    type: string
                    description: The language tag in BCP 47 format.
                  status:
                    type: string
                    enum:
                      - ready
                      - inprogress
                      - error
                    description: The status of a generated caption.
      x-distilled-response-path: result
    delete:
      operationId: deleteCaptionLanguage
      description: "Removes the captions or subtitles from a video.  @example ```ts
        const language = await client.stream.captions.language.delete(
        'ea95132c15732412d22c1476fa83f27a', 'tr', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
      x-distilled-response-path: result
  /accounts/{account_id}/stream/{identifier}/captions/{language}/generate:
    post:
      operationId: createCaptionLanguage
      description: "Generate captions or subtitles for provided language via
        AI.  @example ```ts const caption = await
        client.stream.captions.language.create(
        'ea95132c15732412d22c1476fa83f27a', 'tr', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: boolean
                    description: Whether the caption was generated via AI.
                  label:
                    type: string
                    description: The language label displayed in the native language to users.
                  language:
                    type: string
                    description: The language tag in BCP 47 format.
                  status:
                    type: string
                    enum:
                      - ready
                      - inprogress
                      - error
                    description: The status of a generated caption.
      x-distilled-response-path: result
  /accounts/{account_id}/stream/{identifier}/captions/{language}/vtt:
    get:
      operationId: getCaptionLanguageVtt
      description: "Return WebVTT captions for a provided language.  @example ```ts
        const vtt = await client.stream.captions.language.vtt.get(
        'ea95132c15732412d22c1476fa83f27a', 'tr', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
  /accounts/{account_id}/stream/clip:
    post:
      operationId: createClip
      description: "Clips a video based on the specified start and end times provided
        in seconds.  @example ```ts const video = await
        client.stream.clip.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', clippedFromVideoUID:
        '023e105f4ecef8ad9ca31a8372d0c353', endTimeSeconds: 0, startTimeSeconds:
        0, }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clippedFromVideoUID:
                  type: string
                  description: "Body param: The unique video identifier (UID)."
                endTimeSeconds:
                  type: number
                  description: "Body param: Specifies the end time for the video clip in seconds."
                startTimeSeconds:
                  type: number
                  description: "Body param: Specifies the start time for the video clip in
                    seconds."
                allowedOrigins:
                  type: array
                  items:
                    type: string
                  description: "Body param: Lists the origins allowed to display the video. Enter
                    allowed origin domains in an array and use ` ` for wildcard
                    subdomains. Empty arrays allow the video to be viewed on any
                    origin."
                creator:
                  type: string
                  description: "Body param: A user-defined identifier for the media creator."
                input:
                  type: string
                  description: "Body param: A video's URL. Preferred over 'url'."
                meta:
                  description: "Body param: A user modifiable key-value store used to reference
                    other systems of record for managing videos."
                name:
                  type: string
                  description: "Body param: A name for the video."
                requireSignedURLs:
                  type: boolean
                  description: "Body param: Indicates whether the video can be a accessed using
                    the UID. When set to `true`, a signed token must be
                    generated with a signing key to view the video."
                scheduledDeletion:
                  type: string
                  description: "Body param: Indicates the date and time at which the video will be
                    deleted. Omit the field to indicate no change, or include
                    with a `null` value to remove an existing scheduled
                    deletion. If specified, must be at least 30 days from upload
                    time."
                thumbnailTimestampPct:
                  type: number
                  description: "Body param: The timestamp for a thumbnail image calculated as a
                    percentage value of the video's duration. To convert from a
                    second-wise timestamp to a percentage, divide the desired
                    timestamp by the total duration of the video. If this value
                    is not set, the default thumbnail image is taken from 0s of
                    the video."
                url:
                  type: string
                  description: "Body param: A video's URL (legacy field, use 'input' instead)."
                watermark:
                  type: object
                  properties:
                    uid:
                      type: string
                      description: The unique identifier for the watermark profile.
                  description: Body param
              required:
                - clippedFromVideoUID
                - endTimeSeconds
                - startTimeSeconds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowedOrigins:
                    type: array
                    items:
                      type: string
                    description: Lists the origins allowed to display the video. Enter allowed
                      origin domains in an array and use ` ` for wildcard
                      subdomains. Empty arrays allow the video to be viewed on
                      any origin.
                  clippedFrom:
                    type: string
                    description: The unique identifier of the source video this video was clipped
                      from.
                  created:
                    type: string
                    description: The date and time the media item was created.
                  creator:
                    type: string
                    description: A user-defined identifier for the media creator.
                  duration:
                    type: number
                    description: The duration of the video in seconds. A value of `-1` means the
                      duration is unknown. The duration becomes available after
                      the upload and before the video is ready.
                  input:
                    type: object
                    properties:
                      height:
                        type: number
                        description: The video height in pixels. A value of `-1` means the height is
                          unknown. The value becomes available after the upload
                          and before the video is ready.
                      width:
                        type: number
                        description: The video width in pixels. A value of `-1` means the width is
                          unknown. The value becomes available after the upload
                          and before the video is ready.
                  liveInput:
                    type: string
                    description: The live input ID used to upload a video with Stream Live.
                  maxDurationSeconds:
                    type: number
                    description: The maximum duration in seconds for a video upload. Can be set for
                      a video that is not yet uploaded to limit its duration.
                      Uploads that exceed the specified duration will fail
                      during processing. A value of `-1` means the value is
                      unknown.
                  maxSizeBytes:
                    type: number
                    description: The maximum size in bytes for the video upload.
                  meta:
                    description: A user modifiable key-value store used to reference other systems
                      of record for managing videos.
                  modified:
                    type: string
                    description: The date and time the media item was last modified.
                  playback:
                    type: object
                    properties:
                      dash:
                        type: string
                        description: DASH Media Presentation Description for the video.
                      hls:
                        type: string
                        description: The HLS manifest for the video.
                  preview:
                    type: string
                    description: The video's preview page URI. This field is omitted until encoding
                      is complete.
                  publicDetails:
                    type: object
                    properties:
                      channel_link:
                        oneOf:
                          - type: string
                        nullable: true
                      logo:
                        oneOf:
                          - type: string
                        nullable: true
                      media_id:
                        type: number
                      share_link:
                        oneOf:
                          - type: string
                        nullable: true
                      title:
                        oneOf:
                          - type: string
                        nullable: true
                    description: Public details for the video including title, share link, channel
                      link, and logo.
                  readyToStream:
                    type: boolean
                    description: Indicates whether the video is playable. The field is empty if the
                      video is not ready for viewing or the live stream is still
                      in progress.
                  readyToStreamAt:
                    type: string
                    description: Indicates the time at which the video became playable. The field is
                      empty if the video is not ready for viewing or the live
                      stream is still in progress.
                  requireSignedURLs:
                    type: boolean
                    description: Indicates whether the video can be a accessed using the UID. When
                      set to `true`, a signed token must be generated with a
                      signing key to view the video.
                  scheduledDeletion:
                    type: string
                    description: Indicates the date and time at which the video will be deleted.
                      Omit the field to indicate no change, or include with a
                      `null` value to remove an existing scheduled deletion. If
                      specified, must be at least 30 days from upload time.
                  size:
                    type: number
                    description: The size of the media item in bytes.
                  status:
                    type: object
                    properties:
                      errorReasonCode:
                        type: string
                        description: Specifies why the video failed to encode. This field is empty if
                          the video is not in an `error` state. Preferred for
                          programmatic use.
                      errorReasonText:
                        type: string
                        description: Specifies why the video failed to encode using a human readable
                          error message in English. This field is empty if the
                          video is not in an `error` state.
                      pctComplete:
                        type: string
                        description: Indicates the progress as a percentage between 0 and 100.
                      state:
                        type: string
                        enum:
                          - pendingupload
                          - downloading
                          - queued
                          - inprogress
                          - ready
                          - error
                          - live-inprogress
                        description: Specifies the processing status for all quality levels for a video.
                    description: Specifies a detailed status for a video. If the `state` is
                      `inprogress` or `error`, the `step` field returns
                      `encoding` or `manifest`. If the `state` is `inprogress`,
                      `pctComplete` returns a number between 0 and 100 to
                      indicate the approximate percent of completion. If the
                      `state` is `error`, `errorReasonCode` and
                      `errorReasonText` provide additional details.
                  thumbnail:
                    type: string
                    description: The media item's thumbnail URI. This field is omitted until
                      encoding is complete.
                  thumbnailTimestampPct:
                    type: number
                    description: The timestamp for a thumbnail image calculated as a percentage
                      value of the video's duration. To convert from a
                      second-wise timestamp to a percentage, divide the desired
                      timestamp by the total duration of the video. If this
                      value is not set, the default thumbnail image is taken
                      from 0s of the video.
                  uid:
                    type: string
                    description: A Cloudflare-generated unique identifier for a media item.
                  uploaded:
                    type: string
                    description: The date and time the media item was uploaded.
                  uploadExpiry:
                    type: string
                    description: The date and time when the video upload URL is no longer valid for
                      direct user uploads.
                  watermark:
                    type: object
                    properties:
                      created:
                        type: string
                        description: The date and a time a watermark profile was created.
                      downloadedFrom:
                        type: string
                        description: The source URL for a downloaded image. If the watermark profile was
                          created via direct upload, this field is null.
                      height:
                        type: number
                        description: The height of the image in pixels.
                      name:
                        type: string
                        description: A short description of the watermark profile.
                      opacity:
                        type: number
                        description: The translucency of the image. A value of `0.0` makes the image
                          completely transparent, and `1.0` makes the image
                          completely opaque. Note that if the image is already
                          semi-transparent, setting this to `1.0` will not make
                          the image completely opaque.
                      padding:
                        type: number
                        description: The whitespace between the adjacent edges (determined by position)
                          of the video and the image. `0.0` indicates no
                          padding, and `1.0` indicates a fully padded video
                          width or length, as determined by the algorithm.
                      position:
                        type: string
                        description: "The location of the image. Valid positions are: `upperRight`,
                          `upperLeft`, `lowerLeft`, `lowerRight`, and `center`.
                          Note that `center` ignores the `padding` parameter."
                      scale:
                        type: number
                        description: The size of the image relative to the overall size of the video.
                          This parameter will adapt to horizontal and vertical
                          videos automatically. `0.0` indicates no scaling (use
                          the size of the image as-is), and `1.0 `fills the
                          entire video.
                      size:
                        type: number
                        description: The size of the image in bytes.
                      uid:
                        type: string
                        description: The unique identifier for a watermark profile.
                      width:
                        type: number
                        description: The width of the image in pixels.
      x-distilled-response-path: result
  /accounts/{account_id}/stream/copy:
    post:
      operationId: createCopy
      description: "Uploads a video to Stream from a provided URL.  @example ```ts
        const video = await client.stream.copy.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
        - name: Upload-Creator
          in: header
          required: false
          description: "Header param: A user-defined identifier for the media creator."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                allowedOrigins:
                  type: array
                  items:
                    type: string
                  description: "Body param: Lists the origins allowed to display the video. Enter
                    allowed origin domains in an array and use ` ` for wildcard
                    subdomains. Empty arrays allow the video to be viewed on any
                    origin."
                creator:
                  type: string
                  description: "Body param: A user-defined identifier for the media creator."
                input:
                  type: string
                  description: "Body param: A video's URL. The server must be publicly routable
                    and support `HTTP HEAD` requests and `HTTP GET` range
                    requests. The server should respond to `HTTP HEAD` requests
                    with a `content-range` header that includes the size of the
                    file. This is the preferred field over `url`."
                meta:
                  description: "Body param: A user modifiable key-value store used to reference
                    other systems of record for managing videos."
                name:
                  type: string
                  description: "Body param: A video's name. Used for legacy compatibility."
                requireSignedURLs:
                  type: boolean
