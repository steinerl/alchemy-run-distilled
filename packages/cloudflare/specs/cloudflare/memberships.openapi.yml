    delete:
      operationId: deleteMembership
      description: Remove the associated member from an account.  @example ```ts const
        membership = await client.memberships.delete(
        '4536bcfad5faccb111b47003c79917fa', ); ```
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
