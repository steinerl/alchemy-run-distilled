  /radar/post_quantum/tls/support:
    get:
      operationId: supportPostQuantumTls
      description: "Tests whether a hostname or IP address supports Post-Quantum (PQ)
        TLS key exchange. Returns information about the negotiated key exchange
        algorithm, whether it uses PQ cryptography, and any detected TLS
        implementation bugs (Split ClientHello, HRR failure, etc.).  @example
        ```ts const response = await client.radar.postQuantum.tls.support( {
        host: 'cloudflare.com' }, ); ```"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                  description: Hostname or IP address to test for Post-Quantum TLS support,
                    optionally with port (defaults to 443).
              required:
                - host
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  bugs:
                    type: object
                    properties:
                      hrrFailure:
                        type: boolean
                        description: Server sends a HelloRetryRequest but fails to complete the
                          handshake after the client sends the second
                          ClientHello. Often caused by non-compliant TLS 1.3
                          implementations on shared hosting providers.
                      splitClientHello:
                        type: boolean
                        description: Server rejects fragmented ClientHello caused by large PQ keyshare,
                          but accepts classical (non-PQ) handshakes. Typically
                          caused by middleboxes or firewalls that cannot
                          reassemble split TLS ClientHello messages.
                      unknownKeyshare:
                        type: boolean
                        description: Server cannot handle an unknown key exchange algorithm in the
                          ClientHello keyshare extension. Compliant servers
                          should respond with HelloRetryRequest for a supported
                          algorithm.
                    required:
                      - hrrFailure
                      - splitClientHello
                      - unknownKeyshare
                  host:
                    type: string
                    description: The host that was tested
                  kex:
                    type: number
                    description: TLS CurveID of the negotiated key exchange
                  kexName:
                    type: string
                    description: Human-readable name of the key exchange algorithm
                  pq:
                    type: boolean
                    description: Whether the negotiated key exchange uses Post-Quantum cryptography
                      (specifically X25519MLKEM768)
                required:
                  - bugs
                  - host
                  - kex
                  - kexName
                  - pq
      x-distilled-response-path: result
