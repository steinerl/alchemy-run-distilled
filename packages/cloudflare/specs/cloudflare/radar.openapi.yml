                name:
                  type: array
                  items:
                    type: string
                  description: Array of names used to label the series in the response.
                responseStatus:
                  type: array
                  items:
                    type: string
                  description: Filters results by HTTP response status code (e.g. 200, 403, 404).
                    Only [IANA-registered
                    codes](https://www.iana.org/assignments/http-status-codes/http-status-codes.xhtml)
                    are accepted.
                responseStatusCategory:
