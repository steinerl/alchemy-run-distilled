openapi: 3.1.0
info:
  title: Cloudflare RADAR API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: radar
paths:
  /radar/ai/bots/summary/user_agent:
    get:
      operationId: userAgentAiBotSummary
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                asn:
                  type: array
                  items:
                    type: string
                  description: Filters results by Autonomous System. Specify one or more
                    Autonomous System Numbers (ASNs) as a comma-separated list.
                    Prefix with `-` to exclude ASNs from results. For example,
                    `-174, 3356` excludes results from AS174, but includes
                    results from AS3356.
                continent:
                  type: array
                  items:
                    type: string
                  description: Filters results by continent. Specify a comma-separated list of
                    alpha-2 codes. Prefix with `-` to exclude continents from
                    results. For example, `-EU,NA` excludes results from EU, but
                    includes results from NA.
                dateEnd:
                  type: array
                  items:
                    type: string
                  description: End of the date range (inclusive).
                dateRange:
                  type: array
                  items:
                    type: string
                  description: Filters results by date range. For example, use `7d` and
                    `7dcontrol` to compare this week with the previous week. Use
                    this parameter or set specific start and end dates
                    (`dateStart` and `dateEnd` parameters).
                dateStart:
                  type: array
                  items:
                    type: string
                  description: Start of the date range.
                format:
                  type: string
                  enum:
                    - JSON
                    - CSV
                  description: Format in which results will be returned.
                limitPerGroup:
                  type: number
                  description: Limits the number of objects per group to the top items within the
                    specified time range. When item count exceeds the limit,
                    extra items appear grouped under an "other" category.
                location:
                  type: array
                  items:
                    type: string
                  description: Filters results by location. Specify a comma-separated list of
                    alpha-2 codes. Prefix with `-` to exclude locations from
                    results. For example, `-US,PT` excludes results from the US,
                    but includes results from PT.
                name:
                  type: array
                  items:
                    type: string
                  description: Array of names used to label the series in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      confidenceInfo:
                        type: object
                        properties:
                          annotations:
                            type: array
                            items:
                              type: object
                              properties:
                                dataSource:
                                  type: string
                                  enum:
                                    - ALL
                                    - AI_BOTS
                                    - AI_GATEWAY
                                    - BGP
                                    - BOTS
                                    - CONNECTION_ANOMALY
                                    - CT
                                    - DNS
                                    - DNS_MAGNITUDE
                                    - DNS_AS112
                                    - DOS
                                    - EMAIL_ROUTING
                                    - EMAIL_SECURITY
                                    - FW
                                    - FW_PG
                                    - HTTP
                                    - HTTP_CONTROL
                                    - HTTP_CRAWLER_REFERER
                                    - HTTP_ORIGINS
                                    - IQI
                                    - LEAKED_CREDENTIALS
                                    - NET
                                    - ROBOTS_TXT
                                    - SPEED
                                    - WORKERS_AI
                                  description: Data source for annotations.
                                description:
                                  type: string
                                endDate:
                                  type: string
                                eventType:
                                  type: string
                                  enum:
                                    - EVENT
                                    - GENERAL
                                    - OUTAGE
                                    - PARTIAL_PROJECTION
                                    - PIPELINE
                                    - TRAFFIC_ANOMALY
                                  description: Event type for annotations.
                                isInstantaneous:
                                  type: boolean
                                  description: Whether event is a single point in time or a time range.
                                linkedUrl:
                                  type: string
                                startDate:
                                  type: string
                              required:
                                - dataSource
                                - description
                                - endDate
                                - eventType
                                - isInstantaneous
                                - linkedUrl
                                - startDate
                          level:
                            type: number
                            description: Provides an indication of how much confidence Cloudflare has in the
                              data.
                        required:
                          - annotations
                          - level
                      dateRange:
                        type: array
                        items:
                          type: object
                          properties:
                            endTime:
                              type: string
                              description: Adjusted end of date range.
                            startTime:
                              type: string
                              description: Adjusted start of date range.
                          required:
                            - endTime
                            - startTime
                      lastUpdated:
                        type: string
                        description: Timestamp of the last dataset update.
                      normalization:
                        type: string
                        enum:
                          - PERCENTAGE
                          - MIN0_MAX
                          - MIN_MAX
                          - RAW_VALUES
                          - PERCENTAGE_CHANGE
                          - ROLLING_AVERAGE
                          - OVERLAPPED_PERCENTAGE
                          - RATIO
                        description: Normalization method applied to the results. Refer to
                          [Normalization
                          methods](https://developers.cloudflare.com/radar/concepts/normalization/).
                      units:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            value:
                              type: string
                          required:
                            - name
                            - value
                        description: Measurement units for the results.
                    required:
                      - confidenceInfo
                      - dateRange
                      - lastUpdated
                      - normalization
                      - units
                    description: Metadata for the results.
                  summary_0:
                    type: object
                    additionalProperties: true
                required:
                  - meta
                  - summary_0
      x-distilled-response-path: result
