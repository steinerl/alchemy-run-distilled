  /radar/agent_readiness/summary/{dimension}:
    get:
      operationId: summaryAgentReadiness
      parameters:
        - name: dimension
          in: path
          required: true
          schema:
            type: string
            enum:
              - CHECK
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  description: Filters results by the specified date.
                domainCategory:
                  type: array
                  items:
                    type: string
                  description: Filters results by domain category.
                format:
                  type: string
                  enum:
                    - JSON
                    - CSV
                  description: Format in which results will be returned.
                name:
                  type: array
                  items:
                    type: string
                  description: Array of names used to label the series in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      date:
                        type: string
                        description: Date of the returned scan (YYYY-MM-DD). May differ from the
                          requested date if no scan exists for that exact date.
                      domainCategories:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Sub-category name.
                            value:
                              type: number
                              description: Number of successfully scanned domains in this sub-category.
                          required:
                            - name
                            - value
                        description: Available domain sub-categories with their scan counts. Use as
                          filter options for the domainCategory parameter.
                      lastUpdated:
                        type: string
                        description: Timestamp of the last dataset update.
                      normalization:
                        type: string
                        enum:
                          - PERCENTAGE
                          - MIN0_MAX
                          - MIN_MAX
                          - RAW_VALUES
                          - PERCENTAGE_CHANGE
                          - ROLLING_AVERAGE
                          - OVERLAPPED_PERCENTAGE
                          - RATIO
                        description: Normalization method applied to the results. Refer to
                          [Normalization
                          methods](https://developers.cloudflare.com/radar/concepts/normalization/).
                      successfulDomains:
                        type: number
                        description: Domains successfully scanned (excludes errors).
                      totalDomains:
                        type: number
                        description: Total domains attempted in the scan.
                      units:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            value:
                              type: string
                          required:
                            - name
                            - value
                        description: Measurement units for the results.
                    required:
                      - date
                      - domainCategories
                      - lastUpdated
                      - normalization
                      - successfulDomains
                      - totalDomains
                      - units
                  summary_0:
                    type: object
                    additionalProperties: true
                required:
                  - meta
                  - summary_0
      x-distilled-response-path: result
