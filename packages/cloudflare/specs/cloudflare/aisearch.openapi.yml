                          objectCount:
                            type: number
                          payloadSizeBytes:
                            type: number
                        required:
                          - metadataSizeBytes
                          - objectCount
                          - payloadSizeBytes
                        description: R2 bucket storage usage in bytes.
                      vectorize:
                        type: object
                        properties:
                          dimensions:
                            type: number
                          vectorsCount:
                            type: number
                        required:
                          - dimensions
                          - vectorsCount
                        description: Vectorize index metadata (dimensions, vector count).
                    description: Engine-specific metadata. Present only for managed (v3) instances.
