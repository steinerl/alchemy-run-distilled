openapi: 3.1.0
info:
  title: Cloudflare AISEARCH API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: aisearch
paths:
  /accounts/{account_id}/ai-search/instances/{id}/chat/completions:
    post:
      operationId: chatCompletionsInstance
      description: "Performs a chat completion request against an AI Search instance,
        using indexed content as context for generating responses.  @example
        ```ts const response = await client.aiSearch.instances.chatCompletions(
        'my-ai-search', { account_id: 'c3dc5f0b34a14ff8e1b3ec04895e1b22',
        messages: [{ content: 'content', role: 'system' }], }, ); ```"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Path param
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      content:
                        oneOf:
                          - type: string
                        nullable: true
                      role:
                        type: string
                        enum:
                          - system
                          - developer
                          - user
                          - assistant
                          - tool
                    required:
                      - content
                      - role
                  description: Body param
                ai_search_options:
                  type: object
                  properties:
                    cache:
                      type: object
                      properties:
                        cache_threshold:
                          type: string
                          enum:
                            - super_strict_match
                            - close_enough
                            - flexible_friend
                            - anything_goes
                        enabled:
                          type: boolean
                    query_rewrite:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        model:
                          type: string
                          enum:
                            - "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
                            - "@cf/zai-org/glm-4.7-flash"
                            - "@cf/meta/llama-3.1-8b-instruct-fast"
                            - "@cf/meta/llama-3.1-8b-instruct-fp8"
                            - "@cf/meta/llama-4-scout-17b-16e-instruct"
                            - "@cf/qwen/qwen3-30b-a3b-fp8"
                            - "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b"
                            - "@cf/moonshotai/kimi-k2-instruct"
                            - "@cf/google/gemma-3-12b-it"
                            - "@cf/google/gemma-4-26b-a4b-it"
                            - "@cf/moonshotai/kimi-k2.5"
                            - anthropic/claude-3-7-sonnet
                            - anthropic/claude-sonnet-4
                            - anthropic/claude-opus-4
                            - anthropic/claude-3-5-haiku
                            - cerebras/qwen-3-235b-a22b-instruct
                            - cerebras/qwen-3-235b-a22b-thinking
                            - cerebras/llama-3.3-70b
                            - cerebras/llama-4-maverick-17b-128e-instruct
                            - cerebras/llama-4-scout-17b-16e-instruct
                            - cerebras/gpt-oss-120b
                            - google-ai-studio/gemini-2.5-flash
                            - google-ai-studio/gemini-2.5-pro
                            - grok/grok-4
                            - groq/llama-3.3-70b-versatile
                            - groq/llama-3.1-8b-instant
                            - openai/gpt-5
                            - openai/gpt-5-mini
                            - openai/gpt-5-nano
                            - ""
                        rewrite_prompt:
                          type: string
                    reranking:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        match_threshold:
                          type: number
                        model:
                          type: string
                          enum:
                            - "@cf/baai/bge-reranker-base"
                            - ""
                    retrieval:
                      type: object
                      properties:
                        boost_by:
                          type: array
                          items:
                            type: object
                            properties:
                              field:
                                type: string
                                description: Metadata field name to boost by. Use 'timestamp' for document
                                  freshness, or any custom_metadata field.
                                  Numeric and datetime fields support all four
                                  directions (asc, desc, exists, not_exists);
                                  text/boolean fields only support
                                  exists/not_exists.
                              direction:
                                type: string
                                enum:
                                  - asc
                                  - desc
                                  - exists
                                  - not_exists
                                description: Boost direction. 'desc' = higher values rank higher (e.g. newer
                                  timestamps). 'asc' = lower values rank higher.
                                  'exists' = boost chunks that have the field.
                                  'not_exists' = boost chunks that lack the
                                  field. Optional — defaults to 'asc' for
                                  numeric/datetime fields, 'exists' for
                                  text/boolean fields.
                            required:
                              - field
                          description: Metadata fields to boost search results by. Overrides the
                            instance-level boost_by config. Direction defaults
                            to 'asc' for numeric/datetime fields, 'exists' for
                            text/boolean fields. Fields must match 'timestamp'
                            or a defined custom_metadata field.
                        context_expansion:
                          type: number
                        filters:
                          type: object
                          additionalProperties: true
                        fusion_method:
                          type: string
                          enum:
                            - max
                            - rrf
                        keyword_match_mode:
                          type: string
                          enum:
                            - and
                            - or
                          description: Controls which documents are candidates for BM25 scoring. 'and'
                            restricts candidates to documents containing all
                            query terms; 'or' includes any document containing
                            at least one term, ranked by BM25 relevance.
                            Defaults to 'and'.
                        match_threshold:
                          type: number
                        max_num_results:
                          type: number
                        retrieval_type:
                          type: string
                          enum:
                            - vector
                            - keyword
                            - hybrid
                        return_on_failure:
                          type: boolean
                  description: Body param
                model:
                  type: string
                  enum:
                    - "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
                    - "@cf/zai-org/glm-4.7-flash"
                    - "@cf/meta/llama-3.1-8b-instruct-fast"
                    - "@cf/meta/llama-3.1-8b-instruct-fp8"
                    - "@cf/meta/llama-4-scout-17b-16e-instruct"
                    - "@cf/qwen/qwen3-30b-a3b-fp8"
                    - "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b"
                    - "@cf/moonshotai/kimi-k2-instruct"
                    - "@cf/google/gemma-3-12b-it"
                    - "@cf/google/gemma-4-26b-a4b-it"
                    - "@cf/moonshotai/kimi-k2.5"
                    - anthropic/claude-3-7-sonnet
                    - anthropic/claude-sonnet-4
                    - anthropic/claude-opus-4
                    - anthropic/claude-3-5-haiku
                    - cerebras/qwen-3-235b-a22b-instruct
                    - cerebras/qwen-3-235b-a22b-thinking
                    - cerebras/llama-3.3-70b
                    - cerebras/llama-4-maverick-17b-128e-instruct
                    - cerebras/llama-4-scout-17b-16e-instruct
                    - cerebras/gpt-oss-120b
                    - google-ai-studio/gemini-2.5-flash
                    - google-ai-studio/gemini-2.5-pro
                    - grok/grok-4
                    - groq/llama-3.3-70b-versatile
                    - groq/llama-3.1-8b-instant
                    - openai/gpt-5
                    - openai/gpt-5-mini
                    - openai/gpt-5-nano
                    - ""
                  description: Body param
                stream:
                  type: boolean
                  description: Body param
              required:
                - messages
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: object
                          properties:
                            content:
                              oneOf:
                                - type: string
                              nullable: true
                            role:
                              type: string
                              enum:
                                - system
                                - developer
                                - user
                                - assistant
                                - tool
                          required:
                            - content
                            - role
                        index:
                          type: number
                      required:
                        - message
                  chunks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        score:
                          type: number
                        text:
                          type: string
                        type:
                          type: string
                        item:
                          type: object
                          properties:
                            key:
                              type: string
                            metadata:
                              type: object
                              additionalProperties: true
                            timestamp:
                              type: number
                          required:
                            - key
                        scoring_details:
                          type: object
                          properties:
                            fusion_method:
                              type: string
                              enum:
                                - rrf
                                - max
                            keyword_rank:
                              type: number
                            keyword_score:
                              type: number
                            reranking_score:
                              type: number
                            vector_rank:
                              type: number
                            vector_score:
                              type: number
                      required:
                        - id
                        - score
                        - text
                        - type
                  id:
                    type: string
                  model:
                    type: string
                  object:
                    type: string
                required:
                  - choices
                  - chunks
