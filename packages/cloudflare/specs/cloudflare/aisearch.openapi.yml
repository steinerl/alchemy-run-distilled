                    type: object
                    additionalProperties: true
                  index_source_errors:
                    type: object
                    additionalProperties: true
                  last_activity:
                    type: string
                  outdated:
                    type: number
                  queued:
                    type: number
                  running:
                    type: number
                  skipped:
