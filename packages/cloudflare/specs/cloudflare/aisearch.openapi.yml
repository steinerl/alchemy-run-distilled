      description: "Retrieves usage statistics for AI Search instances.  @example
        ```ts const response = await client.aiSearch.namespaces.instances.stats(
        'my-namespace', 'my-ai-search', { account_id:
        'c3dc5f0b34a14ff8e1b3ec04895e1b22' }, ); ```"
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  completed:
                    type: number
                  degraded:
                    type: boolean
                    description: True when status counts are unavailable (e.g. legacy stats query
                      exceeded D1 statement-size limit). Counts are omitted in
                      this case.
                  engine:
                    type: object
                    properties:
                      r2:
                        type: object
                        properties:
                          metadataSizeBytes:
