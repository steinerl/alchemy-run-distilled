openapi: 3.1.0
info:
  title: Cloudflare ALERTING API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: alerting
paths:
  /accounts/{account_id}/alerting/v3/available_alerts:
    get:
      operationId: listAvailableAlerts
      description: "Gets a list of all alert types for which an account is
        eligible.  @example ```ts const availableAlerts = await
        client.alerting.availableAlerts.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/alerting/v3/destinations/eligible:
    get:
      operationId: getDestinationEligible
      description: "Get a list of all delivery mechanism types for which an account is
        eligible.  @example ```ts const eligible = await
        client.alerting.destinations.eligible.get({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/alerting/v3/destinations/pagerduty:
    get:
      operationId: getDestinationPagerduty
      description: "Get a list of all configured PagerDuty services.  @example ```ts
        // Automatically fetches more pages as needed. for await (const
        pagerduty of client.alerting.destinations.pagerduty.get( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID
                  name:
                    type: string
                    description: The name of the pagerduty service.
      x-distilled-pagination-class: PagerdutiesSinglePage
    delete:
      operationId: deleteDestinationPagerduty
      description: "Deletes all the PagerDuty Services connected to the
        account.  @example ```ts const pagerduty = await
        client.alerting.destinations.pagerduty.delete({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                        code:
                          type: number
                      required:
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                        code:
                          type: number
                      required:
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful
                required:
                  - errors
                  - messages
                  - success
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/alerting/v3/destinations/pagerduty/connect:
    post:
      operationId: createDestinationPagerduty
      description: "Creates a new token for integrating with PagerDuty.  @example
        ```ts const pagerduty = await
        client.alerting.destinations.pagerduty.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: token in form of UUID
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/alerting/v3/destinations/pagerduty/connect/{tokenId}:
    get:
      operationId: linkDestinationPagerduty
      description: "Links PagerDuty with the account using the integration
        token.  @example ```ts const response = await
        client.alerting.destinations.pagerduty.link(
        '8c71e667571b4f61b94d9e4b12158038', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/alerting/v3/destinations/webhooks/{webhookId}:
    get:
      operationId: getDestinationWebhook
      description: "Get details for a single webhooks destination.  @example ```ts
        const webhooks = await client.alerting.destinations.webhooks.get(
        'b115d5ec15c641ee8b7692c449b5227b', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique identifier of a webhook
                  created_at:
                    type: string
                    description: Timestamp of when the webhook destination was created.
                  last_failure:
                    type: string
                    description: Timestamp of the last time an attempt to dispatch a notification to
                      this webhook failed.
                  last_success:
                    type: string
                    description: Timestamp of the last time Cloudflare was able to successfully
                      dispatch a notification using this webhook.
                  name:
                    type: string
                    description: The name of the webhook destination. This will be included in the
                      request body when you receive a webhook notification.
                  type:
                    type: string
                    enum:
                      - datadog
                      - discord
                      - feishu
                      - gchat
                      - generic
                      - opsgenie
                      - slack
                      - splunk
                    description: Type of webhook endpoint.
                  url:
                    type: string
                    description: The POST endpoint to call when dispatching a notification.
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        WebhookNotFound:
          - code: 0
            message:
              includes: Webhook not found
    put:
      operationId: updateDestinationWebhook
      description: "Update a webhook destination.  @example ```ts const webhook =
        await client.alerting.destinations.webhooks.update(
        'b115d5ec15c641ee8b7692c449b5227b', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', name: 'Slack Webhook', url:
        'https://hooks.slack.com/services/Ds3fdBFbV/456464Gdd', }, ); ```"
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account id"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: The name of the webhook destination. This will be
                    included in the request body when you receive a webhook
                    notification."
                url:
                  type: string
                  description: "Body param: The POST endpoint to call when dispatching a
                    notification."
                secret:
                  type: string
                  description: "Body param: Optional secret that will be passed in the
                    `cf-webhook-auth` header when dispatching generic webhook
                    notifications or formatted for supported destinations.
                    Secrets are not returned in any API response body."
              required:
                - name
                - url
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        InvalidWebhookId:
          - code: 0
            message:
              includes: invalid Webhook ID
    delete:
      operationId: deleteDestinationWebhook
      description: "Delete a configured webhook destination.  @example ```ts const
        webhook = await client.alerting.destinations.webhooks.delete(
        'b115d5ec15c641ee8b7692c449b5227b', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account id
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                        code:
                          type: number
                      required:
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                        code:
                          type: number
                      required:
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful
                required:
                  - errors
                  - messages
                  - success
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        InternalServerError:
          - code: 15000
