                    description: Type of webhook endpoint.
                  url:
                    type: string
                    description: The POST endpoint to call when dispatching a notification.
      x-distilled-pagination-class: WebhooksSinglePage
    post:
      operationId: createDestinationWebhook
      description: "Creates a new webhook destination.  @example ```ts const webhook =
        await client.alerting.destinations.webhooks.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', name: 'Slack Webhook', url:
        'https://hooks.slack.com/services/Ds3fdBFbV/456464Gdd', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The account id"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: The name of the webhook destination. This will be
                    included in the request body when you receive a webhook
                    notification."
                url:
                  type: string
                  description: "Body param: The POST endpoint to call when dispatching a
                    notification."
                secret:
                  type: string
                  description: "Body param: Optional secret that will be passed in the
                    `cf-webhook-auth` header when dispatching generic webhook
                    notifications or formatted for supported destinations.
                    Secrets are not returned in any API response body."
              required:
                - name
                - url
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        WebhookTestFailed:
          - code: 0
            message:
              includes: Webhook test failed
  /accounts/{account_id}/alerting/v3/history:
    get:
      operationId: listHistories
      description: "Gets a list of history records for notifications sent to an
        account. The records are displayed for last `x` number of days based on
        the zone plan (free = 30, pro = 30, biz = 30, ent = 90).  @example ```ts
        // Automatically fetches more pages as needed. for await (const history
        of client.alerting.history.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', })) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The account id"
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: before
          in: query
          required: false
          description: "Query param: Limit the returned results to history records older
            than the specified date. This must be a timestamp that conforms to
            RFC3339."
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: "Query param: Limit the returned results to history records newer
            than the specified date. This must be a timestamp that conforms to
            RFC3339."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID
                  alert_body:
                    type: string
                    description: Message body included in the notification sent.
                  alert_type:
                    type: string
                    description: Type of notification that has been dispatched.
                  description:
                    type: string
                    description: Description of the notification policy (if present).
                  mechanism:
                    type: string
                    description: The mechanism to which the notification has been dispatched.
                  mechanism_type:
                    type: string
                    enum:
                      - email
                      - pagerduty
                      - webhook
                    description: The type of mechanism to which the notification has been
                      dispatched. This can be email/pagerduty/webhook based on
                      the mechanism configured.
                  name:
                    type: string
                    description: Name of the policy.
                  policy_id:
                    type: string
                    description: The unique identifier of a notification policy
                  sent:
                    type: string
                    description: Timestamp of when the notification was dispatched in ISO 8601
                      format.
      x-distilled-pagination-class: HistoriesV4PagePaginationArray
