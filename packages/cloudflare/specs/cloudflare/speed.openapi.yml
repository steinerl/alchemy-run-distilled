  /zones/{zone_id}/speed_api/pages/{url}/trend:
    get:
      operationId: trendPage
      description: "Lists the core web vital metrics trend over time for a specific
        page.  @example ```ts const trend = await client.speed.pages.trend(
        'example.com', { zone_id: '023e105f4ecef8ad9ca31a8372d0c353',
        deviceType: 'DESKTOP', metrics:
        'performanceScore,ttfb,fcp,si,lcp,tti,tbt,cls', region: 'us-central1',
        start: '2014-01-01T05:20:00.12345Z', tz: 'tz', }, ); ```"
      parameters:
        - name: url
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: deviceType
          in: query
          required: true
          description: "Query param: The type of device."
          schema:
            type: string
            enum:
              - DESKTOP
              - MOBILE
        - name: metrics
          in: query
          required: true
          description: "Query param: A comma-separated list of metrics to include in the
            results."
          schema:
            type: string
        - name: region
          in: query
          required: true
          description: "Query param: A test region."
          schema:
            type: string
            enum:
              - asia-east1
              - asia-northeast1
              - asia-northeast2
              - asia-south1
              - asia-southeast1
              - australia-southeast1
              - europe-north1
              - europe-southwest1
              - europe-west1
              - europe-west2
              - europe-west3
              - europe-west4
              - europe-west8
              - europe-west9
              - me-west1
              - southamerica-east1
              - us-central1
              - us-east1
              - us-east4
              - us-south1
              - us-west1
        - name: start
          in: query
          required: true
          description: Query param
          schema:
            type: string
        - name: tz
          in: query
          required: true
          description: "Query param: The timezone of the start and end timestamps."
          schema:
            type: string
        - name: end
          in: query
          required: false
          description: Query param
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  cls:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: Cumulative Layout Shift trend.
                  fcp:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: First Contentful Paint trend.
                  lcp:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: Largest Contentful Paint trend.
                  performanceScore:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: The Lighthouse score trend.
                  si:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: Speed Index trend.
                  tbt:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: Total Blocking Time trend.
                  ttfb:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: Time To First Byte trend.
                  tti:
                    type: array
                    items:
                      oneOf:
                        - type: number
                      nullable: true
                    description: Time To Interactive trend.
      x-distilled-response-path: result
