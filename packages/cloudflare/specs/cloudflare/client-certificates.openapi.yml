                    description: The type of hash used for the Client Certificate..
                  ski:
                    type: string
                    description: Subject Key Identifier
                  state:
                    type: string
                    description: State, provided by the CSR
                  status:
                    type: string
                    enum:
                      - active
                      - pending_reactivation
                      - pending_revocation
                      - revoked
                    description: Client Certificates may be active or revoked, and the
                      pending_reactivation or pending_revocation represent
                      in-progress asynchronous transitions
                  validity_days:
                    type: number
                    description: The number of days the Client Certificate will be valid after the
                      issued_on date
      x-distilled-pagination-class: ClientCertificatesV4PagePaginationArray
      x-distilled-errors:
        Forbidden:
          - status: 403
    post:
      operationId: createClientCertificate
      description: "Create a new API Shield mTLS Client Certificate  @example ```ts
        const clientCertificate = await client.clientCertificates.create({
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353', csr: '-----BEGIN
        CERTIFICATE REQUEST-----\\nMIICY....\\n-----END CERTIFICATE
        REQUEST-----', validity_days: 3650, }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                csr:
                  type: string
                  description: "Body param: The Certificate Signing Request (CSR). Must be
                    newline-encoded."
                validity_days:
                  type: number
                  description: "Body param: The number of days the Client Certificate will be
                    valid after the issued_on date"
              required:
                - csr
                - validity_days
      responses:
