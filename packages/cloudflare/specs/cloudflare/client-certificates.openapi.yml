                      name:
                        type: string
                    description: Certificate Authority used to issue the Client Certificate
                  common_name:
                    type: string
                    description: Common Name of the Client Certificate
                  country:
                    type: string
                    description: Country, provided by the CSR
                  csr:
                    type: string
                    description: The Certificate Signing Request (CSR). Must be newline-encoded.
                  expires_on:
                    type: string
                    description: Date that the Client Certificate expires
                  fingerprint_sha256:
                    type: string
                    description: Unique identifier of the Client Certificate
                  issued_on:
                    type: string
                    description: Date that the Client Certificate was issued by the Certificate
                      Authority
                  location:
                    type: string
                    description: Location, provided by the CSR
                  organization:
                    type: string
                    description: Organization, provided by the CSR
                  organizational_unit:
                    type: string
                    description: Organizational Unit, provided by the CSR
                  serial_number:
                    type: string
                    description: The serial number on the created Client Certificate.
                  signature:
                    type: string
                    description: The type of hash used for the Client Certificate..
                  ski:
                    type: string
                    description: Subject Key Identifier
                  state:
                    type: string
                    description: State, provided by the CSR
                  status:
                    type: string
                    enum:
                      - active
                      - pending_reactivation
                      - pending_revocation
                      - revoked
                    description: Client Certificates may be active or revoked, and the
                      pending_reactivation or pending_revocation represent
                      in-progress asynchronous transitions
                  validity_days:
                    type: number
                    description: The number of days the Client Certificate will be valid after the
                      issued_on date
      x-distilled-response-path: result
      x-distilled-errors:
        ClientCertificateNotFound:
          - code: 1415
            message:
              includes: Invalid Certificate ID
          - status: 404
        ClientCertificateAlreadyRevoked:
          - code: 1407
            message:
              includes: already deleted
        Forbidden:
          - status: 403
  /zones/{zone_id}/client_certificates:
    get:
      operationId: listClientCertificates
      description: "List all of your Zone's API Shield mTLS Client Certificates by
        Status and/or using Pagination  @example ```ts // Automatically fetches
        more pages as needed. for await (const clientCertificate of
        client.clientCertificates.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: limit
          in: query
          required: false
          description: "Query param: Limit to the number of records returned."
          schema:
            type: number
        - name: offset
          in: query
          required: false
          description: "Query param: Offset the results"
          schema:
            type: number
        - name: status
          in: query
          required: false
          description: "Query param: Client Certitifcate Status to filter results by."
          schema:
            type: string
            enum:
              - all
              - active
              - pending_reactivation
              - pending_revocation
              - revoked
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
