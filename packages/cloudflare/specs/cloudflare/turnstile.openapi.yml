  /accounts/{account_id}/challenges/widgets:
    get:
      operationId: listWidgets
      description: "Lists all turnstile widgets of an account.  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        widgetListResponse of client.turnstile.widgets.list( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier"
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: direction
          in: query
          required: false
          description: "Query param: Direction to order widgets."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: filter
          in: query
          required: false
          description: "Query param: Filter widgets by field using case-insensitive
            substring matching. Format: `field:value`  Supported fields:  -
            `name` - Filter by widget name (e.g., `filter=name:login-form`) -
            `sitekey` - Filter by sitekey (e.g.,
            `filter=sitekey:0x4AAA`)  Returns 400 Bad Request if the field is
            unsupported or format is invalid. An empty filter value returns all
            results."
          schema:
            type: string
        - name: order
          in: query
          required: false
          description: "Query param: Field to order widgets by."
          schema:
            type: string
            enum:
              - id
              - sitekey
              - name
              - created_on
              - modified_on
