            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  class_name:
                    type: string
                  created_on:
                    type: string
                  is_deleted:
                    type: number
                  modified_on:
                    type: string
                  name:
                    type: string
                  script_name:
                    type: string
                  terminator_running:
