                  - end
                  - error
                  - output
                  - params
                  - queued
                  - start
                  - status
                  - steps
                  - success
                  - trigger
                  - versionId
      x-distilled-response-path: result
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InvalidRoute:
          - code: 7003
        InstanceNotFound:
          - code: 10400
  /accounts/{account_id}/workflows/{workflowName}/instances:
    get:
      operationId: listInstances
      description: List of workflow instances
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: cursor
          in: query
          required: false
          description: "Query param: `page` and `cursor` are mutually exclusive, use one
            or the other."
          schema:
            type: string
        - name: date_end
          in: query
          required: false
          description: "Query param: Accepts ISO 8601 with no timezone offsets and in UTC."
          schema:
            type: string
        - name: date_start
          in: query
          required: false
          description: "Query param: Accepts ISO 8601 with no timezone offsets and in UTC."
          schema:
            type: string
        - name: direction
          in: query
          required: false
          description: "Query param: should only be used when `cursor` is used, defines a
            new direction for the cursor"
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: status
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
            enum:
              - queued
              - running
              - paused
              - errored
              - terminated
              - complete
              - waitingForPause
              - waiting
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_on:
                    type: string
                  ended_on:
                    oneOf:
                      - type: string
                    nullable: true
                  modified_on:
                    type: string
                  started_on:
                    oneOf:
                      - type: string
                    nullable: true
                  status:
                    type: string
                    enum:
                      - queued
                      - running
                      - paused
                      - errored
                      - terminated
                      - complete
                      - waitingForPause
                      - waiting
                  version_id:
                    type: string
                  workflow_id:
                    type: string
                required:
                  - id
                  - created_on
                  - ended_on
                  - modified_on
                  - started_on
                  - status
                  - version_id
                  - workflow_id
      x-distilled-pagination-class: InstanceListResponsesV4PagePaginationArray
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        WorkflowInternalError:
          - code: 10001
        InvalidRoute:
          - code: 7003
        InvalidBody:
          - code: 10002
    post:
      operationId: createInstance
      description: Create a new workflow instance
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                instance_id:
                  type: string
                  description: "Body param:"
                instance_retention:
                  type: object
                  properties:
                    error_retention:
                      oneOf:
                        - type: number
                        - type: string
                      description: Duration in milliseconds or as a string like '5 minutes'
                    success_retention:
                      oneOf:
                        - type: number
                        - type: string
                      description: Duration in milliseconds or as a string like '5 minutes'
                  description: "Body param:"
                params:
                  description: "Body param:"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - queued
                      - running
                      - paused
                      - errored
                      - terminated
                      - complete
                      - waitingForPause
                      - waiting
                  version_id:
                    type: string
                  workflow_id:
                    type: string
                required:
                  - id
                  - status
                  - version_id
                  - workflow_id
      x-distilled-response-path: result
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InstanceAlreadyExists:
          - code: 10405
        InvalidRoute:
          - code: 7003
        InvalidBody:
          - code: 10002
  /accounts/{account_id}/workflows/{workflowName}/instances/batch:
    post:
      operationId: bulkInstance
      description: Batch create new Workflow instances
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  instance_id:
                    type: string
                  instance_retention:
                    type: object
                    properties:
                      error_retention:
                        oneOf:
                          - type: number
                          - type: string
                        description: Duration in milliseconds or as a string like '5 minutes'
                      success_retention:
                        oneOf:
                          - type: number
                          - type: string
                        description: Duration in milliseconds or as a string like '5 minutes'
                  params: {}
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - queued
                      - running
                      - paused
                      - errored
                      - terminated
                      - complete
                      - waitingForPause
                      - waiting
                  version_id:
                    type: string
                  workflow_id:
                    type: string
                required:
                  - id
                  - status
                  - version_id
                  - workflow_id
      x-distilled-pagination-class: InstanceBulkResponsesSinglePage
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InstanceAlreadyExists:
          - code: 10405
        InvalidRoute:
          - code: 7003
        InvalidBody:
          - code: 10002
  /accounts/{account_id}/workflows/{workflowName}/instances/{instanceId}/events/{eventType}:
    post:
      operationId: createInstanceEvent
      description: Send event to instance
      parameters:
        - name: workflowName
          in: path
          required: true
