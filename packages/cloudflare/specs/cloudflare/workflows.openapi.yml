openapi: 3.1.0
info:
  title: Cloudflare WORKFLOWS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: workflows
paths:
  /accounts/{account_id}/workflows/{workflowName}/instances/{instanceId}:
    get:
      operationId: getInstance
      description: Get logs and status from instance
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  end:
                    oneOf:
                      - type: string
                    nullable: true
                  error:
                    oneOf:
                      - type: object
                        properties:
                          message:
                            type: string
                          name:
                            type: string
                        required:
                          - message
                          - name
                    nullable: true
                  output:
                    oneOf:
                      - type: string
                      - type: number
                    nullable: true
                  params: {}
                  queued:
                    type: string
                  start:
                    oneOf:
                      - type: string
                    nullable: true
                  status:
                    type: string
                    enum:
                      - queued
                      - running
                      - paused
                      - errored
                      - terminated
                      - complete
                      - waitingForPause
                      - waiting
                  steps:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            attempts:
                              type: array
                              items:
                                type: object
                                properties:
                                  end:
                                    oneOf:
                                      - type: string
                                    nullable: true
                                  error:
                                    oneOf:
                                      - type: object
                                        properties:
                                          message:
                                            type: string
                                          name:
                                            type: string
                                        required:
                                          - message
                                          - name
                                    nullable: true
                                  start:
                                    type: string
                                  success:
                                    oneOf:
                                      - type: boolean
                                    nullable: true
                                required:
                                  - end
                                  - error
                                  - start
                                  - success
                            config:
                              type: object
                              properties:
                                retries:
                                  type: object
                                  properties:
                                    delay:
                                      type: number
                                    limit:
                                      type: number
                                    backoff:
                                      type: string
                                      enum:
                                        - constant
                                        - linear
                                        - exponential
                                  required:
                                    - delay
                                    - limit
                                timeout: {}
                              required:
                                - retries
                                - timeout
                            end:
                              oneOf:
                                - type: string
                              nullable: true
                            name:
                              type: string
                            output: {}
                            start:
                              type: string
                            success:
                              oneOf:
                                - type: boolean
                              nullable: true
                            type:
                              type: string
                              enum:
                                - step
                          required:
                            - attempts
                            - config
                            - end
                            - name
                            - output
                            - start
                            - success
                            - type
                        - type: object
                          properties:
                            end:
                              type: string
                            error:
                              oneOf:
                                - type: object
                                  properties:
                                    message:
                                      type: string
                                    name:
                                      type: string
                                  required:
                                    - message
                                    - name
                              nullable: true
                            finished:
                              type: boolean
                            name:
                              type: string
                            start:
                              type: string
                            type:
                              type: string
                              enum:
                                - sleep
                          required:
                            - end
                            - error
                            - finished
                            - name
                            - start
                            - type
                        - type: object
                          properties:
                            trigger:
                              type: object
                              properties:
                                source:
                                  type: string
                              required:
                                - source
                            type:
                              type: string
                              enum:
                                - termination
                          required:
                            - trigger
                            - type
                        - type: object
                          properties:
                            end:
                              type: string
                            error:
                              oneOf:
                                - type: object
                                  properties:
                                    message:
                                      type: string
                                    name:
                                      type: string
                                  required:
                                    - message
                                    - name
                              nullable: true
                            finished:
                              type: boolean
                            name:
                              type: string
                            output:
                              oneOf:
                                - type: string
                                - type: number
                                - type: boolean
                            start:
                              type: string
                            type:
                              type: string
                              enum:
                                - waitForEvent
                          required:
                            - end
                            - error
                            - finished
                            - name
                            - output
                            - start
                            - type
                  success:
                    oneOf:
                      - type: boolean
                    nullable: true
                  trigger:
                    type: object
                    properties:
                      source:
                        type: string
                        enum:
                          - unknown
                          - api
                          - binding
                          - event
