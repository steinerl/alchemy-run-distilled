  /accounts/{account_id}/workflows/{workflowName}:
    get:
      operationId: getWorkflow
      description: Get Workflow details
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  class_name:
                    type: string
                  created_on:
                    type: string
                  instances:
                    type: object
                    properties:
                      complete:
                        type: number
                      errored:
                        type: number
                      paused:
                        type: number
                      queued:
                        type: number
                      running:
                        type: number
                      terminated:
                        type: number
                      waiting:
                        type: number
                      waitingForPause:
                        type: number
                  modified_on:
                    type: string
                  name:
                    type: string
                  script_name:
                    type: string
                  triggered_on:
