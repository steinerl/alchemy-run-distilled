      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InvalidRoute:
          - code: 7003
        InstanceNotFound:
          - code: 10201
        InvalidBody:
          - code: 10002
  /accounts/{account_id}/workflows/{workflowName}/instances/{instanceId}/status:
    patch:
      operationId: patchInstanceStatus
      description: Change status of instance
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - resume
                    - pause
                    - terminate
                    - restart
                  description: "Body param: Apply action to instance."
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - queued
                      - running
                      - paused
                      - errored
                      - terminated
                      - complete
                      - waitingForPause
                      - waiting
                  timestamp:
                    type: string
                    description: Accepts ISO 8601 with no timezone offsets and in UTC.
                required:
                  - status
                  - timestamp
      x-distilled-response-path: result
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InvalidRoute:
          - code: 7003
        InstanceNotFound:
          - code: 10400
        InstanceCannotTerminate:
          - code: 10401
