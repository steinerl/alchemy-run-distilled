                  - created_on
                  - instances
                  - modified_on
                  - name
                  - script_name
                  - triggered_on
      x-distilled-response-path: result
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InvalidRoute:
          - code: 7003
    put:
      operationId: putWorkflow
      description: Create/modify Workflow
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                class_name:
                  type: string
                  description: "Body param:"
                script_name:
                  type: string
                  description: "Body param:"
              required:
                - class_name
                - script_name
      responses:
        "200":
          description: Success
