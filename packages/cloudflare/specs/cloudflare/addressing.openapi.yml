openapi: 3.1.0
info:
  title: Cloudflare ADDRESSING API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: addressing
paths:
  /accounts/{account_id}/addressing/address_maps/{addressMapId}:
    get:
      operationId: getAddressMap
      description: "Show a particular address map owned by the account.  @example
        ```ts const addressMap = await client.addressing.addressMaps.get(
        '055817b111884e0227e1be16a0be6ee0', { account_id:
        '258def64c72dae45f3e4c8516e2111f2' }, ); ```"
      parameters:
        - name: addressMapId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier of a Cloudflare account.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier of an Address Map.
                  can_delete:
                    type: boolean
                    description: If set to false, then the Address Map cannot be deleted via API.
                      This is true for Cloudflare-managed maps.
                  can_modify_ips:
                    type: boolean
                    description: If set to false, then the IPs on the Address Map cannot be modified
                      via the API. This is true for Cloudflare-managed maps.
                  created_at:
                    type: string
                  default_sni:
                    oneOf:
                      - type: string
                    nullable: true
                    description: If you have legacy TLS clients which do not send the TLS server
                      name indicator, then you can specify one default SNI on
                      the map. If Cloudflare receives a TLS handshake from a
                      client without an SNI, it will respond with the default
                      SNI on those IPs. The default SNI can be any valid zone or
                      subdomain owned by the account.
                  description:
                    oneOf:
                      - type: string
                    nullable: true
                    description: An optional description field which may be used to describe the
                      types of IPs or zones on the map.
                  enabled:
                    oneOf:
                      - type: boolean
                    nullable: true
                    description: Whether the Address Map is enabled or not. Cloudflare's DNS will
                      not respond with IP addresses on an Address Map until the
                      map is enabled.
                  ips:
                    type: array
                    items:
                      type: object
                      properties:
                        created_at:
                          type: string
                        ip:
                          type: string
                          description: An IPv4 or IPv6 address.
                    description: The set of IPs on the Address Map.
                  memberships:
                    type: array
                    items:
                      type: object
                      properties:
                        can_delete:
                          type: boolean
                          description: Controls whether the membership can be deleted via the API or not.
                        created_at:
                          type: string
                        identifier:
                          type: string
                          description: The identifier for the membership (eg. a zone or account tag).
                        kind:
                          type: string
                          enum:
                            - zone
                            - account
                          description: The type of the membership.
                    description: Zones and Accounts which will be assigned IPs on this Address Map.
                      A zone membership will take priority over an account
                      membership.
                  modified_at:
                    type: string
      x-distilled-response-path: result
      x-distilled-errors:
        AddressMapNotFound:
          - code: 1000
        InvalidAccountId:
          - code: 7003
            message:
              includes: Could not route
        Forbidden:
          - status: 403
    patch:
      operationId: patchAddressMap
      description: "Modify properties of an address map owned by the
        account.  @example ```ts const addressMap = await
        client.addressing.addressMaps.edit( '055817b111884e0227e1be16a0be6ee0',
