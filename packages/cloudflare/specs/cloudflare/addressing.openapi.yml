                    SNI on those IPs. The default SNI can be any valid zone or
                    subdomain owned by the account."
                description:
                  oneOf:
                    - type: string
                  nullable: true
                  description: "Body param: An optional description field which may be used to
                    describe the types of IPs or zones on the map."
                enabled:
