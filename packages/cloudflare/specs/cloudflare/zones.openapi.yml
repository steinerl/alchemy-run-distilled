                          nullable: true
                        http_application_id:
                          oneOf:
                            - type: string
                          nullable: true
                      required:
                        - expression
                        - locked_on_deployment
                        - name
                        - position
                        - ref
                        - version
                required:
                  - environments
      x-distilled-response-path: result
    put:
      operationId: updateEnvironment
      description: "Upsert zone environments  @example ```ts const environment = await
        client.zones.environments.update({ zone_id: 'zone_id', environments: [ {
        expression: 'expression', locked_on_deployment: true, name: 'name',
