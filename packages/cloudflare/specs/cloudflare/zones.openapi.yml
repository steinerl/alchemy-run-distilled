                          nullable: true
                      required:
                        - expression
                        - locked_on_deployment
                        - name
                        - position
                        - ref
                        - version
                required:
                  - environments
      x-distilled-response-path: result
    post:
      operationId: createEnvironment
      description: "Create zone environments  @example ```ts const environment = await
        client.zones.environments.create({ zone_id: 'zone_id', environments: [ {
        expression: 'expression', locked_on_deployment: true, name: 'name',
