  /zones/{zone_id}/hold:
    get:
      operationId: getHold
      description: "Retrieve whether the zone is subject to a zone hold, and metadata
        about the hold.  @example ```ts const zoneHold = await
        client.zones.holds.get({ zone_id: '023e105f4ecef8ad9ca31a8372d0c353',
        }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  hold:
                    type: boolean
                  hold_after:
                    type: string
                  include_subdomains:
                    type: string
      x-distilled-response-path: result
    post:
      operationId: createHold
      description: "Enforce a zone hold on the zone, blocking the creation and
        activation of zones with this zone's hostname.  @example ```ts const
        zoneHold = await client.zones.holds.create({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: include_subdomains
          in: query
          required: false
          description: "Query param: If provided, the zone hold will extend to block any
            subdomain of the given zone, as well as SSL4SaaS Custom Hostnames.
            For example, a zone hold on a zone with the hostname 'example.com'
            and include_subdomains=true will block 'example.com',
            'staging.example.com', 'api.staging.example.com', etc."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  hold:
                    type: boolean
                  hold_after:
                    type: string
                  include_subdomains:
                    type: string
      x-distilled-response-path: result
    patch:
      operationId: patchHold
      description: "Update the `hold_after` and/or `include_subdomains` values on an
        existing zone hold. The hold is enabled if the `hold_after` date-time
        value is in the past.  @example ```ts const zoneHold = await
        client.zones.holds.edit({ zone_id: '023e105f4ecef8ad9ca31a8372d0c353',
        }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                hold_after:
                  type: string
                  description: "Body param: If `hold_after` is provided and future-dated, the hold
                    will be temporarily disabled, then automatically re-enabled
                    by the system at the time specified in this
                    RFC3339-formatted timestamp. A past-dated `hold_after` value
                    will have no effect on an existing, enabled hold. Providing
                    an empty string will set its value to the current time."
                include_subdomains:
                  type: boolean
                  description: "Body param: If `true`, the zone hold will extend to block any
                    subdomain of the given zone, as well as SSL4SaaS Custom
                    Hostnames. For example, a zone hold on a zone with the
                    hostname 'example.com' and include_subdomains=true will
                    block 'example.com', 'staging.example.com',
                    'api.staging.example.com', etc."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  hold:
                    type: boolean
                  hold_after:
                    type: string
                  include_subdomains:
                    type: string
      x-distilled-response-path: result
    delete:
      operationId: deleteHold
      description: "Stop enforcement of a zone hold on the zone, permanently or
        temporarily, allowing the creation and activation of zones with this
        zone's hostname.  @example ```ts const zoneHold = await
        client.zones.holds.delete({ zone_id: '023e105f4ecef8ad9ca31a8372d0c353',
        }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: hold_after
          in: query
          required: false
          description: "Query param: If `hold_after` is provided, the hold will be
            temporarily disabled, then automatically re-enabled by the system at
            the time specified in this RFC3339-formatted timestamp. Otherwise,
            the hold will be disabled indefinitely."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  hold:
                    type: boolean
                  hold_after:
                    type: string
                  include_subdomains:
                    type: string
      x-distilled-response-path: result
