openapi: 3.1.0
info:
  title: Cloudflare ZONES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: zones
paths:
  /zones/{zone_id}/activation_check:
    put:
      operationId: triggerActivationCheck
      description: "Triggeres a new activation check for a PENDING Zone. This can be
        triggered every 5 min for paygo/ent customers, every hour for FREE
        Zones.  @example ```ts const response = await
        client.zones.activationCheck.trigger( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
      x-distilled-response-path: result
  /zones/{zone_id}/custom_ns:
    get:
      operationId: getCustomNameserver
      description: Get metadata for account-level custom nameservers on a
        zone.  Deprecated in favor of [Show DNS
        Settings](https://developers.cloudflare.com/api/operations/dns-settings-for-a-zone-list-dns-settings).  @deprecated
        Use [DNS settings
        API](https://developers.cloudflare.com/api/resources/dns/subresources/settings/methods/get/)
        instead.
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful.
                  enabled:
                    type: boolean
                    description: Whether zone uses account-level custom nameservers.
                  ns_set:
                    type: number
                    description: The number of the name server set to assign to the zone.
                  result_info:
                    type: object
                    properties:
                      count:
                        type: number
                        description: Total number of results for the requested service.
                      page:
                        type: number
                        description: Current page within paginated list of results.
                      per_page:
                        type: number
                        description: Number of results per page of results.
                      total_count:
                        type: number
                        description: Total results available without any search parameters.
                      total_pages:
                        type: number
                        description: The number of total pages in the entire result set.
                required:
                  - errors
                  - messages
                  - success
    put:
      operationId: putCustomNameserver
      description: Set metadata for account-level custom nameservers on a zone.  If
        you would like new zones in the account to use account custom
        nameservers by default, use PUT /accounts/:identifier to set the account
        setting use_account_custom_ns_by_default to true.  Deprecated in favor
        of [Update DNS
        Settings](https://developers.cloudflare.com/api/operations/dns-settings-for-a-zone-update-dns-settings).  @deprecated
        Use [DNS settings
        API](https://developers.cloudflare.com/api/resources/dns/subresources/settings/methods/put/)
        instead.
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: "Body param: Whether zone uses account-level custom nameservers."
                ns_set:
                  type: number
                  description: "Body param: The number of the name server set to assign to the
                    zone."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
      x-distilled-pagination-class: CustomNameserverUpdateResponsesSinglePage
  /zones/{zone_id}/environments:
    get:
      operationId: listEnvironments
      description: "List zone environments  @example ```ts const environments = await
        client.zones.environments.list({ zone_id: 'zone_id', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier of the zone.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments:
                    type: array
                    items:
                      type: object
                      properties:
                        expression:
                          type: string
                        locked_on_deployment:
                          oneOf:
                            - type: boolean
                          nullable: true
                        name:
                          type: string
                        position:
                          type: object
                          properties:
                            after:
                              type: string
                            before:
                              type: string
                        ref:
                          type: string
                        version:
                          oneOf:
                            - type: number
                          nullable: true
                        http_application_id:
                          oneOf:
