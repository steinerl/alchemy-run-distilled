                          before:
                            type: string
                      ref:
                        type: string
                      version:
                        oneOf:
                          - type: number
                        nullable: true
                      http_application_id:
                        oneOf:
                          - type: string
                        nullable: true
                    required:
                      - expression
                      - locked_on_deployment
                      - name
                      - position
                      - ref
                      - version
                  description: Body param
              required:
                - environments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments:
                    type: array
                    items:
                      type: object
                      properties:
                        expression:
