openapi: 3.1.0
info:
  title: Cloudflare NETWORK-INTERCONNECTS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: network-interconnects
paths:
  /accounts/{account_id}/cni/cnis/{cni}:
    get:
      operationId: getCni
      description: "Get information about a CNI object  @example ```ts const cni =
        await client.networkInterconnects.cnis.get(
        '182bd5e5-6e1a-4fe4-a799-aa6d9a6ab26e', { account_id: 'account_id' }, );
        ```"
      parameters:
        - name: cni
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Customer account tag
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  account:
                    type: string
                    description: Customer account tag
                  cust_ip:
                    type: string
                    description: Customer end of the point-to-point link  This should always be
                      inside the same prefix as `p2p_ip`.
                  interconnect:
                    type: string
                    description: Interconnect identifier hosting this CNI
                  magic:
                    type: object
                    properties:
                      conduit_name:
                        type: string
                      description:
                        type: string
                      mtu:
                        type: number
                    required:
                      - conduit_name
                      - description
                      - mtu
                  p2p_ip:
                    type: string
                    description: Cloudflare end of the point-to-point link
                  bgp:
                    type: object
                    properties:
                      customer_asn:
                        type: number
                        description: ASN used on the customer end of the BGP session
                      extra_prefixes:
                        type: array
                        items:
                          type: string
                        description: Extra set of static prefixes to advertise to the customer's end of
                          the session
                      md5_key:
                        oneOf:
                          - type: string
                        nullable: true
                        description: "MD5 key to use for session authentication.  Note that _this is not
                          a security measure_. MD5 is not a valid security
                          mechanism, and the key is not treated as a secret
                          value. This is _only_ supported for preventing
                          misconfiguration, not for defending against malicious
                          attacks.  The MD5 key, if set, must be of non-zero
                          length and consist only of the following types of
                          character:  - ASCII alphanumerics: `[a-zA-Z0-9]` -
                          Special characters in the set `'!@#$%^&
                          ()+[]{}<>/.,;:_-~`= \\|`  In other words, MD5 keys may
                          contain any printable ASCII character aside from
                          newline (0x0A), quotation mark (`\"`), vertical tab
                          (0x0B), carriage return (0x0D), tab (0x09), form feed
                          (0x0C), and the question mark (`?`). Requests
                          specifying an MD5 key with one or more of these
                          disallowed characters will be rejected."
                    required:
                      - customer_asn
                      - extra_prefixes
                required:
                  - id
                  - account
                  - cust_ip
                  - interconnect
                  - magic
                  - p2p_ip
    put:
