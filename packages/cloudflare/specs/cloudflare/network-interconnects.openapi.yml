                        Special characters in the set `'!@#$%^&
                        ()+[]{}<>/.,;:_-~`= \\|`  In other words, MD5 keys may
                        contain any printable ASCII character aside from newline
                        (0x0A), quotation mark (`\"`), vertical tab (0x0B),
                        carriage return (0x0D), tab (0x09), form feed (0x0C),
                        and the question mark (`?`). Requests specifying an MD5
                        key with one or more of these disallowed characters will
                        be rejected."
                  required:
                    - customer_asn
                    - extra_prefixes
                  description: Body param
              required:
                - id
                - account
                - cust_ip
                - interconnect
                - magic
                - p2p_ip
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  account:
                    type: string
                    description: Customer account tag
                  cust_ip:
                    type: string
                    description: Customer end of the point-to-point link  This should always be
                      inside the same prefix as `p2p_ip`.
                  interconnect:
                    type: string
                    description: Interconnect identifier hosting this CNI
                  magic:
                    type: object
                    properties:
                      conduit_name:
                        type: string
                      description:
                        type: string
                      mtu:
                        type: number
                    required:
                      - conduit_name
                      - description
                      - mtu
                  p2p_ip:
                    type: string
                    description: Cloudflare end of the point-to-point link
                  bgp:
                    type: object
                    properties:
                      customer_asn:
