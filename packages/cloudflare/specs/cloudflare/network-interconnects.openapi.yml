    get:
      operationId: listInterconnects
      description: "List existing interconnects  @example ```ts const interconnects =
        await client.networkInterconnects.interconnects.list({ account_id:
        'account_id', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Customer account tag"
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Query param
          schema:
            oneOf:
              - type: number
            nullable: true
        - name: limit
          in: query
          required: false
          description: Query param
          schema:
            oneOf:
              - type: number
            nullable: true
        - name: site
          in: query
          required: false
          description: "Query param: If specified, only show interconnects located at the
            given site"
          schema:
            oneOf:
              - type: string
            nullable: true
        - name: type
          in: query
          required: false
          description: "Query param: If specified, only show interconnects of the given
            type"
          schema:
            oneOf:
              - type: string
            nullable: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            account:
                              type: string
                            facility:
                              type: object
                              properties:
                                address:
                                  type: array
                                  items:
