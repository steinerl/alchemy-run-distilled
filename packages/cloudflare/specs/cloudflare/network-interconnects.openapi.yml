  /accounts/{account_id}/cni/interconnects/{icon}:
    get:
      operationId: getInterconnect
      description: "Get information about an interconnect object  @example ```ts const
        interconnect = await client.networkInterconnects.interconnects.get(
        'icon', { account_id: 'account_id' }, ); ```"
      parameters:
        - name: icon
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Customer account tag
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      account:
                        type: string
                      facility:
                        type: object
                        properties:
                          address:
                            type: array
                            items:
                              type: string
                          name:
                            type: string
                        required:
                          - address
                          - name
                      name:
                        type: string
                      site:
                        type: string
                        description: A Cloudflare site name.
                      slot_id:
                        type: string
                      speed:
                        type: string
                      type:
                        type: string
                      owner:
                        type: string
                    required:
                      - account
                      - facility
                      - name
                      - site
                      - slot_id
                      - speed
                      - type
                  - type: object
                    properties:
                      account:
                        type: string
                      name:
                        type: string
                      region:
                        type: string
                      type:
                        type: string
                      owner:
                        type: string
                      speed:
                        type: string
                        enum:
                          - 50M
                          - 100M
                          - 200M
                          - 300M
                          - 400M
                          - 500M
                          - 1G
                          - 2G
                          - 5G
                          - 10G
                          - 20G
                          - 50G
                        description: Bandwidth structure as visible through the customer-facing API.
                    required:
                      - account
                      - name
                      - region
                      - type
    delete:
      operationId: deleteInterconnect
      description: "Delete an interconnect object  @example ```ts await
        client.networkInterconnects.interconnects.delete( 'icon', { account_id:
        'account_id' }, ); ```"
      parameters:
        - name: icon
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
