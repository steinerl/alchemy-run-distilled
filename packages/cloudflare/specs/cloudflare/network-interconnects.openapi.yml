          description: "Path param: Customer account tag"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  description: Body param
                slot_id:
                  type: string
                  description: Body param
                type:
                  type: string
                  description: Body param
                speed:
                  oneOf:
                    - type: string
                  nullable: true
                  description: Body param
                bandwidth:
                  type: string
                  enum:
                    - 50M
                    - 100M
                    - 200M
                    - 300M
                    - 400M
                    - 500M
                    - 1G
                    - 2G
                    - 5G
                    - 10G
                    - 20G
                    - 50G
                  description: "Body param: Bandwidth structure as visible through the
