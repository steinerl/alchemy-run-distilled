                pairing_key:
                  type: string
                  description: "Body param: Pairing key provided by GCP"
              required:
                - account
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      account:
                        type: string
                      facility:
                        type: object
                        properties:
                          address:
                            type: array
                            items:
                              type: string
                          name:
                            type: string
                        required:
                          - address
                          - name
                      name:
                        type: string
                      site:
                        type: string
                        description: A Cloudflare site name.
                      slot_id:
                        type: string
                      speed:
                        type: string
                      type:
                        type: string
                      owner:
