openapi: 3.1.0
info:
  title: Cloudflare USER API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: user
paths:
  /user/audit_logs:
    get:
      operationId: listAuditLogs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: A string that uniquely identifies the audit log.
                  action:
                    type: object
                    properties:
                      result:
                        type: boolean
                        description: A boolean that indicates if the action attempted was successful.
                      type:
                        type: string
                        description: A short string that describes the action that was performed.
                  actor:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The ID of the actor that performed the action. If a user performed
                          the action, this will be their User ID.
                      email:
                        type: string
                        description: The email of the user that performed the action.
                      ip:
                        type: string
                        description: The IP address of the request that performed the action.
                      type:
                        type: string
                        enum:
                          - user
                          - admin
                          - Cloudflare
                        description: The type of actor, whether a User, Cloudflare Admin, or an
                          Automated System.
                  interface:
                    type: string
                    description: The source of the event.
                  metadata:
                    description: An object which can lend more context to the action being logged.
                      This is a flexible value and varies between different
                      actions.
                  newValue:
                    type: string
                    description: The new value of the resource that was modified.
                  oldValue:
                    type: string
                    description: The value of the resource before it was modified.
                  owner:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Identifier
                  resource:
                    type: object
                    properties:
                      id:
                        type: string
                        description: An identifier for the resource that was affected by the action.
                      type:
                        type: string
                        description: A short string that describes the resource that was affected by the
                          action.
                  when:
                    type: string
                    description: A UTC RFC3339 timestamp that specifies when the action being logged
                      occured.
      x-distilled-pagination-class: AuditLogsV4PagePaginationArray
  /user/billing/history:
    get:
      operationId: listBillingHistories
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Billing item identifier tag.
                  action:
                    type: string
                    description: The billing item action.
                  amount:
                    type: number
                    description: The amount associated with this billing item.
                  currency:
                    type: string
                    description: The monetary unit in which pricing information is displayed.
                  description:
                    type: string
                    description: The billing item description.
                  occurred_at:
                    type: string
                    description: When the billing item was created.
                  type:
                    type: string
                    description: The billing item type.
                  zone:
                    type: object
                    properties:
                      name:
                        type: string
                required:
                  - id
                  - action
                  - amount
                  - currency
                  - description
                  - occurred_at
                  - type
                  - zone
      x-distilled-pagination-class: BillingHistoriesV4PagePaginationArray
  /user/billing/profile:
    get:
      operationId: getBillingProfile
      description: Accesses your billing profile object.  @deprecated
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Billing item identifier tag.
                  account_type:
                    type: string
                  address:
                    type: string
                  address2:
                    type: string
                  balance:
                    type: string
                  card_expiry_month:
                    type: number
                  card_expiry_year:
                    type: number
                  card_number:
                    type: string
                  city:
                    type: string
                  company:
                    type: string
                  country:
                    type: string
                  created_on:
                    type: string
                  device_data:
                    type: string
                  edited_on:
                    type: string
                  enterprise_billing_email:
                    type: string
                  enterprise_primary_email:
                    type: string
                  first_name:
                    type: string
                  is_partner:
                    type: boolean
                  last_name:
                    type: string
                  next_bill_date:
                    type: string
                  payment_address:
                    type: string
                  payment_address2:
                    type: string
                  payment_city:
                    type: string
                  payment_country:
                    type: string
                  payment_email:
                    type: string
                  payment_first_name:
                    type: string
                  payment_gateway:
                    type: string
                  payment_last_name:
                    type: string
                  payment_nonce:
                    type: string
                  payment_state:
                    type: string
                  payment_zipcode:
                    type: string
                  primary_email:
                    type: string
                  state:
                    type: string
                  tax_id_type:
                    type: string
                  telephone:
                    type: string
                  use_legacy:
                    type: boolean
                  validation_code:
                    type: string
                  vat:
                    type: string
                  zipcode:
                    type: string
      x-distilled-response-path: result
  /user/invites/{inviteId}:
    get:
      operationId: getInvite
      description: Gets the details of an invitation.  @example ```ts const invite =
        await client.user.invites.get( '4f5f0c14a2a41d5063dd301b2f829f04', );
        ```
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  invited_member_id:
                    oneOf:
                      - type: string
                    nullable: true
                    description: ID of the user to add to the organization.
                  organization_id:
                    type: string
                    description: ID of the organization the user will be added to.
                  id:
                    type: string
                    description: Invite identifier tag.
                  expires_on:
                    type: string
                    description: When the invite is no longer active.
                  invited_by:
                    type: string
                    description: The email address of the user who created the invite.
                  invited_member_email:
                    type: string
                    description: Email address of the user to add to the organization.
                  invited_on:
                    type: string
                    description: When the invite was sent.
                  organization_is_enforcing_twofactor:
                    type: boolean
                  organization_name:
                    type: string
                    description: Organization name.
                  roles:
                    type: array
                    items:
                      type: string
                    description: List of role names the membership has for this account.
                  status:
                    type: string
                    enum:
                      - pending
                      - accepted
                      - rejected
                      - expired
                    description: Current status of the invitation.
                required:
                  - invited_member_id
                  - organization_id
      x-distilled-response-path: result
    patch:
      operationId: patchInvite
      description: "Responds to an invitation.  @example ```ts const invite = await
        client.user.invites.edit( '4f5f0c14a2a41d5063dd301b2f829f04', { status:
        'accepted' }, ); ```"
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - accepted
                    - rejected
                  description: Status of your response to the invitation (rejected or accepted).
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  invited_member_id:
                    oneOf:
                      - type: string
                    nullable: true
                    description: ID of the user to add to the organization.
                  organization_id:
                    type: string
                    description: ID of the organization the user will be added to.
                  id:
                    type: string
                    description: Invite identifier tag.
                  expires_on:
                    type: string
                    description: When the invite is no longer active.
                  invited_by:
                    type: string
                    description: The email address of the user who created the invite.
                  invited_member_email:
                    type: string
                    description: Email address of the user to add to the organization.
                  invited_on:
                    type: string
                    description: When the invite was sent.
                  organization_is_enforcing_twofactor:
                    type: boolean
                  organization_name:
                    type: string
                    description: Organization name.
                  roles:
                    type: array
                    items:
                      type: string
                    description: List of role names the membership has for this account.
                  status:
                    type: string
                    enum:
                      - pending
                      - accepted
                      - rejected
                      - expired
                    description: Current status of the invitation.
                required:
                  - invited_member_id
                  - organization_id
      x-distilled-response-path: result
  /user/invites:
    get:
      operationId: listInvites
      description: Lists all invitations associated with my user.  @example ```ts //
        Automatically fetches more pages as needed. for await (const invite of
        client.user.invites.list()) { // ... } ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  invited_member_id:
                    oneOf:
                      - type: string
                    nullable: true
                    description: ID of the user to add to the organization.
                  organization_id:
                    type: string
                    description: ID of the organization the user will be added to.
                  id:
                    type: string
                    description: Invite identifier tag.
                  expires_on:
                    type: string
                    description: When the invite is no longer active.
                  invited_by:
                    type: string
                    description: The email address of the user who created the invite.
                  invited_member_email:
                    type: string
                    description: Email address of the user to add to the organization.
                  invited_on:
                    type: string
                    description: When the invite was sent.
                  organization_is_enforcing_twofactor:
                    type: boolean
                  organization_name:
                    type: string
                    description: Organization name.
                  roles:
                    type: array
                    items:
                      type: string
                    description: List of role names the membership has for this account.
                  status:
                    type: string
                    enum:
                      - pending
                      - accepted
                      - rejected
                      - expired
                    description: Current status of the invitation.
                required:
                  - invited_member_id
                  - organization_id
      x-distilled-pagination-class: InvitesSinglePage
  /user/organizations/{organizationId}:
    get:
      operationId: getOrganization
      description: Gets a specific organization the user is associated with.  @deprecated
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
    delete:
      operationId: deleteOrganization
      description: Removes association to an organization.  @deprecated
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
  /user/organizations:
    get:
      operationId: listOrganizations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                  name:
                    type: string
                    description: Organization name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Access permissions for this User.
                  roles:
                    type: array
                    items:
                      type: string
                    description: List of roles that a user has within an organization.
                  status:
                    type: string
                    enum:
                      - member
                      - invited
                    description: Whether the user is a member of the organization or has an
                      invitation pending.
      x-distilled-pagination-class: OrganizationsV4PagePaginationArray
  /user/subscriptions:
    get:
      operationId: getSubscription
      description: Lists all of a user's subscriptions.  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        subscription of client.user.subscriptions.get()) { // ... } ```
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Subscription identifier tag.
                  currency:
                    type: string
                    description: The monetary unit in which pricing information is displayed.
                  current_period_end:
                    type: string
                    description: The end of the current period and also when the next billing is
                      due.
                  current_period_start:
                    type: string
                    description: When the current billing period started. May match
                      initial_period_start if this is the first period.
                  frequency:
                    type: string
                    enum:
                      - weekly
                      - monthly
                      - quarterly
                      - yearly
                    description: How often the subscription is renewed automatically.
                  price:
                    type: number
                    description: The price of the subscription that will be billed, in US dollars.
                  rate_plan:
                    type: object
                    properties:
                      id:
                        type: string
                        enum:
                          - free
                          - lite
                          - pro
                          - pro_plus
                          - business
                          - enterprise
                          - partners_free
                          - partners_pro
                          - partners_business
                          - partners_enterprise
                        description: The ID of the rate plan.
                      currency:
                        type: string
                        description: The currency applied to the rate plan subscription.
                      externally_managed:
                        type: boolean
                        description: Whether this rate plan is managed externally from Cloudflare.
                      is_contract:
                        type: boolean
                        description: Whether a rate plan is enterprise-based (or newly adopted term
                          contract).
                      public_name:
                        type: string
                        description: The full name of the rate plan.
                      scope:
                        type: string
                        description: The scope that this rate plan applies to.
                      sets:
                        type: array
                        items:
                          type: string
                        description: The list of sets this rate plan applies to. Returns array of
                          strings.
                    description: The rate plan applied to the subscription.
                  state:
                    type: string
                    enum:
                      - Trial
                      - Provisioned
                      - Paid
                      - AwaitingPayment
                      - Cancelled
                      - Failed
                      - Expired
                    description: The state that the subscription is in.
      x-distilled-pagination-class: SubscriptionsSinglePage
  /user/subscriptions/{identifier}:
    put:
      operationId: putSubscription
      description: Updates a user's subscriptions.  @example ```ts const subscription
        = await client.user.subscriptions.update(
        '506e3185e9c882d175a2d0cb0093d9f2', ); ```
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                frequency:
                  type: string
                  enum:
                    - weekly
                    - monthly
                    - quarterly
                    - yearly
                  description: How often the subscription is renewed automatically.
                rate_plan:
                  type: object
                  properties:
                    id:
                      type: string
                      enum:
                        - free
                        - lite
                        - pro
                        - pro_plus
                        - business
                        - enterprise
                        - partners_free
                        - partners_pro
                        - partners_business
                        - partners_enterprise
                      description: The ID of the rate plan.
                    currency:
                      type: string
                      description: The currency applied to the rate plan subscription.
                    externally_managed:
                      type: boolean
                      description: Whether this rate plan is managed externally from Cloudflare.
                    is_contract:
                      type: boolean
                      description: Whether a rate plan is enterprise-based (or newly adopted term
                        contract).
                    public_name:
                      type: string
                      description: The full name of the rate plan.
                    scope:
                      type: string
                      description: The scope that this rate plan applies to.
                    sets:
                      type: array
                      items:
                        type: string
                      description: The list of sets this rate plan applies to. Returns array of
                        strings.
                  description: The rate plan applied to the subscription.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
    delete:
      operationId: deleteSubscription
      description: Deletes a user's subscription.  @example ```ts const subscription =
        await client.user.subscriptions.delete(
        '506e3185e9c882d175a2d0cb0093d9f2', ); ```
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription_id:
                    type: string
                    description: Subscription identifier tag.
  /user/tokens/{tokenId}:
    get:
      operationId: getToken
      description: Get information about a specific token.  @example ```ts const token
        = await client.user.tokens.get( 'ed17574386854bf78a67040be0a770b0', );
        ```
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Token identifier tag.
                  condition:
                    type: object
                    properties:
                      request_ip:
                        type: object
                        properties:
                          in:
                            type: array
                            items:
                              type: string
                            description: List of IPv4/IPv6 CIDR addresses.
                          not_in:
                            type: array
                            items:
                              type: string
                            description: List of IPv4/IPv6 CIDR addresses.
                        description: Client IP restrictions.
                  expires_on:
                    type: string
                    description: The expiration time on or after which the JWT MUST NOT be accepted
                      for processing.
                  issued_on:
                    type: string
                    description: The time on which the token was created.
                  last_used_on:
                    type: string
                    description: Last time the token was used.
                  modified_on:
                    type: string
                    description: Last time the token was modified.
                  name:
                    type: string
                    description: Token name.
                  not_before:
                    type: string
                    description: The time before which the token MUST NOT be accepted for
                      processing.
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Policy identifier.
                        effect:
                          type: string
                          enum:
                            - allow
                            - deny
                          description: Allow or deny operations against the resources.
                        permission_groups:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Identifier of the permission group.
                              meta:
                                type: object
                                properties:
                                  key:
                                    type: string
                                  value:
                                    type: string
                                description: Attributes associated to the permission group.
                              name:
                                type: string
                                description: Name of the permission group.
                            required:
                              - id
                          description: A set of permission groups that are specified to the policy.
                        resources:
                          type: object
                          additionalProperties: true
                          description: A list of resource names that the policy applies to.
                      required:
                        - id
                        - effect
                        - permission_groups
                        - resources
                    description: List of access policies assigned to the token.
                  status:
                    type: string
                    enum:
                      - active
                      - disabled
                      - expired
                    description: Status of the token.
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        TokenNotFound:
          - code: 1003
    put:
      operationId: updateToken
      description: "Update an existing token.  @example ```ts const token = await
        client.user.tokens.update( 'ed17574386854bf78a67040be0a770b0', { name:
        'readonly token', policies: [ { effect: 'allow', permission_groups: [ {
        id: 'c8fed203ed3043cba015a93ad1616f1f' }, { id:
        '82e64a83756745bbbb1c9c2701bf816b' }, ], resources: { foo: 'string' },
        }, ], }, ); ```"
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Token name.
                policies:
                  type: array
                  items:
                    type: object
                    properties:
                      effect:
                        type: string
                        enum:
                          - allow
                          - deny
                        description: Allow or deny operations against the resources.
                      permission_groups:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: Identifier of the permission group.
                            meta:
                              type: object
                              properties:
                                key:
                                  type: string
                                value:
                                  type: string
                              description: Attributes associated to the permission group.
                          required:
                            - id
                        description: A set of permission groups that are specified to the policy.
                      resources:
                        type: object
                        additionalProperties: true
                        description: A list of resource names that the policy applies to.
                    required:
                      - effect
                      - permission_groups
                      - resources
                  description: List of access policies assigned to the token.
                condition:
                  type: object
                  properties:
                    request_ip:
                      type: object
                      properties:
                        in:
                          type: array
                          items:
                            type: string
                          description: List of IPv4/IPv6 CIDR addresses.
                        not_in:
                          type: array
                          items:
                            type: string
                          description: List of IPv4/IPv6 CIDR addresses.
                      description: Client IP restrictions.
                expires_on:
                  type: string
                  description: The expiration time on or after which the JWT MUST NOT be accepted
                    for processing.
                not_before:
                  type: string
                  description: The time before which the token MUST NOT be accepted for
                    processing.
                status:
                  type: string
                  enum:
                    - active
                    - disabled
                    - expired
                  description: Status of the token.
              required:
                - name
                - policies
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Token identifier tag.
                  condition:
                    type: object
                    properties:
                      request_ip:
                        type: object
                        properties:
                          in:
                            type: array
                            items:
                              type: string
                            description: List of IPv4/IPv6 CIDR addresses.
                          not_in:
                            type: array
                            items:
                              type: string
                            description: List of IPv4/IPv6 CIDR addresses.
                        description: Client IP restrictions.
                  expires_on:
                    type: string
                    description: The expiration time on or after which the JWT MUST NOT be accepted
                      for processing.
                  issued_on:
                    type: string
                    description: The time on which the token was created.
                  last_used_on:
                    type: string
                    description: Last time the token was used.
                  modified_on:
                    type: string
                    description: Last time the token was modified.
                  name:
                    type: string
                    description: Token name.
                  not_before:
                    type: string
                    description: The time before which the token MUST NOT be accepted for
                      processing.
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Policy identifier.
                        effect:
                          type: string
                          enum:
                            - allow
                            - deny
                          description: Allow or deny operations against the resources.
                        permission_groups:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Identifier of the permission group.
                              meta:
                                type: object
                                properties:
                                  key:
                                    type: string
                                  value:
                                    type: string
                                description: Attributes associated to the permission group.
                              name:
                                type: string
                                description: Name of the permission group.
                            required:
                              - id
                          description: A set of permission groups that are specified to the policy.
                        resources:
                          type: object
                          additionalProperties: true
                          description: A list of resource names that the policy applies to.
                      required:
                        - id
                        - effect
                        - permission_groups
                        - resources
                    description: List of access policies assigned to the token.
                  status:
                    type: string
                    enum:
                      - active
                      - disabled
                      - expired
                    description: Status of the token.
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        MethodNotAllowed:
          - code: 7001
        TokenNotFound:
          - code: 1003
        PermissionGroupNotFound:
          - code: 1001
            message:
              includes: Permission group
    delete:
      operationId: deleteToken
      description: Destroy a token.  @example ```ts const token = await
        client.user.tokens.delete( 'ed17574386854bf78a67040be0a770b0', ); ```
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier
                required:
                  - id
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidRoute:
          - code: 7003
        MethodNotAllowed:
          - code: 7001
        TokenNotFound:
          - code: 1003
