                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - id
                      - asn
                      - created_on
                      - modified_on
      x-distilled-pagination-class: ItemListResponsesCursorPaginationAfter
      x-distilled-errors:
        ListNotFound:
          - code: 10001
        Forbidden:
          - status: 403
    post:
      operationId: createListItem
      description: "Appends new items to the list.  This operation is asynchronous. To
        get current the operation status, invoke the `Get bulk operation status`
        endpoint with the returned `operation_id`.  There is a limit of 1
        pending bulk operation per account. If an outstanding bulk operation is
        in progress, the request will be rejected.  @example ```ts const item =
        await client.rules.lists.items.create(
        '2c0fc9fa937b11eaa1b71c4d701ab86e', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', body: [{ ip: '10.0.0.1' }], }, );
        ```"
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID for this resource."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                oneOf:
                  - type: object
                    properties:
                      ip:
                        type: string
                        description: An IPv4 address, an IPv4 CIDR, an IPv6 address, or an IPv6 CIDR.
                      comment:
