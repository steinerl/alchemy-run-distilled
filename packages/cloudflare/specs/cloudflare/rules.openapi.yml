          description: "Path param: The Account ID for this resource."
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: "Query param: Amount of results to include in each paginated
            response. A non-negative 32 bit integer."
          schema:
            type: number
        - name: search
          in: query
          required: false
          description: "Query param: A search query to filter returned items. Its meaning
            depends on the list type: IP addresses must start with the provided
            string, hostnames and bulk redirects must contain the string, and
            ASNs must match the string exactly."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      id:
                        type: string
                        description: Defines the unique ID of the item in the List.
                      created_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was created.
                      ip:
                        type: string
                        description: An IPv4 address, an IPv4 CIDR, an IPv6 address, or an IPv6 CIDR.
                      modified_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was last modified.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - id
