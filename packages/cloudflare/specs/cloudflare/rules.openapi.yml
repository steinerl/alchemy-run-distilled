                              - 302
                              - 307
                              - 308
                          subpath_matching:
                            type: boolean
                        required:
                          - source_url
                          - target_url
                        description: The definition of the redirect.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - redirect
                  - type: object
                    properties:
                      hostname:
                        type: object
                        properties:
                          url_hostname:
                            type: string
                          exclude_exact_hostname:
                            type: boolean
                            description: Only applies to wildcard hostnames (e.g., \ .example.com). When
                              true (default), only subdomains are blocked. When
                              false, both the root domain and subdomains are
                              blocked.
                        required:
                          - url_hostname
                        description: Valid characters for hostnames are ASCII(7) letters from a to z,
                          the digits from 0 to 9, wildcards (\ ), and the hyphen
                          (-).
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - hostname
                  - type: object
                    properties:
                      asn:
                        type: number
                        description: Defines a non-negative 32 bit integer.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - asn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  operation_id:
                    type: string
                    description: The unique operation ID of the asynchronous action.
                required:
                  - operation_id
      x-distilled-response-path: result
    put:
      operationId: updateListItem
      description: "Removes all existing items from the list and adds the provided
        items to the list.  This operation is asynchronous. To get current the
        operation status, invoke the `Get bulk operation status` endpoint with
        the returned `operation_id`.  There is a limit of 1 pending bulk
        operation per account. If an outstanding bulk operation is in progress,
        the request will be rejected.  @example ```ts const item = await
        client.rules.lists.items.update( '2c0fc9fa937b11eaa1b71c4d701ab86e', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', body: [{ ip: '10.0.0.1'
        }], }, ); ```"
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID for this resource."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                oneOf:
                  - type: object
                    properties:
