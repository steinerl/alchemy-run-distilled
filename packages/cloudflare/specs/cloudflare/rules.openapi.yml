      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Account ID for this resource.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      id:
                        type: string
                        description: Defines the unique ID of the item in the List.
                      created_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was created.
                      ip:
                        type: string
                        description: An IPv4 address, an IPv4 CIDR, an IPv6 address, or an IPv6 CIDR.
                      modified_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was last modified.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - id
                      - created_on
                      - ip
                      - modified_on
                  - type: object
                    properties:
                      id:
                        type: string
                        description: Defines the unique ID of the item in the List.
                      created_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was created.
                      hostname:
                        type: object
                        properties:
                          url_hostname:
                            type: string
                          exclude_exact_hostname:
                            type: boolean
                            description: Only applies to wildcard hostnames (e.g., \ .example.com). When
                              true (default), only subdomains are blocked. When
                              false, both the root domain and subdomains are
                              blocked.
                        required:
                          - url_hostname
                        description: Valid characters for hostnames are ASCII(7) letters from a to z,
                          the digits from 0 to 9, wildcards (\ ), and the hyphen
                          (-).
                      modified_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was last modified.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - id
                      - created_on
                      - hostname
                      - modified_on
                  - type: object
                    properties:
                      id:
                        type: string
                        description: Defines the unique ID of the item in the List.
                      created_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was created.
                      modified_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was last modified.
                      redirect:
                        type: object
                        properties:
                          source_url:
                            type: string
                          target_url:
                            type: string
                          include_subdomains:
                            type: boolean
                          preserve_path_suffix:
                            type: boolean
                          preserve_query_string:
                            type: boolean
                          status_code:
                            type: number
                            enum:
                              - 301
                              - 302
                              - 307
                              - 308
                          subpath_matching:
                            type: boolean
                        required:
                          - source_url
                          - target_url
                        description: The definition of the redirect.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - id
                      - created_on
                      - modified_on
                      - redirect
                  - type: object
                    properties:
                      id:
                        type: string
                        description: Defines the unique ID of the item in the List.
                      asn:
                        type: number
                        description: Defines a non-negative 32 bit integer.
                      created_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was created.
                      modified_on:
                        type: string
                        description: The RFC 3339 timestamp of when the list was last modified.
                      comment:
                        type: string
                        description: Defines an informative summary of the list item.
                    required:
                      - id
                      - asn
                      - created_on
                      - modified_on
      x-distilled-response-path: result
  /accounts/{account_id}/rules/lists/{listId}/items:
