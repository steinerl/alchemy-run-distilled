        itemListResponse of client.rules.lists.items.list(
        '2c0fc9fa937b11eaa1b71c4d701ab86e', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: listId
          in: path
