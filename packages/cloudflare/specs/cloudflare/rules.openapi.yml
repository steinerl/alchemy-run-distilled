openapi: 3.1.0
info:
  title: Cloudflare RULES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: rules
paths:
  /accounts/{account_id}/rules/lists/{listId}:
    get:
      operationId: getList
      description: "Fetches the details of a list.  @example ```ts const list = await
        client.rules.lists.get( '2c0fc9fa937b11eaa1b71c4d701ab86e', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Account ID for this resource.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique ID of the list.
                  created_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was created.
                  kind:
                    type: string
                    enum:
                      - ip
                      - redirect
                      - hostname
                      - asn
                    description: The type of the list. Each type supports specific list items (IP
                      addresses, ASNs, hostnames or redirects).
                  modified_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was last modified.
                  name:
                    type: string
                    description: An informative name for the list. Use this name in filter and rule
                      expressions.
                  num_items:
                    type: number
                    description: The number of items in the list.
                  num_referencing_filters:
                    type: number
                    description: The number of [filters](/api/resources/filters/) referencing the
                      list.
                  description:
                    type: string
                    description: An informative summary of the list.
                required:
                  - id
                  - created_on
                  - kind
                  - modified_on
                  - name
                  - num_items
                  - num_referencing_filters
      x-distilled-response-path: result
      x-distilled-errors:
        ListNotFound:
          - code: 10001
        Forbidden:
          - status: 403
    put:
      operationId: updateList
      description: "Updates the description of a list.  @example ```ts const list =
        await client.rules.lists.update( '2c0fc9fa937b11eaa1b71c4d701ab86e', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID for this resource."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: "Body param: An informative summary of the list."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique ID of the list.
                  created_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was created.
                  kind:
                    type: string
                    enum:
                      - ip
                      - redirect
                      - hostname
                      - asn
                    description: The type of the list. Each type supports specific list items (IP
                      addresses, ASNs, hostnames or redirects).
                  modified_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was last modified.
                  name:
                    type: string
                    description: An informative name for the list. Use this name in filter and rule
                      expressions.
                  num_items:
                    type: number
                    description: The number of items in the list.
                  num_referencing_filters:
                    type: number
                    description: The number of [filters](/api/resources/filters/) referencing the
                      list.
                  description:
                    type: string
                    description: An informative summary of the list.
                required:
                  - id
                  - created_on
                  - kind
                  - modified_on
                  - name
                  - num_items
                  - num_referencing_filters
      x-distilled-response-path: result
      x-distilled-errors:
        ListNotFound:
          - code: 10001
        Forbidden:
          - status: 403
    delete:
      operationId: deleteList
      description: "Deletes a specific list and all its items.  @example ```ts const
        list = await client.rules.lists.delete(
        '2c0fc9fa937b11eaa1b71c4d701ab86e', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Account ID for this resource.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique ID of the list.
                required:
                  - id
      x-distilled-response-path: result
      x-distilled-errors:
        ListNotFound:
          - code: 10001
        Forbidden:
          - status: 403
  /accounts/{account_id}/rules/lists:
    get:
      operationId: listLists
      description: "Fetches all lists in the account.  @example ```ts // Automatically
        fetches more pages as needed. for await (const listsList of
        client.rules.lists.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', })) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: The Account ID for this resource.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique ID of the list.
                  created_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was created.
                  kind:
                    type: string
                    enum:
                      - ip
                      - redirect
                      - hostname
                      - asn
                    description: The type of the list. Each type supports specific list items (IP
