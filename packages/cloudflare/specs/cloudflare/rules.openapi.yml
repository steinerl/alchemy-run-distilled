                  num_items:
                    type: number
                    description: The number of items in the list.
                  num_referencing_filters:
                    type: number
                    description: The number of [filters](/api/resources/filters/) referencing the
                      list.
                  description:
                    type: string
                    description: An informative summary of the list.
                required:
                  - id
                  - created_on
                  - kind
                  - modified_on
                  - name
                  - num_items
                  - num_referencing_filters
      x-distilled-pagination-class: ListsListsSinglePage
      x-distilled-errors:
        Forbidden:
          - status: 403
    post:
      operationId: createList
      description: "Creates a new list of the specified kind.  @example ```ts const
        list = await client.rules.lists.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', kind: 'ip', name: 'list1', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID for this resource."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                    - ip
                    - redirect
                    - hostname
                    - asn
                  description: "Body param: The type of the list. Each type supports specific list
                    items (IP addresses, ASNs, hostnames or redirects)."
                name:
                  type: string
                  description: "Body param: An informative name for the list. Use this name in
                    filter and rule expressions."
                description:
                  type: string
                  description: "Body param: An informative summary of the list."
              required:
                - kind
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique ID of the list.
                  created_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was created.
                  kind:
                    type: string
                    enum:
                      - ip
                      - redirect
                      - hostname
                      - asn
                    description: The type of the list. Each type supports specific list items (IP
                      addresses, ASNs, hostnames or redirects).
                  modified_on:
                    type: string
                    description: The RFC 3339 timestamp of when the list was last modified.
                  name:
                    type: string
                    description: An informative name for the list. Use this name in filter and rule
                      expressions.
                  num_items:
                    type: number
                    description: The number of items in the list.
                  num_referencing_filters:
                    type: number
                    description: The number of [filters](/api/resources/filters/) referencing the
                      list.
                  description:
                    type: string
                    description: An informative summary of the list.
                required:
                  - id
                  - created_on
                  - kind
                  - modified_on
                  - name
                  - num_items
                  - num_referencing_filters
      x-distilled-response-path: result
      x-distilled-errors:
        ListAlreadyExists:
          - code: 10021
        Forbidden:
          - status: 403
  /accounts/{account_id}/rules/lists/bulk_operations/{operationId}:
    get:
      operationId: getListBulkOperation
      description: "Gets the current status of an asynchronous operation on a
        list.  The `status` property can have one of the following values:
        `pending`, `running`, `completed`, or `failed`. If the status is
        `failed`, the `error` property will contain a message describing the
        error.  @example ```ts const bulkOperation = await
        client.rules.lists.bulkOperations.get(
        '4da8780eeb215e6cb7f48dd981c4ea02', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The Account ID for this resource.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      id:
                        type: string
                        description: The unique operation ID of the asynchronous action.
                      status:
                        type: string
                        enum:
                          - pending
                          - running
                        description: The current status of the asynchronous operation.
                    required:
                      - id
                      - status
                  - type: object
                    properties:
                      id:
                        type: string
                        description: The unique operation ID of the asynchronous action.
                      completed:
                        type: string
                        description: The RFC 3339 timestamp of when the operation was completed.
                      status:
                        type: string
                        enum:
                          - completed
                        description: The current status of the asynchronous operation.
                    required:
                      - id
                      - completed
                      - status
                  - type: object
                    properties:
                      id:
                        type: string
                        description: The unique operation ID of the asynchronous action.
                      completed:
                        type: string
                        description: The RFC 3339 timestamp of when the operation was completed.
                      error:
                        type: string
                        description: A message describing the error when the status is `failed`.
                      status:
                        type: string
                        enum:
                          - failed
                        description: The current status of the asynchronous operation.
                    required:
                      - id
                      - completed
                      - error
                      - status
      x-distilled-response-path: result
      x-distilled-errors:
        ListNotFound:
          - code: 10001
        Forbidden:
          - status: 403
  /accounts/{account_id}/rules/lists/{listId}/items/{itemId}:
    get:
      operationId: getListItem
      description: "Fetches a list item in the list.  @example ```ts const item =
        await client.rules.lists.items.get( '2c0fc9fa937b11eaa1b71c4d701ab86e',
