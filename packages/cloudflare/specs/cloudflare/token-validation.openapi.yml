                                  description: Curve
                                kid:
                                  type: string
                                  description: Key ID
                                kty:
                                  type: string
                                  enum:
                                    - EC
                                  description: Key Type
                                x:
                                  type: string
                                  description: X EC coordinate
                                y:
                                  type: string
                                  description: Y EC coordinate
                              required:
                                - alg
                                - crv
                                - kid
                                - kty
                                - x
                                - y
                    required:
                      - keys
                  description:
                    type: string
                  last_updated:
                    type: string
                  title:
                    type: string
                  token_sources:
                    type: array
                    items:
                      type: string
                  token_type:
                    type: string
                    enum:
                      - JWT
                required:
                  - id
                  - created_at
                  - credentials
                  - description
                  - last_updated
                  - title
                  - token_sources
                  - token_type
