  /zones/{zone_id}/token_validation/config/{configId}:
    get:
      operationId: getConfiguration
      description: "Get a single Token Configuration  @example ```ts const tokenConfig
        = await client.tokenValidation.configuration.get(
        '4a7ee8d3-dd63-4ceb-9d5f-c27831854ce7', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: configId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID.
                  created_at:
                    type: string
                  credentials:
                    type: object
                    properties:
                      keys:
                        type: array
                        items:
                          oneOf:
                            - type: object
                              properties:
                                alg:
                                  type: string
                                  enum:
                                    - RS256
