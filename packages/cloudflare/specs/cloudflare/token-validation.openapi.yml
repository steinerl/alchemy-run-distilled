  /zones/{zone_id}/token_validation/rules/{ruleId}:
    get:
      operationId: getRule
      description: "Get a zone token validation rule.  @example ```ts const
        tokenValidationRule = await client.tokenValidation.rules.get(
        '4a7ee8d3-dd63-4ceb-9d5f-c27831854ce7', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum:
                      - log
                      - block
                    description: Action to take on requests that match operations included in
                      `selector` and fail `expression`.
                  description:
                    type: string
                    description: A human-readable description that gives more details than `title`.
                  enabled:
                    type: boolean
                    description: Toggle rule on or off.
                  expression:
                    type: string
                    description: Rule expression. Requests that fail to match this expression will
                      be subject to `action`.  For details on expressions, see
                      the [Cloudflare
                      Docs](https://developers.cloudflare.com/api-shield/security/jwt-validation/).
                  selector:
                    type: object
                    properties:
                      exclude:
                        oneOf:
                          - type: array
