openapi: 3.1.0
info:
  title: Cloudflare RUM API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: rum
paths:
  /accounts/{account_id}/rum/v2/{rulesetId}/rules:
    get:
      operationId: listRules
      description: "Lists all the rules in a Web Analytics ruleset.  @example ```ts
        const rules = await client.rum.rules.list(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: rulesetId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The Web Analytics rule identifier.
                        created:
                          type: string
                        host:
                          type: string
                          description: The hostname the rule will be applied to.
                        inclusive:
                          type: boolean
                          description: Whether the rule includes or excludes traffic from being measured.
                        is_paused:
                          type: boolean
                          description: Whether the rule is paused or not.
                        paths:
                          type: array
                          items:
                            type: string
                          description: The paths the rule will be applied to.
                        priority:
                          type: number
                    description: A list of rules.
                  ruleset:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The Web Analytics ruleset identifier.
                      enabled:
                        type: boolean
                        description: Whether the ruleset is enabled.
                      zone_name:
                        type: string
                      zone_tag:
                        type: string
                        description: The zone identifier.
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
        RulesetNotFound:
          - status: 404
    post:
      operationId: bulkCreateRules
      description: "Modifies one or more rules in a Web Analytics ruleset with a
        single request.  @example ```ts const response = await
        client.rum.rules.bulkCreate( 'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: rulesetId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                delete_rules:
                  type: array
                  items:
                    type: string
                  description: "Body param: A list of rule identifiers to delete."
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The Web Analytics rule identifier.
                      host:
                        type: string
                      inclusive:
                        type: boolean
                      is_paused:
                        type: boolean
                      paths:
                        type: array
                        items:
                          type: string
                  description: "Body param: A list of rules to create or update."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The Web Analytics rule identifier.
                        created:
                          type: string
                        host:
                          type: string
                          description: The hostname the rule will be applied to.
                        inclusive:
                          type: boolean
                          description: Whether the rule includes or excludes traffic from being measured.
                        is_paused:
                          type: boolean
                          description: Whether the rule is paused or not.
                        paths:
                          type: array
                          items:
                            type: string
                          description: The paths the rule will be applied to.
                        priority:
                          type: number
                    description: A list of rules.
                  ruleset:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The Web Analytics ruleset identifier.
                      enabled:
                        type: boolean
                        description: Whether the ruleset is enabled.
                      zone_name:
                        type: string
                      zone_tag:
                        type: string
                        description: The zone identifier.
      x-distilled-response-path: result
  /accounts/{account_id}/rum/v2/{rulesetId}/rule:
    post:
      operationId: createRule
      description: "Creates a new rule in a Web Analytics ruleset.  @example ```ts
        const rumRule = await client.rum.rules.create(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: rulesetId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                  description: Body param
                inclusive:
                  type: boolean
                  description: "Body param: Whether the rule includes or excludes traffic from
                    being measured."
                is_paused:
                  type: boolean
                  description: "Body param: Whether the rule is paused or not."
                paths:
                  type: array
                  items:
                    type: string
                  description: Body param
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The Web Analytics rule identifier.
                  created:
                    type: string
                  host:
                    type: string
                    description: The hostname the rule will be applied to.
                  inclusive:
                    type: boolean
                    description: Whether the rule includes or excludes traffic from being measured.
                  is_paused:
                    type: boolean
                    description: Whether the rule is paused or not.
                  paths:
                    type: array
                    items:
                      type: string
                    description: The paths the rule will be applied to.
                  priority:
                    type: number
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
        RulesetNotFound:
          - status: 404
        MaxRulesExceeded:
          - status: 409
            message:
              includes: maxRulesError
  /accounts/{account_id}/rum/v2/{rulesetId}/rule/{ruleId}:
    put:
      operationId: updateRule
      description: "Updates a rule in a Web Analytics ruleset.  @example ```ts const
        rumRule = await client.rum.rules.update(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415',
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: rulesetId
          in: path
          required: true
          schema:
            type: string
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                  description: Body param
                inclusive:
                  type: boolean
                  description: "Body param: Whether the rule includes or excludes traffic from
                    being measured."
                is_paused:
                  type: boolean
                  description: "Body param: Whether the rule is paused or not."
                paths:
                  type: array
                  items:
                    type: string
                  description: Body param
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The Web Analytics rule identifier.
                  created:
                    type: string
                  host:
                    type: string
                    description: The hostname the rule will be applied to.
                  inclusive:
                    type: boolean
                    description: Whether the rule includes or excludes traffic from being measured.
                  is_paused:
                    type: boolean
                    description: Whether the rule is paused or not.
                  paths:
                    type: array
                    items:
                      type: string
                    description: The paths the rule will be applied to.
                  priority:
                    type: number
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
        RulesetNotFound:
          - status: 404
    delete:
      operationId: deleteRule
      description: "Deletes an existing rule from a Web Analytics ruleset.  @example
        ```ts const rule = await client.rum.rules.delete(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415',
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: rulesetId
          in: path
          required: true
          schema:
            type: string
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The Web Analytics rule identifier.
      x-distilled-response-path: result
      x-distilled-errors:
        Forbidden:
          - status: 403
        RulesetNotFound:
          - status: 404
        RuleNotFound:
          - code: 10003
  /accounts/{account_id}/rum/site_info/{siteId}:
    get:
      operationId: getSiteInfo
      description: "Retrieves a Web Analytics site.  @example ```ts const site = await
        client.rum.siteInfo.get( '023e105f4ecef8ad9ca31a8372d0c353', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  auto_install:
                    type: boolean
                    description: If enabled, the JavaScript snippet is automatically injected for
                      orange-clouded sites.
                  created:
                    type: string
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The Web Analytics rule identifier.
                        created:
                          type: string
                        host:
                          type: string
                          description: The hostname the rule will be applied to.
                        inclusive:
                          type: boolean
                          description: Whether the rule includes or excludes traffic from being measured.
                        is_paused:
                          type: boolean
                          description: Whether the rule is paused or not.
                        paths:
                          type: array
                          items:
                            type: string
                          description: The paths the rule will be applied to.
                        priority:
                          type: number
                    description: A list of rules.
                  ruleset:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The Web Analytics ruleset identifier.
                      enabled:
                        type: boolean
                        description: Whether the ruleset is enabled.
                      zone_name:
                        type: string
                      zone_tag:
                        type: string
                        description: The zone identifier.
                  site_tag:
                    type: string
                    description: The Web Analytics site identifier.
                  site_token:
                    type: string
                    description: The Web Analytics site token.
                  snippet:
                    type: string
                    description: Encoded JavaScript snippet.
                  host:
                    type: string
      x-distilled-response-path: result
      x-distilled-errors:
        SiteNotFound:
          - code: 10015
        Forbidden:
          - status: 403
    put:
      operationId: updateSiteInfo
      description: "Updates an existing Web Analytics site.  @example ```ts const site
        = await client.rum.siteInfo.update( '023e105f4ecef8ad9ca31a8372d0c353',
        { account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                auto_install:
                  type: boolean
                  description: "Body param: If enabled, the JavaScript snippet is automatically
                    injected for orange-clouded sites."
                enabled:
                  type: boolean
                  description: "Body param: Enables or disables RUM. This option can be used only
                    when auto_install is set to true."
                host:
                  type: string
                  description: "Body param: The hostname to use for gray-clouded sites."
                lite:
                  type: boolean
                  description: "Body param: If enabled, the JavaScript snippet will not be
                    injected for visitors from the EU."
                zone_tag:
                  type: string
                  description: "Body param: The zone identifier."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  auto_install:
                    type: boolean
                    description: If enabled, the JavaScript snippet is automatically injected for
                      orange-clouded sites.
                  created:
                    type: string
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The Web Analytics rule identifier.
                        created:
                          type: string
                        host:
                          type: string
                          description: The hostname the rule will be applied to.
                        inclusive:
                          type: boolean
                          description: Whether the rule includes or excludes traffic from being measured.
                        is_paused:
                          type: boolean
                          description: Whether the rule is paused or not.
                        paths:
                          type: array
                          items:
                            type: string
                          description: The paths the rule will be applied to.
                        priority:
                          type: number
                    description: A list of rules.
                  ruleset:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The Web Analytics ruleset identifier.
                      enabled:
                        type: boolean
                        description: Whether the ruleset is enabled.
                      zone_name:
                        type: string
                      zone_tag:
                        type: string
                        description: The zone identifier.
                  site_tag:
                    type: string
                    description: The Web Analytics site identifier.
                  site_token:
                    type: string
                    description: The Web Analytics site token.
                  snippet:
                    type: string
                    description: Encoded JavaScript snippet.
                  host:
                    type: string
      x-distilled-response-path: result
      x-distilled-errors:
        SiteNotFound:
          - code: 10015
        Forbidden:
          - status: 403
    delete:
      operationId: deleteSiteInfo
      description: "Deletes an existing Web Analytics site.  @example ```ts const
        siteInfo = await client.rum.siteInfo.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  site_tag:
                    type: string
                    description: The Web Analytics site identifier.
      x-distilled-response-path: result
      x-distilled-errors:
        SiteNotFound:
          - code: 10015
        Forbidden:
          - status: 403
  /accounts/{account_id}/rum/site_info/list:
    get:
      operationId: listSiteInfos
      description: "Lists all Web Analytics sites of an account.  @example ```ts //
        Automatically fetches more pages as needed. for await (const site of
        client.rum.siteInfo.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', })) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: order_by
          in: query
          required: false
          description: "Query param: The property used to sort the list of results."
          schema:
            type: string
            enum:
              - host
              - created
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
