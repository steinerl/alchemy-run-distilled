                      `queueingMethod`: The queueing method currently used by
                      the waiting room. It is
                      either  fifo  ,  random  ,  passthrough  , or  reject  .
                      13. `isFIFOQueue`: Boolean indicating if the waiting room
                      uses a FIFO (First-In-First-Out) queue. 14.
                      `isRandomQueue`: Boolean indicating if the waiting room
