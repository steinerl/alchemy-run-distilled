                      enabled or an event is prequeueing, users in the waiting
                      room will not be accepted to the origin. These users will
                      always see a waiting room page that refreshes
                      automatically. The valid queueing methods are:  1.
                      `fifo`  (default)  : First-In-First-Out queue where
                      customers gain access in the order they arrived. 2.
                      `random`: Random queue where customers gain access
                      randomly, regardless of arrival time. 3. `passthrough`:
                      Users will pass directly through the waiting room and into
                      the origin website. As a result, any configured limits
                      will not be respected while this is enabled. This method
                      can be used as an alternative to disabling a waiting room
                      (with `suspended`) so that analytics are still reported.
                      This can be used if you wish to allow all traffic
                      normally, but want to restrict traffic during a waiting
                      room event, or vice versa. 4. `reject`: Users will be
