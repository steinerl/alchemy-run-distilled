                      indicating if the waiting room uses a reject queue. 17.
                      `isEventActive`: Boolean indicating if an event is
                      currently occurring. Events are able to change a waiting
                      room's behavior during a specified period of time. For
                      additional information, look at the event properties
                      `prequeue_start_time`, `event_start_time`, and
                      `event_end_time` in the documentation for creating waiting
                      room events. Events are considered active between these
                      start and end times, as well as during the prequeueing
                      period if it exists. 18. `isEventPrequeueing`: Valid only
                      when `isEventActive` is  true  . Boolean indicating if an
                      event is currently prequeueing users before it starts. 19.
                      `timeUntilEventStart`: Valid only when
                      `isEventPrequeueing` is  true  . Integer indicating the
                      number of minutes until the event starts. 20.
                      `timeUntilEventStartFormatted`: String displaying the
                      `timeUntilEventStart` formatted in English for users. If
                      `isEventPrequeueing` is  false  ,
                      `timeUntilEventStartFormatted` will
                      display  unavailable  . 21. `timeUntilEventEnd`: Valid
                      only when `isEventActive` is  true  . Integer indicating
                      the number of minutes until the event ends. 22.
                      `timeUntilEventEndFormatted`: String displaying the
                      `timeUntilEventEnd` formatted in English for users. If
                      `isEventActive` is  false  , `timeUntilEventEndFormatted`
                      will display  unavailable  . 23. `shuffleAtEventStart`:
                      Valid only when `isEventActive` is  true  . Boolean
                      indicating if the users in the prequeue are shuffled
                      randomly when the event starts. 24. `turnstile`: Empty
                      when turnstile isn't enabled. String displaying an html
                      tag to display the Turnstile widget. Please add the
                      `{{{turnstile}}}` tag to the `custom_html` template to
                      ensure the Turnstile widget appears. 25. `infiniteQueue`:
                      Boolean indicating whether the response is for a user in
                      the infinite queue.  An example cURL to a waiting room
                      could be:  curl -X GET \"https://example.com/waitingroom\"
                      \\ -H \"Accept: application/json\"  If
