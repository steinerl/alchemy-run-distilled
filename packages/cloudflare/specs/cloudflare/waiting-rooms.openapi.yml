                    {{`waitTime`}} Number of minutes of estimated wait for a
                    user. 4. {{`waitTimeHours`}} Number of hours of estimated
                    wait for a user (`Math.floor(waitTime/60)`). 5.
                    {{`waitTimeHourMinutes`}} Number of minutes above the
                    `waitTimeHours` value (`waitTime%60`). 6. {{`queueIsFull`}}
