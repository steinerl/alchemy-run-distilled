                    route every minute. This value is used as baseline for the
                    number of users that are let in per minute. So it is
                    possible that there is a little more or little less traffic
                    coming to the route based on the traffic patterns at that
                    time around the world."
                total_active_users:
                  type: number
                  description: "Body param: Sets the total number of active user sessions on the
                    route at a point in time. A route is a combination of host
                    and path on which a waiting room is available. This value is
                    used as a baseline for the total number of active user
                    sessions on the route. It is possible to have a situation
                    where there are more or less active users sessions on the
                    route based on the traffic patterns at that time around the
