    put:
      operationId: updateWaitingRoom
      description: "Updates a configured waiting room.  @example ```ts const
        waitingRoom = await client.waitingRooms.update(
        '699d98642c564d2e855e9661899b7252', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', host: 'shop.example.com', name:
        'production_webinar', new_users_per_minute: 200, total_active_users:
        200, }, ); ```"
