                  json_response_enabled:
                    type: boolean
                    description: "Only available for the Waiting Room Advanced subscription. If
                      `true`, requests to the waiting room with the header
                      `Accept: application/json` will receive a JSON response
                      object with information on the user's status in the
                      waiting room as opposed to the configured static HTML
