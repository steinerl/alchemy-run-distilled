openapi: 3.1.0
info:
  title: Cloudflare WAITING-ROOMS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: waiting-rooms
paths:
  /zones/{zone_id}/waiting_rooms/{waitingRoomId}/events/{eventId}:
    get:
      operationId: getEvent
      description: "Fetches a single configured event for a waiting room.  @example
        ```ts const event = await client.waitingRooms.events.get(
        '699d98642c564d2e855e9661899b7252', '25756b2dfe6e378a06b033b670413757',
        { zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: waitingRoomId
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_on:
                    type: string
                  custom_page_html:
                    oneOf:
                      - type: string
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `custom_page_html` property while it is active. If null,
                      the event will inherit it.
                  description:
                    type: string
                    description: A note that you can use to add more details about the event.
                  disable_session_renewal:
                    oneOf:
                      - type: boolean
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `disable_session_renewal` property while it is active. If
                      null, the event will inherit it.
                  event_end_time:
                    type: string
                    description: An ISO 8601 timestamp that marks the end of the event.
                  event_start_time:
                    type: string
                    description: An ISO 8601 timestamp that marks the start of the event. At this
                      time, queued users will be processed with the event's
                      configuration. The start time must be at least one minute
                      before `event_end_time`.
                  modified_on:
                    type: string
                  name:
                    type: string
                    description: A unique name to identify the event. Only alphanumeric characters,
                      hyphens and underscores are allowed.
                  new_users_per_minute:
                    oneOf:
                      - type: number
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `new_users_per_minute` property while it is active. If
                      null, the event will inherit it. This can only be set if
                      the event's `total_active_users` property is also set.
                  prequeue_start_time:
                    oneOf:
                      - type: string
                    nullable: true
                    description: An ISO 8601 timestamp that marks when to begin queueing all users
                      before the event starts. The prequeue must start at least
                      five minutes before `event_start_time`.
                  queueing_method:
                    oneOf:
                      - type: string
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `queueing_method` property while it is active. If null,
                      the event will inherit it.
                  session_duration:
                    oneOf:
                      - type: number
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `session_duration` property while it is active. If null,
                      the event will inherit it.
                  shuffle_at_event_start:
                    type: boolean
                    description: If enabled, users in the prequeue will be shuffled randomly at the
                      `event_start_time`. Requires that `prequeue_start_time` is
                      not null. This is useful for situations when many users
                      will join the event prequeue at the same time and you want
                      to shuffle them to ensure fairness. Naturally, it makes
                      the most sense to enable this feature when the
                      `queueing_method` during the event respects ordering such
                      as  fifo  , or else the shuffling may be unnecessary.
                  suspended:
                    type: boolean
                    description: Suspends or allows an event. If set to `true`, the event is ignored
                      and traffic will be handled based on the waiting room
                      configuration.
                  total_active_users:
                    oneOf:
                      - type: number
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `total_active_users` property while it is active. If null,
                      the event will inherit it. This can only be set if the
                      event's `new_users_per_minute` property is also set.
                  turnstile_action:
                    type: string
                    enum:
                      - log
                      - infinite_queue
                    nullable: true
                    description: If set, the event will override the waiting room's
                      `turnstile_action` property while it is active. If null,
                      the event will inherit it.
                  turnstile_mode:
                    type: string
                    enum:
                      - off
                      - invisible
                      - visible_non_interactive
                      - visible_managed
                    nullable: true
                    description: If set, the event will override the waiting room's `turnstile_mode`
                      property while it is active. If null, the event will
                      inherit it.
      x-distilled-response-path: result
