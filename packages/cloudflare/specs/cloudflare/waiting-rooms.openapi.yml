                      if the user is in the waiting room (always  true  ). 2.
                      `waitTimeKnown`: Boolean indicating if the current
                      estimated wait times are accurate. If  false  , they are
                      not available. 3. `waitTime`: Valid only when
                      `waitTimeKnown` is  true  . Integer indicating the current
                      estimated time in minutes the user will wait in the
                      waiting room. When `queueingMethod` is  random  , this is
                      set to `waitTime50Percentile`. 4. `waitTime25Percentile`:
                      Valid only when `queueingMethod` is  random  and
                      `waitTimeKnown` is  true  . Integer indicating the current
                      estimated maximum wait time for the 25% of users that gain
                      entry the fastest (25th percentile). 5.
                      `waitTime50Percentile`: Valid only when `queueingMethod`
                      is  random  and `waitTimeKnown` is  true  . Integer
                      indicating the current estimated maximum wait time for the
                      50% of users that gain entry the fastest (50th
                      percentile). In other words, half of the queued users are
                      expected to let into the origin website before
                      `waitTime50Percentile` and half are expected to be let in
                      after it. 6. `waitTime75Percentile`: Valid only when
                      `queueingMethod` is  random  and `waitTimeKnown`
                      is  true  . Integer indicating the current estimated
                      maximum wait time for the 75% of users that gain entry the
                      fastest (75th percentile). 7. `waitTimeFormatted`: String
