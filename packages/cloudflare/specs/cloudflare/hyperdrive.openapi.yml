openapi: 3.1.0
info:
  title: Cloudflare HYPERDRIVE API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: hyperdrive
paths:
  /accounts/{account_id}/hyperdrive/configs/{hyperdriveId}:
    get:
      operationId: getConfig
      description: "Returns the specified Hyperdrive configuration.  @example ```ts
        const hyperdrive = await client.hyperdrive.configs.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: hyperdriveId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Define configurations using a unique string identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Define configurations using a unique string identifier.
                  name:
                    type: string
