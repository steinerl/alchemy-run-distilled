                            - gateway-policy
                            - gateway-destination-ip
                            - gateway-block-page-settings
                            - gateway-extended-email-matching
                            - idp-federation-grant
                          description: Resource Type.
                        resource_version:
                          type: number
                          description: Resource Version.
                        status:
                          type: string
                          enum:
                            - active
                            - deleting
