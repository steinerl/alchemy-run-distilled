          schema:
            type: string
        - name: include_resources
          in: query
          required: false
          description: "Query param: Include resources in the response."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Share Recipient identifier tag.
                  account_id:
                    type: string
