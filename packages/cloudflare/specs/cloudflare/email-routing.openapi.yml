        created.  @example ```ts const address = await
        client.emailRouting.addresses.get( 'ea95132c15732412d22c1476fa83f27a', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: destinationAddressIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Destination address identifier.
                  created:
                    type: string
                    description: The date and time the destination address has been created.
                  email:
                    type: string
                    description: The contact email address of the user.
                  modified:
                    type: string
                    description: The date and time the destination address was last modified.
