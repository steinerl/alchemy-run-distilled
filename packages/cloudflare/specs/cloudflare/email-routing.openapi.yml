  /zones/{zone_id}/email/routing/rules/{ruleIdentifier}:
    get:
      operationId: getRule
      description: "Get information for a specific routing rule already
        created.  @example ```ts const emailRoutingRule = await
        client.emailRouting.rules.get( 'a7e6fb77503c41d8a7f3113c6918f10c', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: ruleIdentifier
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Routing rule identifier.
                  actions:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - drop
                            - forward
                            - worker
                          description: Type of supported action.
                        value:
                          type: array
                          items:
                            type: string
                      required:
                        - type
                    description: List actions patterns.
                  enabled:
                    type: boolean
                    enum:
                      - true
                      - false
                    description: Routing rule status.
                  matchers:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - all
                            - literal
                          description: Type of matcher.
                        field:
                          type: string
                          enum:
                            - to
                          description: Field for type matcher.
