  /accounts/{account_id}/workers/dispatch/namespaces/{dispatchNamespace}/scripts/{scriptName}/content:
    get:
      operationId: getDispatchNamespaceScriptContent
      description: "Fetch script content from a script uploaded to a Workers for
        Platforms namespace.  @example ```ts const content = await
        client.workersForPlatforms.dispatch.namespaces.scripts.content.get(
        'my-dispatch-namespace', 'this-is_my_script-01', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, );  const data = await
        content.blob(); console.log(data); ```"
      parameters:
        - name: dispatchNamespace
          in: path
          required: true
          schema:
            type: string
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
    put:
      operationId: putDispatchNamespaceScriptContent
      description: "Put script content for a script uploaded to a Workers for
        Platforms namespace.  @example ```ts const script = await
        client.workersForPlatforms.dispatch.namespaces.scripts.content.update(
        'my-dispatch-namespace', 'this-is_my_script-01', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', metadata: {}, }, ); ```"
      parameters:
        - name: dispatchNamespace
          in: path
          required: true
          schema:
            type: string
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: CF-WORKER-BODY-PART
          in: header
          required: false
          description: "Header param: The multipart name of a script upload part
            containing script content in service worker format. Alternative to
            including in a metadata part."
          schema:
            type: string
        - name: CF-WORKER-MAIN-MODULE-PART
          in: header
          required: false
          description: "Header param: The multipart name of a script upload part
            containing script content in es module format. Alternative to
            including in a metadata part."
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  properties:
                    body_part:
                      type: string
                      description: Name of the part in the multipart request that contains the script
                        (e.g. the file adding a listener to the `fetch` event).
                        Indicates a `service worker syntax` Worker.
                    main_module:
                      type: string
                      description: Name of the part in the multipart request that contains the main
                        module (e.g. the file exporting a `fetch` handler).
                        Indicates a `module syntax` Worker.
                  description: "Body param: JSON-encoded metadata about the uploaded parts and
                    Worker configuration."
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "Body param: An array of modules (often JavaScript files)
                    comprising a Worker script. At least one module must be
                    present and referenced in the metadata as `main_module` or
                    `body_part` by filename.<br/>Possible Content-Type(s) are:
                    `application/javascript+module`, `text/javascript+module`,
                    `application/javascript`, `text/javascript`,
                    `text/x-python`, `text/x-python-requirement`,
                    `application/wasm`, `text/plain`,
                    `application/octet-stream`, `application/source-map`."
              required:
                - metadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The name used to identify the script.
                  compatibility_date:
                    type: string
                    description: Date indicating targeted support in the Workers runtime. Backwards
                      incompatible fixes to the runtime following this date will
                      not affect this Worker.
                  compatibility_flags:
                    type: array
                    items:
                      type: string
                    description: Flags that enable or disable certain features in the Workers
                      runtime. Used to enable upcoming features or opt in or out
                      of specific changes not included in a
                      `compatibility_date`.
                  created_on:
                    type: string
                    description: When the script was created.
                  etag:
                    type: string
                    description: Hashed script content, can be used in a If-None-Match header when
                      updating.
                  handlers:
                    type: array
                    items:
                      type: string
                    description: The names of handlers exported as part of the default export.
                  has_assets:
                    type: boolean
                    description: Whether a Worker contains assets.
                  has_modules:
                    type: boolean
                    description: Whether a Worker contains modules.
                  last_deployed_from:
                    type: string
                    description: The client most recently used to deploy this Worker.
                  logpush:
                    type: boolean
                    description: Whether Logpush is turned on for the Worker.
                  migration_tag:
                    type: string
                    description: The tag of the Durable Object migration that was most recently
                      applied for this Worker.
                  modified_on:
                    type: string
                    description: When the script was last modified.
                  named_handlers:
                    type: array
                    items:
                      type: object
                      properties:
                        handlers:
                          type: array
                          items:
                            type: string
                          description: The names of handlers exported as part of the named export.
                        name:
                          type: string
                          description: The name of the export.
                    description: Named exports, such as Durable Object class implementations and
                      named entrypoints.
