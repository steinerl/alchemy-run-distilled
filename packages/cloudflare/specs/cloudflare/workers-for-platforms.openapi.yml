openapi: 3.1.0
info:
  title: Cloudflare WORKERS-FOR-PLATFORMS API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: workers-for-platforms
paths:
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatchNamespace}:
    get:
      operationId: getDispatchNamespace
      description: "Get a Workers for Platforms namespace.  @example ```ts const
        namespace = await client.workersForPlatforms.dispatch.namespaces.get(
        'my-dispatch-namespace', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: dispatchNamespace
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created_by:
                    type: string
                    description: Identifier.
                  created_on:
                    type: string
                    description: When the script was created.
                  modified_by:
                    type: string
                    description: Identifier.
                  modified_on:
                    type: string
                    description: When the script was last modified.
                  namespace_id:
                    type: string
                    description: API Resource UUID tag.
                  namespace_name:
                    type: string
                    description: Name of the Workers for Platforms dispatch namespace.
                  script_count:
                    type: number
                    description: The current number of scripts in this Dispatch Namespace.
                  trusted_workers:
                    type: boolean
                    description: Whether the Workers in the namespace are executed in a "trusted"
                      manner. When a Worker is trusted, it has access to the
                      shared caches for the zone in the Cache API, and has
                      access to the `request.cf` object on incoming Requests.
                      When a Worker is untrusted, caches are not shared across
                      the zone, and `request.cf` is undefined. By default,
                      Workers in a namespace are "untrusted".
      x-distilled-response-path: result
      x-distilled-errors:
        DispatchNamespaceNotFound:
          - code: 100119
        Forbidden:
          - status: 403
    delete:
      operationId: deleteDispatchNamespace
      description: "Delete a Workers for Platforms namespace.  @example ```ts const
        namespace = await client.workersForPlatforms.dispatch.namespaces.delete(
        'my-dispatch-namespace', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: dispatchNamespace
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        DispatchNamespaceNotFound:
          - code: 100119
        Forbidden:
          - status: 403
  /accounts/{account_id}/workers/dispatch/namespaces:
    get:
      operationId: listDispatchNamespaces
      description: "Fetch a list of Workers for Platforms namespaces.  @example ```ts
        // Automatically fetches more pages as needed. for await (const
        namespaceListResponse of
        client.workersForPlatforms.dispatch.namespaces.list( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created_by:
                    type: string
                    description: Identifier.
                  created_on:
                    type: string
                    description: When the script was created.
                  modified_by:
                    type: string
                    description: Identifier.
                  modified_on:
                    type: string
                    description: When the script was last modified.
                  namespace_id:
                    type: string
                    description: API Resource UUID tag.
                  namespace_name:
                    type: string
                    description: Name of the Workers for Platforms dispatch namespace.
                  script_count:
                    type: number
                    description: The current number of scripts in this Dispatch Namespace.
                  trusted_workers:
                    type: boolean
                    description: Whether the Workers in the namespace are executed in a "trusted"
                      manner. When a Worker is trusted, it has access to the
                      shared caches for the zone in the Cache API, and has
                      access to the `request.cf` object on incoming Requests.
                      When a Worker is untrusted, caches are not shared across
                      the zone, and `request.cf` is undefined. By default,
                      Workers in a namespace are "untrusted".
      x-distilled-pagination-class: NamespaceListResponsesSinglePage
    post:
      operationId: createDispatchNamespace
      description: "Create a new Workers for Platforms namespace.  @example ```ts
        const namespace = await
        client.workersForPlatforms.dispatch.namespaces.create( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: The name of the dispatch namespace."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created_by:
                    type: string
                    description: Identifier.
                  created_on:
                    type: string
                    description: When the script was created.
                  modified_by:
                    type: string
                    description: Identifier.
                  modified_on:
                    type: string
                    description: When the script was last modified.
                  namespace_id:
                    type: string
                    description: API Resource UUID tag.
                  namespace_name:
                    type: string
                    description: Name of the Workers for Platforms dispatch namespace.
                  script_count:
                    type: number
                    description: The current number of scripts in this Dispatch Namespace.
                  trusted_workers:
                    type: boolean
                    description: Whether the Workers in the namespace are executed in a "trusted"
                      manner. When a Worker is trusted, it has access to the
                      shared caches for the zone in the Cache API, and has
                      access to the `request.cf` object on incoming Requests.
                      When a Worker is untrusted, caches are not shared across
                      the zone, and `request.cf` is undefined. By default,
                      Workers in a namespace are "untrusted".
      x-distilled-response-path: result
      x-distilled-errors:
        DispatchNamespaceAlreadyExists:
          - code: 100120
        Forbidden:
          - status: 403
  /accounts/{account_id}/workers/dispatch/namespaces/{dispatchNamespace}/scripts/{scriptName}:
    get:
      operationId: getDispatchNamespaceScript
      description: "Fetch information about a script uploaded to a Workers for
        Platforms namespace.  @example ```ts const script = await
        client.workersForPlatforms.dispatch.namespaces.scripts.get(
        'my-dispatch-namespace', 'this-is_my_script-01', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: dispatchNamespace
          in: path
          required: true
          schema:
            type: string
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  created_on:
                    type: string
                    description: When the script was created.
                  dispatch_namespace:
                    type: string
                    description: Name of the Workers for Platforms dispatch namespace.
                  modified_on:
                    type: string
                    description: When the script was last modified.
                  script:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The name used to identify the script.
                      compatibility_date:
                        type: string
                        description: Date indicating targeted support in the Workers runtime. Backwards
                          incompatible fixes to the runtime following this date
                          will not affect this Worker.
                      compatibility_flags:
                        type: array
                        items:
                          type: string
                        description: Flags that enable or disable certain features in the Workers
                          runtime. Used to enable upcoming features or opt in or
                          out of specific changes not included in a
                          `compatibility_date`.
                      created_on:
                        type: string
                        description: When the script was created.
                      etag:
                        type: string
                        description: Hashed script content, can be used in a If-None-Match header when
                          updating.
                      handlers:
                        type: array
                        items:
                          type: string
                        description: The names of handlers exported as part of the default export.
                      has_assets:
                        type: boolean
                        description: Whether a Worker contains assets.
                      has_modules:
                        type: boolean
                        description: Whether a Worker contains modules.
                      last_deployed_from:
                        type: string
                        description: The client most recently used to deploy this Worker.
                      logpush:
                        type: boolean
                        description: Whether Logpush is turned on for the Worker.
                      migration_tag:
                        type: string
                        description: The tag of the Durable Object migration that was most recently
                          applied for this Worker.
                      modified_on:
                        type: string
                        description: When the script was last modified.
                      named_handlers:
                        type: array
                        items:
                          type: object
                          properties:
                            handlers:
                              type: array
                              items:
                                type: string
                              description: The names of handlers exported as part of the named export.
                            name:
                              type: string
                              description: The name of the export.
                        description: Named exports, such as Durable Object class implementations and
                          named entrypoints.
                      observability:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            description: Whether observability is enabled for the Worker.
                          head_sampling_rate:
                            oneOf:
                              - type: number
                            nullable: true
                            description: The sampling rate for incoming requests. From 0 to 1 (1 = 100%, 0.1
                              = 10%). Default is 1.
                          logs:
                            oneOf:
                              - type: object
                                properties:
                                  enabled:
                                    type: boolean
                                    description: Whether logs are enabled for the Worker.
                                  invocation_logs:
                                    type: boolean
                                    description: Whether [invocation
                                      logs](https://developers.cloudflare.com/workers/observability/logs/workers-logs/#invocation-logs)
                                      are enabled for the Worker.
                                  destinations:
                                    type: array
                                    items:
                                      type: string
                                    description: A list of destinations where logs will be exported to.
                                  head_sampling_rate:
                                    oneOf:
                                      - type: number
                                    nullable: true
                                    description: The sampling rate for logs. From 0 to 1 (1 = 100%, 0.1 = 10%).
                                      Default is 1.
                                  persist:
                                    type: boolean
                                    description: Whether log persistence is enabled for the Worker.
                                required:
                                  - enabled
                                  - invocation_logs
                            nullable: true
                            description: Log settings for the Worker.
                          traces:
                            oneOf:
                              - type: object
                                properties:
                                  destinations:
                                    type: array
                                    items:
                                      type: string
                                    description: A list of destinations where traces will be exported to.
                                  enabled:
                                    type: boolean
                                    description: Whether traces are enabled for the Worker.
                                  head_sampling_rate:
                                    oneOf:
                                      - type: number
                                    nullable: true
                                    description: The sampling rate for traces. From 0 to 1 (1 = 100%, 0.1 = 10%).
                                      Default is 1.
                                  persist:
                                    type: boolean
                                    description: Whether trace persistence is enabled for the Worker.
                                  propagation_policy:
                                    type: string
                                    enum:
                                      - authenticated
                                      - accept
                                    description: Controls how inbound trace context (traceparent/tracestate) headers
                                      on incoming requests are handled.
                                      "authenticated" (default) honors inbound
                                      trace context only when accompanied by a
                                      valid trace auth token. "accept"
                                      unconditionally accepts inbound trace
                                      context. Requires the trace propagation
                                      feature to be enabled.
                            nullable: true
                            description: Trace settings for the Worker.
                        required:
                          - enabled
                        description: Observability settings for the Worker.
                      placement:
                        oneOf:
                          - type: object
                            properties:
                              mode:
                                type: string
                                enum:
                                  - smart
                                description: Enables [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - mode
                          - type: object
                            properties:
                              region:
                                type: string
                                description: Cloud region for targeted placement in format 'provider:region'.
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - region
                          - type: object
                            properties:
                              hostname:
                                type: string
                                description: HTTP hostname for targeted placement.
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - hostname
                          - type: object
                            properties:
                              host:
                                type: string
                                description: TCP host and port for targeted placement.
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - host
                          - type: object
                            properties:
                              mode:
                                type: string
                                enum:
                                  - targeted
                                description: Targeted placement mode.
                              region:
                                type: string
                                description: Cloud region for targeted placement in format 'provider:region'.
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - mode
                              - region
                          - type: object
                            properties:
                              hostname:
                                type: string
                                description: HTTP hostname for targeted placement.
                              mode:
                                type: string
                                enum:
                                  - targeted
                                description: Targeted placement mode.
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - hostname
                              - mode
                          - type: object
                            properties:
                              host:
                                type: string
                                description: TCP host and port for targeted placement.
                              mode:
                                type: string
                                enum:
                                  - targeted
                                description: Targeted placement mode.
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - host
                              - mode
                          - type: object
                            properties:
                              mode:
                                type: string
                                enum:
                                  - targeted
                                description: Targeted placement mode.
                              target:
                                type: array
                                items:
                                  oneOf:
                                    - type: object
                                      properties:
                                        region:
                                          type: string
                                          description: Cloud region in format 'provider:region'.
                                      required:
                                        - region
                                    - type: object
                                      properties:
                                        hostname:
                                          type: string
                                          description: HTTP hostname for targeted placement.
                                      required:
                                        - hostname
                                    - type: object
                                      properties:
                                        host:
                                          type: string
                                          description: TCP host:port for targeted placement.
                                      required:
                                        - host
                                description: Array of placement targets (currently limited to single target).
                              last_analyzed_at:
                                type: string
                                description: The last time the script was analyzed for [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                              status:
                                type: string
                                enum:
                                  - SUCCESS
                                  - UNSUPPORTED_APPLICATION
                                  - INSUFFICIENT_INVOCATIONS
                                description: Status of [Smart
                                  Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                            required:
                              - mode
                              - target
                        description: Configuration for [Smart
                          Placement](https://developers.cloudflare.com/workers/configuration/smart-placement).
                          Specify mode='smart' for Smart Placement, or one of
                          region/hostname/host.
                      placement_mode:
                        type: string
                        enum:
                          - smart
                          - targeted
                        description: "@deprecated Configuration for [Smart
                          Placement](https://developers.cloudflare.com/workers/\
                          configuration/smart-placement). Specify mode='smart'
                          for Smart Placement, or one of region/hostname/host."
                      placement_status:
                        type: string
                        enum:
                          - SUCCESS
                          - UNSUPPORTED_APPLICATION
                          - INSUFFICIENT_INVOCATIONS
                        description: "@deprecated Status of [Smart
                          Placement](https://developers.cloudflare.com/workers/\
                          configuration/smart-placement)."
                      tag:
                        type: string
                        description: The immutable ID of the script.
                      tags:
                        oneOf:
                          - type: array
                            items:
                              type: string
                        nullable: true
                        description: Tags associated with the Worker.
                      tail_consumers:
                        oneOf:
                          - type: array
                            items:
                              type: object
                              properties:
                                service:
                                  type: string
                                  description: Name of Worker that is to be the consumer.
                                environment:
                                  type: string
                                  description: Optional environment if the Worker utilizes one.
                                namespace:
                                  type: string
                                  description: Optional dispatch namespace the script belongs to.
                              required:
                                - service
                        nullable: true
                        description: List of Workers that will consume logs from the attached Worker.
                      usage_model:
                        type: string
                        enum:
                          - standard
                          - bundled
                          - unbound
                        description: Usage model for the Worker invocations.
      x-distilled-response-path: result
      x-distilled-errors:
        DispatchNamespaceNotFound:
          - code: 100119
        DispatchNamespaceScriptNotFound:
          - code: 10007
        Forbidden:
          - status: 403
    put:
      operationId: putDispatchNamespaceScript
      description: "Upload a worker module to a Workers for Platforms namespace. You
        can find more about the multipart metadata on our docs:
        https://developers.cloudflare.com/workers/configuration/multipart-uploa\
        d-metadata/.  @example ```ts const script = await
        client.workersForPlatforms.dispatch.namespaces.scripts.update(
        'my-dispatch-namespace', 'this-is_my_script-01', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', metadata: {}, }, ); ```"
      parameters:
        - name: dispatchNamespace
          in: path
          required: true
          schema:
            type: string
        - name: scriptName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: bindings_inherit
          in: query
          required: false
          description: 'Query param: When set to "strict", the upload will fail if any
            `inherit` type bindings cannot be resolved against the previous
            version of the script. Without this, unresolvable inherit bindings
            are silently dropped.'
          schema:
            type: string
            enum:
              - strict
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  properties:
                    assets:
                      type: object
                      properties:
                        config:
                          type: object
                          properties:
                            _headers:
                              type: string
                              description: The contents of a \_headers file (used to attach custom headers on
                                asset responses).
                            _redirects:
                              type: string
                              description: The contents of a \_redirects file (used to apply redirects or
                                proxy paths ahead of asset serving).
                            html_handling:
                              type: string
                              enum:
                                - auto-trailing-slash
                                - force-trailing-slash
                                - drop-trailing-slash
                                - none
                              description: Determines the redirects and rewrites of requests for HTML content.
                            not_found_handling:
                              type: string
                              enum:
                                - none
                                - 404-page
                                - single-page-application
                              description: Determines the response when a request does not match a static
                                asset, and there is no Worker script.
                            run_worker_first:
                              oneOf:
                                - type: array
                                  items:
                                    type: string
                                - type: boolean
                              description: Contains a list path rules to control routing to either the Worker
                                or assets. Glob (\ ) and negative (!) rules are
                                supported. Rules must start with either '/' or
                                '!/'. At least one non-negative rule must be
                                provided, and negative rules have higher
                                precedence than non-negative rules.
                            serve_directly:
                              type: boolean
                              description: "@deprecated When true and the incoming request matches an asset,
                                that will be served instead of invoking the
                                Worker script. When false, requests will always
                                invoke the Worker script."
                          description: Configuration for assets within a Worker.
                        jwt:
                          type: string
                          description: Token provided upon successful upload of all files from a
                            registered manifest.
                      description: Configuration for assets within a Worker.
                    bindings:
                      type: array
                      items:
                        oneOf:
                          - type: object
                            properties:
                              name:
                                type: string
                                description: A JavaScript variable name for the binding.
                              type:
                                type: string
                                enum:
                                  - ai
                                description: The kind of resource that the binding provides.
                            required:
                              - name
                              - type
                          - type: object
                            properties:
                              instance_name:
                                type: string
                                description: The user-chosen instance name. Must exist at deploy time. The
                                  worker can search, chat, update, and manage
                                  items/jobs on this instance.
                              name:
                                type: string
                                description: A JavaScript variable name for the binding.
                              type:
                                type: string
                                enum:
                                  - ai_search
                                description: The kind of resource that the binding provides.
                              namespace:
                                type: string
                                description: The namespace the instance belongs to. Defaults to "default" if
                                  omitted. Customers who don't use namespaces
                                  can simply omit this field.
                            required:
                              - instance_name
                              - name
                              - type
                          - type: object
                            properties:
                              name:
                                type: string
                                description: A JavaScript variable name for the binding.
                              namespace:
                                type: string
                                description: The user-chosen namespace name. Must exist before deploy --
                                  Wrangler handles auto-creation on deploy
                                  failure (R2 bucket pattern). The "default"
                                  namespace is auto-created by config-api for
                                  new accounts. Grants full access (CRUD +
                                  search + chat) to all instances within the
                                  namespace.
                              type:
                                type: string
                                enum:
                                  - ai_search_namespace
                                description: The kind of resource that the binding provides.
                            required:
                              - name
                              - namespace
                              - type
                          - type: object
                            properties:
                              dataset:
                                type: string
                                description: The name of the dataset to bind to.
                              name:
                                type: string
                                description: A JavaScript variable name for the binding.
                              type:
                                type: string
                                enum:
                                  - analytics_engine
                                description: The kind of resource that the binding provides.
                            required:
                              - dataset
