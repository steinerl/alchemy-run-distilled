openapi: 3.1.0
info:
  title: Cloudflare SECRETS-STORE API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: secrets-store
paths:
  /accounts/{account_id}/secrets_store/quota:
    get:
      operationId: getQuota
      description: "Lists the number of secrets used in the account.  @example ```ts
        const quota = await client.secretsStore.quota.get({ account_id:
        '985e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  secrets:
                    type: object
                    properties:
                      quota:
                        type: number
                        description: The number of secrets the account is entitlted to use
                      usage:
                        type: number
                        description: The number of secrets the account is currently using
                    required:
                      - quota
                      - usage
                required:
                  - secrets
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidAccountId:
          - code: 7003
  /accounts/{account_id}/secrets_store/stores/{storeId}:
    get:
      operationId: getStore
      description: "Returns details of a single store  @example ```ts const store =
        await client.secretsStore.stores.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '985e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Store Identifier
                  created:
                    type: string
                    description: Whenthe secret was created.
                  modified:
                    type: string
                    description: When the secret was modified.
                  name:
                    type: string
                    description: The name of the store
                  account_id:
                    type: string
                    description: Account Identifier
                required:
                  - id
                  - created
                  - modified
                  - name
      x-distilled-response-path: result
    delete:
      operationId: deleteStore
      description: "Deletes a single store. By default, a store that still contains
        secrets cannot be deleted and returns HTTP 409 (Conflict) with the
        \"store_not_empty\" error. Pass `force=true` to cascade-delete all
        secrets in the store. Empty stores are always deleted regardless of the
        force parameter.  @example ```ts const store = await
        client.secretsStore.stores.delete( '023e105f4ecef8ad9ca31a8372d0c353', {
        account_id: '985e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account Identifier"
          schema:
            type: string
        - name: force
          in: query
          required: false
          description: "Query param: When true, cascade-deletes all secrets in the store
            before deleting the store itself. Required when deleting a non-empty
            store. Without this parameter, attempting to delete a non-empty
            store returns 409."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        StoreNotFound:
          - code: 1001
            message:
              includes: store_not_found
        InvalidAccountId:
          - code: 7003
        NotFound:
          - code: 1000
  /accounts/{account_id}/secrets_store/stores:
    get:
      operationId: listStores
      description: "Lists all the stores in an account  @example ```ts //
        Automatically fetches more pages as needed. for await (const
        storeListResponse of client.secretsStore.stores.list( { account_id:
        '985e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account Identifier"
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: direction
          in: query
          required: false
          description: "Query param: Direction to sort objects"
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: order
          in: query
          required: false
          description: "Query param: Order secrets by values in the given field"
          schema:
            type: string
            enum:
              - name
              - comment
              - created
              - modified
              - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Store Identifier
                  created:
                    type: string
                    description: Whenthe secret was created.
                  modified:
                    type: string
                    description: When the secret was modified.
                  name:
                    type: string
                    description: The name of the store
                  account_id:
                    type: string
                    description: Account Identifier
                required:
                  - id
                  - created
                  - modified
                  - name
      x-distilled-pagination-class: StoreListResponsesV4PagePaginationArray
      x-distilled-errors:
        InvalidAccountId:
          - code: 7003
    post:
      operationId: createStore
      summary: Create a Secrets Store
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the store
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Store identifier
                  created:
                    type: string
                    description: When the store was created
                  modified:
                    type: string
                    description: When the store was modified
                  name:
                    type: string
                    description: The name of the store
                required:
                  - id
                  - created
                  - modified
                  - name
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidAccountId:
          - code: 7003
        MaximumStoresExceeded:
          - code: 1003
            message:
              includes: maximum_stores_exceeded
  /accounts/{account_id}/secrets_store/stores/{storeId}/secrets/{secretId}:
    get:
      operationId: getStoreSecret
      description: "Returns details of a single secret  @example ```ts const secret =
        await client.secretsStore.stores.secrets.get(
        '023e105f4ecef8ad9ca31a8372d0c353', '3fd85f74b32742f1bff64a85009dda07',
        { account_id: '985e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: secretId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Secret identifier tag.
                  created:
                    type: string
                    description: Whenthe secret was created.
                  modified:
                    type: string
                    description: When the secret was modified.
                  name:
                    type: string
                    description: The name of the secret
                  status:
                    type: string
                    enum:
                      - pending
                      - active
                      - deleted
                  store_id:
                    type: string
                    description: Store Identifier
                  comment:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Freeform text describing the secret
                  scopes:
                    type: array
                    items:
                      type: string
                    description: The list of services that can use this secret.
                required:
                  - id
                  - created
                  - modified
                  - name
                  - status
                  - store_id
      x-distilled-response-path: result
      x-distilled-errors:
        StoreNotFound:
          - code: 1001
            message:
              includes: store_not_found
        SecretNotFound:
          - code: 1001
            message:
              includes: secret_not_found
        InvalidAccountId:
          - code: 7003
        NotFound:
          - code: 1000
    patch:
      operationId: patchStoreSecret
      description: "Updates a single secret  @example ```ts const response = await
        client.secretsStore.stores.secrets.edit(
        '023e105f4ecef8ad9ca31a8372d0c353', '3fd85f74b32742f1bff64a85009dda07',
        { account_id: '985e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: secretId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account Identifier"
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: "Body param: Freeform text describing the secret"
                scopes:
                  type: array
                  items:
                    type: string
                  description: "Body param: The list of services that can use this secret."
                value:
                  type: string
                  description: "Body param: The value of the secret. Maximum 64 KiB (65,536
                    bytes). Note that this is 'write only' - no API response
                    will provide this value, it is only used to create/modify
                    secrets."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Secret identifier tag.
                  created:
                    type: string
                    description: Whenthe secret was created.
                  modified:
                    type: string
                    description: When the secret was modified.
                  name:
                    type: string
                    description: The name of the secret
                  status:
                    type: string
                    enum:
                      - pending
                      - active
                      - deleted
                  store_id:
                    type: string
                    description: Store Identifier
                  comment:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Freeform text describing the secret
                  scopes:
                    type: array
                    items:
                      type: string
                    description: The list of services that can use this secret.
                required:
                  - id
                  - created
                  - modified
                  - name
                  - status
                  - store_id
      x-distilled-response-path: result
      x-distilled-errors:
        StoreNotFound:
          - code: 1001
            message:
              includes: store_not_found
        SecretNotFound:
          - code: 1001
            message:
              includes: secret_not_found
        InvalidAccountId:
          - code: 7003
        SecretScopeInvalid:
          - code: 1001
            message:
              includes: secret_scope_invalid
    delete:
      operationId: deleteStoreSecret
      description: "Deletes a single secret  @example ```ts const secret = await
        client.secretsStore.stores.secrets.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', '3fd85f74b32742f1bff64a85009dda07',
