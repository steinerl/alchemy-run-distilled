                                  engine:
                                    type: string
                                  is_mobile:
                                    type: boolean
                                  memory:
                                    type: number
                                  os:
                                    type: string
                                  os_version:
                                    type: string
                                  sdk_name:
                                    type: string
                                  sdk_version:
                                    type: string
                                  user_agent:
                                    type: string
                                  webgl_support:
                                    type: string
                              events:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    timestamp:
                                      type: string
                                    type:
                                      type: string
                              ip_information:
                                type: object
                                properties:
                                  city:
                                    type: string
                                  country:
                                    type: string
                                  ip_location:
                                    type: string
                                  ipv4:
                                    type: string
                                  org:
                                    type: string
                                  portal:
                                    type: string
                                  region:
                                    type: string
                                  timezone:
                                    type: string
                              precall_network_information:
                                type: object
                                properties:
                                  backend_rtt:
                                    type: number
                                  effective_networktype:
                                    type: string
                                  fractional_loss:
                                    type: number
                                  jitter:
                                    type: number
                                  reflexive_connectivity:
                                    type: boolean
                                  relay_connectivity:
                                    type: boolean
                                  rtt:
                                    type: number
                                  throughtput:
                                    type: number
                                  turn_connectivity:
                                    type: boolean
                              status:
                                type: string
                          preset_name:
                            type: string
                            description: Name of the preset associated with the participant.
                          quality_stats:
                            type: array
                            items:
                              type: object
                              properties:
                                audio_bandwidth:
                                  type: number
                                audio_packet_loss:
                                  type: number
                                audio_stats:
                                  type: array
