  /accounts/{account_id}/realtime/kit/{appId}/recordings:
    get:
      operationId: getRecordingsRecording
      description: "Returns all recordings for an App. If the `meeting_id` parameter
        is passed, returns all recordings for the given meeting ID.  @example
        ```ts const response = await
        client.realtimeKit.recordings.getRecordings( 'app_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
        - name: end_time
          in: query
          required: false
          description: "Query param: The end time range for which you want to retrieve the
            meetings. The time must be specified in ISO format."
          schema:
            type: string
        - name: expired
          in: query
          required: false
          description: "Query param: If passed, only shows expired/non-expired recordings
            on RealtimeKit's bucket"
          schema:
            type: boolean
        - name: meeting_id
          in: query
          required: false
          description: "Query param: ID of a meeting. Optional. Will limit results to only
            this meeting if passed."
          schema:
            type: string
        - name: page_no
          in: query
          required: false
          description: "Query param: The page number from which you want your page search
            results to be displayed."
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          description: "Query param: Number of results per page"
          schema:
            type: number
        - name: search
          in: query
          required: false
          description: "Query param: The search query string. You can search using the
            meeting ID or title."
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          description: Query param
          schema:
            type: string
            enum:
              - invokedTime
        - name: sort_order
          in: query
          required: false
          description: Query param
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: start_time
          in: query
          required: false
          description: "Query param: The start time range for which you want to retrieve
            the meetings. The time must be specified in ISO format."
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: "Query param: Filter by one or more recording status"
          schema:
            type: array
            items:
              type: string
              enum:
                - INVOKED
                - RECORDING
                - UPLOADING
                - UPLOADED
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: ID of the recording
                        audio_download_url:
                          oneOf:
                            - type: string
                          nullable: true
                          description: If the audio_config is passed, the URL for downloading the audio
                            recording is returned.
                        download_url:
                          oneOf:
                            - type: string
                          nullable: true
                          description: URL where the recording can be downloaded.
                        download_url_expiry:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Timestamp when the download URL expires.
                        file_size:
                          oneOf:
                            - type: number
                          nullable: true
                          description: File size of the recording, in bytes.
                        invoked_time:
                          type: string
                          description: Timestamp when this recording was invoked.
                        output_file_name:
                          type: string
                          description: File name of the recording.
                        session_id:
                          oneOf:
                            - type: string
                          nullable: true
                          description: ID of the meeting session this recording is for.
                        started_time:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Timestamp when this recording actually started after being invoked.
                            Usually a few seconds after `invoked_time`.
                        status:
                          type: string
                          enum:
                            - INVOKED
                            - RECORDING
                            - UPLOADING
                            - UPLOADED
                            - ERRORED
                            - PAUSED
                          description: Current status of the recording.
                        stopped_time:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Timestamp when this recording was stopped. Optional; is present
                            only when the recording has actually been stopped.
                        meeting:
                          type: object
                          properties:
                            id:
                              type: string
                              description: ID of the meeting.
                            created_at:
                              type: string
                              description: Timestamp the object was created at. The time is returned in ISO
                                format.
                            updated_at:
                              type: string
                              description: Timestamp the object was updated at. The time is returned in ISO
                                format.
                            live_stream_on_start:
                              type: boolean
                              description: Specifies if the meeting should start getting livestreamed on
                                start.
                            persist_chat:
                              type: boolean
                              description: Specifies if Chat within a meeting should persist for a week.
                            record_on_start:
                              type: boolean
                              description: Specifies if the meeting should start getting recorded as soon as
                                someone joins the meeting.
                            session_keep_alive_time_in_secs:
                              type: number
                              description: Time in seconds, for which a session remains active, after the last
                                participant has left the meeting.
                            status:
                              type: string
                              enum:
                                - ACTIVE
                                - INACTIVE
                              description: Whether the meeting is `ACTIVE` or `INACTIVE`. Users will not be
                                able to join an `INACTIVE` meeting.
                            summarize_on_end:
                              type: boolean
                              description: Automatically generate summary of meetings using transcripts.
                                Requires Transcriptions to be enabled, and can
                                be retrieved via Webhooks or summary API.
                            title:
                              type: string
                              description: Title of the meeting.
                          required:
                            - id
                            - created_at
                            - updated_at
                        recording_duration:
                          type: number
                          description: Total recording time in seconds.
                        storage_config:
                          oneOf:
                            - type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - aws
                                    - azure
                                    - digitalocean
                                    - gcs
                                    - sftp
                                  description: Type of storage media.
                                auth_method:
                                  type: string
                                  enum:
                                    - KEY
                                    - PASSWORD
                                  description: Authentication method used for "sftp" type storage medium
                                bucket:
                                  type: string
                                  description: Name of the storage medium's bucket.
                                host:
                                  type: string
                                  description: SSH destination server host for SFTP type storage medium
                                password:
                                  type: string
                                  description: SSH destination server password for SFTP type storage medium when
                                    auth_method is "PASSWORD". If auth_method is
                                    "KEY", this specifies the password for the
                                    ssh private key.
                                path:
                                  type: string
                                  description: Path relative to the bucket root at which the recording will be
                                    placed.
                                port:
                                  type: number
                                  description: SSH destination server port for SFTP type storage medium
                                private_key:
                                  type: string
                                  description: Private key used to login to destination SSH server for SFTP type
                                    storage medium, when auth_method used is
                                    "KEY"
                                region:
                                  type: string
                                  description: Region of the storage medium.
                                secret:
                                  type: string
                                  description: Secret key of the storage medium. Similar to `access_key`, it is
                                    only writeable by clients, not readable.
                                username:
                                  type: string
                                  description: SSH destination server username for SFTP type storage medium
                              required:
                                - type
                          nullable: true
                      required:
                        - id
                        - audio_download_url
                        - download_url
                        - download_url_expiry
                        - file_size
                        - invoked_time
                        - output_file_name
                        - session_id
                        - started_time
                        - status
                        - stopped_time
                  paging:
                    type: object
                    properties:
                      end_offset:
                        type: number
                      start_offset:
                        type: number
                      total_count:
                        type: number
                    required:
                      - end_offset
                      - start_offset
                      - total_count
                  success:
                    type: boolean
                required:
                  - data
                  - paging
                  - success
    post:
      operationId: startRecordingsRecording
      description: "Starts recording a meeting. The meeting can be started by an App
        admin directly, or a participant with permissions to start a recording,
        based on the type of authorization used.  @example ```ts const response
        = await client.realtimeKit.recordings.startRecordings( 'app_id', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', audio_config: { channel:
        'stereo', codec: 'AAC', export_file: true, }, file_name_prefix:
        'string', interactive_config: { type: 'ID3' }, max_seconds: 60,
        meeting_id: '97440c6a-140b-40a9-9499-b23fd7a3868a',
        realtimekit_bucket_config: { enabled: true }, video_config: { codec:
        'H264', export_file: true, height: 720, watermark: { position: 'left
        top', size: { height: 1, width: 1 }, url: 'http://example.com', },
        width: 1280, }, }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                allow_multiple_recordings:
                  type: boolean
                  description: "Body param: By default, a meeting allows only one recording to run
                    at a time. Enabling the `allow_multiple_recordings`
                    parameter to true allows you to initiate multiple recordings
                    concurrently in the same meeting. This allows you to record
                    separate videos of the same meeting with different
                    configurations, such as portrait mode or landscape mode."
                audio_config:
                  type: object
                  properties:
                    channel:
                      type: string
                      enum:
                        - mono
                        - stereo
                      description: Audio signal pathway within an audio file that carries a specific
                        sound source.
                    codec:
                      type: string
                      enum:
                        - MP3
                        - AAC
                      description: Codec using which the recording will be encoded. If VP8/VP9 is
                        selected for videoConfig, changing audioConfig is not
                        allowed. In this case, the codec in the audioConfig is
                        automatically set to vorbis.
                    export_file:
                      type: boolean
                      description: Controls whether to export audio file seperately
                  description: "Body param: Object containing configuration regarding the audio
                    that is being recorded."
                file_name_prefix:
                  type: string
                  description: "Body param: Update the recording file name."
                interactive_config:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - ID3
                      description: The metadata is presented in the form of ID3 tags.
                  description: "Body param: Allows you to add timed metadata to your recordings,
                    which are digital markers inserted into a video file to
                    provide contextual information at specific points in the
                    content range. The ID3 tags containing this information are
                    available to clients on the playback timeline in HLS format.
                    The output files are generated in a compressed .tar format."
                max_seconds:
                  type: number
                  description: "Body param: Specifies the maximum duration for recording in
                    seconds, ranging from a minimum of 60 seconds to a maximum
                    of 24 hours."
                meeting_id:
                  type: string
                  description: "Body param: ID of the meeting to record."
                realtimekit_bucket_config:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Controls whether recordings are uploaded to RealtimeKit's bucket.
                        If set to false, `download_url`, `audio_download_url`,
                        `download_url_expiry` won't be generated for a
                        recording.
                  required:
                    - enabled
                  description: Body param
                rtmp_out_config:
                  type: object
                  properties:
                    rtmp_url:
                      type: string
                      description: RTMP URL to stream to
                  description: Body param
                storage_config:
                  oneOf:
                    - type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - aws
                            - azure
                            - digitalocean
                            - gcs
                            - sftp
                          description: Type of storage media.
                        access_key:
                          type: string
                          description: Access key of the storage medium. Access key is not required for
                            the `gcs` storage media type.  Note that this field
                            is not readable by clients, only writeable.
                        auth_method:
                          type: string
                          enum:
                            - KEY
                            - PASSWORD
                          description: Authentication method used for "sftp" type storage medium
                        bucket:
                          type: string
                          description: Name of the storage medium's bucket.
                        host:
                          type: string
                          description: SSH destination server host for SFTP type storage medium
                        password:
                          type: string
                          description: SSH destination server password for SFTP type storage medium when
                            auth_method is "PASSWORD". If auth_method is "KEY",
                            this specifies the password for the ssh private key.
                        path:
                          type: string
                          description: Path relative to the bucket root at which the recording will be
                            placed.
                        port:
                          type: number
                          description: SSH destination server port for SFTP type storage medium
                        private_key:
                          type: string
                          description: Private key used to login to destination SSH server for SFTP type
                            storage medium, when auth_method used is "KEY"
                        region:
                          type: string
                          description: Region of the storage medium.
                        secret:
                          type: string
                          description: Secret key of the storage medium. Similar to `access_key`, it is
                            only writeable by clients, not readable.
                        username:
                          type: string
                          description: SSH destination server username for SFTP type storage medium
                      required:
                        - type
                  nullable: true
                  description: Body param
                url:
                  type: string
                  description: "Body param: Pass a custom url to record arbitary screen"
                video_config:
                  type: object
                  properties:
                    codec:
                      type: string
                      enum:
                        - H264
                        - VP8
                      description: Codec using which the recording will be encoded.
                    export_file:
                      type: boolean
                      description: Controls whether to export video file seperately
                    height:
                      type: number
                      description: Height of the recording video in pixels
                    watermark:
                      type: object
                      properties:
                        position:
                          type: string
                          enum:
                            - left top
                            - right top
                            - left bottom
                            - right bottom
                          description: Position of the watermark
                        size:
                          type: object
                          properties:
                            height:
                              type: number
                              description: Height of the watermark in px
                            width:
                              type: number
                              description: Width of the watermark in px
                          description: Size of the watermark
                        url:
                          type: string
                          description: URL of the watermark image
                      description: Watermark to be added to the recording
                    width:
                      type: number
                      description: Width of the recording video in pixels
                  description: Body param
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Success status of the operation
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: ID of the recording
                      audio_download_url:
                        oneOf:
                          - type: string
                        nullable: true
                        description: If the audio_config is passed, the URL for downloading the audio
                          recording is returned.
                      download_url:
                        oneOf:
                          - type: string
                        nullable: true
                        description: URL where the recording can be downloaded.
                      download_url_expiry:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Timestamp when the download URL expires.
                      file_size:
                        oneOf:
                          - type: number
                        nullable: true
                        description: File size of the recording, in bytes.
                      invoked_time:
                        type: string
                        description: Timestamp when this recording was invoked.
                      output_file_name:
                        type: string
                        description: File name of the recording.
                      session_id:
                        oneOf:
                          - type: string
                        nullable: true
                        description: ID of the meeting session this recording is for.
                      started_time:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Timestamp when this recording actually started after being invoked.
                          Usually a few seconds after `invoked_time`.
                      status:
                        type: string
                        enum:
                          - INVOKED
                          - RECORDING
                          - UPLOADING
                          - UPLOADED
                          - ERRORED
                          - PAUSED
                        description: Current status of the recording.
                      stopped_time:
                        oneOf:
                          - type: string
                        nullable: true
                        description: Timestamp when this recording was stopped. Optional; is present
                          only when the recording has actually been stopped.
                      recording_duration:
                        type: number
                        description: Total recording time in seconds.
                      start_reason:
                        type: object
                        properties:
                          caller:
                            type: object
                            properties:
                              name:
                                type: string
                                description: Name of the user who started the recording.
                              type:
                                type: string
                                enum:
                                  - ORGANIZATION
                                  - USER
                                description: The type can be an App or a user. If the type is `user`, then only
                                  the `user_Id` and `name` are returned.
                              user_Id:
                                type: string
                                description: The user ID of the person who started the recording.
                          reason:
                            type: string
                            enum:
                              - API_CALL
                              - RECORD_ON_START
                            description: Specifies if the recording was started using the "Start a
                              Recording"API or using the parameter
                              RECORD_ON_START in the "Create a meeting" API.  If
                              the recording is initiated using the
                              "RECORD_ON_START" parameter, the user details will
                              not be populated.
                      stop_reason:
                        type: object
                        properties:
                          caller:
                            type: object
                            properties:
                              name:
                                type: string
                                description: Name of the user who stopped the recording.
                              type:
                                type: string
                                enum:
                                  - ORGANIZATION
                                  - USER
                                description: The type can be an App or a user. If the type is `user`, then only
                                  the `user_Id` and `name` are returned.
                              user_Id:
                                type: string
                                description: The user ID of the person who stopped the recording.
                          reason:
                            type: string
                            enum:
                              - API_CALL
                              - INTERNAL_ERROR
                              - ALL_PEERS_LEFT
                            description: Specifies the reason why the recording stopped.
                      storage_config:
                        oneOf:
                          - type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - aws
                                  - azure
                                  - digitalocean
                                  - gcs
                                  - sftp
                                description: Type of storage media.
                              auth_method:
                                type: string
                                enum:
                                  - KEY
                                  - PASSWORD
                                description: Authentication method used for "sftp" type storage medium
                              bucket:
                                type: string
                                description: Name of the storage medium's bucket.
                              host:
                                type: string
                                description: SSH destination server host for SFTP type storage medium
                              password:
                                type: string
                                description: SSH destination server password for SFTP type storage medium when
                                  auth_method is "PASSWORD". If auth_method is
                                  "KEY", this specifies the password for the ssh
                                  private key.
                              path:
                                type: string
                                description: Path relative to the bucket root at which the recording will be
                                  placed.
                              port:
                                type: number
                                description: SSH destination server port for SFTP type storage medium
                              private_key:
                                type: string
                                description: Private key used to login to destination SSH server for SFTP type
                                  storage medium, when auth_method used is "KEY"
                              region:
                                type: string
                                description: Region of the storage medium.
                              secret:
                                type: string
                                description: Secret key of the storage medium. Similar to `access_key`, it is
                                  only writeable by clients, not readable.
                              username:
                                type: string
                                description: SSH destination server username for SFTP type storage medium
                            required:
                              - type
                        nullable: true
                    required:
                      - id
                      - audio_download_url
                      - download_url
                      - download_url_expiry
                      - file_size
                      - invoked_time
                      - output_file_name
                      - session_id
                      - started_time
                      - status
                      - stopped_time
                    description: Data returned by the operation
                required:
                  - success
  /accounts/{account_id}/realtime/kit/{appId}/sessions/{sessionId}/chat:
    get:
      operationId: getSessionChatSession
      description: "Returns a URL to download all chat messages of the session ID in
        CSV format.  @example ```ts const response = await
        client.realtimeKit.sessions.getSessionChat( 'app_id', 'session_id', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: The account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      chat_download_url:
                        type: string
                        description: URL where the chat logs can be downloaded
                      chat_download_url_expiry:
                        type: string
                        description: Time when the download URL will expire
                    required:
                      - chat_download_url
                      - chat_download_url_expiry
                  success:
                    type: boolean
  /accounts/{account_id}/realtime/kit/{appId}/sessions/{sessionId}:
    get:
      operationId: getSessionDetailsSession
      description: "Returns data of the given session ID including recording
        details.  @example ```ts const response = await
        client.realtimeKit.sessions.getSessionDetails( 'app_id', 'session_id', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The account identifier tag."
          schema:
            type: string
        - name: include_breakout_rooms
          in: query
          required: false
          description: "Query param: List all breakout rooms"
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      session:
                        type: object
                        properties:
                          id:
                            type: string
                            description: ID of the session
                          associated_id:
                            type: string
                            description: ID of the meeting this session is associated with. In the case of
                              V2 meetings, it is always a UUID. In V1 meetings,
                              it is a room name of the form `abcdef-ghijkl`
                          created_at:
                            type: string
                            description: timestamp when session created
                          live_participants:
                            type: number
                            description: number of participants currently in the session
                          max_concurrent_participants:
                            type: number
                            description: number of maximum participants that were in the session
                          meeting_display_name:
                            type: string
                            description: Title of the meeting this session belongs to
                          minutes_consumed:
                            type: number
                            description: number of minutes consumed since the session started
                          organization_id:
                            type: string
                            description: App id that hosted this session
                          started_at:
                            type: string
                            description: timestamp when session started
                          status:
                            type: string
                            enum:
                              - LIVE
                              - ENDED
                            description: current status of session
                          type:
                            type: string
                            enum:
                              - meeting
                              - livestream
                              - participant
                            description: type of session
                          updated_at:
                            type: string
                            description: timestamp when session was last updated
                          breakout_rooms:
                            type: array
                            items: {}
                          ended_at:
                            type: string
                            description: timestamp when session ended
                          meta:
                            description: Any meta data about session.
                        required:
                          - id
                          - associated_id
                          - created_at
                          - live_participants
                          - max_concurrent_participants
                          - meeting_display_name
                          - minutes_consumed
                          - organization_id
                          - started_at
                          - status
                          - type
                          - updated_at
                  success:
                    type: boolean
