                                        type: number
                                      packets_lost:
                                        type: number
                                      quality:
                                        type: number
                                      timestamp:
                                        type: string
                                average_quality:
                                  type: number
                                end:
                                  type: string
                                peer_id:
                                  type: string
                                start:
                                  type: string
                                video_bandwidth:
                                  type: number
                                video_packet_loss:
                                  type: number
                                video_stats:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      frame_height:
                                        type: number
                                      frame_width:
                                        type: number
                                      frames_dropped:
                                        type: number
                                      frames_per_second:
                                        type: number
                                      jitter:
                                        type: number
                                      packets_lost:
                                        type: number
                                      quality:
                                        type: number
                                      timestamp:
                                        type: string
                          updated_at:
