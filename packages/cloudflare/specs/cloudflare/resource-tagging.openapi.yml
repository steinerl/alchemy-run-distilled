paths:
  /accounts/{account_id}/tags:
    get:
      operationId: getAccountTag
      description: Retrieves tags for a specific account-level resource.
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: resource_id
          in: query
          required: true
          description: "Query param: The ID of the resource to retrieve tags for."
          schema:
            type: string
        - name: resource_type
          in: query
          required: true
          description: "Query param: The type of the resource."
          schema:
            type: string
            enum:
              - access_application
              - access_group
              - account
              - ai_gateway
              - alerting_policy
              - alerting_webhook
              - cloudflared_tunnel
              - d1_database
              - durable_object_namespace
              - gateway_list
              - gateway_rule
              - image
              - kv_namespace
              - queue
              - r2_bucket
              - resource_share
              - stream_live_input
              - stream_video
              - worker
              - worker_version
        - name: worker_id
          in: query
          required: false
          description: "Query param: Worker identifier. Required for worker_version
            resources."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
