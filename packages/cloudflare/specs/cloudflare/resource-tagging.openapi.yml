        Replaces all existing tags for the resource.  @example ```ts const
        zoneTag = await client.resourceTagging.zoneTags.update({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', resource_id:
        '023e105f4ecef8ad9ca31a8372d0c353', resource_type: 'zone', }); ```"
