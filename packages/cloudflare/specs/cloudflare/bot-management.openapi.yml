openapi: 3.1.0
info:
  title: Cloudflare BOT-MANAGEMENT API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: bot-management
paths:
  /zones/{zone_id}/bot_management:
    get:
      operationId: getBotManagement
      description: "Retrieve a zone's Bot Management Config  @example ```ts const
        botManagement = await client.botManagement.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ai_bots_protection:
                        type: string
                        enum:
                          - block
                          - disabled
                          - only_on_ad_pages
                        description: Enable rule to block AI Scrapers and Crawlers. Please note the
                          value `only_on_ad_pages` is currently not available
                          for Enterprise customers.
                      cf_robots_variant:
                        type: string
                        enum:
                          - off
                          - policy_only
                        description: Specifies the Robots Access Control License variant to use.
                      content_bots_protection:
                        type: string
                        enum:
                          - block
                          - disabled
                        description: Enable rule to block content bots. When enabled, blocks automated
                          traffic with low bot scores, excluding safe verified
                          bot categories. Exceptions should be managed via skip
                          rules.
                      crawler_protection:
                        type: string
                        enum:
                          - enabled
                          - disabled
                        description: Enable rule to punish AI Scrapers and Crawlers via a link maze.
                      enable_js:
                        type: boolean
                        description: Use lightweight, invisible JavaScript detections to improve Bot
                          Management. [Learn more about JavaScript
                          Detections](https://developers.cloudflare.com/bots/reference/javascript-detections/).
                      fight_mode:
                        type: boolean
                        description: Whether to enable Bot Fight Mode.
                      is_robots_txt_managed:
                        type: boolean
                        description: Enable cloudflare managed robots.txt. If an existing robots.txt is
                          detected, then managed robots.txt will be prepended to
                          the existing robots.txt.
                      stale_zone_configuration:
                        type: object
                        properties:
                          optimize_wordpress:
                            type: boolean
                            description: Indicates that the zone's wordpress optimization for SBFM is turned
                              on.
                          sbfm_definitely_automated:
                            type: string
                            description: Indicates that the zone's definitely automated requests are being
                              blocked or challenged.
                          sbfm_likely_automated:
                            type: string
                            description: Indicates that the zone's likely automated requests are being
                              blocked or challenged.
                          sbfm_static_resource_protection:
                            type: string
                            description: Indicates that the zone's static resource protection is turned on.
                          sbfm_verified_bots:
                            type: string
                            description: Indicates that the zone's verified bot requests are being blocked.
                          suppress_session_score:
                            type: boolean
                            description: Indicates that the zone's session score tracking is disabled.
                        description: A read-only field that shows which unauthorized settings are
                          currently active on the zone. These settings typically
                          result from upgrades or downgrades.
                      using_latest_model:
                        type: boolean
                        description: A read-only field that indicates whether the zone currently is
                          running the latest ML model.
                  - type: object
                    properties:
                      ai_bots_protection:
                        type: string
