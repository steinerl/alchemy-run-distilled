                    more.](https://developers.cloudflare.com/bots/reference/mac\
                    hine-learning-models#model-versions-and-release-notes)"
                bm_cookie_enabled:
                  type: boolean
                  description: "Body param: Indicates that the bot management cookie can be placed
                    on end user devices accessing the site. Defaults to true"
                suppress_session_score:
                  type: boolean
                  description: "Body param: Whether to disable tracking the highest bot score for
                    a session in the Bot Management cookie."
