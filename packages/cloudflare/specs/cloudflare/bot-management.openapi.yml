                  description: "Body param: Enable rule to block AI Scrapers and Crawlers. Please
                    note the value `only_on_ad_pages` is currently not available
                    for Enterprise customers."
                cf_robots_variant:
                  type: string
                  enum:
                    - off
                    - policy_only
                  description: "Body param: Specifies the Robots Access Control License variant to
                    use."
                content_bots_protection:
                  type: string
                  enum:
                    - block
                    - disabled
                  description: "Body param: Enable rule to block content bots. When enabled,
                    blocks automated traffic with low bot scores, excluding safe
                    verified bot categories. Exceptions should be managed via
                    skip rules."
                crawler_protection:
                  type: string
                  enum:
                    - enabled
                    - disabled
                  description: "Body param: Enable rule to punish AI Scrapers and Crawlers via a
                    link maze."
                enable_js:
                  type: boolean
                  description: "Body param: Use lightweight, invisible JavaScript detections to
                    improve Bot Management. [Learn more about JavaScript
                    Detections](https://developers.cloudflare.com/bots/referenc\
                    e/javascript-detections/)."
                fight_mode:
                  type: boolean
                  description: "Body param: Whether to enable Bot Fight Mode."
                is_robots_txt_managed:
                  type: boolean
                  description: "Body param: Enable cloudflare managed robots.txt. If an existing
                    robots.txt is detected, then managed robots.txt will be
                    prepended to the existing robots.txt."
                optimize_wordpress:
                  type: boolean
                  description: "Body param: Whether to optimize Super Bot Fight Mode protections
                    for Wordpress."
                sbfm_definitely_automated:
                  type: string
                  enum:
                    - allow
                    - block
                    - managed_challenge
                  description: "Body param: Super Bot Fight Mode (SBFM) action to take on
                    definitely automated requests."
                sbfm_static_resource_protection:
                  type: boolean
                  description: "Body param: Super Bot Fight Mode (SBFM) to enable static resource
                    protection. Enable if static resources on your application
                    need bot protection. Note: Static resource protection can
                    also result in legitimate traffic being blocked."
                sbfm_verified_bots:
                  type: string
                  enum:
                    - allow
                    - block
                  description: "Body param: Super Bot Fight Mode (SBFM) action to take on verified
                    bots requests."
                sbfm_likely_automated:
