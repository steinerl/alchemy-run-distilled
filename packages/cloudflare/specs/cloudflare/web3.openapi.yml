openapi: 3.1.0
info:
  title: Cloudflare WEB3 API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: web3
paths:
  /zones/{zone_id}/web3/hostnames/{identifier}:
    get:
      operationId: getHostname
      description: "Web3 Hostname Details  @example ```ts const hostname = await
        client.web3.hostnames.get( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Specify the identifier of the hostname.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Specify the identifier of the hostname.
                  created_on:
                    type: string
                  description:
                    type: string
                    description: Specify an optional description of the hostname.
                  dnslink:
                    type: string
                    description: Specify the DNSLink value used if the target is ipfs.
                  modified_on:
                    type: string
                  name:
                    type: string
                    description: Specify the hostname that points to the target gateway via CNAME.
                  status:
                    type: string
                    enum:
                      - active
                      - pending
                      - deleting
                      - error
                    description: Specifies the status of the hostname's activation.
                  target:
                    type: string
                    enum:
                      - ethereum
                      - ipfs
                      - ipfs_universal_path
                    description: Specify the target gateway of the hostname.
      x-distilled-response-path: result
      x-distilled-errors:
        Web3HostnameNotFound:
          - code: 1002
        Forbidden:
          - status: 403
    patch:
      operationId: patchHostname
      description: "Edit Web3 Hostname  @example ```ts const hostname = await
        client.web3.hostnames.edit( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Specify the identifier of the hostname."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: "Body param: Specify an optional description of the hostname."
                dnslink:
                  type: string
                  description: "Body param: Specify the DNSLink value used if the target is ipfs."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Specify the identifier of the hostname.
                  created_on:
                    type: string
                  description:
                    type: string
                    description: Specify an optional description of the hostname.
                  dnslink:
                    type: string
                    description: Specify the DNSLink value used if the target is ipfs.
                  modified_on:
                    type: string
                  name:
                    type: string
                    description: Specify the hostname that points to the target gateway via CNAME.
                  status:
                    type: string
                    enum:
                      - active
                      - pending
                      - deleting
                      - error
                    description: Specifies the status of the hostname's activation.
                  target:
                    type: string
                    enum:
                      - ethereum
                      - ipfs
                      - ipfs_universal_path
                    description: Specify the target gateway of the hostname.
      x-distilled-response-path: result
      x-distilled-errors:
        Web3HostnameNotFound:
          - code: 1002
        Forbidden:
          - status: 403
    delete:
      operationId: deleteHostname
      description: "Delete Web3 Hostname  @example ```ts const hostname = await
        client.web3.hostnames.delete( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Specify the identifier of the hostname.
          schema:
            type: string
      responses:
        "200":
          description: Success
