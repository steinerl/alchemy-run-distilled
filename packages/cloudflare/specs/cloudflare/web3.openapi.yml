          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "Body param: Specify the hostname that points to the target gateway
                    via CNAME."
                target:
                  type: string
                  enum:
                    - ethereum
                    - ipfs
                    - ipfs_universal_path
                  description: "Body param: Specify the target gateway of the hostname."
                description:
                  type: string
                  description: "Body param: Specify an optional description of the hostname."
                dnslink:
                  type: string
                  description: "Body param: Specify the DNSLink value used if the target is ipfs."
              required:
                - name
                - target
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Specify the identifier of the hostname.
                  created_on:
                    type: string
                  description:
                    type: string
                    description: Specify an optional description of the hostname.
                  dnslink:
                    type: string
                    description: Specify the DNSLink value used if the target is ipfs.
                  modified_on:
                    type: string
                  name:
                    type: string
                    description: Specify the hostname that points to the target gateway via CNAME.
                  status:
                    type: string
                    enum:
                      - active
                      - pending
                      - deleting
                      - error
                    description: Specifies the status of the hostname's activation.
                  target:
                    type: string
                    enum:
                      - ethereum
                      - ipfs
                      - ipfs_universal_path
                    description: Specify the target gateway of the hostname.
      x-distilled-response-path: result
      x-distilled-errors:
        Web3HostnameNotEntitled:
          - code: 1010
            message:
              includes: not entitled
        Forbidden:
          - status: 403
  /zones/{zone_id}/web3/hostnames/{identifier}/ipfs_universal_path/content_list:
    get:
      operationId: getHostnameIpfsUniversalPathContentList
      description: "IPFS Universal Path Gateway Content List Details  @example ```ts
        const contentList = await
        client.web3.hostnames.ipfsUniversalPaths.contentLists.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Specify the identifier of the hostname.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum:
                      - block
                    description: Behavior of the content list.
      x-distilled-response-path: result
      x-distilled-errors:
        Web3HostnameNotFound:
          - code: 1002
        InvalidWeb3HostnameTarget:
          - code: 1006
        Forbidden:
          - status: 403
    put:
      operationId: putHostnameIpfsUniversalPathContentList
      description: "Update IPFS Universal Path Gateway Content List  @example ```ts
        const contentList = await
        client.web3.hostnames.ipfsUniversalPaths.contentLists.update(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', action: 'block', entries: [{}], },
        ); ```"
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Specify the identifier of the hostname."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - block
                  description: "Body param: Behavior of the content list."
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      content:
                        type: string
                        description: Specify the CID or content path of content to block.
                      description:
                        type: string
                        description: Specify an optional description of the content list entry.
                      type:
                        type: string
                        enum:
                          - cid
                          - content_path
                        description: Specify the type of content list entry to block.
                  description: "Body param: Provides content list entries."
              required:
                - action
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum:
                      - block
                    description: Behavior of the content list.
      x-distilled-response-path: result
      x-distilled-errors:
        Web3HostnameNotFound:
          - code: 1002
        InvalidWeb3HostnameTarget:
          - code: 1006
        Forbidden:
          - status: 403
