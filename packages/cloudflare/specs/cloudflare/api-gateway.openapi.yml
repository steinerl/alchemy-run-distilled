openapi: 3.1.0
info:
  title: Cloudflare API-GATEWAY API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: api-gateway
paths:
  /zones/{zone_id}/api_gateway/configuration:
    get:
      operationId: getConfiguration
      description: "Retrieve information about specific configuration
        properties  @example ```ts const configuration = await
        client.apiGateway.configurations.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: normalize
          in: query
          required: false
          description: "Query param: Ensures that the configuration is written or
            retrieved in normalized fashion"
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_id_characteristics:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            name:
                              type: string
                              description: The name of the characteristic field, i.e., the header or cookie
                                name.
                            type:
                              type: string
                              enum:
                                - header
                                - cookie
                              description: The type of characteristic.
                          required:
                            - name
                            - type
                        - type: object
                          properties:
                            name:
                              type: string
                              description: Claim location expressed as `$(token_config_id):$(json_path)`,
                                where `token_config_id` is the ID of the token
                                configuration used in validating the JWT, and
                                `json_path` is a RFC 9535 JSONPath
                                (https://goessner.net/articles/JsonPath/,
                                https://www.rfc-editor.org/rfc/rfc9535.html).
                                The JSONPath expression may be in dot or bracket
                                notation, may only specify literal keys or array
                                indexes, and must return a singleton value,
                                which will be interpreted as a string.
                            type:
                              type: string
                              enum:
                                - jwt
                              description: The type of characteristic.
                          required:
                            - name
                            - type
                required:
                  - auth_id_characteristics
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        NotEntitled:
          - code: 10403
    put:
      operationId: putConfiguration
      description: "Update configuration properties  @example ```ts const
        configuration = await client.apiGateway.configurations.update({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', auth_id_characteristics: [ { name:
        'authorization', type: 'header' }, ], }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: normalize
          in: query
          required: false
          description: "Query param: Ensures that the configuration is written or
            retrieved in normalized fashion"
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_id_characteristics:
                  type: array
                  items:
                    oneOf:
                      - type: object
                        properties:
                          name:
                            type: string
                            description: The name of the characteristic field, i.e., the header or cookie
                              name.
                          type:
                            type: string
                            enum:
                              - header
                              - cookie
                            description: The type of characteristic.
                        required:
                          - name
                          - type
                      - type: object
                        properties:
                          name:
                            type: string
                            description: Claim location expressed as `$(token_config_id):$(json_path)`,
                              where `token_config_id` is the ID of the token
                              configuration used in validating the JWT, and
                              `json_path` is a RFC 9535 JSONPath
                              (https://goessner.net/articles/JsonPath/,
                              https://www.rfc-editor.org/rfc/rfc9535.html). The
                              JSONPath expression may be in dot or bracket
                              notation, may only specify literal keys or array
                              indexes, and must return a singleton value, which
                              will be interpreted as a string.
                          type:
                            type: string
                            enum:
                              - jwt
                            description: The type of characteristic.
                        required:
                          - name
                          - type
                  description: "Body param:"
              required:
                - auth_id_characteristics
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_id_characteristics:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            name:
                              type: string
                              description: The name of the characteristic field, i.e., the header or cookie
                                name.
                            type:
                              type: string
                              enum:
                                - header
                                - cookie
                              description: The type of characteristic.
                          required:
                            - name
                            - type
                        - type: object
                          properties:
                            name:
                              type: string
                              description: Claim location expressed as `$(token_config_id):$(json_path)`,
                                where `token_config_id` is the ID of the token
                                configuration used in validating the JWT, and
                                `json_path` is a RFC 9535 JSONPath
                                (https://goessner.net/articles/JsonPath/,
                                https://www.rfc-editor.org/rfc/rfc9535.html).
                                The JSONPath expression may be in dot or bracket
                                notation, may only specify literal keys or array
                                indexes, and must return a singleton value,
                                which will be interpreted as a string.
                            type:
                              type: string
                              enum:
                                - jwt
                              description: The type of characteristic.
                          required:
                            - name
                            - type
                required:
                  - auth_id_characteristics
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        NotEntitled:
          - code: 10403
  /zones/{zone_id}/api_gateway/discovery:
    get:
      operationId: getDiscovery
      description: "Retrieve the most up to date view of discovered operations,
        rendered as OpenAPI schemas  @example ```ts const discovery = await
        client.apiGateway.discovery.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items: {}
                  timestamp:
                    type: string
                required:
                  - schemas
                  - timestamp
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        NotEntitled:
          - code: 10403
          - code: 10404
  /zones/{zone_id}/api_gateway/discovery/operations:
    get:
      operationId: listDiscoveryOperations
      description: "Retrieve the most up to date view of discovered
        operations  @example ```ts // Automatically fetches more pages as
        needed. for await (const discoveryOperation of
        client.apiGateway.discovery.operations.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: diff
          in: query
          required: false
          description: "Query param: When `true`, only return API Discovery results that
            are not saved into API Shield Endpoint Management"
          schema:
            type: boolean
        - name: direction
          in: query
          required: false
          description: "Query param: Direction to order results."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: endpoint
          in: query
          required: false
          description: "Query param: Filter results to only include endpoints containing
            this pattern."
          schema:
            type: string
        - name: host
          in: query
          required: false
          description: "Query param: Filter results to only include the specified hosts."
          schema:
            type: array
            items:
              type: string
        - name: method
          in: query
          required: false
          description: "Query param: Filter results to only include the specified HTTP
            methods."
          schema:
            type: array
            items:
              type: string
        - name: order
          in: query
          required: false
          description: "Query param: Field to order by"
          schema:
            type: string
            enum:
              - host
              - method
              - endpoint
              - traffic_stats.requests
              - traffic_stats.last_updated
        - name: origin
          in: query
          required: false
          description: "Query param: Filter results to only include discovery results
            sourced from a particular discovery engine  - `ML` - Discovered
            operations that were sourced using ML API Discovery -
            `SessionIdentifier` - Discovered operations that were sourced using
            Session Identifier API Discovery"
          schema:
            type: string
            enum:
              - ML
              - SessionIdentifier
              - LabelDiscovery
        - name: state
          in: query
          required: false
          description: "Query param: Filter results to only include discovery results in a
            particular state. States are as follows  - `review` - Discovered
            operations that are not saved into API Shield Endpoint Management -
            `saved` - Discovered operations that are already saved into API
            Shield Endpoint Management - `ignored` - Discovered operations that
            have been marked as ignored"
          schema:
            type: string
            enum:
              - review
              - saved
              - ignored
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID.
                  endpoint:
                    type: string
                    description: "The endpoint which can contain path parameter templates in curly
                      braces, each will be replaced from left to right with
                      {varN}, starting with {var1}, during insertion. This will
                      further be Cloudflare-normalized upon insertion. See:
                      https://developers.cloudflare.com/rules/normalization/how\
                      -it-works/."
                  host:
                    type: string
                    description: RFC3986-compliant host.
                  last_updated:
                    type: string
                  method:
                    type: string
                    enum:
                      - GET
                      - POST
                      - HEAD
                      - OPTIONS
                      - PUT
                      - DELETE
                      - CONNECT
                      - PATCH
                      - TRACE
                    description: The HTTP method used to access the endpoint.
                  origin:
                    type: array
                    items:
                      type: string
                      enum:
                        - ML
                        - SessionIdentifier
                        - LabelDiscovery
                    description: API discovery engine(s) that discovered this operation
                  state:
                    type: string
                    enum:
                      - review
                      - saved
                      - ignored
                    description: State of operation in API Discovery  - `review` - Operation is not
                      saved into API Shield Endpoint Management - `saved` -
                      Operation is saved into API Shield Endpoint Management -
                      `ignored` - Operation is marked as ignored
                  features:
                    type: object
                    properties:
                      traffic_stats:
                        type: object
                        properties:
                          last_updated:
                            type: string
                          period_seconds:
                            type: number
                            description: The period in seconds these statistics were computed over
                          requests:
                            type: number
                            description: The average number of requests seen during this period
                        required:
                          - last_updated
                          - period_seconds
                          - requests
                required:
                  - id
                  - endpoint
                  - host
                  - last_updated
                  - method
                  - origin
                  - state
      x-distilled-pagination-class: DiscoveryOperationsV4PagePaginationArray
    patch:
      operationId: bulkPatchDiscoveryOperations
      description: "Update the `state` on one or more discovered operations  @example
        ```ts const response = await
        client.apiGateway.discovery.operations.bulkEdit({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', body: {
        '3818d821-5901-4147-a474-f5f5aec1d54e': {},
        'b17c8043-99a0-4202-b7d9-8f7cdbee02cd': {}, }, }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        NotEntitled:
          - code: 10403
  /zones/{zone_id}/api_gateway/discovery/operations/{operationId}:
    patch:
      operationId: patchDiscoveryOperation
      description: "Update the `state` on a discovered operation  @example ```ts const
        response = await client.apiGateway.discovery.operations.edit(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  type: string
                  enum:
                    - review
                    - ignored
                  description: "Body param: Mark state of operation in API Discovery  - `review` -
                    Mark operation as for review - `ignored` - Mark operation as
                    ignored"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum:
                      - review
                      - saved
                      - ignored
                    description: State of operation in API Discovery  - `review` - Operation is not
                      saved into API Shield Endpoint Management - `saved` -
                      Operation is saved into API Shield Endpoint Management -
                      `ignored` - Operation is marked as ignored
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        NotEntitled:
          - code: 10403
  /zones/{zone_id}/api_gateway/expression-template/fallthrough:
    post:
      operationId: createExpressionTemplateFallthrough
      description: "Generate fallthrough WAF expression template from a set of API
        hosts  @example ```ts const fallthrough = await
        client.apiGateway.expressionTemplate.fallthrough.create( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', hosts: ['{zone}.domain1.tld',
        'domain2.tld'], }, ); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hosts:
                  type: array
                  items:
                    type: string
                  description: "Body param: List of hosts to be targeted in the expression"
              required:
                - hosts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  expression:
                    type: string
                    description: WAF Expression for fallthrough
                  title:
                    type: string
                    description: Title for the expression
                required:
                  - expression
                  - title
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
  /zones/{zone_id}/api_gateway/operations/{operationId}:
    get:
      operationId: getOperation
      description: "Retrieve information about an operation  @example ```ts const
        operation = await client.apiGateway.operations.get(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: feature
          in: query
          required: false
          description: "Query param: Add feature(s) to the results. The feature name that
            is given here corresponds to the resulting feature object. Have a
            look at the top-level object description for more details on the
            specific meaning."
          schema:
            type: array
            items:
              type: string
              enum:
                - thresholds
                - parameter_schemas
                - schema_info
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: string
                    description: "The endpoint which can contain path parameter templates in curly
                      braces, each will be replaced from left to right with
                      {varN}, starting with {var1}, during insertion. This will
                      further be Cloudflare-normalized upon insertion. See:
                      https://developers.cloudflare.com/rules/normalization/how\
                      -it-works/."
                  host:
                    type: string
                    description: RFC3986-compliant host.
                  last_updated:
                    type: string
                  method:
                    type: string
                    enum:
                      - GET
                      - POST
                      - HEAD
                      - OPTIONS
                      - PUT
                      - DELETE
                      - CONNECT
                      - PATCH
                      - TRACE
                    description: The HTTP method used to access the endpoint.
                  operation_id:
                    type: string
                    description: UUID.
                  features:
                    oneOf:
                      - type: object
                        properties:
                          thresholds:
                            type: object
                            properties:
                              auth_id_tokens:
                                type: number
                                description: The total number of auth-ids seen across this calculation.
                              data_points:
                                type: number
                                description: The number of data points used for the threshold suggestion
                                  calculation.
                              last_updated:
                                type: string
                              p50:
                                type: number
                                description: The p50 quantile of requests (in period_seconds).
                              p90:
                                type: number
                                description: The p90 quantile of requests (in period_seconds).
                              p99:
                                type: number
                                description: The p99 quantile of requests (in period_seconds).
                              period_seconds:
                                type: number
                                description: The period over which this threshold is suggested.
                              requests:
                                type: number
                                description: The estimated number of requests covered by these calculations.
                              suggested_threshold:
                                type: number
                                description: The suggested threshold in requests done by the same auth_id or
                                  period_seconds.
                      - type: object
                        properties:
                          parameter_schemas:
                            type: object
                            properties:
                              last_updated:
                                type: string
                              parameter_schemas:
                                type: object
                                properties:
                                  parameters:
                                    type: array
                                    items: {}
                                    description: An array containing the learned parameter schemas.
                                  responses:
                                    description: An empty response object. This field is required to yield a valid
                                      operation schema.
                                description: An operation schema object containing a response.
                        required:
                          - parameter_schemas
                      - type: object
                        properties:
                          api_routing:
                            type: object
                            properties:
                              last_updated:
                                type: string
                              route:
                                type: string
                                description: Target route.
                            description: API Routing settings on endpoint.
                      - type: object
                        properties:
                          confidence_intervals:
                            type: object
                            properties:
                              last_updated:
                                type: string
                              suggested_threshold:
                                type: object
                                properties:
                                  confidence_intervals:
                                    type: object
                                    properties:
                                      p90:
                                        type: object
                                        properties:
                                          lower:
                                            type: number
                                            description: Lower bound for percentile estimate
                                          upper:
                                            type: number
                                            description: Upper bound for percentile estimate
                                        description: Upper and lower bound for percentile estimate
                                      p95:
                                        type: object
                                        properties:
                                          lower:
                                            type: number
                                            description: Lower bound for percentile estimate
                                          upper:
                                            type: number
                                            description: Upper bound for percentile estimate
                                        description: Upper and lower bound for percentile estimate
                                      p99:
                                        type: object
                                        properties:
                                          lower:
                                            type: number
                                            description: Lower bound for percentile estimate
                                          upper:
                                            type: number
                                            description: Upper bound for percentile estimate
                                        description: Upper and lower bound for percentile estimate
                                  mean:
                                    type: number
                                    description: Suggested threshold.
                      - type: object
                        properties:
                          schema_info:
                            type: object
                            properties:
                              active_schema:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    description: UUID.
                                  created_at:
                                    type: string
                                  is_learned:
                                    type: boolean
                                    description: True if schema is Cloudflare-provided.
                                  name:
                                    type: string
                                    description: Schema file name.
                                description: Schema active on endpoint.
                              learned_available:
                                type: boolean
                                description: True if a Cloudflare-provided learned schema is available for this
                                  endpoint.
                              mitigation_action:
                                type: string
                                enum:
                                  - none
                                  - log
                                  - block
                                nullable: true
                                description: Action taken on requests failing validation.
                required:
                  - endpoint
                  - host
                  - last_updated
                  - method
                  - operation_id
      x-distilled-response-path: result
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        OperationNotFound:
          - code: 10404
    delete:
      operationId: deleteOperation
      description: "Delete an operation  @example ```ts const operation = await
        client.apiGateway.operations.delete(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: number
                        message:
                          type: string
                        documentation_url:
                          type: string
                        source:
                          type: object
                          properties:
                            pointer:
                              type: string
                      required:
                        - code
                        - message
                  success:
                    type: boolean
                    enum:
                      - true
                    description: Whether the API call was successful.
                required:
                  - errors
                  - messages
                  - success
      x-distilled-errors:
        InvalidObjectIdentifier:
          - code: 7003
        OperationNotFound:
          - code: 10404
  /zones/{zone_id}/api_gateway/operations:
    get:
      operationId: listOperations
      description: "Retrieve information about all operations on a zone  @example
        ```ts // Automatically fetches more pages as needed. for await (const
        operationListResponse of client.apiGateway.operations.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: direction
          in: query
          required: false
          description: "Query param: Direction to order results."
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: endpoint
          in: query
          required: false
          description: "Query param: Filter results to only include endpoints containing
            this pattern."
          schema:
            type: string
        - name: feature
          in: query
          required: false
          description: "Query param: Add feature(s) to the results. The feature name that
            is given here corresponds to the resulting feature object. Have a
            look at the top-level object description for more details on the
            specific meaning."
          schema:
            type: array
            items:
              type: string
              enum:
                - thresholds
                - parameter_schemas
                - schema_info
        - name: host
          in: query
          required: false
          description: "Query param: Filter results to only include the specified hosts."
          schema:
            type: array
            items:
              type: string
        - name: method
          in: query
          required: false
          description: "Query param: Filter results to only include the specified HTTP
            methods."
          schema:
            type: array
            items:
              type: string
        - name: order
          in: query
