openapi: 3.1.0
info:
  title: Cloudflare PIPELINES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: pipelines
paths:
  /accounts/{account_id}/pipelines/{pipelineName}:
    get:
      operationId: getPipeline
      description: "[DEPRECATED] Get configuration of a pipeline. Use the new
        /pipelines/v1/pipelines endpoint instead.  @deprecated Use get_v1
        instead. This endpoint will be removed in the future."
      parameters:
        - name: pipelineName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Specifies the public ID of the account.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Specifies the pipeline identifier.
                  destination:
                    type: object
                    properties:
                      batch:
                        type: object
                        properties:
                          max_bytes:
                            type: number
                            description: Specifies rough maximum size of files.
                          max_duration_s:
                            type: number
                            description: Specifies duration to wait to aggregate batches files.
                          max_rows:
                            type: number
                            description: Specifies rough maximum number of rows per file.
                        required:
                          - max_bytes
                          - max_duration_s
                          - max_rows
                      compression:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - none
                              - gzip
                              - deflate
                            description: Specifies the desired compression algorithm and format.
                        required:
                          - type
                      format:
                        type: string
                        enum:
                          - json
                        description: Specifies the format of data to deliver.
                      path:
                        type: object
                        properties:
                          bucket:
                            type: string
                            description: Specifies the R2 Bucket to store files.
                          filename:
                            type: string
                            description: Specifies the name pattern to for individual data files.
                          filepath:
                            type: string
                            description: Specifies the name pattern for directory.
                          prefix:
                            type: string
                            description: Specifies the base directory within the bucket.
                        required:
                          - bucket
                      type:
                        type: string
                        enum:
                          - r2
                        description: Specifies the type of destination.
                    required:
                      - batch
                      - compression
                      - format
                      - path
                      - type
                  endpoint:
                    type: string
                    description: Indicates the endpoint URL to send traffic.
                  name:
                    type: string
                    description: Defines the name of the pipeline.
                  source:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            format:
                              type: string
                              enum:
                                - json
                              description: Specifies the format of source data.
                            type:
                              type: string
                            authentication:
                              type: boolean
                              description: Specifies whether authentication is required to send to this
                                pipeline via HTTP.
                            cors:
                              type: object
                              properties:
                                origins:
                                  type: array
                                  items:
                                    type: string
                                  description: Specifies allowed origins to allow Cross Origin HTTP Requests.
                          required:
                            - format
                            - type
                        - type: object
                          properties:
                            format:
                              type: string
                              enum:
                                - json
                              description: Specifies the format of source data.
                            type:
                              type: string
                          required:
                            - format
                            - type
                  version:
                    type: number
                    description: Indicates the version number of last saved configuration.
                required:
                  - id
                  - destination
                  - endpoint
                  - name
                  - source
                  - version
      x-distilled-response-path: result
      x-distilled-errors:
        PipelineNotExists:
          - code: 1000
