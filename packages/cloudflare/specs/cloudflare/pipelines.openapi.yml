  /accounts/{account_id}/pipelines/v1/sinks/{sinkId}:
    get:
      operationId: getSink
      description: "Get Sink Details.  @example ```ts const sink = await
        client.pipelines.sinks.get( '0223105f4ecef8ad9ca31a8372d0c353', {
        account_id: '0123105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: sinkId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Specifies the public ID of the account.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Indicates a unique identifier for this sink.
                  created_at:
                    type: string
                  modified_at:
                    type: string
                  name:
                    type: string
                    description: Defines the name of the Sink.
                  type:
                    type: string
                    enum:
                      - r2
                      - r2_data_catalog
                    description: Specifies the type of sink.
                  config:
                    oneOf:
                      - type: object
                        properties:
                          account_id:
                            type: string
                            description: Cloudflare Account ID for the bucket
                          bucket:
                            type: string
                            description: R2 Bucket to write to
                          file_naming:
                            type: object
                            properties:
                              prefix:
                                type: string
                                description: The prefix to use in file name. i.e prefix-<uuid>.parquet
                              strategy:
                                type: string
                                enum:
                                  - serial
                                  - uuid
                                  - uuid_v7
                                  - ulid
                                description: Filename generation strategy.
                              suffix:
                                type: string
                                description: This will overwrite the default file suffix. i.e .parquet, use with
                                  caution
                            description: Controls filename prefix/suffix and strategy.
                          jurisdiction:
                            type: string
                            description: Jurisdiction this bucket is hosted in
                          partitioning:
                            type: object
                            properties:
                              time_pattern:
                                type: string
                                description: The pattern of the date string
                            description: Data-layout partitioning for sinks.
                          path:
                            type: string
                            description: Subpath within the bucket to write to
                          rolling_policy:
                            type: object
                            properties:
                              file_size_bytes:
                                type: number
                                description: Files will be rolled after reaching this number of bytes
                              inactivity_seconds:
                                type: number
                                description: Number of seconds of inactivity to wait before rolling over to a
                                  new file
                              interval_seconds:
                                type: number
                                description: Number of seconds to wait before rolling over to a new file
                            description: Rolling policy for file sinks (when & why to close a file and open
                              a new one).
                        required:
                          - account_id
                          - bucket
                      - type: object
                        properties:
                          account_id:
                            type: string
                            description: Cloudflare Account ID
                          bucket:
                            type: string
                            description: The R2 Bucket that hosts this catalog
                          table_name:
                            type: string
                            description: Table name
                          namespace:
                            type: string
                            description: Table namespace
                          rolling_policy:
                            type: object
                            properties:
                              file_size_bytes:
                                type: number
                                description: Files will be rolled after reaching this number of bytes
