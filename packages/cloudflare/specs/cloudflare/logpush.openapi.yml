    put:
      operationId: updateJob
      description: "Updates a Logpush job.  @example ```ts const logpushJob = await
        client.logpush.jobs.update(1, { account_id: 'account_id',
        destination_conf: 's3://mybucket/logs?region=us-west-2', filter:
        '{\"where\":{\"and\":[{\"key\":\"ClientRequestPath\",\"operator\":\"con\
        tains\",\"value\":\"/static\"},{\"key\":\"ClientRequestHost\",\"operator\
        \":\"eq\",\"value\":\"example.com\"}]}}', max_upload_bytes: 5000000,
        max_upload_interval_seconds: 30, max_upload_records: 1000,
        output_options: { 'CVE-2021-44228': false, batch_prefix: '',
        batch_suffix: '', field_delimiter: ',', field_names: ['Datetime',
        'DstIP', 'SrcIP'], output_type: 'ndjson', record_delimiter: '',
        record_prefix: '{', record_suffix: '}\\n', sample_rate: 1,
        timestamp_format: 'unixnano', }, ownership_challenge:
        '00000000000000000000', }); ```"
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: number
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID to use for this endpoint. Mutually
            exclusive with the Zone ID."
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: The Zone ID to use for this endpoint. Mutually
