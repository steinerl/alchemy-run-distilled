openapi: 3.1.0
info:
  title: Cloudflare IMAGES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: images
paths:
  /accounts/{account_id}/images/v1/{imageId}:
    get:
      operationId: getV1
      description: "Fetch details for a single image.  @example ```ts const image =
        await client.images.v1.get('image_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Image unique identifier.
                  creator:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Can set the creator field with an internal user ID.
                  filename:
                    type: string
                    description: Image file name.
                  meta:
                    description: User modifiable key-value store. Can be used for keeping references
                      to another system of record for managing images. Metadata
                      must not exceed 1024 bytes.
                  requireSignedURLs:
                    type: boolean
                    description: Indicates whether the image can be a accessed only using it's UID.
                      If set to true, a signed token needs to be generated with
                      a signing key to view the image.
                  uploaded:
                    type: string
                    description: When the media item was uploaded.
                  variants:
                    type: array
                    items:
                      type: string
                    description: Object specifying available variants for an image.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        ImageNotFound:
          - code: 5404
    patch:
      operationId: patchV1
      description: "Update image access control. On access control change, all copies
        of the image are purged from cache.  @example ```ts const image = await
        client.images.v1.edit('image_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                creator:
                  type: string
                  description: "Body param: Can set the creator field with an internal user ID."
                metadata:
                  description: "Body param: User modifiable key-value store. Can be used for
                    keeping references to another system of record for managing
                    images. No change if not specified."
                requireSignedURLs:
                  type: boolean
                  description: "Body param: Indicates whether the image can be accessed using only
                    its UID. If set to `true`, a signed token needs to be
                    generated with a signing key to view the image. Returns a
                    new UID on a change. No change if not specified."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Image unique identifier.
                  creator:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Can set the creator field with an internal user ID.
                  filename:
                    type: string
                    description: Image file name.
                  meta:
                    description: User modifiable key-value store. Can be used for keeping references
                      to another system of record for managing images. Metadata
                      must not exceed 1024 bytes.
                  requireSignedURLs:
                    type: boolean
                    description: Indicates whether the image can be a accessed only using it's UID.
                      If set to true, a signed token needs to be generated with
                      a signing key to view the image.
                  uploaded:
                    type: string
                    description: When the media item was uploaded.
                  variants:
                    type: array
                    items:
                      type: string
                    description: Object specifying available variants for an image.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        ImageNotFound:
          - code: 5404
    delete:
      operationId: deleteV1
      description: "Delete an image on Cloudflare Images. On success, all copies of
        the image are deleted and purged from cache.  @example ```ts const v1 =
        await client.images.v1.delete('image_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        ImageNotFound:
          - code: 5404
  /accounts/{account_id}/images/v1:
    get:
      operationId: listV1s
      description: List up to 100 images with one request. Use the optional parameters
        below to get a specific range of images.  @deprecated
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: creator
          in: query
          required: false
          description: 'Query param: Internal user ID set within the creator field.
            Setting to empty string "" will return images where creator field is
            not set'
          schema:
            oneOf:
              - type: string
            nullable: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Image unique identifier.
                        creator:
                          oneOf:
                            - type: string
                          nullable: true
                          description: Can set the creator field with an internal user ID.
                        filename:
                          type: string
                          description: Image file name.
                        meta:
                          description: User modifiable key-value store. Can be used for keeping references
                            to another system of record for managing images.
                            Metadata must not exceed 1024 bytes.
                        requireSignedURLs:
                          type: boolean
                          description: Indicates whether the image can be a accessed only using it's UID.
                            If set to true, a signed token needs to be generated
                            with a signing key to view the image.
                        uploaded:
                          type: string
                          description: When the media item was uploaded.
                        variants:
                          type: array
                          items:
                            type: string
                          description: Object specifying available variants for an image.
      x-distilled-pagination-class: V1ListResponsesV4PagePagination
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
    post:
      operationId: createV1
      description: "Upload an image with up to 10 Megabytes using a single HTTP POST
        (multipart/form-data) request. An image can be uploaded by sending an
        image file or passing an accessible to an API url.  @example ```ts const
        image = await client.images.v1.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: "Body param: An optional custom unique identifier for your image."
                creator:
                  type: string
                  description: "Body param: Can set the creator field with an internal user ID."
                file:
                  type: string
                  format: binary
                  description: "Body param: An image binary data. Only needed when type is
                    uploading a file."
                metadata:
                  description: "Body param: User modifiable key-value store. Can use used for
                    keeping references to another system of record for managing
                    images."
                requireSignedURLs:
                  type: boolean
                  description: "Body param: Indicates whether the image requires a signature token
                    for the access."
                url:
                  type: string
                  description: "Body param: A URL to fetch an image from origin. Only needed when
                    type is uploading from a URL."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Image unique identifier.
                  creator:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Can set the creator field with an internal user ID.
                  filename:
                    type: string
                    description: Image file name.
                  meta:
                    description: User modifiable key-value store. Can be used for keeping references
                      to another system of record for managing images. Metadata
                      must not exceed 1024 bytes.
                  requireSignedURLs:
                    type: boolean
                    description: Indicates whether the image can be a accessed only using it's UID.
                      If set to true, a signed token needs to be generated with
                      a signing key to view the image.
                  uploaded:
                    type: string
                    description: When the media item was uploaded.
                  variants:
                    type: array
                    items:
                      type: string
                    description: Object specifying available variants for an image.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
  /accounts/{account_id}/images/v1/{imageId}/blob:
    get:
      operationId: getV1Blob
      description: "Fetch base image. For most images this will be the originally
        uploaded file. For larger images it can be a near-lossless version of
        the original.  @example ```ts const blob = await
        client.images.v1.blobs.get('image_id', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', });  const content = await
        blob.blob(); console.log(content); ```"
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        ImageNotFound:
          - code: 5404
  /accounts/{account_id}/images/v1/keys:
    get:
      operationId: listV1Keys
      description: "Lists your signing keys. These can be found on your Cloudflare
        Images dashboard.  @example ```ts const keys = await
        client.images.v1.keys.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Key name.
                        value:
                          type: string
                          description: Key value.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
  /accounts/{account_id}/images/v1/keys/{signingKeyName}:
    put:
      operationId: putV1Key
      description: "Create a new signing key with specified name. Returns all keys
        available.  @example ```ts const key = await
        client.images.v1.keys.update('someKey', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: signingKeyName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Key name.
                        value:
                          type: string
                          description: Key value.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
    delete:
      operationId: deleteV1Key
      description: "Delete signing key with specified name. Returns all keys
        available. When last key is removed, a new default signing key will be
        generated.  @example ```ts const key = await
        client.images.v1.keys.delete('someKey', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: signingKeyName
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Key name.
                        value:
                          type: string
                          description: Key value.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        KeyNotFound:
          - code: 5404
  /accounts/{account_id}/images/v1/stats:
    get:
      operationId: getV1Stat
      description: "Fetch image statistics details for Cloudflare Images. The returned
        statistics detail storage usage, including the current image count vs
        this account's allowance.  @example ```ts const stat = await
        client.images.v1.stats.get({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: object
                    properties:
                      allowed:
                        type: number
                        description: Cloudflare Images allowed usage.
                      current:
                        type: number
                        description: Cloudflare Images current usage.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
  /accounts/{account_id}/images/v1/variants/{variantId}:
    get:
      operationId: getV1Variant
      description: "Fetch details for a single variant.  @example ```ts const variant
        = await client.images.v1.variants.get( 'hero', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  variant:
                    type: object
                    properties:
                      id:
                        type: string
                      options:
                        type: object
                        properties:
                          fit:
                            type: string
                            enum:
                              - scale-down
                              - contain
                              - cover
                              - crop
                              - pad
                            description: The fit property describes how the width and height dimensions
                              should be interpreted.
                          height:
                            type: number
                            description: Maximum height in image pixels.
                          metadata:
                            type: string
                            enum:
                              - keep
                              - copyright
                              - none
                            description: What EXIF data should be preserved in the output image.
                          width:
                            type: number
                            description: Maximum width in image pixels.
                        required:
                          - fit
                          - height
                          - metadata
                          - width
                        description: Allows you to define image resizing sizes for different use cases.
                      neverRequireSignedURLs:
                        type: boolean
                        description: Indicates whether the variant can access an image without a
                          signature, regardless of image access control.
                    required:
                      - id
                      - options
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        VariantNameNotAllowed:
          - code: 5400
        VariantNotFound:
          - code: 5401
          - status: 404
            message:
              includes: not found
    patch:
      operationId: patchV1Variant
      description: "Updating a variant purges the cache for all images associated with
        the variant.  @example ```ts const response = await
        client.images.v1.variants.edit( 'hero', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', options: { fit: 'scale-down',
        height: 768, metadata: 'none', width: 1366, }, }, ); ```"
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                options:
                  type: object
                  properties:
                    fit:
                      type: string
                      enum:
                        - scale-down
                        - contain
                        - cover
                        - crop
                        - pad
                      description: The fit property describes how the width and height dimensions
                        should be interpreted.
                    height:
                      type: number
                      description: Maximum height in image pixels.
                    metadata:
                      type: string
                      enum:
                        - keep
                        - copyright
                        - none
                      description: What EXIF data should be preserved in the output image.
                    width:
                      type: number
                      description: Maximum width in image pixels.
                  required:
                    - fit
                    - height
                    - metadata
                    - width
                  description: "Body param: Allows you to define image resizing sizes for
                    different use cases."
                neverRequireSignedURLs:
                  type: boolean
                  description: "Body param: Indicates whether the variant can access an image
                    without a signature, regardless of image access control."
              required:
                - options
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  variant:
                    type: object
                    properties:
                      id:
                        type: string
                      options:
                        type: object
                        properties:
                          fit:
                            type: string
                            enum:
                              - scale-down
                              - contain
                              - cover
                              - crop
                              - pad
                            description: The fit property describes how the width and height dimensions
                              should be interpreted.
                          height:
                            type: number
                            description: Maximum height in image pixels.
                          metadata:
                            type: string
                            enum:
                              - keep
                              - copyright
                              - none
                            description: What EXIF data should be preserved in the output image.
                          width:
                            type: number
                            description: Maximum width in image pixels.
                        required:
                          - fit
                          - height
                          - metadata
                          - width
                        description: Allows you to define image resizing sizes for different use cases.
                      neverRequireSignedURLs:
                        type: boolean
                        description: Indicates whether the variant can access an image without a
                          signature, regardless of image access control.
                    required:
                      - id
                      - options
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        VariantNameNotAllowed:
          - code: 5400
        VariantNotFound:
          - code: 5401
    delete:
      operationId: deleteV1Variant
      description: "Deleting a variant purges the cache for all images associated with
        the variant.  @example ```ts const variant = await
        client.images.v1.variants.delete( 'hero', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        VariantNameNotAllowed:
          - code: 5400
        VariantNotFound:
          - code: 5401
  /accounts/{account_id}/images/v1/variants:
    get:
      operationId: listV1Variants
      description: "Lists existing variants.  @example ```ts const variant = await
        client.images.v1.variants.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  options:
                    type: object
                    properties:
                      fit:
                        type: string
                        enum:
                          - scale-down
                          - contain
                          - cover
                          - crop
                          - pad
                        description: The fit property describes how the width and height dimensions
                          should be interpreted.
                      height:
                        type: number
                        description: Maximum height in image pixels.
                      metadata:
                        type: string
                        enum:
                          - keep
                          - copyright
                          - none
                        description: What EXIF data should be preserved in the output image.
                      width:
                        type: number
                        description: Maximum width in image pixels.
                    required:
                      - fit
                      - height
                      - metadata
                      - width
                    description: Allows you to define image resizing sizes for different use cases.
                  neverRequireSignedURLs:
                    type: boolean
                    description: Indicates whether the variant can access an image without a
                      signature, regardless of image access control.
                  variants:
                    type: object
                    additionalProperties: true
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
    post:
      operationId: createV1Variant
      description: "Specify variants that allow you to resize images for different use
        cases.  @example ```ts const variant = await
        client.images.v1.variants.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', id: 'hero', options: { fit:
        'scale-down', height: 768, metadata: 'none', width: 1366, }, }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Body param
                options:
                  type: object
                  properties:
                    fit:
                      type: string
                      enum:
                        - scale-down
                        - contain
                        - cover
                        - crop
                        - pad
                      description: The fit property describes how the width and height dimensions
                        should be interpreted.
                    height:
                      type: number
                      description: Maximum height in image pixels.
                    metadata:
                      type: string
                      enum:
                        - keep
                        - copyright
                        - none
                      description: What EXIF data should be preserved in the output image.
                    width:
                      type: number
                      description: Maximum width in image pixels.
                  required:
                    - fit
                    - height
                    - metadata
                    - width
                  description: "Body param: Allows you to define image resizing sizes for
                    different use cases."
                neverRequireSignedURLs:
                  type: boolean
                  description: "Body param: Indicates whether the variant can access an image
                    without a signature, regardless of image access control."
              required:
                - id
                - options
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  variant:
                    type: object
                    properties:
                      id:
                        type: string
                      options:
                        type: object
                        properties:
                          fit:
                            type: string
                            enum:
                              - scale-down
                              - contain
                              - cover
                              - crop
                              - pad
                            description: The fit property describes how the width and height dimensions
                              should be interpreted.
                          height:
                            type: number
                            description: Maximum height in image pixels.
                          metadata:
                            type: string
                            enum:
                              - keep
                              - copyright
                              - none
                            description: What EXIF data should be preserved in the output image.
                          width:
                            type: number
                            description: Maximum width in image pixels.
                        required:
                          - fit
                          - height
                          - metadata
                          - width
                        description: Allows you to define image resizing sizes for different use cases.
                      neverRequireSignedURLs:
                        type: boolean
                        description: Indicates whether the variant can access an image without a
                          signature, regardless of image access control.
                    required:
                      - id
                      - options
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        VariantNameNotAllowed:
          - code: 5400
        VariantAlreadyExists:
          - code: 5409
  /accounts/{account_id}/images/v2:
    get:
      operationId: listV2s
      description: "List up to 10000 images with up to 1000 results per page. Use the
        optional parameters below to get a specific range of images. Pagination
