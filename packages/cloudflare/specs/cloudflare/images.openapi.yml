  /accounts/{account_id}/images/v2/direct_upload:
    post:
      operationId: createV2DirectUpload
      description: "Direct uploads allow users to upload images without API keys. A
        common use case are web apps, client-side applications, or mobile
        devices where users upload content directly to Cloudflare Images. This
        method creates a draft record for a future image. It returns an upload
        URL and an image identifier. To verify if the image itself has been
        uploaded, send an image details request
        (accounts/:account_identifier/images/v1/:identifier), and check that the
        `draft: true` property is not present.  @example ```ts const
        directUpload = await client.images.v2.directUploads.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account identifier tag."
          schema:
            type: string
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: "Body param: Optional Image Custom ID. Up to 1024 chars. Can
                    include any number of subpaths, and utf8 characters. Cannot
                    start nor end with a / (forward slash). Cannot be a UUID."
                creator:
                  type: string
                  description: "Body param: Can set the creator field with an internal user ID."
                expiry:
                  type: string
                  description: "Body param: The date after which the upload will not be accepted.
                    Minimum: Now + 2 minutes. Maximum: Now + 6 hours."
                metadata:
                  description: "Body param: User modifiable key-value store. Can be used for
                    keeping references to another system of record, for managing
                    images."
                requireSignedURLs:
                  type: boolean
                  description: "Body param: Indicates whether the image requires a signature token
                    to be accessed."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Image unique identifier.
                  uploadURL:
                    type: string
                    description: The URL the unauthenticated upload can be performed to using a
                      single HTTP POST (multipart/form-data) request.
      x-distilled-response-path: result
      x-distilled-errors:
        ImagesAccessNotEnabled:
          - code: 5403
        ImageAlreadyExists:
          - code: 5409
        InvalidUploadFormat:
          - code: 5415
