  /accounts/{account_id}/load_balancers/monitors/{monitorId}:
    get:
      operationId: getMonitor
      description: "List a single configured monitor for an account.  @example ```ts
        const monitor = await client.loadBalancers.monitors.get(
        'f1aba936b94213e5b8dca0c0dbf1f9cc', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: monitorId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  allow_insecure:
                    type: boolean
                    description: Do not validate the certificate when monitor use HTTPS. This
                      parameter is currently only valid for HTTP and HTTPS
                      monitors.
                  consecutive_down:
                    type: number
                    description: To be marked unhealthy the monitored origin must fail this
                      healthcheck N consecutive times.
                  consecutive_up:
                    type: number
                    description: To be marked healthy the monitored origin must pass this
                      healthcheck N consecutive times.
                  created_on:
                    type: string
                  description:
                    type: string
                    description: Object description.
                  expected_body:
                    type: string
                    description: A case-insensitive sub-string to look for in the response body. If
                      this string is not found, the origin will be marked as
                      unhealthy. This parameter is only valid for HTTP and HTTPS
                      monitors.
                  expected_codes:
                    type: string
                    description: The expected HTTP response code or code range of the health check.
                      This parameter is only valid for HTTP and HTTPS monitors.
                  follow_redirects:
                    type: boolean
                    description: Follow redirects if returned by the origin. This parameter is only
                      valid for HTTP and HTTPS monitors.
                  header:
                    type: object
                    additionalProperties: true
                    description: The HTTP request headers to send in the health check. It is
                      recommended you set a Host header by default. The
                      User-Agent header cannot be overridden. This parameter is
                      only valid for HTTP and HTTPS monitors.
                  interval:
                    type: number
                    description: The interval between each health check. Shorter intervals may
                      improve failover time, but will increase load on the
                      origins as we check from multiple locations.
                  method:
                    type: string
                    description: The method to use for the health check. This defaults to 'GET' for
                      HTTP/HTTPS based checks and 'connection_established' for
                      TCP based health checks.
                  modified_on:
                    type: string
                  path:
                    type: string
                    description: The endpoint path you want to conduct a health check against. This
                      parameter is only valid for HTTP and HTTPS monitors.
                  port:
                    oneOf:
                      - type: number
                    nullable: true
                    description: "The port number to connect to for the health check. Required for
                      TCP, UDP, and SMTP checks. HTTP and HTTPS checks should
                      only define the port when using a non-standard port (HTTP:
                      default 80, HTTPS: default 443)."
                  probe_zone:
                    type: string
                    description: Assign this monitor to emulate the specified zone while probing.
                      This parameter is only valid for HTTP and HTTPS monitors.
                  retries:
                    type: number
                    description: The number of retries to attempt in case of a timeout before
                      marking the origin as unhealthy. Retries are attempted
                      immediately.
                  timeout:
                    type: number
                    description: The timeout (in seconds) before marking the health check as failed.
                  type:
                    type: string
                    enum:
                      - http
                      - https
                      - tcp
                      - udp_icmp
                      - icmp_ping
                      - smtp
                    description: The protocol to use for the health check. Currently supported
                      protocols are 'HTTP','HTTPS', 'TCP', 'ICMP-PING',
                      'UDP-ICMP', and 'SMTP'.
      x-distilled-response-path: result
    put:
      operationId: updateMonitor
      description: "Modify a configured monitor.  @example ```ts const monitor = await
        client.loadBalancers.monitors.update(
        'f1aba936b94213e5b8dca0c0dbf1f9cc', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: monitorId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                allow_insecure:
                  type: boolean
                  description: "Body param: Do not validate the certificate when monitor use
                    HTTPS. This parameter is currently only valid for HTTP and
                    HTTPS monitors."
                consecutive_down:
                  type: number
                  description: "Body param: To be marked unhealthy the monitored origin must fail
                    this healthcheck N consecutive times."
                consecutive_up:
                  type: number
                  description: "Body param: To be marked healthy the monitored origin must pass
                    this healthcheck N consecutive times."
                description:
                  type: string
                  description: "Body param: Object description."
                expected_body:
                  type: string
                  description: "Body param: A case-insensitive sub-string to look for in the
                    response body. If this string is not found, the origin will
                    be marked as unhealthy. This parameter is only valid for
                    HTTP and HTTPS monitors."
