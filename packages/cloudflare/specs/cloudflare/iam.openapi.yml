  /oauth/scopes:
    get:
      operationId: listOauthScopes
      description: List all available OAuth scopes. This endpoint requires
        authentication but has no authorization role requirements.  @example
        ```ts // Automatically fetches more pages as needed. for await (const
        oauthScopeListResponse of client.iam.oauthScopes.list()) { // ... } ```
      responses:
