      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                allowed_cors_origins:
                  type: array
                  items:
                    type: string
                  description: "Body param: Array of allowed CORS origins."
                client_name:
                  type: string
                  description: "Body param: Human-readable name of the OAuth client."
                client_uri:
                  type: string
                  description: "Body param: URL of the home page of the client."
                grant_types:
                  type: array
                  items:
                    type: string
                    enum:
                      - authorization_code
                      - refresh_token
                  description: "Body param: Array of OAuth grant types the client is allowed to
                    use. `authorization_code` is required; `refresh_token` may
                    be included optionally."
                logo_uri:
                  type: string
                  description: "Body param: URL of the client's logo."
                policy_uri:
                  type: string
                  description: "Body param: URL that points to a privacy policy document."
                post_logout_redirect_uris:
                  type: array
                  items:
                    type: string
                  description: "Body param: Array of allowed post-logout redirect URIs."
                redirect_uris:
                  type: array
                  items:
                    type: string
                  description: "Body param: Array of allowed redirect URIs for the client."
                response_types:
                  type: array
                  items:
                    type: string
                    enum:
                      - token
                      - id_token
                      - code
                  description: "Body param: Array of OAuth response types the client is allowed to
                    use."
                scopes:
                  type: array
                  items:
                    type: string
                  description: "Body param: Array of OAuth scopes the client is allowed to
                    request. Colon-delimited scopes are not accepted.
                    Dot-delimited scopes are validated against available OAuth
