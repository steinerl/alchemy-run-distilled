openapi: 3.1.0
info:
  title: Cloudflare IAM API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: iam
paths:
  /accounts/{account_id}/oauth_clients/{oauthClientId}:
    get:
      operationId: getOauthClient
      description: "Get details of a specific OAuth client.  @example ```ts const
        oauthClient = await client.iam.oauthClients.get(
        'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: oauthClientId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account identifier tag.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                    description: The unique identifier for an OAuth client.
                  visibility:
                    type: string
                    enum:
                      - public
                      - private
                    description: Visibility of the OAuth client.
                  allowed_cors_origins:
                    type: array
                    items:
                      type: string
                    description: Array of allowed CORS origins.
                  client_name:
                    type: string
                    description: Human-readable name of the OAuth client.
                  client_uri:
                    type: string
                    description: URL of the home page of the client.
                  client_uri_verification:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - pending
                          - in_progress
                          - verified
                          - failed
                        description: Current verification status for the client URI host.
                      text:
                        type: string
                        description: Exact TXT record value that must be added to DNS to prove ownership
                          of the client URI host.
                    description: Client URI domain control verification state.
                  created_at:
                    type: string
                    description: Timestamp when the OAuth client was created.
                  grant_types:
                    type: array
                    items:
                      type: string
                      enum:
                        - authorization_code
                        - refresh_token
                    description: Array of OAuth grant types the client is allowed to use.
                      `authorization_code` is required; `refresh_token` may be
                      included optionally.
                  has_rotated_secret:
                    type: boolean
                    description: Indicates whether the client has a rotated secret that has not yet
                      been deleted.
                  logo_uri:
                    type: string
                    description: URL of the client's logo.
                  policy_uri:
                    type: string
                    description: URL that points to a privacy policy document.
                  post_logout_redirect_uris:
                    type: array
                    items:
                      type: string
                    description: Array of allowed post-logout redirect URIs.
                  promoted_at:
                    type: string
                    description: Timestamp when the OAuth client was promoted to public visibility.
                  redirect_uris:
                    type: array
                    items:
                      type: string
                    description: Array of allowed redirect URIs for the client.
                  response_types:
                    type: array
                    items:
                      type: string
                      enum:
                        - token
                        - id_token
                        - code
                    description: Array of OAuth response types the client is allowed to use.
                  scopes:
                    type: array
                    items:
                      type: string
                    description: Array of OAuth scopes the client is allowed to request.
                      Colon-delimited scopes are not accepted. Dot-delimited
                      scopes are validated against available OAuth API scopes;
                      simple identity scopes are allowed. Protocol scopes
                      `offline_access` and `openid` are added or removed
                      automatically based on `grant_types` and `response_types`.
                  token_endpoint_auth_method:
                    type: string
                    enum:
                      - none
                      - client_secret_basic
                      - client_secret_post
                    description: The authentication method the client uses at the token endpoint.
                  tos_uri:
                    type: string
                    description: URL that points to a terms of service document.
                  updated_at:
                    type: string
                    description: Timestamp when the OAuth client was last updated.
                required:
                  - client_id
                  - visibility
      x-distilled-response-path: result
    patch:
      operationId: patchOauthClient
      description: "Update an existing OAuth client. Only include fields you want to
        update.  @example ```ts const oauthClient = await
        client.iam.oauthClients.update( 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
