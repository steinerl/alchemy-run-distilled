    post:
      operationId: createOauthClient
      description: "Create a new OAuth client for an account.  @example ```ts const
        oauthClient = await client.iam.oauthClients.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', client_name: 'My OAuth App',
        grant_types: ['authorization_code', 'refresh_token'], redirect_uris:
