                      on this state; it will not resolve on its own without user
                      intervention. - `blocked`: The workflow cannot make
                      progress due to a third party such as the domain
                      extension's registry or a losing registrar. No user action
                      will help. Continue polling — the block may resolve when
                      the third party responds. - `succeeded`: Terminal. The
                      operation completed successfully. `completed` will be
                      `true`. For registrations, `context.registration` contains
