                    description: "Workflow lifecycle state.  - `pending`: Workflow has been created
                      but not yet started processing. - `in_progress`: Actively
                      processing. Continue polling `links.self`. The workflow
                      has an internal deadline and will not remain in this state
                      indefinitely. - `action_required`: Paused — requires
                      action by the user (not the system). See `context.action`
