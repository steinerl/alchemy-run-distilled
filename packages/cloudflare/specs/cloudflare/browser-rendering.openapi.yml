  /accounts/{account_id}/browser-rendering/json:
    post:
      operationId: createJson
      description: "Gets json from a webpage from a provided URL or HTML. Pass
        `prompt` or `schema` in the body. Control page loading with
        `gotoOptions` and `waitFor ` options.  @example ```ts const json = await
        client.browserRendering.json.create({ account_id: 'account_id', html:
        '<h1>Hello World!</h1>', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cacheTTL
          in: query
          required: false
          description: "Query param: Cache TTL default is 5s. Set to 0 to disable."
          schema:
            type: number
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                html:
                  type: string
                  description: "Body param: Set the content of the page, eg: `<h1>Hello
                    World!!</h1>`. Either `html` or `url` must be set."
                actionTimeout:
                  type: number
                  description: "Body param: The maximum duration allowed for the browser action to
                    complete after the page has loaded (such as taking
                    screenshots, extracting content, or generating PDFs). If
                    this time limit is exceeded, the action stops and returns a
                    timeout error."
                addScriptTag:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      content:
                        type: string
                      type:
                        type: string
                      url:
                        type: string
                  description: "Body param: Adds a `<script>` tag into the page with the desired
                    URL or content."
                addStyleTag:
                  type: array
                  items:
                    type: object
                    properties:
                      content:
                        type: string
                      url:
                        type: string
                  description: 'Body param: Adds a `<link rel="stylesheet">` tag into the page
                    with the desired URL or a `<style type="text/css">` tag with
                    the content.'
                allowRequestPattern:
                  type: array
                  items:
                    type: string
                  description: "Body param: Only allow requests that match the provided regex
                    patterns, eg. '/^.\\ \\.(css)'."
                allowResourceTypes:
                  type: array
                  items:
                    type: string
                    enum:
                      - document
                      - stylesheet
                      - image
                      - media
                      - font
                      - script
                      - texttrack
                      - xhr
                      - fetch
                      - prefetch
                      - eventsource
                      - websocket
                      - manifest
                      - signedexchange
                      - ping
                      - cspviolationreport
                      - preflight
                      - other
                  description: "Body param: Only allow requests that match the provided resource
                    types, eg. 'image' or 'script'."
                authenticate:
                  type: object
                  properties:
                    password:
                      type: string
                    username:
                      type: string
                  required:
                    - password
                    - username
                  description: "Body param: Provide credentials for HTTP authentication."
                bestAttempt:
                  type: boolean
                  description: "Body param: Attempt to proceed when 'awaited' events fail or
                    timeout."
                cookies:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Cookie name.
                      value:
                        type: string
                      domain:
                        type: string
                      expires:
                        type: number
                      httpOnly:
                        type: boolean
                      partitionKey:
                        type: string
                      path:
                        type: string
                      priority:
                        type: string
                        enum:
                          - Low
                          - Medium
                          - High
                      sameParty:
                        type: boolean
                      sameSite:
                        type: string
                        enum:
                          - Strict
                          - Lax
                          - None
                      secure:
                        type: boolean
                      sourcePort:
                        type: number
                      sourceScheme:
                        type: string
                        enum:
                          - Unset
                          - NonSecure
                          - Secure
                      url:
                        type: string
                    required:
                      - name
                      - value
                  description: "Body param: Check
                    [options](https://pptr.dev/api/puppeteer.page.setcookie)."
                custom_ai:
                  type: array
                  items:
                    type: object
                    properties:
                      model:
                        type: string
                        description: AI model to use for the request. Must be formed as
                          `<provider>/<model_name>`, e.g.
                          `workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast`.
                      authorization:
                        type: string
                        description: "Authorization token for the AI model: `Bearer <token>`. Not needed
                          for workers-ai models."
                    required:
                      - model
                  description: "Body param: Optional list of custom AI models to use for the
                    request. The models will be tried in the order provided, and
                    in case a model returns an error, the next one will be used
                    as fallback."
                emulateMediaType:
                  type: string
                  description: Body param
                gotoOptions:
                  type: object
                  properties:
                    referer:
                      type: string
                    referrerPolicy:
                      type: string
                    timeout:
                      type: number
                    waitUntil:
                      oneOf:
                        - type: string
                          enum:
                            - load
                        - type: string
                          enum:
                            - domcontentloaded
                        - type: string
                          enum:
                            - networkidle0
                        - type: string
                          enum:
                            - networkidle2
                        - type: array
                          items:
                            type: string
                            enum:
                              - load
                              - domcontentloaded
                              - networkidle0
                              - networkidle2
                  description: "Body param: Check
                    [options](https://pptr.dev/api/puppeteer.gotooptions)."
                prompt:
                  type: string
                  description: Body param
                rejectRequestPattern:
                  type: array
                  items:
                    type: string
                  description: "Body param: Block undesired requests that match the provided regex
                    patterns, eg. '/^.\\ \\.(css)'."
                rejectResourceTypes:
                  type: array
                  items:
                    type: string
                    enum:
                      - document
                      - stylesheet
                      - image
                      - media
                      - font
                      - script
                      - texttrack
                      - xhr
                      - fetch
                      - prefetch
                      - eventsource
                      - websocket
                      - manifest
                      - signedexchange
                      - ping
                      - cspviolationreport
                      - preflight
                      - other
                  description: "Body param: Block undesired requests that match the provided
                    resource types, eg. 'image' or 'script'."
                response_format:
                  type: object
                  properties:
                    type:
                      type: string
                    json_schema:
                      oneOf:
                        - type: object
                          additionalProperties: true
                      nullable: true
                      description: "Schema for the response format. More information here:
                        https://developers.cloudflare.com/workers-ai/json-mode/"
                  required:
                    - type
                  description: Body param
                setExtraHTTPHeaders:
                  type: object
                  additionalProperties: true
                  description: Body param
                setJavaScriptEnabled:
                  type: boolean
                  description: Body param
                userAgent:
                  type: string
                  description: Body param
                viewport:
                  type: object
                  properties:
                    height:
                      type: number
                    width:
                      type: number
                    deviceScaleFactor:
                      type: number
                    hasTouch:
                      type: boolean
                    isLandscape:
                      type: boolean
                    isMobile:
                      type: boolean
                  required:
                    - height
                    - width
                  description: "Body param: Check
                    [options](https://pptr.dev/api/puppeteer.page.setviewport)."
                waitForSelector:
                  type: object
                  properties:
                    selector:
                      type: string
                    hidden:
                      type: boolean
                      enum:
                        - true
                    timeout:
                      type: number
                    visible:
                      type: boolean
                      enum:
                        - true
                  required:
                    - selector
                  description: "Body param: Wait for the selector to appear in page. Check
                    [options](https://pptr.dev/api/puppeteer.page.waitforselect\
                    or)."
                waitForTimeout:
                  type: number
                  description: "Body param: Waits for a specified timeout before continuing."
                url:
                  type: string
                  description: "Body param: URL to navigate to, eg. `https://example.com`."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      x-distilled-response-path: result
