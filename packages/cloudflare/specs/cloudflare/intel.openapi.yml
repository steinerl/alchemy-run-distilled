openapi: 3.1.0
info:
  title: Cloudflare INTEL API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: intel
paths:
  /accounts/{account_id}/intel/asn/{asn}:
    get:
      operationId: getAsn
      description: "Gets an overview of the Autonomous System Number (ASN) and a list
        of subnets for it.  @example ```ts const asn = await
        client.intel.asn.get(0, { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
        - name: asn
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: number
      x-distilled-response-path: result
  /accounts/{account_id}/intel/asn/{asn}/subnets:
    get:
      operationId: getAsnSubnet
      description: "Get ASN Subnets.  @example ```ts const subnet = await
        client.intel.asn.subnets.get(0, { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
        - name: asn
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  asn:
                    type: number
                  count:
                    type: number
                    description: Total results returned based on your search parameters.
                  ip_count_total:
                    type: number
                  page:
                    type: number
                    description: Current page within paginated list of results.
                  per_page:
                    type: number
                    description: Number of results per page of results.
                  subnets:
                    type: array
                    items:
                      type: string
  /accounts/{account_id}/intel/attack-surface-report/issues:
    get:
      operationId: listAttackSurfaceReportIssues
      description: Lists all Security Center issues for the account, showing active
        security problems requiring attention.  @deprecated
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: dismissed
          in: query
          required: false
          description: Query param
          schema:
            type: boolean
        - name: issue_class
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
        - name: issue_class~neq
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
        - name: issue_type
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
              enum:
                - compliance_violation
                - email_security
                - exposed_infrastructure
                - insecure_configuration
                - weak_authentication
                - configuration_suggestion
        - name: issue_type~neq
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
              enum:
                - compliance_violation
                - email_security
                - exposed_infrastructure
                - insecure_configuration
                - weak_authentication
                - configuration_suggestion
        - name: product
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
        - name: product~neq
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
        - name: severity
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
              enum:
                - low
                - moderate
                - critical
        - name: severity~neq
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
              enum:
                - low
                - moderate
                - critical
        - name: subject
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
        - name: subject~neq
          in: query
          required: false
          description: Query param
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: number
                    description: Indicates the total number of results.
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        dismissed:
                          type: boolean
                        has_extended_context:
                          type: boolean
                          description: Indicates whether the insight has a large payload that requires
                            fetching via the context endpoint.
                        issue_class:
                          type: string
                        issue_type:
                          type: string
                          enum:
                            - compliance_violation
                            - email_security
                            - exposed_infrastructure
                            - insecure_configuration
                            - weak_authentication
                            - configuration_suggestion
                        payload:
                          type: object
                          properties:
                            detection_method:
                              type: string
                              description: Describes the method used to detect insight.
                            zone_tag:
                              type: string
                        resolve_link:
                          type: string
                        resolve_text:
                          type: string
                        severity:
                          type: string
                          enum:
                            - Low
                            - Moderate
                            - Critical
                        since:
                          type: string
                        status:
                          type: string
                          enum:
                            - active
                            - resolved
                          description: The current status of the insight.
                        subject:
                          type: string
                        timestamp:
                          type: string
                        user_classification:
                          type: string
                          enum:
                            - false_positive
                            - accept_risk
                            - other
                          nullable: true
                          description: User-defined classification for the insight. Can be
                            'false_positive', 'accept_risk', 'other', or null.
                  page:
                    type: number
                    description: Specifies the current page within paginated list of results.
                  per_page:
                    type: number
                    description: Sets the number of results per page of results.
      x-distilled-pagination-class: IssueListResponsesV4PagePagination
