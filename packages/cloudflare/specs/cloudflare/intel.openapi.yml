      x-distilled-pagination-class: IssueTypeGetResponsesSinglePage
  /accounts/{account_id}/intel/dns:
    get:
      operationId: listDns
      description: "Gets a list of all the domains that have resolved to a specific IP
        address.  @example ```ts // Automatically fetches more pages as needed.
        for await (const dns of client.intel.dns.list({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', })) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: ipv4
          in: query
          required: false
          description: Query param
          schema:
            type: string
        - name: start_end_params
          in: query
          required: false
          description: Query param
          schema:
            type: object
            properties:
              end:
                type: string
                description: Defaults to the current date.
              start:
                type: string
                description: Defaults to 30 days before the end parameter value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: number
                    description: Total results returned based on your search parameters.
                  page:
                    type: number
                    description: Current page within paginated list of results.
                  per_page:
                    type: number
                    description: Number of results per page of results.
                  reverse_records:
                    type: array
                    items:
                      type: object
                      properties:
                        first_seen:
                          type: string
                          description: First seen date of the DNS record during the time period.
                        hostname:
                          type: string
                          description: Hostname that the IP was observed resolving to.
                        last_seen:
                          type: string
                          description: Last seen date of the DNS record during the time period.
                    description: Reverse DNS look-ups observed during the time period.
      x-distilled-pagination-class: DNSV4PagePagination
  /accounts/{account_id}/intel/domain:
    get:
      operationId: getDomain
      description: "Gets security details and statistics about a domain.  @example
        ```ts const domain = await client.intel.domains.get({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: domain
          in: query
          required: false
          description: Query param
          schema:
            type: string
        - name: skip_dns
          in: query
          required: false
          description: "Query param: Skip DNS resolution lookups for faster response."
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  additional_information:
                    type: object
                    properties:
                      suspected_malware_family:
                        type: string
                        description: Suspected DGA malware family.
                    description: Additional information related to the host name.
                  application:
                    type: object
                    properties:
                      id:
                        type: number
                      name:
                        type: string
                    description: Application that the hostname belongs to.
                  content_categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        name:
                          type: string
                        super_category_id:
                          type: number
                  domain:
                    type: string
                  inherited_content_categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        name:
                          type: string
                        super_category_id:
                          type: number
                  inherited_from:
                    type: string
                    description: Domain from which `inherited_content_categories` and
                      `inherited_risk_types` are inherited, if applicable.
                  inherited_risk_types:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        name:
                          type: string
                        super_category_id:
                          type: number
                  popularity_rank:
                    type: number
                    description: Global Cloudflare 100k ranking for the last 30 days, if available
                      for the hostname. The top ranked domain is 1, the lowest
                      ranked domain is 100,000.
                  resolves_to_refs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: "STIX 2.1 identifier:
                            https://docs.oasis-open.org/cti/stix/v2.1/cs02/stix\
                            -v2.1-cs02.html#_64yvzeku5a5c."
                        value:
                          type: string
                          description: IP address or domain name.
                    description: Specifies a list of references to one or more IP addresses or
                      domain names that the domain name currently resolves to.
                  risk_score:
                    type: number
                    description: Hostname risk score, which is a value between 0 (lowest risk) to 1
                      (highest risk).
                  risk_types:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        name:
                          type: string
                        super_category_id:
                          type: number
      x-distilled-response-path: result
