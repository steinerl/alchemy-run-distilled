name: pr-package

on:
  push:
    branches: [main]
  pull_request:
    # `labeled` so adding the `force-ci` label re-triggers the run. We
    # intentionally do NOT listen to `closed` — pr-package tags persist
    # past PR close so existing install URLs keep resolving.
    types: [opened, synchronize, reopened, labeled]

# Reusable workflows can't widen permissions — the caller must grant
# `pull-requests: write` for the sticky install-instructions comment.
permissions:
  contents: read
  pull-requests: write

jobs:
  pr-package:
    uses: alchemy-run/actions/.github/workflows/pr-package.yml@67b1515cf5774c16a0666f4480d21b03443e6091 # main
    with:
      install-host: pkg.distilled.cloud
      packages: |
        [
          { "dir": "packages/core",            "name": "@distilled.cloud/core",            "install": "core" },
          { "dir": "packages/aws",             "name": "@distilled.cloud/aws",             "install": "aws",             "runner": "ubuntu-22-large" },
          { "dir": "packages/axiom",           "name": "@distilled.cloud/axiom",           "install": "axiom" },
          { "dir": "packages/azure",           "name": "@distilled.cloud/azure",           "install": "azure" },
          { "dir": "packages/cloudflare",      "name": "@distilled.cloud/cloudflare",      "install": "cloudflare" },
          { "dir": "packages/coinbase",        "name": "@distilled.cloud/coinbase",        "install": "coinbase" },
          { "dir": "packages/expo-eas",        "name": "@distilled.cloud/expo-eas",        "install": "expo-eas" },
          { "dir": "packages/fly-io",          "name": "@distilled.cloud/fly-io",          "install": "fly-io" },
          { "dir": "packages/gcp",             "name": "@distilled.cloud/gcp",             "install": "gcp",             "runner": "ubuntu-22-large" },
          { "dir": "packages/kubernetes",      "name": "@distilled.cloud/kubernetes",      "install": "kubernetes" },
          { "dir": "packages/mongodb-atlas",   "name": "@distilled.cloud/mongodb-atlas",   "install": "mongodb-atlas" },
          { "dir": "packages/neon",            "name": "@distilled.cloud/neon",            "install": "neon" },
          { "dir": "packages/planetscale",     "name": "@distilled.cloud/planetscale",     "install": "planetscale" },
          { "dir": "packages/posthog",         "name": "@distilled.cloud/posthog",         "install": "posthog" },
          { "dir": "packages/prisma-postgres", "name": "@distilled.cloud/prisma-postgres", "install": "prisma-postgres" },
          { "dir": "packages/stripe",          "name": "@distilled.cloud/stripe",          "install": "stripe" },
          { "dir": "packages/supabase",        "name": "@distilled.cloud/supabase",        "install": "supabase" },
          { "dir": "packages/turso",           "name": "@distilled.cloud/turso",           "install": "turso" },
          { "dir": "packages/typesense",       "name": "@distilled.cloud/typesense",       "install": "typesense" },
          { "dir": "packages/workos",          "name": "@distilled.cloud/workos",          "install": "workos" }
        ]
    secrets: inherit
