name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      aws: ${{ steps.changes.outputs.aws }}
      cloudflare: ${{ steps.changes.outputs.cloudflare }}
      gcp: ${{ steps.changes.outputs.gcp }}
      neon: ${{ steps.changes.outputs.neon }}
      planetscale: ${{ steps.changes.outputs.planetscale }}
      prisma-postgres: ${{ steps.changes.outputs.prisma-postgres }}
      stripe: ${{ steps.changes.outputs.stripe }}
      supabase: ${{ steps.changes.outputs.supabase }}
      azure: ${{ steps.changes.outputs.azure }}
      kubernetes: ${{ steps.changes.outputs.kubernetes }}
      coinbase: ${{ steps.changes.outputs.coinbase }}
      mongodb-atlas: ${{ steps.changes.outputs.mongodb-atlas }}
      fly-io: ${{ steps.changes.outputs.fly-io }}
      turso: ${{ steps.changes.outputs.turso }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            core:
              - 'packages/core/**'
            aws:
              - 'packages/aws/**'
              - 'packages/core/**'
            cloudflare:
              - 'packages/cloudflare/**'
              - 'packages/core/**'
            gcp:
              - 'packages/gcp/**'
              - 'packages/core/**'
            neon:
              - 'packages/neon/**'
              - 'packages/core/**'
            planetscale:
              - 'packages/planetscale/**'
              - 'packages/core/**'
            prisma-postgres:
              - 'packages/prisma-postgres/**'
              - 'packages/core/**'
            stripe:
              - 'packages/stripe/**'
              - 'packages/core/**'
            supabase:
              - 'packages/supabase/**'
              - 'packages/core/**'
            azure:
              - 'packages/azure/**'
              - 'packages/core/**'
            kubernetes:
              - 'packages/kubernetes/**'
              - 'packages/core/**'
            coinbase:
              - 'packages/coinbase/**'
              - 'packages/core/**'
            mongodb-atlas:
              - 'packages/mongodb-atlas/**'
              - 'packages/core/**'
            fly-io:
              - 'packages/fly-io/**'
              - 'packages/core/**'
            turso:
              - 'packages/turso/**'
              - 'packages/core/**'

  ci-core:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
        working-directory: packages/core

  ci-aws:
    needs: detect-changes
    if: needs.detect-changes.outputs.aws == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::391965393224:role/distilled-github-oidc-role
          aws-region: us-west-2
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - name: Fetch AWS specs submodules
        run: |
          git submodule update --force --init --recursive --depth=1 specs/api-models-aws
          git -C specs/api-models-aws checkout -- .
          git submodule update --force --init --recursive --depth=1 specs/aws-sdk-js-v3
          git -C specs/aws-sdk-js-v3 checkout -- .
          git submodule update --force --init --recursive --depth=1 specs/smithy
          git -C specs/smithy checkout -- .
          git submodule update --force --init --recursive --depth=1 specs/smithy-typescript
          git -C specs/smithy-typescript checkout -- .
        working-directory: packages/aws
      - run: bun run check
        working-directory: packages/aws
      - run: bun run test
        working-directory: packages/aws

  ci-cloudflare:
    needs: detect-changes
    if: needs.detect-changes.outputs.cloudflare == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/cloudflare
      - run: bun run test
        working-directory: packages/cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_API_EMAIL: ${{ secrets.CLOUDFLARE_API_EMAIL }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACM_ZONE_ID: ${{ secrets.CLOUDFLARE_ACM_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  ci-gcp:
    needs: detect-changes
    if: needs.detect-changes.outputs.gcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      # disable until we can optimize because its wayyy to big rn 
      # - run: bun run check
      #   working-directory: packages/gcp

  ci-neon:
    needs: detect-changes
    if: needs.detect-changes.outputs.neon == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/neon
      - run: bun run test
        working-directory: packages/neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

  ci-planetscale:
    needs: detect-changes
    if: needs.detect-changes.outputs.planetscale == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/planetscale
      - run: bun run test
        working-directory: packages/planetscale
        env:
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}

  ci-prisma-postgres:
    needs: detect-changes
    if: needs.detect-changes.outputs.prisma-postgres == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/prisma-postgres

  ci-stripe:
    needs: detect-changes
    if: needs.detect-changes.outputs.stripe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/stripe

  ci-supabase:
    needs: detect-changes
    if: needs.detect-changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/supabase

  ci-mongodb-atlas:
    needs: detect-changes
    if: needs.detect-changes.outputs.mongodb-atlas == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/mongodb-atlas

  ci-fly-io:
    needs: detect-changes
    if: needs.detect-changes.outputs.fly-io == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/fly-io

  ci-turso:
    needs: detect-changes
    if: needs.detect-changes.outputs.turso == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/turso

  ci-coinbase:
    needs: detect-changes
    if: needs.detect-changes.outputs.coinbase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/coinbase

  ci-kubernetes:
    needs: detect-changes
    if: needs.detect-changes.outputs.kubernetes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/kubernetes

  ci-azure:
    needs: detect-changes
    if: needs.detect-changes.outputs.azure == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/azure
