name: Release NPM Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Release spec. Empty = next beta. `patch|minor|major` or `x.y.z`
          for a stable release. `beta` / `beta.N` / `alpha` / `alpha.N`
          for a prerelease. Anything else = tag release on
          `0.0.0-<name>`.
        required: false
        type: string
        default: ""

# Reusable workflows can't widen permissions — the caller must grant
# `contents: write` (commit + tag) and `id-token: write` (npm OIDC).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: alchemy-run/actions/.github/workflows/release.yml@67b1515cf5774c16a0666f4480d21b03443e6091 # main
    with:
      version: ${{ inputs.version }}
      repo: alchemy-run/distilled
      current-version: "0.22.0"
      # Each package builds inside its own publish job; aws and gcp run
      # on a larger runner because their builds are too heavy for the
      # default ubuntu-latest box.
      build-mode: per-package
      build-command: "bun run build"
      packages: |
        [
          { "dir": "packages/core",            "name": "@distilled.cloud/core" },
          { "dir": "packages/aws",             "name": "@distilled.cloud/aws",             "runner": "ubuntu-22-large" },
          { "dir": "packages/axiom",           "name": "@distilled.cloud/axiom" },
          { "dir": "packages/azure",           "name": "@distilled.cloud/azure" },
          { "dir": "packages/cloudflare",      "name": "@distilled.cloud/cloudflare" },
          { "dir": "packages/coinbase",        "name": "@distilled.cloud/coinbase" },
          { "dir": "packages/expo-eas",        "name": "@distilled.cloud/expo-eas" },
          { "dir": "packages/fly-io",          "name": "@distilled.cloud/fly-io" },
          { "dir": "packages/gcp",             "name": "@distilled.cloud/gcp",             "runner": "ubuntu-22-large" },
          { "dir": "packages/kubernetes",      "name": "@distilled.cloud/kubernetes" },
          { "dir": "packages/mongodb-atlas",   "name": "@distilled.cloud/mongodb-atlas" },
          { "dir": "packages/neon",            "name": "@distilled.cloud/neon" },
          { "dir": "packages/planetscale",     "name": "@distilled.cloud/planetscale" },
          { "dir": "packages/posthog",         "name": "@distilled.cloud/posthog" },
          { "dir": "packages/prisma-postgres", "name": "@distilled.cloud/prisma-postgres" },
          { "dir": "packages/stripe",          "name": "@distilled.cloud/stripe" },
          { "dir": "packages/supabase",        "name": "@distilled.cloud/supabase" },
          { "dir": "packages/turso",           "name": "@distilled.cloud/turso" },
          { "dir": "packages/typesense",       "name": "@distilled.cloud/typesense" },
          { "dir": "packages/workos",          "name": "@distilled.cloud/workos" }
        ]
    secrets: inherit
