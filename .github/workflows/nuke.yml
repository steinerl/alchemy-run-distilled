      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - name: Run nuke script
        run: bun scripts/nuke.ts
        working-directory: packages/neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

  # ── Prisma Postgres ──
  nuke-prisma-postgres:
    needs: gate
    if: needs.gate.outputs.run == 'true' && (github.event_name == 'merge_group' || inputs.all || inputs.prisma-postgres)
