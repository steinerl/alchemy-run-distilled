      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - name: Run nuke script
        run: bun scripts/nuke.ts
        working-directory: packages/prisma-postgres
        env:
          PRISMA_POSTGRES_API_TOKEN: ${{ secrets.PRISMA_POSTGRES_API_TOKEN }}

  # ── Stripe ──
  nuke-stripe:
    needs: gate
    if: needs.gate.outputs.run == 'true' && (github.event_name == 'merge_group' || inputs.all || inputs.stripe)
