name: Publish Preview Package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      aws: ${{ steps.changes.outputs.aws }}
      cloudflare: ${{ steps.changes.outputs.cloudflare }}
      gcp: ${{ steps.changes.outputs.gcp }}
      neon: ${{ steps.changes.outputs.neon }}
      planetscale: ${{ steps.changes.outputs.planetscale }}
      prisma-postgres: ${{ steps.changes.outputs.prisma-postgres }}
      stripe: ${{ steps.changes.outputs.stripe }}
      supabase: ${{ steps.changes.outputs.supabase }}
      azure: ${{ steps.changes.outputs.azure }}
      kubernetes: ${{ steps.changes.outputs.kubernetes }}
      coinbase: ${{ steps.changes.outputs.coinbase }}
      mongodb-atlas: ${{ steps.changes.outputs.mongodb-atlas }}
      fly-io: ${{ steps.changes.outputs.fly-io }}
      turso: ${{ steps.changes.outputs.turso }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            core:
              - 'packages/core/**'
            aws:
              - 'packages/aws/**'
              - 'packages/core/**'
            cloudflare:
              - 'packages/cloudflare/**'
              - 'packages/core/**'
            gcp:
              - 'packages/gcp/**'
              - 'packages/core/**'
            neon:
              - 'packages/neon/**'
              - 'packages/core/**'
            planetscale:
              - 'packages/planetscale/**'
              - 'packages/core/**'
            prisma-postgres:
              - 'packages/prisma-postgres/**'
              - 'packages/core/**'
            stripe:
              - 'packages/stripe/**'
              - 'packages/core/**'
            supabase:
              - 'packages/supabase/**'
            azure:
              - 'packages/azure/**'
              - 'packages/core/**'
            kubernetes:
              - 'packages/kubernetes/**'
              - 'packages/core/**'
            coinbase:
              - 'packages/coinbase/**'
              - 'packages/core/**'
            mongodb-atlas:
              - 'packages/mongodb-atlas/**'
              - 'packages/core/**'
            fly-io:
              - 'packages/fly-io/**'
              - 'packages/core/**'
            turso:
              - 'packages/turso/**'
              - 'packages/core/**'

  # All pkg-pr jobs run sequentially to avoid parallel publish conflicts.
  # Core runs first, then each package one-by-one in a chain.
  # Each job uses `always()` so the chain continues even if a previous job
  # was skipped (no changes), but checks `!failure() && !cancelled()` to
  # stop the chain if something actually broke.

  pkg-pr-core:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/core

  # pkg-pr-aws:
  #   needs: [detect-changes, pkg-pr-core]
  #   if: always() && !failure() && !cancelled() && needs.detect-changes.outputs.aws == 'true'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: latest
  #     - run: bun install --frozen-lockfile
  #     - run: bun run build
  #       working-directory: packages/core
  #     - run: bun run build
  #       working-directory: packages/aws
  #     - run: bun scripts/generate-pnpm-workspace.yaml.ts
  #     - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/aws

  pkg-pr-cloudflare:
    needs: [detect-changes, pkg-pr-core]
    if: always() && !failure() && !cancelled() && needs.detect-changes.outputs.cloudflare == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/cloudflare
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/cloudflare

  pkg-pr-gcp:
